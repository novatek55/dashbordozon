<script>

  { label: "Логистика % к выручке", bg: "var(--color-background-secondary)", color: "var(--color-text-secondary)", align: "right", w: "75px", vertical: true },
];

const hdr = document.getElementById("hdr");
cols.forEach(c => {
  const th = document.createElement("th");
  th.style.cssText = `height:140px; vertical-align:bottom; padding:0 4px 10px; border-bottom:0.5px solid var(--color-border-tertiary); background:${c.bg}; min-width:${c.w};`;
  if (c.vertical) {
    const d = document.createElement("div");
    d.style.cssText = `writing-mode:vertical-rl; transform:rotate(180deg); font-weight:500; color:${c.color}; font-size:11px; white-space:nowrap; margin:0 auto; line-height:1.3;`;
    d.textContent = c.label;
    th.appendChild(d);
  } else {
    th.style.textAlign = "left";
    th.style.paddingLeft = "12px";
    th.style.fontWeight = "500";
    th.style.color = c.color;
    th.style.fontSize = "11px";

});

const rows = [

const tbody = document.getElementById("tbody");

const sumRow = document.createElement("tr");

const sumData = ["Итого","6 744 377","873","827 992","771 381","11,4%","2 652 307","838 002","1 102 172","42%","6 744 377","873","144 687","2.75%","776 709","890"];
sumData.forEach((v, j) => {
  const td = document.createElement("td");
  td.style.cssText = `padding:10px ${j===0?'12':'8'}px; text-align:${j===0?'left':'right'}; font-size:12px; font-variant-numeric:tabular-nums; color:var(--color-text-primary);`;

  td.textContent = v;
  sumRow.appendChild(td);
});
tbody.appendChild(sumRow);

rows.forEach((row, i) => {
  const tr = document.createElement("tr");
  tr.style.borderBottom = "0.5px solid var(--color-border-tertiary)";
  if (i % 2 === 0) tr.style.background = "transparent";
  else tr.style.background = "var(--color-background-secondary)";

  row.forEach((cell, j) => {
    const td = document.createElement("td");
    td.style.cssText = `padding:9px ${j===0?'12':'8'}px; text-align:${cols[j].align}; font-size:12px; font-variant-numeric:tabular-nums;`;

    if (j === 0) {
      td.style.fontWeight = "500";
      td.style.whiteSpace = "nowrap";
      td.style.overflow = "hidden";
      td.style.textOverflow = "ellipsis";
      td.style.maxWidth = "160px";
      td.style.color = "var(--color-text-primary)";
    } else {
      const clean = cell.replace(/[%\s]/g, "");
      const num = parseFloat(clean);
      if (num === 0) {
        td.style.color = "var(--color-text-tertiary)";
      } else if (j >= 3 && j <= 5) {
        td.style.color = "#854F0B";
      } else if (j === 8 || j === 9) {
        td.style.color = "#0F6E56";
      } else if (j >= 12 && j <= 13) {
        td.style.color = "#A32D2D";
      } else {
        td.style.color = "var(--color-text-primary)";
      }
    }
    td.textContent = cell;

  });
