# Separate vhost for the Ozon dashboard.
# Keep it as a separate server_name so the WordPress site on newtekpro.ru is not touched.
#
# Direct IP access: http://80.87.203.161/
# Optional DNS: create an A record for ozon.newtekpro.ru pointing to the server.
# Upstream app: 127.0.0.1:18088, configured by /etc/ozon-dashboard.env.

server {
    listen 80;
    server_name ozon.newtekpro.ru 80.87.203.161;

    client_max_body_size 100m;

    location / {
        auth_basic "Ozon Dashboard";
        auth_basic_user_file /etc/nginx/ozon-dashboard.htpasswd;

        proxy_pass http://127.0.0.1:18088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
