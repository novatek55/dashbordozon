        const btnTotal = document.getElementById('advSummaryModeTotal');
        if (btnAd && btnTotal) {
          btnAd.style.background = !isTotal ? '#378ADD' : '#f1efe8';
          btnAd.style.color = !isTotal ? '#fff' : '#666';
          btnTotal.style.background = isTotal ? '#378ADD' : '#f1efe8';
          btnTotal.style.color = isTotal ? '#fff' : '#666';
        }
        // Update body cells
        document.querySelectorAll('#advSummaryBody tr.advSummaryRow').forEach(tr => {
          tr.querySelectorAll('td[data-col]').forEach(td => {
            const colKey = td.dataset.col;
            const colDef = cols.find(c => c.key === colKey);
            if (!colDef) return;
            const raw = Number(isTotal ? td.dataset.rawTotal : td.dataset.rawAd);
            td.textContent = colDef.fn(raw);
            const bg = cellColorForValue(RK, colKey, raw);
            td.style.backgroundColor = bg || '';
          });
        });
        // Update footer
        const ft = calcTotals(mode);
        document.querySelectorAll('#advSummaryFooter td[data-col]').forEach(td => {
          const colKey = td.dataset.col;
          const colDef = cols.find(c => c.key === colKey);
          if (colDef) td.textContent = colDef.fn(ft[colKey]);
        });
      };

      // Click → new tab
      window._advSummaryClick = function(tr) {
        const oid = tr.dataset.offer;
        if (!oid || oid.startsWith('SKU:')) return;
        const params = new URLSearchParams({report: 'advertising_report', offer_id: oid});
        if (dateFrom.value) params.set('date_from', dateFrom.value);
        if (dateTo.value) params.set('date_to', dateTo.value);
        window.open(window.location.pathname + '?' + params.toString(), '_blank');
      };

      // Sorting — reads current mode values from DOM data attributes
      window._advSummarySortKey = 'spent';
      window._advSummarySortAsc = false;
      const thCells = document.querySelectorAll('#advSummaryTable thead th[data-sort]');
      thCells.forEach(th => {
        th.addEventListener('click', function(e) {
          if (e.button !== 0) return;
          const key = this.dataset.sort;
          if (window._advSummarySortKey === key) {
            window._advSummarySortAsc = !window._advSummarySortAsc;
          } else {
            window._advSummarySortKey = key;
            window._advSummarySortAsc = false;
          }
          const isTotal = window._advSummaryMode === 'total';
          const rawAttr = isTotal ? 'rawTotal' : 'rawAd';
          const tbody = document.getElementById('advSummaryBody');
          if (!tbody) return;
          const rows = Array.from(tbody.querySelectorAll('tr.advSummaryRow'));
          rows.sort((a, b) => {
            if (key === 'offer_id') {
              const av = (a.dataset.offer || '').toLowerCase();
              const bv = (b.dataset.offer || '').toLowerCase();
              return av < bv ? (window._advSummarySortAsc ? -1 : 1) : av > bv ? (window._advSummarySortAsc ? 1 : -1) : 0;
            }
            const aTd = a.querySelector(`td[data-col="${key}"]`);
            const bTd = b.querySelector(`td[data-col="${key}"]`);
            const av = Number(aTd?.dataset[rawAttr] || 0);
            const bv = Number(bTd?.dataset[rawAttr] || 0);
            if (av < bv) return window._advSummarySortAsc ? -1 : 1;
            if (av > bv) return window._advSummarySortAsc ? 1 : -1;
            return 0;
          });
          rows.forEach(r => tbody.appendChild(r));
          thCells.forEach(h => {
            const span = h.querySelector('span') || h;
            const txt = span.textContent.replace(/ [▲▼]/g, '');
            span.textContent = h.dataset.sort === key ? txt + (window._advSummarySortAsc ? ' ▲' : ' ▼') : txt;
          });
        });
      });
    }

    // ─── Отчёт «Отзывы» ─────────────────────────────────────────────
    // ─── Сортировка таблицы «Отзывы» ────────────────────────────────
    // Состояние persistено в renderReviewsReport замыкании; первичная сортировка:
    // алертные сверху, дальше по убыванию reviews_count.
    const reviewsSortState = { column: null, direction: "desc" };

    function sortReviewsItems(items) {
      const arr = items.slice();
      const { column, direction } = reviewsSortState;
      if (!column) {
        arr.sort((a, b) => (Number(b.has_alert) - Number(a.has_alert)) || ((b.reviews_count || 0) - (a.reviews_count || 0)));
        return arr;
      }
      const dir = direction === "asc" ? 1 : -1;
      arr.sort((a, b) => {
        const va = a[column], vb = b[column];
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;
        if (typeof va === "string" || typeof vb === "string") {
          return String(va).localeCompare(String(vb), "ru") * dir;
        }
        return (va - vb) * dir;
      });
      return arr;
    }

    function renderReviewsReport(data) {
      const wrap = document.getElementById("reviews_report_wrap");
      if (!wrap) return;
      const items = data.items || [];
      window._lastReviewsReport = items;

      const fmtRating = (v) => (v === null || v === undefined) ? "—" : Number(v).toFixed(2);
      const fmtDelta = (v) => {
        if (v === null || v === undefined) return "—";
        const n = Number(v);
        if (Math.abs(n) < 0.005) return "0";
        const sign = n > 0 ? "+" : "";
        const color = n < 0 ? "#d62828" : "#2a9d8f";
        return `<span style="color:${color};font-weight:600;">${sign}${n.toFixed(2)}</span>`;
      };
      const fmtStars = (v) => {
        if (v === null || v === undefined) return "";
        const n = Math.round(Number(v));
        return "★".repeat(Math.max(0, Math.min(5, n))) + "☆".repeat(Math.max(0, 5 - n));
      };
      const escapeHtml = (s) => String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");

      const headerCell = (key, title, align) => {
        const st = reviewsSortState;
        const ascA = st.column === key && st.direction === "asc" ? " active" : "";
        const descA = st.column === key && st.direction === "desc" ? " active" : "";
        const alignStyle = align === "right" ? "text-align:right;" : (align === "center" ? "text-align:center;" : "");
        return `<th style="${alignStyle}">
          <div class="head-title">${title}</div>
          <div class="head-tools">
            <button type="button" class="head-sort${ascA}" data-col-sort="${key}" data-sort-dir="asc">↑</button>
            <button type="button" class="head-sort${descA}" data-col-sort="${key}" data-sort-dir="desc">↓</button>
          </div>
        </th>`;
      };

      // Aktivnyj podтab: reviews | questions | chats
      const activeSubTab = window._reviewsActiveSubTab || "reviews";
      if (activeSubTab === "questions") {
        renderQuestionsTab(wrap);
        return;
      }

      const sorted = sortReviewsItems(items);
      let html = renderReviewsSubTabsHeader("reviews") + `
        <div class="accrual-table-wrap" style="padding:8px 0;">
          <table class="accrual-unitka-table" id="reviews_report_table">
            <thead>
              <tr>
                <th style="width:1%;"></th>
                ${headerCell("offer_id", "Артикул")}
                ${headerCell("product_name", "Название")}
                ${headerCell("available_stock", "Остаток", "right")}
                ${headerCell("avg_rating", "Средняя", "right")}
                ${headerCell("delta", "Δ к вчера", "right")}
                ${headerCell("reviews_count", "Отзывов", "right")}
                ${headerCell("negative_7d", "Негатив 7д", "right")}
                <th></th>
              </tr>
            </thead>
            <tbody>
      `;
      for (const it of sorted) {
        const alertCell = it.has_alert
          ? `<span title="Оценка упала или прилетел отзыв 1–4★ за 7 дней" style="color:#d62828;font-size:16px;font-weight:700;">❗</span>`
          : "";
        const sellerLink = `https://seller.ozon.ru/app/reviews?offer_id=${encodeURIComponent(it.offer_id || "")}`;
        html += `
          <tr class="reviews-article-row" data-sku="${it.sku}" style="cursor:pointer;">
            <td class="num">${alertCell}</td>
            <td>${escapeHtml(it.offer_id || "")}</td>
            <td>${escapeHtml(it.product_name || "")}</td>
            <td class="num" style="${(it.available_stock || 0) === 0 ? 'color:#d62828;font-weight:600;' : ''}">${it.available_stock != null ? it.available_stock : "—"}</td>
            <td class="num" title="${fmtStars(it.avg_rating)}">${fmtRating(it.avg_rating)}</td>
            <td class="num">${fmtDelta(it.delta)}</td>
            <td class="num">${it.reviews_count}</td>
            <td class="num">${it.negative_7d}</td>
            <td><a href="${sellerLink}" target="_blank" rel="noopener" onclick="event.stopPropagation();" style="color:#1d7eeb;">ЛК →</a></td>
          </tr>
          <tr class="reviews-detail-row hidden" id="reviews_detail_${it.sku}"><td colspan="9" style="background:#fafafa;padding:0;"></td></tr>
        `;
      }
      html += `</tbody></table></div>`;
      wrap.innerHTML = html;

      wrap.querySelectorAll(".head-sort").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const col = btn.getAttribute("data-col-sort");
          const dir = btn.getAttribute("data-sort-dir");
          if (reviewsSortState.column === col && reviewsSortState.direction === dir) {
            reviewsSortState.column = null;
          } else {
            reviewsSortState.column = col;
            reviewsSortState.direction = dir;
          }
          renderReviewsReport({ items: window._lastReviewsReport || [] });
        });
      });

      wrap.querySelectorAll(".reviews-article-row").forEach(row => {
        row.addEventListener("click", async () => {
          const sku = row.getAttribute("data-sku");
          const detailRow = document.getElementById(`reviews_detail_${sku}`);
          if (!detailRow) return;
          if (!detailRow.classList.contains("hidden")) {
            detailRow.classList.add("hidden");
            return;
          }
          const cell = detailRow.querySelector("td");
          cell.innerHTML = `<div style="padding:12px;color:#888;">Загрузка отзывов…</div>`;
          detailRow.classList.remove("hidden");
          try {
            const resp = await fetch(`/api/reviews-report/${sku}`);
            const detail = await resp.json();
            cell.innerHTML = renderReviewsDetail(detail);
            bindReviewsDetailHandlers(detailRow, sku, detail);
          } catch (e) {
            cell.innerHTML = `<div style="padding:12px;color:#d62828;">Ошибка: ${escapeHtml(e.message || e)}</div>`;
          }
        });
      });

      bindReviewsSubTabHandlers(wrap);
    }

    // ─── Подвкладки Отзывы / Вопросы / Чаты ─────────────────────────
    function renderReviewsSubTabsHeader(active) {
      const tabBtnS = "padding:6px 16px;border-radius:8px 8px 0 0;border:1px solid #d6dbe1;border-bottom:0;background:#f7f8fa;color:#666;font-size:13px;font-weight:600;cursor:pointer;width:auto;";
      const tabBtnActiveS = "padding:6px 16px;border-radius:8px 8px 0 0;border:1px solid #1d7eeb;border-bottom:1px solid #fff;background:#fff;color:#1d7eeb;font-size:13px;font-weight:700;cursor:default;width:auto;";
      const newCount = (window._questionsCount && window._questionsCount.new) || 0;
      const newBadge = (active !== "questions" && newCount > 0)
        ? `<span style="display:inline-block;background:#d62828;color:#fff;border-radius:9px;padding:0 6px;font-size:11px;margin-left:6px;">${newCount}</span>`
        : "";
      const mk = (key, label, extra) => `<button type="button" class="reviews-subtab-btn" data-subtab="${key}" style="${active === key ? tabBtnActiveS : tabBtnS}">${label}${extra || ""}</button>`;
      return `
        <div style="display:flex;gap:4px;justify-content:center;border-bottom:1px solid #d6dbe1;margin:0 auto 8px;max-width:max-content;">
          ${mk("reviews", "Отзывы", "")}
          ${mk("questions", "Вопросы", newBadge)}
          <button type="button" class="reviews-subtab-btn" data-subtab="chats" style="${tabBtnS}" disabled title="Скоро">Чаты</button>
        </div>`;
    }

    function bindReviewsSubTabHandlers(wrap) {
      wrap.querySelectorAll(".reviews-subtab-btn").forEach(btn => {
        if (btn.disabled) return;
        btn.addEventListener("click", () => {
          const target = btn.getAttribute("data-subtab");
          if (!target || target === "chats") return;
          if (window._reviewsActiveSubTab === target) return;
          window._reviewsActiveSubTab = target;
          if (target === "questions") {
            renderQuestionsTab(wrap);
          } else {
            renderReviewsReport({ items: window._lastReviewsReport || [] });
          }
        });
      });
    }

    // ─── Подвкладка «Вопросы» ───────────────────────────────────────
    window._questionsState = window._questionsState || {
      status: "ALL",
      date_from: "",
      date_to: "",
    };

    async function renderQuestionsTab(wrap) {
      wrap.innerHTML = renderReviewsSubTabsHeader("questions") + `
        <div id="questions_root" style="padding:8px 0;">
          <div style="padding:24px;text-align:center;color:#888;">Загрузка вопросов…</div>
        </div>`;
      bindReviewsSubTabHandlers(wrap);

      // Сначала проверим, есть ли подписка Premium Plus
      let serviceOk = false;
      let serviceReason = "";
      try {
        const r = await fetch("/api/questions/service-status");
        const sd = await r.json();
        serviceOk = !!sd.enabled;
        serviceReason = sd.reason || "";
        if (sd.counts) window._questionsCount = sd.counts;
      } catch (e) {
        serviceReason = e.message || String(e);
      }

      const root = wrap.querySelector("#questions_root");
      if (!serviceOk) {
        root.innerHTML = `
          <div style="padding:32px;text-align:center;color:#666;background:#fffbe6;border:1px solid #ffe58f;border-radius:8px;">
            <div style="font-size:16px;font-weight:600;margin-bottom:8px;">⚠ Раздел «Вопросы» недоступен</div>
            <div>${escapeHtml(serviceReason || "Требуется подписка Premium Plus")}</div>
          </div>`;
        return;
      }

      const st = window._questionsState;
      root.innerHTML = `
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;padding:8px 12px;background:#f7f8fa;border-radius:8px;">
          <label style="display:flex;flex-direction:column;font-size:12px;color:#666;">Статус
            <select id="q_filter_status" style="padding:4px 8px;border:1px solid #d6dbe1;border-radius:6px;">
              <option value="ALL"${st.status === "ALL" ? " selected" : ""}>Все</option>
              <option value="NEW"${st.status === "NEW" ? " selected" : ""}>Новые</option>
              <option value="VIEWED"${st.status === "VIEWED" ? " selected" : ""}>Просмотренные</option>
              <option value="PROCESSED"${st.status === "PROCESSED" ? " selected" : ""}>Обработанные</option>
              <option value="UNPROCESSED"${st.status === "UNPROCESSED" ? " selected" : ""}>Необработанные</option>
            </select>
          </label>
          <label style="display:flex;flex-direction:column;font-size:12px;color:#666;">С даты
            <input type="date" id="q_filter_from" value="${st.date_from}" style="padding:4px 8px;border:1px solid #d6dbe1;border-radius:6px;">
          </label>
          <label style="display:flex;flex-direction:column;font-size:12px;color:#666;">По дату
            <input type="date" id="q_filter_to" value="${st.date_to}" style="padding:4px 8px;border:1px solid #d6dbe1;border-radius:6px;">
          </label>
          <button id="q_filter_apply" style="padding:6px 16px;background:#1d7eeb;color:#fff;border:0;border-radius:6px;font-weight:600;cursor:pointer;width:auto;">Применить</button>
          <span id="q_counts_summary" style="margin-left:auto;font-size:13px;color:#444;"></span>
        </div>
        <div id="q_list_wrap"><div style="padding:24px;text-align:center;color:#888;">Загрузка…</div></div>
      `;
      root.querySelector("#q_filter_apply").addEventListener("click", () => {
        st.status = root.querySelector("#q_filter_status").value;
        st.date_from = root.querySelector("#q_filter_from").value;
        st.date_to = root.querySelector("#q_filter_to").value;
        loadQuestionsList(root);
      });

      await loadQuestionsList(root);
    }

    async function loadQuestionsList(root) {
      const listWrap = root.querySelector("#q_list_wrap");
      if (!listWrap) return;
      listWrap.innerHTML = `<div style="padding:24px;text-align:center;color:#888;">Загрузка…</div>`;

      const st = window._questionsState;
      const params = new URLSearchParams();
      params.set("status", st.status || "ALL");
      params.set("limit", "100");
      params.set("sort_dir", "DESC");
      if (st.date_from) params.set("date_from", `${st.date_from}T00:00:00Z`);
      if (st.date_to) params.set("date_to", `${st.date_to}T23:59:59Z`);

      try {
        const resp = await fetch(`/api/questions-report?${params.toString()}`);
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.error || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        if (data.counts) window._questionsCount = data.counts;
        const cs = root.querySelector("#q_counts_summary");
        if (cs && data.counts) {
          cs.innerHTML = `Всего: <b>${data.counts.all || 0}</b> · Новых: <b style="color:#d62828;">${data.counts.new || 0}</b> · Необраб.: <b>${data.counts.unprocessed || 0}</b> · Обраб.: <b style="color:#2a9d8f;">${data.counts.processed || 0}</b>`;
        }
        renderQuestionsList(listWrap, data);
      } catch (e) {
        listWrap.innerHTML = `<div style="padding:16px;color:#d62828;">Ошибка: ${escapeHtmlGlobal(e.message || e)}</div>`;
      }
    }

    function escapeHtmlGlobal(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function fmtQuestionDate(iso) {
      if (!iso) return "—";
      try {
        const d = new Date(iso);
        return d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
      } catch (e) { return iso; }
    }

    function questionStatusBadge(status) {
      const map = {
        NEW: { label: "Новый", color: "#d62828", bg: "#fff5f5" },
        VIEWED: { label: "Просмотрен", color: "#1d7eeb", bg: "#eef5ff" },
        PROCESSED: { label: "Обработан", color: "#2a9d8f", bg: "#e8f7f4" },
        UNPROCESSED: { label: "Не обработан", color: "#b76e00", bg: "#fff8e6" },
      };
      const m = map[status] || { label: status || "—", color: "#666", bg: "#f0f0f0" };
      return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;background:${m.bg};color:${m.color};font-size:11px;font-weight:600;">${m.label}</span>`;
    }

    function renderQuestionsList(listWrap, data) {
      const items = data.items || [];
      if (!items.length) {
        listWrap.innerHTML = `<div style="padding:32px;text-align:center;color:#666;">Вопросов не найдено.</div>`;
        return;
      }
      let html = `
        <table class="accrual-unitka-table" style="width:100%;">
          <thead>
            <tr>
              <th style="width:130px;">Артикул</th>
              <th>Название</th>
              <th>Вопрос</th>
              <th style="width:130px;">Автор</th>
              <th style="width:130px;">Дата</th>
              <th style="width:120px;">Статус</th>
              <th style="width:60px;text-align:center;">Отв.</th>
              <th style="width:120px;text-align:center;">Действия</th>
            </tr>
          </thead>
          <tbody>
      `;
      for (const q of items) {
        const linkHtml = q.question_link
          ? `<a href="${escapeHtmlGlobal(q.question_link)}" target="_blank" rel="noopener" style="color:#1d7eeb;">${escapeHtmlGlobal(q.text || "")}</a>`
          : escapeHtmlGlobal(q.text || "");
        html += `
          <tr class="question-row" data-qid="${escapeHtmlGlobal(q.id)}" data-sku="${q.sku || ""}">
            <td>${escapeHtmlGlobal(q.offer_id || "—")}</td>
            <td>${escapeHtmlGlobal(q.product_name || "—")}</td>
            <td>${linkHtml}</td>
            <td>${escapeHtmlGlobal(q.author_name || "—")}</td>
            <td>${fmtQuestionDate(q.published_at)}</td>
            <td>${questionStatusBadge(q.status)}</td>
            <td style="text-align:center;">${q.answers_count || 0}</td>
            <td style="text-align:center;">
              <button class="q-reply-btn" data-qid="${escapeHtmlGlobal(q.id)}" data-sku="${q.sku || ""}" style="padding:4px 12px;background:#1d7eeb;color:#fff;border:0;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;width:auto;">Ответить</button>
            </td>
          </tr>
          <tr class="q-detail-row hidden" id="q_detail_${escapeHtmlGlobal(q.id)}">
            <td colspan="8" style="background:#fafafa;padding:0;"></td>
          </tr>
        `;
      }
      html += `</tbody></table>`;
      listWrap.innerHTML = html;
      bindQuestionsHandlers(listWrap);
    }

    function bindQuestionsHandlers(listWrap) {
      listWrap.querySelectorAll(".q-reply-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const qid = btn.getAttribute("data-qid");
          const sku = btn.getAttribute("data-sku");
          const detailRow = document.getElementById(`q_detail_${qid}`);
          if (!detailRow) return;
          if (!detailRow.classList.contains("hidden")) {
            detailRow.classList.add("hidden");
            return;
          }
          const cell = detailRow.querySelector("td");
          cell.innerHTML = `<div style="padding:12px;color:#888;">Загрузка существующих ответов…</div>`;
          detailRow.classList.remove("hidden");
          await renderQuestionDetail(cell, qid, sku);
        });
      });
    }

    async function renderQuestionDetail(cell, questionId, sku) {
      let answers = [];
      try {
        const r = await fetch(`/api/questions-report/${encodeURIComponent(questionId)}/answers?sku=${encodeURIComponent(sku)}`);
        const d = await r.json();
        answers = d.answers || [];
      } catch (e) { /* пусто */ }

      const answersHtml = answers.length
        ? answers.map(a => `
            <div style="padding:8px 12px;background:#fff;border-left:3px solid #2a9d8f;margin-bottom:6px;border-radius:4px;">
              <div style="font-size:11px;color:#666;margin-bottom:4px;">
                ${escapeHtmlGlobal(a.author_name || "Продавец")} · ${fmtQuestionDate(a.published_at)} · ${escapeHtmlGlobal(a.status_publication || "")}
              </div>
              <div>${escapeHtmlGlobal(a.text || "")}</div>
            </div>`).join("")
        : `<div style="color:#888;font-size:12px;margin-bottom:8px;">Ответов пока нет.</div>`;

      cell.innerHTML = `
        <div style="padding:12px 16px;">
          <div style="margin-bottom:8px;font-weight:600;color:#444;">Существующие ответы:</div>
          <div style="margin-bottom:12px;">${answersHtml}</div>
          <div style="margin-bottom:6px;font-weight:600;color:#444;">Новый ответ:</div>
          <textarea class="q-reply-textarea" rows="4" placeholder="Текст ответа (2–3000 символов)" style="width:100%;padding:8px;border:1px solid #d6dbe1;border-radius:6px;font-family:inherit;font-size:13px;resize:vertical;"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px;align-items:center;">
            <button class="q-reply-submit" style="padding:6px 18px;background:#2a9d8f;color:#fff;border:0;border-radius:6px;font-weight:600;cursor:pointer;width:auto;">Отправить ответ</button>
            <label style="font-size:12px;color:#666;display:flex;align-items:center;gap:4px;">
              <input type="checkbox" class="q-mark-processed" checked> Отметить вопрос как «обработанный»
            </label>
            <span class="q-reply-status" style="margin-left:auto;font-size:12px;"></span>
          </div>
        </div>`;

      const submit = cell.querySelector(".q-reply-submit");
      submit.addEventListener("click", async () => {
        const ta = cell.querySelector(".q-reply-textarea");
        const mark = cell.querySelector(".q-mark-processed").checked;
        const statusEl = cell.querySelector(".q-reply-status");
        const text = (ta.value || "").trim();
        if (text.length < 2 || text.length > 3000) {
          statusEl.textContent = "Длина ответа: 2–3000 символов";
          statusEl.style.color = "#d62828";
          return;
        }
        submit.disabled = true;
        statusEl.textContent = "Отправляю…";
        statusEl.style.color = "#888";
        try {
          const resp = await fetch("/api/questions/answer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question_id: questionId, sku: Number(sku), text, mark_as_processed: mark }),
          });
          const data = await resp.json();
          if (!resp.ok || data.error) {
            throw new Error(data.error || `HTTP ${resp.status}`);
          }
          statusEl.textContent = "Ответ отправлен ✓";
          statusEl.style.color = "#2a9d8f";
          ta.value = "";
          // Перезагрузим вкладку, чтобы обновить статус и счётчики.
          const root = document.querySelector("#questions_root");
          if (root) await loadQuestionsList(root);
        } catch (e) {
          statusEl.textContent = `Ошибка: ${e.message || e}`;
          statusEl.style.color = "#d62828";
        } finally {
          submit.disabled = false;
        }
      });
    }

    // Состояние detail-панели по каждому SKU: фильтр звёзд + выбранные ID + draft текстов.
    // Хранится в DOM-узле через data-attrs, чтобы пережить ре-рендер списка.
    window._reviewsDetailState = window._reviewsDetailState || {};

    function renderReviewsDetail(detail) {
      const items = detail.items || [];
      const sku = detail.sku;
      const stateKey = `sku_${sku}`;
      const state = window._reviewsDetailState[stateKey] || (window._reviewsDetailState[stateKey] = {
        ratingFilter: null,    // null = все, 1..5 = только эта оценка
        selected: new Set(),   // review_id'ы для bulk
        bulkText: "",          // черновик bulk-ответа
      });
      const escapeHtml = (s) => String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      const fmtStars = (n) => "★".repeat(Math.max(0, Math.min(5, n || 0))) + "<span style='color:#ccc;'>" + "★".repeat(Math.max(0, 5 - (n || 0))) + "</span>";
      const fmtDate = (s) => s ? new Date(s).toLocaleDateString("ru-RU") : "";

      // Контейнер деталей — компактный, ограничен шириной, центрирован.
      let html = `<div style="max-width:980px;margin:0 auto;padding:0 12px;font-size:13px;">`;

      // Service status banner + ссылки
      html += `
        <div style="padding:6px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #eee;">
          <span data-reviews-service-status="${sku}" style="font-size:11px;color:#888;">Сервис: проверка…</span>
          <span style="color:#888;">·</span>
          <a href="${detail.seller_link}" target="_blank" rel="noopener" style="color:#1d7eeb;font-size:12px;">ЛК продавца</a>
          <a href="${detail.public_link}" target="_blank" rel="noopener" style="color:#1d7eeb;font-size:12px;">Публичная страница</a>
          <span style="margin-left:auto;color:#888;font-size:11px;">Всего: ${items.length}</span>
        </div>
      `;

      if (!items.length) {
        html += `<div style="padding:14px;color:#888;">Отзывов нет.</div></div>`;
        return html;
      }

      // Фильтр по оценке
      const ratingCounts = [0,0,0,0,0,0]; // index 0 unused
      for (const r of items) ratingCounts[r.rating || 0] += 1;
      const filterChip = (label, value, count, active) => `
        <button type="button" data-rating-filter="${value === null ? '' : value}"
                style="width:auto;padding:3px 10px;border-radius:14px;border:1px solid ${active ? '#1d7eeb' : '#d6dbe1'};
                       background:${active ? '#e9f0ff' : '#fff'};color:${active ? '#163d7a' : '#444'};
                       font-size:11px;font-weight:600;cursor:pointer;line-height:1.4;">
          ${label}${count != null ? ` <span style="color:#888;font-weight:400;">${count}</span>` : ''}
        </button>`;
      html += `<div style="padding:6px 0;display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
        <span style="color:#888;font-size:11px;">Оценка:</span>
        ${filterChip("Все", null, items.length, state.ratingFilter == null)}
        ${[5,4,3,2,1].map(v => filterChip(`${v}★`, v, ratingCounts[v], state.ratingFilter === v)).join("")}
      </div>`;

      // Bulk reply panel — виден если выбран хотя бы 1
      const selectedIds = Array.from(state.selected).filter(id => items.some(r => r.review_id === id));
      state.selected = new Set(selectedIds);
      if (selectedIds.length > 0) {
        html += `
          <div style="margin:6px 0;padding:8px 10px;border:1px solid #1d7eeb;border-radius:6px;background:#f0f6ff;">
            <div style="font-weight:700;color:#163d7a;margin-bottom:4px;font-size:12px;">
              Массовый ответ — выбрано ${selectedIds.length}
            </div>
            <textarea data-bulk-text="${sku}" style="width:100%;min-height:54px;border:1px solid #c4d4ec;border-radius:4px;padding:6px;font-size:12px;font-family:inherit;resize:vertical;box-sizing:border-box;" placeholder="Один ответ на все выбранные">${escapeHtml(state.bulkText || "")}</textarea>
            <div style="margin-top:5px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
              <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#444;margin:0;">
                <input type="checkbox" data-bulk-mark="${sku}" checked style="width:auto;margin:0;" />
                Пометить обработанными
              </label>
              <button type="button" data-bulk-submit="${sku}" style="width:auto;padding:5px 14px;border-radius:5px;border:0;background:#1d7eeb;color:#fff;font-weight:600;cursor:pointer;font-size:12px;">
                Отправить ${selectedIds.length}
              </button>
              <button type="button" data-bulk-clear="${sku}" style="width:auto;padding:5px 10px;border-radius:5px;border:1px solid #c4d4ec;background:#fff;color:#444;cursor:pointer;font-size:12px;">
                Сбросить
              </button>
            </div>
          </div>`;
      }

      // Список отзывов
      html += `<div style="padding:8px 14px 14px;display:flex;flex-direction:column;gap:10px;">`;
      for (const r of items) {
        if (state.ratingFilter && r.rating !== state.ratingFilter) continue;
        const isLow = (r.rating || 0) <= 4;
        const photoUrls = r.photos || [];
        const extraCount = (r.photos_amount || photoUrls.length) - photoUrls.slice(0, 6).length;
        const photos = photoUrls.slice(0, 6).map(u =>
          `<a href="${escapeHtml(u)}" target="_blank" rel="noopener" title="Открыть оригинал" onclick="event.stopPropagation();" style="display:inline-block;line-height:0;">
            <img src="${escapeHtml(u)}" loading="lazy" style="width:56px;height:56px;object-fit:cover;border-radius:5px;border:1px solid #ddd;cursor:zoom-in;transition:transform .1s;" onmouseover="this.style.transform='scale(1.05)';" onmouseout="this.style.transform='';" />
          </a>`
        ).join("");
        const morePhotos = extraCount > 0
          ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:5px;border:1px dashed #c4d4ec;color:#1d7eeb;font-size:11px;font-weight:600;background:#f7faff;">+${extraCount}</span>`
          : "";
        // Esli photos_amount > 0 no urlov net (eshhjo ne podgruzili) — placeholder.
        const photosBlock = (photoUrls.length === 0 && (r.photos_amount || 0) > 0)
          ? `<div style="margin-top:6px;color:#888;font-size:11px;">📷 ${r.photos_amount} фото загружается…</div>`
          : (photos ? `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">${photos}${morePhotos}</div>` : "");
        const replyCount = (r.comments || []).length;
        const reply = replyCount ? `<span style="margin-left:8px;color:#2a9d8f;font-size:11px;">✓ ответ продавца (${replyCount})</span>` : `<span style="margin-left:8px;color:#aaa;font-size:11px;">без ответа</span>`;
        const ratingColor = isLow ? "#d62828" : "#2a9d8f";
        const checked = state.selected.has(r.review_id) ? "checked" : "";
        html += `
          <div data-review-row="${escapeHtml(r.review_id)}" style="display:flex;gap:10px;padding:10px;border:1px solid ${isLow ? '#f5c2c2' : '#e6e6e6'};border-radius:6px;background:${isLow ? '#fff5f5' : '#fff'};">
            <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;">
              <input type="checkbox" data-review-checkbox="${escapeHtml(r.review_id)}" ${checked} style="width:18px;height:18px;margin:0;cursor:pointer;" />
            </div>
            <div data-review-click="${escapeHtml(r.review_id)}" style="flex-shrink:0;width:90px;text-align:center;cursor:pointer;">
              <div style="color:${ratingColor};font-size:14px;font-weight:600;">${fmtStars(r.rating)}</div>
              <div style="color:#888;font-size:11px;margin-top:4px;">${fmtDate(r.published_at)}</div>
              ${r.is_buyer ? `<div style="color:#2a9d8f;font-size:10px;margin-top:2px;">✓ покупал</div>` : ''}
            </div>
            <div style="flex:1;min-width:0;" data-review-click="${escapeHtml(r.review_id)}">
              <div style="font-size:13px;line-height:1.4;color:#333;white-space:pre-wrap;cursor:pointer;">${escapeHtml(r.text || "(без текста)")}</div>
              ${photosBlock}
              <div style="margin-top:6px;font-size:11px;color:#888;">${escapeHtml(r.status || "")}${reply}</div>
              <div data-reply-area="${escapeHtml(r.review_id)}" style="display:none;margin-top:8px;padding:8px;background:#fafbfc;border:1px solid #e6e6e6;border-radius:6px;">
                <textarea data-reply-text="${escapeHtml(r.review_id)}" style="width:100%;min-height:60px;border:1px solid #d6dbe1;border-radius:4px;padding:6px;font-size:13px;font-family:inherit;resize:vertical;" placeholder="Ответ на отзыв..."></textarea>
                <div style="margin-top:6px;display:flex;gap:8px;align-items:center;">
                  <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#444;margin:0;">
                    <input type="checkbox" data-reply-mark="${escapeHtml(r.review_id)}" checked style="width:auto;margin:0;" />
                    Пометить как обработанный
                  </label>
                  <button type="button" data-reply-submit="${escapeHtml(r.review_id)}" data-sku="${sku}" style="padding:5px 14px;border-radius:5px;border:0;background:#2a9d8f;color:#fff;font-weight:600;cursor:pointer;">Отправить</button>
                  <button type="button" data-reply-cancel="${escapeHtml(r.review_id)}" style="padding:5px 10px;border-radius:5px;border:1px solid #c4d4ec;background:#fff;color:#444;cursor:pointer;">Отмена</button>
                </div>
              </div>
            </div>
          </div>`;
      }
      html += `</div>`;
      return html;
    }

    // Привязка обработчиков на detail-панель после её рендера
    function bindReviewsDetailHandlers(detailRow, sku, detail) {
      const escapeHtml = (s) => String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      const stateKey = `sku_${sku}`;
      const state = window._reviewsDetailState[stateKey];

      // Service status — асинхронная проверка
      const statusEl = detailRow.querySelector(`[data-reviews-service-status="${sku}"]`);
      if (statusEl) {
        fetch("/api/reviews/service-status").then(r => r.json()).then(d => {
          if (d.enabled) {
            const c = d.counts || {};
            statusEl.textContent = `Сервис подключён · необработано: ${c.unprocessed ?? "—"}`;
            statusEl.style.color = "#2a9d8f";
          } else {
            statusEl.textContent = `⚠ Сервис не подключён: ${d.reason || ""}`;
            statusEl.style.color = "#d62828";
          }
        }).catch(() => { statusEl.textContent = "Сервис: ошибка"; statusEl.style.color = "#d62828"; });
      }

      // Фильтр по оценке
      detailRow.querySelectorAll("[data-rating-filter]").forEach(btn => {
        btn.addEventListener("click", () => {
          const v = btn.getAttribute("data-rating-filter");
          state.ratingFilter = v === "" ? null : Number(v);
          rerenderReviewsDetail(detailRow, sku, detail);
        });
      });

      // Чекбоксы выбора
      detailRow.querySelectorAll("[data-review-checkbox]").forEach(cb => {
        cb.addEventListener("change", () => {
          const rid = cb.getAttribute("data-review-checkbox");
          if (cb.checked) state.selected.add(rid); else state.selected.delete(rid);
          rerenderReviewsDetail(detailRow, sku, detail);
        });
      });

      // Клик по отзыву → раскрыть/свернуть inline reply
      detailRow.querySelectorAll("[data-review-click]").forEach(el => {
        el.addEventListener("click", (e) => {
          // не реагируем если клик в textarea/кнопке внутри reply-area
          if (e.target.closest("[data-reply-area]")) return;
          const rid = el.getAttribute("data-review-click");
          const area = detailRow.querySelector(`[data-reply-area="${CSS.escape(rid)}"]`);
          if (!area) return;
          area.style.display = area.style.display === "none" ? "" : "none";
          if (area.style.display !== "none") {
            const ta = area.querySelector("textarea");
            if (ta) ta.focus();
          }
        });
      });

      // Single reply — отмена
      detailRow.querySelectorAll("[data-reply-cancel]").forEach(btn => {
        btn.addEventListener("click", () => {
          const rid = btn.getAttribute("data-reply-cancel");
          const area = detailRow.querySelector(`[data-reply-area="${CSS.escape(rid)}"]`);
          if (area) area.style.display = "none";
        });
      });

      // Single reply — отправить
      detailRow.querySelectorAll("[data-reply-submit]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const rid = btn.getAttribute("data-reply-submit");
          const skuStr = btn.getAttribute("data-sku");
          const ta = detailRow.querySelector(`[data-reply-text="${CSS.escape(rid)}"]`);
          const mark = detailRow.querySelector(`[data-reply-mark="${CSS.escape(rid)}"]`);
          const text = (ta?.value || "").trim();
          if (!text) { alert("Введите текст ответа"); return; }
          btn.disabled = true; btn.textContent = "Отправка…";
          try {
            const resp = await fetch("/api/reviews/reply", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({
                review_ids: [rid],
                text,
                mark_as_processed: !!mark?.checked,
              }),
            });
            if (!resp.ok) {
              const body = await resp.text();
              throw new Error(`HTTP ${resp.status}${resp.status === 404 ? ' — endpoint не зарегистрирован, перезапустите дашборд' : ''}: ${body.slice(0, 200)}`);
            }
            const result = await resp.json();
            if (result.success === 1) {
              alert("✓ Ответ отправлен");
              await reloadReviewsDetail(detailRow, sku);
            } else {
              const err = result.results?.[0]?.error || result.error || "Неизвестная ошибка";
              alert(`✗ Ошибка: ${err}`);
              btn.disabled = false; btn.textContent = "Отправить";
            }
          } catch (e) {
            alert(`✗ Ошибка: ${e.message || e}`);
            btn.disabled = false; btn.textContent = "Отправить";
          }
        });
      });

      // Bulk reply — текст в state
      const bulkTa = detailRow.querySelector(`[data-bulk-text="${sku}"]`);
      if (bulkTa) {
        bulkTa.addEventListener("input", () => { state.bulkText = bulkTa.value; });
      }

      // Bulk reply — сброс
      const bulkClear = detailRow.querySelector(`[data-bulk-clear="${sku}"]`);
      if (bulkClear) {
        bulkClear.addEventListener("click", () => {
          state.selected.clear();
          state.bulkText = "";
          rerenderReviewsDetail(detailRow, sku, detail);
        });
      }

      // Bulk reply — отправить
      const bulkSubmit = detailRow.querySelector(`[data-bulk-submit="${sku}"]`);
      if (bulkSubmit) {
        bulkSubmit.addEventListener("click", async () => {
          const ids = Array.from(state.selected);
          if (!ids.length) return;
          const text = (state.bulkText || "").trim();
          if (!text) { alert("Введите текст ответа"); return; }
          const mark = detailRow.querySelector(`[data-bulk-mark="${sku}"]`);
          if (!confirm(`Отправить один и тот же ответ на ${ids.length} отзыв(ов)?\n\nТекст:\n${text.slice(0, 200)}${text.length > 200 ? "…" : ""}`)) return;
          bulkSubmit.disabled = true; bulkSubmit.textContent = "Отправка…";
          try {
            const resp = await fetch("/api/reviews/reply", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({
                review_ids: ids,
                text,
                mark_as_processed: !!mark?.checked,
              }),
            });
            if (!resp.ok) {
              const body = await resp.text();
              throw new Error(`HTTP ${resp.status}${resp.status === 404 ? ' — endpoint не зарегистрирован, перезапустите дашборд' : ''}: ${body.slice(0, 200)}`);
            }
            const result = await resp.json();
            const failed = result.failed || 0;
            if (failed === 0) {
              alert(`✓ Отправлено ${result.success}/${result.total} ответов`);
            } else {
              const errs = (result.results || []).filter(r => !r.ok).map(r => `  ${r.review_id}: ${r.error}`).join("\n");
              alert(`Отправлено ${result.success}/${result.total}. Ошибок: ${failed}\n\n${errs}`);
            }
            state.selected.clear();
            state.bulkText = "";
            await reloadReviewsDetail(detailRow, sku);
          } catch (e) {
            alert(`✗ Ошибка: ${e.message || e}`);
            bulkSubmit.disabled = false;
          }
        });
      }
    }

    function rerenderReviewsDetail(detailRow, sku, detail) {
      const cell = detailRow.querySelector("td");
      cell.innerHTML = renderReviewsDetail(detail);
      bindReviewsDetailHandlers(detailRow, sku, detail);
    }

    async function reloadReviewsDetail(detailRow, sku) {
      const cell = detailRow.querySelector("td");
      cell.innerHTML = `<div style="padding:12px;color:#888;">Обновление…</div>`;
      try {
        const resp = await fetch(`/api/reviews-report/${sku}`);
        const detail = await resp.json();
        cell.innerHTML = renderReviewsDetail(detail);
        bindReviewsDetailHandlers(detailRow, sku, detail);
      } catch (e) {
        cell.innerHTML = `<div style="padding:12px;color:#d62828;">Ошибка: ${e.message || e}</div>`;
      }
    }

    function renderAdvertisingReport(data) {
      if (!advertisingReportWrap) return;
      const wrap = advertisingReportWrap;
      if (!data || data.error) {
        wrap.innerHTML = `<div style="padding:24px;color:#A32D2D;">${data?.error || 'Выберите артикул в фильтре Offer ID'}</div>`;
        return;
      }
      const s = data.summary || {};
      const daily = data.daily || [];
      const campaigns = data.campaigns || [];
      const dailyByType = data.daily_by_type || {};
      const dailyByCampaign = data.daily_by_campaign || {};
      const dailyCampaigns = data.daily_campaigns || {};
      const summaryByType = data.summary_by_type || {};
      const advTypes = Object.keys(dailyByType);
      const acc = data._accruals || {};
      const taxRate = getAccrualTaxRate();

      // ── Экономика на основе Начислений ──
      // Расходы МП % (без рекламы) из Начислений
      const accRevenue = Number(acc.revenue_sales || acc.sales_total || 0);
      const accMpExpenses = Number(acc.marketplace_expenses || 0);
      const accAdSpend = Number(acc.ad_spend || acc.pay_per_click || 0);
      const mpExpensesNoAd = accMpExpenses - accAdSpend;
      const mpNoAdPct = accRevenue > 0 ? mpExpensesNoAd / accRevenue : 0;

      // Расчёт по всем заказам
      const totalRevenue = s.total_revenue || 0;
      const totalQty = s.total_qty || 0;
      const avgPrice = s.avg_price || (totalQty > 0 ? totalRevenue / totalQty : 0);
      const adSpent = s.spent || 0;
      const unitCost = s.unit_cost || 0;

      // Выручка = кол-во * средняя цена (= total_revenue)
      // Расходы МП (без рекламы) = выручка * mp_no_ad_pct
      const mpExpensesCalc = totalRevenue * mpNoAdPct;
      // Начисленные = выручка - расходы_мп - расход_на_рекламу
      const accrued = totalRevenue - mpExpensesCalc - adSpent;
      // Налог = выручка * ставка% (как в Начислениях по артикулам)
      const taxAmount = totalRevenue * (taxRate / 100);
      // Вал. прибыль = начисленные - себестоимость - налог
      const materialCostTotal = unitCost * totalQty;
      const margin = accrued - materialCostTotal - taxAmount;
      const marginPct = totalRevenue > 0 ? (margin / totalRevenue * 100) : 0;

      // То же для рекламных заказов
      const adOrders = s.ad_orders || 0;
      const adRevenue = s.ad_revenue || 0;
      const adOrdersCpo = s.ad_orders_cpo || 0;
      const adRevenueCpo = s.ad_revenue_cpo || 0;
      const adOrdersTotal = s.ad_orders_total || (adOrders + adOrdersCpo);
      const adRevenueTotal = s.ad_revenue_total || (adRevenue + adRevenueCpo);
      const adMpExpenses = adRevenueTotal * mpNoAdPct;
      const adAccrued = adRevenueTotal - adMpExpenses - adSpent;
      const adTax = adRevenueTotal * (taxRate / 100);
      const adMaterialCost = unitCost * adOrdersTotal;
      const adMargin = adAccrued - adMaterialCost - adTax;
      const adMarginPct = adRevenueTotal > 0 ? (adMargin / adRevenueTotal * 100) : 0;
      const fmt = (n) => new Intl.NumberFormat('ru-RU', {maximumFractionDigits: 0, useGrouping: true}).format(n || 0);
      const fmt1 = (n) => new Intl.NumberFormat('ru-RU', {maximumFractionDigits: 1, useGrouping: true}).format(n || 0);

      html += `<h3 style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:#888780;margin:32px 0 10px;">4 · Таблица по дням</h3>`;

      for (const c of campaigns) {

      html += `<div style="background:#fff;border:1px solid rgba(0,0,0,0.15);border-radius:0 8px 8px 8px;overflow-x:auto;">`;

      // Tab content: "all"
      html += `<div id="${tabId}_all" class="advDailyTabContent_${tabId}">${advDailyTableHtml(daily, true, { showCampaignsInDate: true, campaignsByDate: dailyCampaigns })}</div>`;

      for (const at of advTypes) {

      // Tab switch function (defined directly, not via innerHTML script tag)

      html += `<div style="font-size:11px;color:#888780;margin-top:8px;">Скролл по горизонтали. Колонка «Дата» залипает слева. Красным — ДРР выше 25%, зелёным — ниже 18%.</div>`;

      // ── BLOCK 5: FORECAST ──
      const scFactors = [

        {label: 'Оптимистичный +30%', f: 1.3},
      ];
      html += `<h3 style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:#888780;margin:32px 0 10px;">5 · Финансовый прогноз на следующие ${data.num_days || 30} дней</h3>`;
      html += `<div style="background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:4px 16px;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="background:#f1efe8;">

      for (const sc of scFactors) {

      // Точка безубыточности: вал. прибыль = 0

      html += `</div>`; // close max-width wrapper

      // ── Wire campaign on/off toggles ──
      wrap.querySelectorAll('input[data-adv-toggle="1"]').forEach(inp => {
        inp.addEventListener('click', async (ev) => {
          ev.preventDefault();
          const atype = inp.dataset.atype;
          const atlabel = inp.dataset.atlabel;
          const camps = (inp.dataset.campaigns || '').split(',').filter(Boolean).map(s => parseInt(s, 10)).filter(Number.isFinite);
          if (!camps.length) return;
          // click фаерится ПОСЛЕ того как браузер уже переключил checked.
          // Поэтому inp.checked — это уже желаемое новое состояние.
          const wantOn = inp.checked;
          const action = wantOn ? 'activate' : 'deactivate';
          const st = (summaryByType[atype] || {});
          const campList = (st.campaigns || []).map(c => `  • ${c.title || ('#' + c.campaign_id)} (${c.campaign_id}) — ${c.state === 'CAMPAIGN_STATE_RUNNING' ? 'включена' : c.state === 'CAMPAIGN_STATE_STOPPED' ? 'выключена' : c.state}`).join('\n');

            const fails = results.filter(r => !r.ok);
            if (fails.length) {
              alert(`Частичный сбой: ${fails.length} из ${results.length} кампаний не удалось переключить:\n` +
                fails.map(f => `• ${f.campaign_id}: ${f.error || 'ошибка'}`).join('\n'));
            }
            // Мгновенно обновляем визуал тумблера (без ожидания перезагрузки отчёта)
            const successful = results.filter(r => r.ok).length > 0;
            if (successful) {
              inp.checked = wantOn;
              const track = inp.nextElementSibling;
              if (track) {
                track.style.background = wantOn ? '#1D9E75' : '#b9b7b0';
                const knob = track.firstElementChild;
                if (knob) knob.style.left = wantOn ? '16px' : '2px';
              }
            }
            inp.disabled = false;
            // Перезагружаем отчёт, чтобы отразить новый статус и пересчёт сводки
            if (typeof loadReport === 'function') loadReport();
          } catch (e) {
            alert('Ошибка: ' + (e.message || e));
            inp.disabled = false;
          }
        });
      });

      // ── Render Charts ──
      if (typeof Chart !== 'undefined') {
        let advFunnelChart = null;
        let advConvChart = null;
        const rowsByTabKey = { all: daily };
        for (const at of advTypes) rowsByTabKey[at] = dailyByType[at] || [];
        for (const c of campaigns) rowsByTabKey[`camp_${c.campaign_id}`] = dailyByCampaign[String(c.campaign_id)] || [];

        // Normalize helper: scale array to 0–100 range
        function normalize(arr) {
          const max = Math.max(...arr);
          return max > 0 ? arr.map(v => (v / max) * 100) : arr.map(() => 0);
        }

        function renderAdvCharts(rowsSrc) {
          const rows = Array.isArray(rowsSrc) ? rowsSrc : [];
          const labels = rows.map(d => d.date_label);

          // Tab 1: Показы / Клики (normalized)
          const funnelCanvas = document.getElementById(chartTabId + '_funnelCanvas');
          if (funnelCanvas) {
            if (advFunnelChart) advFunnelChart.destroy();
            const viewsNorm = normalize(rows.map(d => d.views));
            const clicksNorm = normalize(rows.map(d => d.clicks));
            advFunnelChart = new Chart(funnelCanvas.getContext('2d'), {
            type: 'line',
            data: {
              labels,
              datasets: [
                {label:'Показы (норм.)', data: viewsNorm, borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,0.1)', fill:true, tension:0.3, pointRadius:0, borderWidth:2},
                {label:'Клики (норм.)', data: clicksNorm, borderColor:'#D4537E', backgroundColor:'rgba(212,83,126,0.1)', fill:true, tension:0.3, pointRadius:0, borderWidth:2}
              ]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: {
                legend: {display: false},
                tooltip: {
                  callbacks: {
                    label: function(ctx) {
                      const i = ctx.dataIndex;
                      if (ctx.datasetIndex === 0) return 'Показы: ' + fmt(rows[i]?.views || 0) + ' (' + fmt1(ctx.raw) + '%)';
                      return 'Клики: ' + fmt(rows[i]?.clicks || 0) + ' (' + fmt1(ctx.raw) + '%)';
                    }
                  }
                }
              },
              scales: {
                y: {min: 0, max: 105, ticks:{callback:v=>v+'%', font:{size:10}}},
                x: {ticks:{font:{size:10}, maxRotation:0}}
              }
            }
          });
          }

          // Tab 2: Корзины / Заказы
          const convCanvas = document.getElementById(chartTabId + '_convCanvas');
          if (convCanvas) {
            if (advConvChart) advConvChart.destroy();
            const cartData = rows.map(d => d.adds_to_cart || 0);
            const ordersData = rows.map(d => d.ad_orders || 0);
            const drrData = rows.map(d => d.drr_day || 0);
            advConvChart = new Chart(convCanvas.getContext('2d'), {
            data: {
              labels,
              datasets: [
                {type:'bar', label:'В корзину', data: cartData, backgroundColor:'#BA7517', yAxisID:'y', order: 2},
                {type:'bar', label:'Заказы (рекл.)', data: ordersData, backgroundColor:'#1D9E75', yAxisID:'y', order: 1},
                {type:'line', label:'ДРР %', data: drrData, borderColor:'#D4537E', tension:0.3, yAxisID:'y1', pointRadius:0, borderWidth:2, order: 0}
              ]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: {legend: {display: false}},
              scales: {
                y: {position:'left', ticks:{font:{size:10}}},
                y1: {position:'right', grid:{display:false}, ticks:{callback:v=>v+'%', font:{size:10}}},
                x: {ticks:{font:{size:10}, maxRotation:0}}
              }
            }
          });
          }
        }

        window._advRenderChartsByDailyTab = function(tabKey) {
          const key = tabKey || 'all';
          renderAdvCharts(rowsByTabKey[key] || daily);
        };
        window._advRenderChartsByDailyTab(window._advSelectedDailyTabKey || 'all');

        // Chart tab switch
        window._advChartTabSwitch = function(prefix, key, btn) {
          document.querySelectorAll('.advChartTabContent_' + prefix).forEach(el => el.style.display = 'none');
          document.getElementById(prefix + '_' + key).style.display = '';
          document.getElementById(prefix + '_btns').querySelectorAll('button').forEach(b => b.style.cssText = tabBtnS);
          btn.style.cssText = tabBtnActiveS;
        };
      }
    }

    function renderActionsReport(data) {
      if (!analyticsStocksWrap) return;
      window._lastActionsReportData = data;
      const state = window.actionsReportState;
      const mode = data.mode || state.mode;
      const daysBack = data.days_back || state.days_back;
      state.mode = mode;
      state.days_back = daysBack;
      const actions = Array.isArray(data.actions) ? data.actions : [];

      if (!window.actionsReportState.filter) window.actionsReportState.filter = '';
      if (window.actionsReportState.hideOos == null) window.actionsReportState.hideOos = true;
      if (!window.actionsReportState.sort) window.actionsReportState.sort = { col: null, asc: true };
      const filterVal = window.actionsReportState.filter;
      const hideOos = window.actionsReportState.hideOos;
      const sortState = window.actionsReportState.sort;

      const controlsHtml = `
        <div class="actions-controls" style="display:flex;gap:16px;align-items:center;padding:12px;background:#f5f7fb;border-radius:8px;margin-bottom:16px;flex-wrap:wrap;">
          <div style="display:flex;gap:6px;align-items:center;">
            <span style="color:#666;font-size:13px;">Режим:</span>
            ${actionsModeButton('В акциях (факт)', 'current', mode)}
            ${actionsModeButton('Симуляция', 'simulation', mode)}
          </div>
          ${mode === 'simulation' ? `
          <div style="display:flex;gap:6px;align-items:center;">
            <span style="color:#666;font-size:13px;">База статистики:</span>
            ${actionsDaysButton('30 дней', 30, daysBack)}
            ${actionsDaysButton('60 дней', 60, daysBack)}
          </div>` : ''}
          <div style="display:flex;gap:6px;align-items:center;">
            <input id="actions_filter_input" type="text" placeholder="Поиск по артикулу..." value="${filterVal.replace(/"/g,'&quot;')}" style="padding:6px 10px;border:1px solid #d0d7e2;border-radius:6px;font-size:13px;width:180px;" />
          </div>
          <label style="display:flex;gap:4px;align-items:center;font-size:12px;color:#666;cursor:pointer;">
            <input type="checkbox" id="actions_hide_oos" ${hideOos ? 'checked' : ''} /> Скрыть без остатка
          </label>
          <div style="margin-left:auto;color:#666;font-size:12px;">
            Налог: ${fmtN(data.tax_rate || 0, 1)}% (из настроек «Начисления по артикулам»)
          </div>
        </div>
      `;

      if (!actions.length) {
        analyticsStocksWrap.innerHTML = controlsHtml + `<div style="padding:30px;text-align:center;color:#999;">Акций для отображения нет.</div>`;
        attachActionsControlHandlers();
        return;
      }

      // Вспомогательные: значение колонки для сортировки
      const _sortVal = (p, col) => {
        const f = p.fact || {};
        const s = p.simulation || {};
        switch (col) {
          case 'offer_id': return (p.offer_id || '').toLowerCase();
          case 'units': return Number(f.units || 0);
          case 'price': return Number(f.price || 0);
          case 'revenue': return Number(f.revenue || 0);
          case 'commission': return Number(f.sale_commission || 0);
          case 'services': return Number(f.fixed_costs || 0) + Number(f.acquiring || 0);
          case 'material': return Number(f.material_cost || 0);
          case 'tax': return Number(f.tax || 0);
          case 'gross': return Number(f.gross_profit || 0);
          case 'delta': return s ? (Number(s.gross_profit || 0) - Number(f.gross_profit || 0)) : Number(f.gross_profit_pct || 0);
          case 'stock': return p.stock != null ? Number(p.stock) : -1;
          default: return 0;
        }
      };

      const actionsHtml = actions.map((a, idx) => {
        let products = Array.isArray(a.products) ? [...a.products] : [];
        // Фильтр по артикулу
        if (filterVal) {
          const q = filterVal.toLowerCase();
          products = products.filter(p => (p.offer_id || '').toLowerCase().includes(q) || (p.name || '').toLowerCase().includes(q));
        }
        // Скрыть без остатка
        if (hideOos) {
          products = products.filter(p => p.stock == null || Number(p.stock) > 0);
        }
        // Сортировка
        if (sortState.col) {
          products.sort((a, b) => {
            const va = _sortVal(a, sortState.col);
            const vb = _sortVal(b, sortState.col);
            if (typeof va === 'string') return sortState.asc ? va.localeCompare(vb) : vb.localeCompare(va);
            return sortState.asc ? va - vb : vb - va;
          });
        }
        // Сводка по акции
        const sumFact = { revenue: 0, gross: 0, units: 0 };
        const sumSim = { revenue: 0, gross: 0, units: 0 };
        const sumPre = { revenue: 0, gross: 0, units: 0 };
        for (const p of products) {
          sumFact.revenue += Number(p.fact?.revenue || 0);
          sumFact.gross += Number(p.fact?.gross_profit || 0);
          sumFact.units += Number(p.fact?.units || 0);
          if (p.simulation) {
            sumSim.revenue += Number(p.simulation.revenue || 0);
            sumSim.gross += Number(p.simulation.gross_profit || 0);
            sumSim.units += Number(p.simulation.units || 0);
          }
          if (p.pre_action) {
            sumPre.revenue += Number(p.pre_action.revenue || 0);
            sumPre.gross += Number(p.pre_action.gross_profit || 0);
            sumPre.units += Number(p.pre_action.units || 0);
          }
        }
        const periodTxt = mode === 'current' && a.period_used_from
          ? `${a.period_used_from} → ${a.period_used_to}`
          : `${(a.date_start || '').slice(0,10)} → ${(a.date_end || '').slice(0,10)}`;
        const preperiodTxt = '';  // per-product теперь
        const partChip = a.is_participating
          ? '<span class="analytics-chip ok">участвуем</span>'
          : '<span class="analytics-chip">не участвуем</span>';

        const rowsHtml = products.map((p, pidx) => {
          const detailId = `act_detail_${idx}_${pidx}`;
          const effectivePrice = Number(p.action_price || 0) > 0 ? Number(p.action_price) : Number(p.max_action_price || 0);
          const reg = Number(p.regular_price || 0);
          const realDiscount = reg > 0 && effectivePrice > 0 ? ((reg - effectivePrice) / reg * 100) : 0;
          const noDataCls = p.has_data ? '' : 'opacity:0.55;';
          const f = p.fact || {};
          const s = p.simulation || null;
          const pre = p.pre_action || null;
          const grossDelta = s ? (Number(s.gross_profit || 0) - Number(f.gross_profit || 0)) : null;
          const deltaCls = grossDelta == null ? '' : (grossDelta > 0 ? 'color:#1aa260' : 'color:#d93025');
          // Дельта факт vs до акции (для mode=current)
          const preGrossDelta = pre ? (Number(f.gross_profit || 0) - Number(pre.gross_profit || 0)) : null;
          const preDeltaCls = preGrossDelta == null ? '' : (preGrossDelta > 0 ? 'color:#1aa260' : 'color:#d93025');
          const candidateChip = p.is_candidate ? '<span class="analytics-chip" style="background:#fff3e0;color:#e65100;">кандидат</span>' : (p.is_participating ? '<span class="analytics-chip ok">участвует</span>' : '');
          const boostTxt = Number(p.max_boost || 0) > 0 ? `<span style="color:#2e7d32;font-size:11px;font-weight:600;">+${fmtN(p.current_boost || p.min_boost || 0, 0)}–${fmtN(p.max_boost, 0)}%</span>` : '';
          const stockVal = p.stock != null ? Number(p.stock) : null;
          const ordersPerDay = p.funnel ? Number(p.funnel.orders_per_day || 0) : (Number(f.units || 0) / (data.days_back || 30));
          const daysLeft = (stockVal != null && ordersPerDay > 0) ? Math.round(stockVal / ordersPerDay) : null;
          const daysColor = daysLeft != null ? (daysLeft <= 7 ? '#d93025' : daysLeft <= 14 ? '#e65100' : '#666') : '#999';
          const stockTxt = stockVal != null ? `ост. ${fmtN(stockVal)}${daysLeft != null ? ` (${daysLeft}д)` : ''}` : '';

          // Строка «до акции» (mode=current) — показываем первой как базу
          const prePreFrom = p.pre_period_from || '';
          const prePreTo = p.pre_period_to || '';
          const joinedAt = p.joined_at || '';
          const joinedSrc = p.joined_source || '';
          const srcIcon = joinedSrc === 'event' ? '\u2714' : (joinedSrc === 'sync' ? '\u223C' : '\u2026');
          const prePeriodLabel = (prePreFrom && prePreFrom !== prePreTo)
            ? `ДО АКЦИИ <span style="font-size:10px;color:#aaa;">${prePreFrom} → ${prePreTo}</span> <span title="В акции с ${joinedAt} (${joinedSrc})" style="font-size:10px;cursor:help;">${srcIcon}</span>`
            : 'ДО АКЦИИ <span style="font-size:10px;color:#e65100;">нет данных</span>';
          const preRow = pre ? `
            <tr class="action-product-row action-row-pre" data-detail-target="${detailId}" style="cursor:pointer;${p.has_pre_data ? '' : 'opacity:0.55;'}background:#f5f5f5;">
              <td><span class="action-toggle">▶</span> <strong>${(p.offer_id || '').replace(/</g,'&lt;')}</strong> ${candidateChip} <span style="color:${daysColor};font-size:11px;">${stockTxt}</span></td>
              <td style="text-align:right;color:#888;font-size:12px;">${prePeriodLabel}</td>
              <td style="text-align:right;color:#666;">${fmtN(pre.units, 0)}</td>
              <td style="text-align:right;color:#666;">${fmtR(pre.price)}</td>
              <td style="text-align:right;color:#666;">${fmtR(pre.revenue)}</td>
              <td style="text-align:right;color:#666;">${fmtR(pre.sale_commission)}</td>
              <td style="text-align:right;color:#666;">${fmtR((pre.fixed_costs || 0) + (pre.acquiring || 0))}</td>
              <td style="text-align:right;color:#666;">${fmtR(pre.material_cost)}</td>
              <td style="text-align:right;color:#666;">${fmtR(pre.tax)}</td>
              <td style="text-align:right;font-weight:600;color:#666;">${fmtR(pre.gross_profit)}</td>
              <td style="text-align:right;color:#666;">${fmtPct(pre.gross_profit_pct || 0)}</td>
            </tr>` : '';
          // Чекбокс для кандидатов (simulation mode)
          const checkboxHtml = (s && p.is_candidate && Number(p.max_action_price || 0) > 0)
            ? `<input type="checkbox" class="action-product-check" data-action-idx="${idx}" data-product-id="${p.product_id}" data-action-price="${p.max_action_price}" style="margin-right:6px;" onclick="event.stopPropagation();" />`
            : '';
          // Строка факт (текущие продажи)
          const factRow = `
            <tr class="action-product-row action-row-fact" data-detail-target="${detailId}" style="cursor:pointer;${noDataCls}">
              <td>${checkboxHtml}<span class="action-toggle">▶</span> <strong>${(p.offer_id || '').replace(/</g,'&lt;')}</strong> ${candidateChip} ${boostTxt} <span style="color:${daysColor};font-size:11px;">${stockTxt}</span></td>
              <td style="text-align:right;color:#666;font-size:12px;">ТЕКУЩИЕ</td>
              <td style="text-align:right">${fmtN(f.units, 0)}</td>
              <td style="text-align:right">${fmtR(f.price)}</td>
              <td style="text-align:right">${fmtR(f.revenue)}</td>
              <td style="text-align:right">${fmtR(f.sale_commission)}</td>
              <td style="text-align:right">${fmtR((f.fixed_costs || 0) + (f.acquiring || 0))}</td>
              <td style="text-align:right">${fmtR(f.material_cost)}</td>
              <td style="text-align:right">${fmtR(f.tax)}</td>
              <td style="text-align:right;font-weight:600;">${fmtR(f.gross_profit)}</td>
              <td style="text-align:right;font-weight:600;${preDeltaCls}">${preGrossDelta != null ? ((preGrossDelta >= 0 ? '+' : '') + fmtR(preGrossDelta)) : fmtPct(f.gross_profit_pct || 0)}</td>
            </tr>`;
          // Строка акция (только в simulation)
          const simRow = s ? `
            <tr class="action-product-row action-row-sim" style="${noDataCls}background:#fffbe6;">
              <td style="padding-left:24px;color:#666;font-size:12px;">по цене ${fmtR(effectivePrice)} (-${fmtN(realDiscount, 0)}%)</td>
              <td style="text-align:right;color:#1a73e8;font-size:12px;font-weight:600;">АКЦИЯ</td>
              <td style="text-align:right">${fmtN(s.units, 0)}</td>
              <td style="text-align:right">${fmtR(s.price)}</td>
              <td style="text-align:right">${fmtR(s.revenue)}</td>
              <td style="text-align:right">${fmtR(s.sale_commission)}</td>
              <td style="text-align:right">${fmtR((s.fixed_costs || 0) + (s.acquiring || 0))}</td>
              <td style="text-align:right">${fmtR(s.material_cost)}</td>
              <td style="text-align:right">${fmtR(s.tax)}</td>
              <td style="text-align:right;font-weight:600;${deltaCls}">${fmtR(s.gross_profit)}</td>
              <td style="text-align:right;${deltaCls}">${grossDelta >= 0 ? '+' : ''}${fmtR(grossDelta)}</td>
            </tr>` : '';
          // Строка безубыток (только в simulation, если есть данные)
          const be = p.breakeven || null;
          const fn = p.funnel || null;
          const beRow = (s && be) ? (() => {
            const hints = [];
            if (be.units_growth_pct != null) hints.push(`продажи +${fmtN(be.units_growth_pct, 0)}%`);
            if (be.views_growth_pct != null && fn) hints.push(`показы +${fmtN(be.views_growth_pct, 0)}% (${fmtN(fn.views_per_day, 0)}→${fmtN(be.breakeven_views_per_day, 0)}/д)`);
            if (be.ctr_growth_pct != null && fn) hints.push(`CTR +${fmtN(be.ctr_growth_pct, 0)}% (${fmtN(fn.cr_view_to_cart_pct, 1)}→${fmtN(be.breakeven_ctr, 1)}%)`);
            return `
            <tr class="action-product-row action-row-be" style="background:#f0faf5;">
              <td style="padding-left:24px;color:#666;font-size:12px;">для выхода в ноль нужно</td>
              <td style="text-align:right;color:#e65100;font-size:12px;font-weight:600;">БЕЗУБЫТОК</td>
              <td style="text-align:right;font-weight:600;color:#e65100;">${fmtN(be.units, 0)}</td>
              <td style="text-align:right">${fmtR(effectivePrice)}</td>
              <td style="text-align:right;color:#666;">${fmtR(be.units * effectivePrice)}</td>
              <td colspan="4" style="padding-left:12px;font-size:11px;color:#475569;line-height:1.6;">${hints.join('<br>')}</td>
              <td style="text-align:right;font-weight:600;">${fmtR(f.gross_profit)}</td>
              <td style="text-align:right;color:#666;">0</td>
            </tr>`;
          })() : '';
          // Строка детального дерева (скрыта)
          const detailRow = `
            <tr class="action-product-detail hidden" id="${detailId}">
              <td colspan="11" style="background:#fafbfd;padding:12px 16px;">
                ${buildActionProductDetailRows(p)}
              </td>
            </tr>`;
          return preRow + factRow + simRow + beRow + detailRow;
        }).join('');

        return `
          <section class="action-group" style="border:1px solid #e0e6ed;border-radius:10px;margin-bottom:16px;background:#fff;overflow:hidden;">
            <div class="action-group-head" data-action-toggle="action_body_${idx}" style="cursor:pointer;padding:14px 18px;background:#f7f9fc;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid #e0e6ed;">
              <span class="action-group-toggle">▼</span>
              <strong style="font-size:15px;flex:1;min-width:200px;">${(a.title || '').replace(/</g,'&lt;')}</strong>
              ${partChip}
              <span class="analytics-chip">${a.action_type || ''}</span>
              <span style="color:#666;font-size:12px;">${periodTxt}</span>
              ${preperiodTxt ? `<span style="color:#999;font-size:11px;">(${preperiodTxt})</span>` : ''}
              <span style="color:#666;font-size:12px;">товаров: ${products.length}</span>
              <span style="color:#666;font-size:12px;">текущие: выручка <strong>${fmtR(sumFact.revenue)}</strong>, валовая <strong>${fmtR(sumFact.gross)}</strong></span>
              ${mode === 'current' && sumPre.revenue > 0 ? (() => {
                const gd = sumFact.gross - sumPre.gross;
                const gdCls = gd > 0 ? 'color:#1aa260' : (gd < 0 ? 'color:#d93025' : '');
                return `<span style="color:#666;font-size:12px;">до акции: валовая <strong>${fmtR(sumPre.gross)}</strong>, эффект: <strong style="${gdCls}">${gd >= 0 ? '+' : ''}${fmtR(gd)}</strong></span>`;
              })() : ''}
              ${mode === 'simulation' ? (() => {
                const gd = sumSim.gross - sumFact.gross;
                const gdCls = gd > 0 ? 'color:#1aa260' : (gd < 0 ? 'color:#d93025' : '');
                return `<span style="color:#666;font-size:12px;">акция: валовая <strong>${fmtR(sumSim.gross)}</strong>, Δ <strong style="${gdCls}">${gd >= 0 ? '+' : ''}${fmtR(gd)}</strong></span>`;
              })() : ''}
            </div>
            ${(() => {
              // Собираем бустинг по товарам акции
              const boosts = products.filter(p => p.max_boost > 0);
              const minB = boosts.length ? Math.min(...boosts.map(p => p.current_boost || p.min_boost || 0)) : 0;
              const maxB = boosts.length ? Math.max(...boosts.map(p => p.max_boost || 0)) : 0;
              const chips = [];
              if (maxB > 0) chips.push(`<span style="background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:4px;font-weight:600;">Бустинг: ${minB}–${maxB}%</span>`);
              if (a.action_type) chips.push(`<span style="background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;">${a.action_type}</span>`);
              if (a.with_targeting) chips.push(`<span style="background:#fce4ec;color:#c62828;padding:2px 8px;border-radius:4px;">Таргетинг</span>`);

                <label style="font-size:12px;color:#666;cursor:pointer;"><input type="checkbox" class="action-select-all" data-action-idx="${idx}" /> выбрать всех кандидатов</label>
                <span class="action-selected-count" data-action-idx="${idx}" style="font-size:11px;color:#999;"></span>
              </div>` : ''}
              <table class="action-products-table" style="width:100%;border-collapse:collapse;font-size:13px;">
                <thead style="background:#f0f3f8;">
                  <tr>
                    <th style="text-align:left;padding:8px;cursor:pointer;" data-sort-col="offer_id">Артикул ${sortState.col === 'offer_id' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="padding:8px;"></th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="units">Кол-во ${sortState.col === 'units' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="price">Цена/ед ${sortState.col === 'price' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="revenue">Выручка ${sortState.col === 'revenue' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="commission">Комиссия ${sortState.col === 'commission' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="services">Услуги/доставка ${sortState.col === 'services' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="material">Себест. ${sortState.col === 'material' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="tax">Налог ${sortState.col === 'tax' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="gross">Валовая ${sortState.col === 'gross' ? (sortState.asc ? '▲' : '▼') : ''}</th>
                    <th style="text-align:right;padding:8px;cursor:pointer;" data-sort-col="delta">${mode === 'simulation' ? 'Δ валовой' : 'Δ эффект'} ${sortState.col === 'delta' ? (sortState.asc ? '▲' : '▼') : ''}</th>

      analyticsStocksWrap.innerHTML = `
        <style>
          .action-products-table tr.action-product-row td { padding:8px; border-bottom:1px solid #f0f3f8; }
          .action-products-table tr.action-product-row:hover td { background:#f5f9ff; }

        <div class="actions-report-wrap" style="max-width:1400px;margin:0 auto;">
