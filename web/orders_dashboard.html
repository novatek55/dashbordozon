    async function calculatePalletsForSupplyPlan() {
      syncSupplyDetailOverridesFromDom();
      // Берем данные напрямую из текущего supply-plan, а не из HTML таблицы.
      const groups = getSupplyPlanItemsSource();
      const supplyItems = groups
        .map((group) => {
          const details = (group.details || [])
            .map((detail, detailIndex) => getEffectiveSupplyDetail(group, detail, detailIndex))
            .filter((detail) => Number(detail.allocated_supply || 0) > 0)
            .map((detail) => ({
              sku: detail.sku || group.sku || group.offer_id,
              cluster_name: detail.cluster_name || detail.warehouse_name || "Unknown",
              allocated_supply: Number(detail.allocated_supply || 0),
            }));
          return {
            offer_id: group.offer_id,
            sku: group.sku || group.offer_id,
            details,
          };
        })
        .filter((item) => item.details.length > 0);
      
      if (!supplyItems.length) {
        alert('Нет данных для расчета. Убедитесь что в таблице есть распределение по кластерам (столбец "Поставим")');
        return;
      }
      
      // Показываем индикатор загрузки в контейнере
      const resultsContainer = document.getElementById('supply-plan-pallet-results');
      const progress = createServerProgressReporter(resultsContainer, [
        "Сбор данных из таблицы поставки",
        "Запрос /api/supply-plan/pallets",
        "Расчет паллет на сервере",
        "Подготовка результатов для отображения",
      ]);
      if (resultsContainer) {
        resultsContainer.innerHTML = '<div style="padding: 20px; text-align: center; background: #f8f9fa; border-radius: 8px;">🔄 Расчет паллетов...</div>';
      }
      
      try {
        console.log('🚀 Отправляю запрос с данными:', supplyItems.length, 'товаров');
        console.log('📦 Первый товар:', supplyItems[0]?.offer_id, supplyItems[0]?.details?.length);
        
        const response = await fetch('/api/supply-plan/pallets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: supplyItems })
        });
        
        const data = await response.json();
        console.log('✅ Получен ответ:', data);
        console.log('📊 Кластеров:', data.clusters?.length || 0);
        
        if (data.success) {
          console.log('✅ Успех! Рендерю результаты...');
          palletItemOverrides = {};
          stage2WarehouseItemOverrides = {};
          stage2CompositionDirty = false;
          supplyPlanStageView = "stage1";
          latestPalletClusters = Array.isArray(data.clusters) ? data.clusters : [];
          latestWarehouseAcceptance = data.warehouse_acceptance || null;
          if (!data.clusters || data.clusters.length === 0) {
            await syncSupplyPlanFromAllPallets();
            progress.done("Расчет завершен. Нет данных для паллетизации.");
          } else {
            const tariffFile = data?.crossdock_tariff?.file || "";
            const tariffNote = tariffFile ? ` Тариф: ${tariffFile}.` : "";
            progress.done(`Расчет паллет завершен.${tariffNote} Рендер результатов...`);
            await syncSupplyPlanFromAllPallets();
          }
        } else {
          const container = document.getElementById('supply-plan-pallet-results');
          if (container) {
            container.innerHTML = `
              <div style="padding: 20px; color: #dc3545; background: #f8f9fa; border-radius: 8px;">
                Ошибка: ${data.error || 'Неизвестная ошибка'}<br>
                <pre style="font-size: 11px; margin-top: 10px;">${JSON.stringify(data, null, 2)}</pre>
              </div>
            `;
          }
        }
      } catch (error) {
        console.error('Ошибка запроса:', error);
        const container = document.getElementById('supply-plan-pallet-results');
        if (container) {
          container.innerHTML = `
            <div style="padding: 20px; color: #dc3545; background: #f8f9fa; border-radius: 8px;">
              Ошибка расчета: ${error.message}
            </div>
          `;
        }
        progress.fail(`Ошибка расчета паллет: ${error.message}`);
      }
    }
    
    async function requestTimeslotsForSelection() {
      if (!latestWarehouseAcceptance || !Array.isArray(latestWarehouseAcceptance.clusters) || !latestWarehouseAcceptance.clusters.length) {
        const ok = await createStage2DraftsAndWarehouses();
        if (!ok) {
          alert("Сначала создайте черновики и получите склады на Этапе 2.");
          return;
        }
      }
      if (!latestWarehouseAcceptance || !Array.isArray(latestWarehouseAcceptance.clusters)) {
        return;
      }
      if (stage2CompositionDirty) {
        const ok = await recalculateSupplyByStage2Composition();
        if (!ok) return;
      }

      const container = document.getElementById('supply-plan-pallet-results');
      const selectedByDraft = {};
      const checked = (container ? Array.from(container.querySelectorAll('.warehouse-timeslot-checkbox:checked')) : []);
      for (const input of checked) {
        const draftId = String(input.dataset.draftId || "").trim();
        const warehouseId = Number(input.dataset.warehouseId || 0);
        if (!draftId || !Number.isFinite(warehouseId) || warehouseId <= 0) continue;
        if (!selectedByDraft[draftId]) selectedByDraft[draftId] = [];
        selectedByDraft[draftId].push(warehouseId);
      }

      const statusContainer = document.getElementById('timeslot-request-status');
      const progress = createServerProgressReporter(statusContainer, [
        "Подготовка выбранных складов",
        "Запрос /api/supply-plan/timeslots",
        "Получение таймслотов от Ozon",
        "Обновление данных в интерфейсе",
      ]);

      try {
        const response = await fetch('/api/supply-plan/timeslots', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            clusters: latestWarehouseAcceptance.clusters || [],
            selected_by_draft: selectedByDraft
          })
        });
        const data = await response.json();
        if (!data.success) {
          throw new Error(data.error || 'Не удалось получить таймслоты');
        }
        latestWarehouseAcceptance = data.warehouse_acceptance || latestWarehouseAcceptance;
        progress.done("Таймслоты успешно получены и обновлены.");
        renderPalletResults(latestPalletClusters, latestWarehouseAcceptance);
      } catch (error) {
        progress.fail(`Ошибка запроса таймслотов: ${fmt(error.message)}`);
      }
    }

    function toggleClusterWarehousesSelection(draftId, checked) {
      const container = document.getElementById('supply-plan-pallet-results');
      if (!container) return;
      container.querySelectorAll(`.warehouse-timeslot-checkbox[data-draft-id="${String(draftId)}"]`).forEach((input) => {
        input.checked = !!checked;
      });
    }

    function slotPeriodLabel(fromTime) {
      const hour = Number(extractTimeOnly(fromTime).slice(0, 2));
      if (!Number.isFinite(hour)) return "День";
      if (hour < 12) return "Утро";
      if (hour < 18) return "День";
      if (hour < 24) return "Вечер";
      return "Ночь";
    }

    function extractTimeOnly(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      const m = raw.match(/(\d{2}:\d{2})(?::\d{2})?$/);
      if (m && m[1]) return m[1];
      return raw.length >= 5 ? raw.slice(0, 5) : raw;
    }

    function formatSlotDateLabel(dateRaw) {
      const d = new Date(dateRaw);
      if (Number.isNaN(d.getTime())) return String(dateRaw || "");
      return d.toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
    }

    function selectTimeslotDay(widgetId, dayIndex) {
      const widget = document.getElementById(widgetId);
      if (!widget) return;
      widget.querySelectorAll(".warehouse-timeslot-date-btn").forEach((btn) => {
        const idx = Number(btn.dataset.dayIndex || -1);
        btn.classList.toggle("active", idx === dayIndex);
      });
      widget.querySelectorAll(".warehouse-timeslot-calendar-day").forEach((btn) => {
        const idx = Number(btn.dataset.dayIndex || -1);
        btn.classList.toggle("active", idx === dayIndex);
      });
      widget.querySelectorAll(".warehouse-timeslot-day").forEach((panel) => {
        const idx = Number(panel.dataset.dayIndex || -1);
        panel.classList.toggle("hidden", idx !== dayIndex);
      });
      const activePanel = widget.querySelector(`.warehouse-timeslot-day[data-day-index="${dayIndex}"]`);
      const currentDateLabel = widget.querySelector(".warehouse-timeslot-current-date");
      if (activePanel && currentDateLabel) {
        currentDateLabel.textContent = String(activePanel.dataset.dateLabel || "");
      }
    }

    function selectTimeslotRange(button, widgetId, dateLabel, fromTime, toTime) {
      const widget = document.getElementById(widgetId);
      if (!widget) return;
      widget.querySelectorAll(".warehouse-timeslot-chip").forEach((chip) => chip.classList.remove("active"));
      if (button && button.classList) button.classList.add("active");
      const selected = widget.querySelector(".warehouse-timeslot-selected-value");
      if (selected) {
        selected.textContent = `${dateLabel} ${fromTime} - ${toTime}`;
      }
    }

    function renderWarehouseTimeslotWidget(wh, widgetId) {
      const slotsByDate = Array.isArray(wh.slots_by_date) ? wh.slots_by_date : [];
      if (!slotsByDate.length) {
        return `<div class="warehouse-timeslot-empty">Таймслоты пока не запрошены или недоступны для выбранного склада.</div>`;
      }

      const toDateObj = (value) => {
        const raw = String(value || "").trim();
        if (!raw) return null;
        const tryDirect = new Date(raw);
        if (!Number.isNaN(tryDirect.getTime())) return tryDirect;
        const short = raw.slice(0, 10);
        const m = short.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!m) return null;
        return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
      };
      const toDateKey = (value) => {
        const d = toDateObj(value);
        if (!d) return "";
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      };

      const normalizedDays = slotsByDate
        .map((day) => {
          const dateObj = toDateObj(day?.date);
          if (!dateObj) return null;
          return {
            rawDate: String(day?.date || ""),
            key: toDateKey(day?.date),
            dateObj,
            label: formatSlotDateLabel(day?.date),
            times: Array.isArray(day?.times) ? day.times : [],
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.dateObj - b.dateObj);
      if (!normalizedDays.length) {
        return `<div class="warehouse-timeslot-empty">Таймслоты пока не запрошены или недоступны для выбранного склада.</div>`;
      }

      const monthNames = ["январь", "февраль", "март", "апрель", "май", "июнь", "июль", "август", "сентябрь", "октябрь", "ноябрь", "декабрь"];
      const weekDays = ["пн", "вт", "ср", "чт", "пт", "сб", "вс"];
      const firstDay = normalizedDays[0].dateObj;
      const monthStart = new Date(firstDay.getFullYear(), firstDay.getMonth(), 1);
      const monthEnd = new Date(firstDay.getFullYear(), firstDay.getMonth() + 1, 0);
      const startShift = (monthStart.getDay() + 6) % 7;
      const totalCells = Math.ceil((startShift + monthEnd.getDate()) / 7) * 7;
      const dayIndexByKey = Object.fromEntries(normalizedDays.map((day, idx) => [day.key, idx]));

      const calendarCells = [];
      for (let cell = 0; cell < totalCells; cell += 1) {
        const dayNum = cell - startShift + 1;
        const inCurrentMonth = dayNum >= 1 && dayNum <= monthEnd.getDate();
        if (!inCurrentMonth) {
          calendarCells.push(`<button type="button" class="warehouse-timeslot-calendar-day" disabled><span></span></button>`);
          continue;
        }
        const cellDate = new Date(firstDay.getFullYear(), firstDay.getMonth(), dayNum);
        const key = toDateKey(cellDate.toISOString());
        const dayIdx = dayIndexByKey[key];
        const hasSlots = Number.isInteger(dayIdx);
        calendarCells.push(`
          <button
            type="button"
            class="warehouse-timeslot-calendar-day ${hasSlots ? "has-slots" : ""} ${dayIdx === 0 ? "active" : ""}"
            ${hasSlots ? "" : "disabled"}
            data-day-index="${hasSlots ? dayIdx : -1}"
            onclick="${hasSlots ? `selectTimeslotDay('${widgetId}', ${dayIdx})` : ""}"
          >
            <span>${dayNum}</span>
          </button>
        `);
      }

      const dayPanels = normalizedDays.map((day, dayIdx) => {
        const times = day.times;
        const groups = {};
        for (const slot of times) {
          const period = slotPeriodLabel(slot.from);
          if (!groups[period]) groups[period] = [];
          groups[period].push(slot);
        }
        const orderedPeriods = ["Утро", "День", "Вечер", "Ночь"];
        const periodBlocks = orderedPeriods
          .filter((label) => Array.isArray(groups[label]) && groups[label].length > 0)
          .map((label) => `
            <div class="warehouse-timeslot-period">
              <div class="warehouse-timeslot-period-title">${label}</div>
              <div class="warehouse-timeslot-chips">
                ${(groups[label] || []).map((slot) => `
                  <button
                    type="button"
                    class="warehouse-timeslot-chip"
                    onclick="selectTimeslotRange(this, '${widgetId}', '${String(day.rawDate || "").replace(/'/g, "\\'")}', '${extractTimeOnly(String(slot.from || ""))}', '${extractTimeOnly(String(slot.to || ""))}')"
                  >
                    ${fmt(extractTimeOnly(slot.from))} - ${fmt(extractTimeOnly(slot.to))}
                  </button>
                `).join("")}
              </div>
            </div>
          `).join("");

        return `
          <div class="warehouse-timeslot-day ${dayIdx === 0 ? "" : "hidden"}" data-day-index="${dayIdx}" data-date-label="${fmt(day.label)}">
            <div class="warehouse-timeslot-current-date">${fmt(day.label)}</div>
            ${periodBlocks || `<div class="warehouse-timeslot-empty">На выбранную дату нет интервалов.</div>`}
          </div>
        `;
      }).join("");

      return `
        <div class="warehouse-timeslot-widget" id="${widgetId}">
          <div class="warehouse-timeslot-header">
            <div class="warehouse-timeslot-title">Дата и время отгрузки</div>
            <div class="warehouse-timeslot-subtitle">
              Показываем все доступные интервалы — время отображается в часовом поясе склада.
              <button type="button" class="warehouse-timeslot-help-btn">Как это работает</button>
            </div>
          </div>
          <div class="warehouse-timeslot-layout">
            <div class="warehouse-timeslot-calendar">
              <div class="warehouse-timeslot-calendar-head">
                <span>${monthNames[firstDay.getMonth()]} ${firstDay.getFullYear()}</span>
                <button type="button" class="warehouse-timeslot-calendar-arrow" disabled>›</button>
              </div>
              <div class="warehouse-timeslot-calendar-weekdays">
                ${weekDays.map((dayName) => `<div class="warehouse-timeslot-calendar-weekday">${dayName}</div>`).join("")}
              </div>
              <div class="warehouse-timeslot-calendar-grid">${calendarCells.join("")}</div>
            </div>
            <div>${dayPanels}</div>
          </div>
          <div class="warehouse-timeslot-selected">
            Время: <strong class="warehouse-timeslot-selected-value">Не выбрано</strong>
          </div>
        </div>
      `;
    }

    function normalizeWarehouseKey(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function getPlannedItemsForWarehouse(clusterInfo, wh) {
      const warehouseKey = normalizeWarehouseKey(wh?.warehouse_name || "");
      const clusterKey = normalizeWarehouseKey(clusterInfo?.cluster_name || "");
      const byWarehouse = new Map();
      const byCluster = new Map();

      getSupplyPlanItemsSource().forEach((group) => {
        const offerLabel = String(group?.offer_id || "").trim() || String(group?.sku || "").trim() || "Без артикула";
        (group?.details || []).forEach((detail, detailIndex) => {
          const effective = getEffectiveSupplyDetail(group, detail, detailIndex);
          const qty = toNonNegativeInt(effective?.allocated_supply ?? 0, 0);
          if (qty <= 0) return;
          const detailWarehouseKey = normalizeWarehouseKey(effective?.warehouse_name || "");
          const detailClusterKey = normalizeWarehouseKey(effective?.cluster_name || "");
          const itemKey = `${offerLabel}::${String(effective?.sku || group?.sku || "")}`;
          const target = detailWarehouseKey && detailWarehouseKey === warehouseKey
            ? byWarehouse
            : (detailClusterKey && detailClusterKey === clusterKey ? byCluster : null);
          if (!target) return;
          const prev = target.get(itemKey) || { offer_id: offerLabel, sku: String(effective?.sku || group?.sku || ""), quantity: 0 };
          prev.quantity += qty;
          target.set(itemKey, prev);
        });
      });

      const selected = byWarehouse.size > 0 ? byWarehouse : byCluster;
      const sourceLabel = byWarehouse.size > 0 ? "по складу" : (byCluster.size > 0 ? "по кластеру" : "");
      const items = Array.from(selected.values()).sort((a, b) => b.quantity - a.quantity || a.offer_id.localeCompare(b.offer_id, "ru"));
      return { items, sourceLabel };
    }

    function stage2WarehouseItemKey(clusterInfo, wh, item) {
      return [
        String(clusterInfo?.draft_id || 0),
        String(wh?.warehouse_id || 0),
        String(item?.offer_id || ""),
        String(item?.sku || ""),
      ].join("::");
    }

    function getEffectivePlannedItemsForWarehouse(clusterInfo, wh) {
      const base = getPlannedItemsForWarehouse(clusterInfo, wh);
      const items = (base.items || []).map((item) => {
        const key = stage2WarehouseItemKey(clusterInfo, wh, item);
        const override = stage2WarehouseItemOverrides[key];
        const quantity = toNonNegativeInt(override?.quantity ?? item.quantity, item.quantity);
        return { ...item, quantity };
      });
      return { items, sourceLabel: base.sourceLabel };
    }

    function getPlannedItemsForCluster(clusterInfo) {
      const bySku = new Map();
      const warehouses = Array.isArray(clusterInfo?.accepted_warehouses) ? clusterInfo.accepted_warehouses : [];
      warehouses.forEach((wh) => {
        const planned = getEffectivePlannedItemsForWarehouse(clusterInfo, wh);
        (planned.items || []).forEach((item) => {
          const sku = String(item?.sku || "").trim();
          const offer = String(item?.offer_id || sku);
          const qty = toNonNegativeInt(item?.quantity ?? 0, 0);
          if (!sku || qty <= 0) return;
          const prev = bySku.get(sku) || { sku, offer_id: offer, quantity: 0 };
          prev.quantity += qty;
          bySku.set(sku, prev);
        });
      });
      return Array.from(bySku.values()).sort((a, b) => b.quantity - a.quantity || a.offer_id.localeCompare(b.offer_id, "ru"));
    }

    function setSupplyPlanStageView(view) {
      const next = view === "stage2" ? "stage2" : "stage1";
      if (supplyPlanStageView === next) return;
      supplyPlanStageView = next;
      renderPalletResults(latestPalletClusters, latestWarehouseAcceptance);
    }

    function buildSupplyItemsFromStage2Edits() {
      if (!latestWarehouseAcceptance || !Array.isArray(latestWarehouseAcceptance.clusters)) return [];
      const bucketByCluster = new Map();

      (latestWarehouseAcceptance.clusters || []).forEach((clusterInfo) => {
        const clusterName = String(clusterInfo?.cluster_name || "Unknown").trim() || "Unknown";
        const clusterKey = String(clusterInfo?.macrolocal_cluster_id || clusterName);
        if (!bucketByCluster.has(clusterKey)) {
          bucketByCluster.set(clusterKey, {
            cluster_name: clusterName,
            by_sku: new Map(),
          });
        }
        const bucket = bucketByCluster.get(clusterKey);
        const warehouses = Array.isArray(clusterInfo?.accepted_warehouses) ? clusterInfo.accepted_warehouses : [];
        warehouses.forEach((wh) => {
          const planned = getEffectivePlannedItemsForWarehouse(clusterInfo, wh);
          (planned.items || []).forEach((item) => {
            const qty = toNonNegativeInt(item.quantity, 0);
            if (qty <= 0) return;
            const sku = String(item.sku || "").trim();
            if (!sku) return;
            const prev = bucket.by_sku.get(sku) || { sku, offer_id: String(item.offer_id || sku), allocated_supply: 0 };
            prev.allocated_supply += qty;
            bucket.by_sku.set(sku, prev);
          });
        });
      });

      const result = [];
      bucketByCluster.forEach((bucket) => {
        bucket.by_sku.forEach((entry) => {
          result.push({
            offer_id: entry.offer_id,
            sku: entry.sku,
            details: [{
              sku: entry.sku,
              cluster_name: bucket.cluster_name,
              allocated_supply: entry.allocated_supply,
            }],
          });
        });
      });
      return result;
    }

    function buildSupplyItemsFromPalletClusters() {
      const byCluster = new Map();
      (Array.isArray(latestPalletClusters) ? latestPalletClusters : []).forEach((cluster) => {
        const clusterName = String(cluster?.cluster || cluster?.cluster_name || "Unknown").trim() || "Unknown";
        const clusterKey = clusterName;
        if (!byCluster.has(clusterKey)) {
          byCluster.set(clusterKey, { cluster_name: clusterName, by_sku: new Map() });
        }
        const bucket = byCluster.get(clusterKey);
        (cluster?.pallets || []).forEach((pallet, palletIndex) => {
          (pallet?.items || []).forEach((item, itemIndex) => {
            const effective = getEffectivePalletItem(cluster, pallet, item, itemIndex);
            const sku = String(effective?.sku || "").trim();
            const qty = toNonNegativeInt(effective?.quantity ?? 0, 0);
            if (!sku || qty <= 0) return;
            const offer = String(supplySkuToOfferMap[sku] || sku);
            const prev = bucket.by_sku.get(sku) || { sku, offer_id: offer, allocated_supply: 0 };
            prev.allocated_supply += qty;
            bucket.by_sku.set(sku, prev);
          });
        });
      });

      const items = [];
      byCluster.forEach((bucket) => {
        bucket.by_sku.forEach((entry) => {
          items.push({
            offer_id: entry.offer_id,
            sku: entry.sku,
            details: [{ sku: entry.sku, cluster_name: bucket.cluster_name, allocated_supply: entry.allocated_supply }],
          });
        });
      });
      return items;
    }

    function buildSupplyItemsFromCurrentSupplyPlan() {
      const groups = getSupplyPlanItemsSource();
      return groups
        .map((group) => {
          const details = (group.details || [])
            .map((detail, detailIndex) => getEffectiveSupplyDetail(group, detail, detailIndex))
            .filter((detail) => Number(detail.allocated_supply || 0) > 0)
            .map((detail) => ({
              sku: detail.sku || group.sku || group.offer_id,
              cluster_name: detail.cluster_name || detail.warehouse_name || "Unknown",
              allocated_supply: Number(detail.allocated_supply || 0),
            }));
          return {
            offer_id: group.offer_id,
            sku: group.sku || group.offer_id,
            details,
          };
        })
        .filter((item) => item.details.length > 0);
    }

    function extractClusterNamesFromSupplyItems(items) {
      return Array.from(
        new Set(
          (Array.isArray(items) ? items : []).flatMap((item) =>
            (Array.isArray(item?.details) ? item.details : [])
              .map((detail) => String(detail?.cluster_name || "").trim())
              .filter(Boolean)
          )
        )
      );
    }

    async function createStage2DraftsAndWarehouses() {
      const stageStatus = document.getElementById("stage2-compose-status");
      const useMultiClusterDraft = true; // Экспериментальный быстрый режим Ozon multi-cluster draft.
      syncSupplyDetailOverridesFromDom();
      const supplyItemsFromPallets = buildSupplyItemsFromPalletClusters();
      const supplyItemsFromPlan = buildSupplyItemsFromCurrentSupplyPlan();
      const palletClusterNames = extractClusterNamesFromSupplyItems(supplyItemsFromPallets);
      const planClusterNames = extractClusterNamesFromSupplyItems(supplyItemsFromPlan);
      const usePlanFallback = (palletClusterNames.length <= 1 && planClusterNames.length > palletClusterNames.length) || !supplyItemsFromPallets.length;
      const supplyItems = usePlanFallback ? supplyItemsFromPlan : supplyItemsFromPallets;
      const requestedClustersCount = extractClusterNamesFromSupplyItems(supplyItems).length;
      if (!supplyItems.length) {
        if (stageStatus) {
          stageStatus.innerHTML = '<div style="padding: 8px 10px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">Нет данных для создания черновиков. Сначала рассчитайте паллеты.</div>';
        }
        return false;
      }
      const clusterNames = extractClusterNamesFromSupplyItems(supplyItems);
      const totalClusters = clusterNames.length || requestedClustersCount || 0;
      const startedAt = Date.now();
      const clusterProgress = clusterNames.map((name, index) => ({
        index: index + 1,
        cluster_name: name,
        state: "pending", // pending | processing | success | error
        message: "",
        accepted_count: 0,
        duration_sec: 0,
      }));
      const renderInProgress = (processed, success, failed, currentCluster = "") => {
        if (!stageStatus) return;
        const elapsedSec = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
        const progressRows = clusterProgress.map((row) => {
          const stateLabel = row.state === "success"
            ? "OK"
            : (row.state === "error" ? "Ошибка" : (row.state === "processing" ? "Обработка" : "Ожидание"));
          const stateColor = row.state === "success"
            ? "#1f6f45"
            : (row.state === "error" ? "#a40000" : (row.state === "processing" ? "#1f4db8" : "#6d7a8f"));
          const details = row.state === "success"
            ? `складов: ${row.accepted_count}`
            : (row.message ? row.message : "—");
          return `
            <div style="display:grid; grid-template-columns: 26px minmax(180px, 1fr) 96px 1fr; gap: 8px; padding: 4px 0; border-bottom: 1px dashed #d9e6fa;">
              <div style="color:#6d7a8f;">${row.index}.</div>
              <div style="font-weight:600; color:#2f3f55;">${fmt(row.cluster_name)}</div>
              <div style="color:${stateColor}; font-weight:700;">${stateLabel}</div>
              <div style="color:#4d5a6d;">${fmt(details)}</div>
            </div>
          `;
        }).join("");
        stageStatus.innerHTML = `
          <div style="padding: 10px 12px; background: #f0f7ff; border: 1px solid #cfe3ff; border-radius: 8px; color: #1f4db8; font-size: 13px;">
            <strong>Создание черновиков и подбор складов</strong> • ${elapsedSec} сек<br/>
            Источник данных: <strong>${usePlanFallback ? "таблица Поставка (fallback)" : "паллетизация этапа 1"}</strong>.<br/>
            Обработано кластеров: ${processed}/${totalClusters}. Успешно: ${success}. С ошибками: ${failed}.<br/>
            ${currentCluster ? `Текущий кластер: ${fmt(currentCluster)}` : "Подготовка запроса..."}
            <div style="margin-top:8px; padding-top:8px; border-top:1px solid #d6e5ff; max-height: 260px; overflow:auto;">
              ${progressRows}
            </div>
          </div>
        `;
      };
      renderInProgress(0, 0, 0, "");
      try {
        const combinedAcceptance = {
          success: true,
          generated_at: new Date().toISOString(),
          clusters: [],
          clusters_truncated: false,
          from_cache: false,
          timeslots_requested: false,
        };
        let successClusters = 0;
        let failedClusters = 0;

        const getClusterItems = (targetNames) => {
          const wanted = new Set((Array.isArray(targetNames) ? targetNames : []).map((v) => String(v || "").trim()));
          return supplyItems
            .map((item) => {
              const details = (Array.isArray(item?.details) ? item.details : []).filter((detail) =>
                wanted.has(String(detail?.cluster_name || "").trim())
              );
              if (!details.length) return null;
              return { ...item, details };
            })
            .filter(Boolean);
        };
        const getAllocatedForCluster = (targetName, sourceItems) => {
          const key = String(targetName || "").trim();
          return (Array.isArray(sourceItems) ? sourceItems : []).reduce((sum, item) => {
            const details = Array.isArray(item?.details) ? item.details : [];
            return sum + details.reduce((s, d) => s + (String(d?.cluster_name || "").trim() === key ? Number(d?.allocated_supply || 0) : 0), 0);
          }, 0);
        };
        const isDirectClusterName = (value) => {
          const raw = String(value || "").trim().toLowerCase();
          return raw.includes("моск") || raw.includes("moscow");
        };
        const directClusterNames = clusterNames.filter((name) => isDirectClusterName(name));
        const crossdockClusterNames = clusterNames.filter((name) => !isDirectClusterName(name));
        const plannedBatches = [];
        if (useMultiClusterDraft && directClusterNames.length > 0) {
          const directBatchSize = 10;
          for (let i = 0; i < directClusterNames.length; i += directBatchSize) {
            plannedBatches.push({
              names: directClusterNames.slice(i, i + directBatchSize),
              useMulti: true,
            });
          }
        } else if (directClusterNames.length > 0) {
          directClusterNames.forEach((name) => plannedBatches.push({ names: [name], useMulti: false }));
        }
        crossdockClusterNames.forEach((name) => plannedBatches.push({ names: [name], useMulti: false }));

        let processedCount = 0;
        for (const batchPlan of plannedBatches) {
          const batchNames = Array.isArray(batchPlan?.names) ? batchPlan.names : [];
          if (!batchNames.length) continue;
          const batchUseMulti = !!batchPlan.useMulti;
          const batchItems = getClusterItems(batchNames);
          const batchStartedAt = Date.now();
          batchNames.forEach((name) => {
            const idx = clusterNames.indexOf(name);
            const row = clusterProgress[idx];
            if (!row) return;
            row.state = "processing";
            row.message = batchUseMulti
              ? "DIRECT пакет: создаем черновики и запрашиваем склады..."
              : "CROSS_DOCK: создаем черновик и запрашиваем склады...";
          });
          renderInProgress(processedCount, successClusters, failedClusters, batchNames[0] || "");
          try {
            const response = await postJsonWithRetry(
              '/api/supply-plan/acceptance',
              { items: batchItems, use_multi_cluster_draft: batchUseMulti },
              {
                retries: 2,
                timeoutMs: 120000,
                fallbackUrls: [
                  'http://127.0.0.1:8088/api/supply-plan/acceptance',
                  'http://localhost:8088/api/supply-plan/acceptance',
                ],
              }
            );
            const data = await response.json();
            if (!data.success) throw new Error(data.error || 'Не удалось получить склады');
            const acceptance = data.warehouse_acceptance || null;
            if (!acceptance || acceptance.success === false) {
              throw new Error((acceptance && acceptance.error) ? acceptance.error : 'Ozon не вернул список принимающих складов');
            }
            const clusters = Array.isArray(acceptance.clusters) ? acceptance.clusters : [];
            const byName = new Map();
            clusters.forEach((cluster) => {
              const k = String(cluster?.cluster_name || "").trim();
              if (!k) return;
              byName.set(k, cluster);
            });
            if (acceptance.clusters_truncated) combinedAcceptance.clusters_truncated = true;
            if (acceptance.from_cache) combinedAcceptance.from_cache = true;
            if (acceptance.timeslots_requested) combinedAcceptance.timeslots_requested = true;

            batchNames.forEach((name) => {
              const idx = clusterNames.indexOf(name);
              const row = clusterProgress[idx];
              const clusterResult = byName.get(String(name).trim());
              if (clusterResult) {
                combinedAcceptance.clusters.push(clusterResult);
                const acceptedTotal = Number(clusterResult?.accepted_count || (Array.isArray(clusterResult?.accepted_warehouses) ? clusterResult.accepted_warehouses.length : 0) || 0);
                if (String(clusterResult?.error || "").trim()) {
                  failedClusters += 1;
                  if (row) {
                    row.state = "error";
                    row.message = String(clusterResult.error || "Ошибка кластера");
                  }
                } else {
                  successClusters += 1;
                  if (row) {
                    row.state = "success";
                    row.accepted_count = acceptedTotal;
                    row.message = acceptedTotal > 0 ? `Складов найдено: ${acceptedTotal}` : "Кластер обработан, но без складов";
                  }
                }
              } else {
                failedClusters += 1;
                const synthetic = {
                  cluster_name: name,
                  allocated_total: getAllocatedForCluster(name, batchItems),
                  error: "Кластер отсутствует в ответе Ozon",
                  accepted_warehouses: [],
                  accepted_count: 0,
                };
                combinedAcceptance.clusters.push(synthetic);
                if (row) {
                  row.state = "error";
                  row.message = synthetic.error;
                }
              }
              if (row) {
                row.duration_sec = Math.max(0, Math.floor((Date.now() - batchStartedAt) / 1000));
              }
            });
          } catch (clusterError) {
            batchNames.forEach((name) => {
              const idx = clusterNames.indexOf(name);
              const row = clusterProgress[idx];
              failedClusters += 1;
              if (row) {
                row.state = "error";
                row.message = String(clusterError?.message || "Ошибка при создании черновика по кластеру");
                row.duration_sec = Math.max(0, Math.floor((Date.now() - batchStartedAt) / 1000));
              }
              combinedAcceptance.clusters.push({
                cluster_name: name,
                allocated_total: getAllocatedForCluster(name, batchItems),
                error: String(clusterError?.message || "Ошибка при создании черновика по кластеру"),
                accepted_warehouses: [],
                accepted_count: 0,
              });
            });
          }
          processedCount = Math.min(clusterNames.length, processedCount + batchNames.length);
          renderInProgress(processedCount, successClusters, failedClusters, batchNames[batchNames.length - 1] || "");
        }

        latestWarehouseAcceptance = combinedAcceptance;
        stage2WarehouseItemOverrides = {};
        stage2CompositionDirty = false;
        const summaryHtml = buildStage2DraftsSummaryHtml(combinedAcceptance, requestedClustersCount || totalClusters);
        if (stageStatus) {
          stageStatus.innerHTML = `<div style="padding: 10px 12px; background: #eef9f1; border: 1px solid #cdebd5; border-radius: 8px; color: #1f6f45; font-size: 13px;">${summaryHtml}</div>`;
        }
        renderPalletResults(latestPalletClusters, latestWarehouseAcceptance);
        return true;
      } catch (error) {
        const msg = String(error?.name || "").toLowerCase() === "aborterror"
          ? "Превышено время ожидания ответа сервера"
          : (String(error?.message || "").includes("Failed to fetch")
              ? "Сервер временно недоступен (network error). Проверьте, что 127.0.0.1:8088 открыт."
              : String(error?.message || "Неизвестная ошибка"));
        if (stageStatus) {
          stageStatus.innerHTML = `<div style="padding: 10px 12px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 13px;">Ошибка создания черновиков: ${fmt(msg)}</div>`;
        }
        alert(`Ошибка создания черновиков: ${msg}`);
        return false;
      }
    }

    async function recalculateSupplyByStage2Composition() {
      syncSupplyDetailOverridesFromDom();
      const stageStatus = document.getElementById("stage2-compose-status");
      const supplyItems = buildSupplyItemsFromStage2Edits();
      if (!supplyItems.length) {
        if (stageStatus) {
          stageStatus.innerHTML = '<div style="padding: 8px 10px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">Нет товаров с количеством > 0 для пересчета.</div>';
        }
        return false;
      }
      if (stageStatus) {
        stageStatus.innerHTML = '<div style="padding: 8px 10px; background: #f0f7ff; border: 1px solid #cfe3ff; border-radius: 8px; color: #1f4db8; font-size: 12px;">Пересчитываю склады и паллеты по измененному составу...</div>';
      }
      try {
        const response = await fetch('/api/supply-plan/pallets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: supplyItems })
        });
        const data = await response.json();
        if (!data.success) throw new Error(data.error || 'Не удалось пересчитать этап 2');
        palletItemOverrides = {};
        latestPalletClusters = Array.isArray(data.clusters) ? data.clusters : [];
        latestWarehouseAcceptance = null;
        stage2WarehouseItemOverrides = {};
        stage2CompositionDirty = false;
        if (stageStatus) {
          stageStatus.innerHTML = '<div style="padding: 8px 10px; background: #eef9f1; border: 1px solid #cdebd5; border-radius: 8px; color: #1f6f45; font-size: 12px;">Готово. Паллеты обновлены. Нажмите «Создать черновики и получить склады» для нового состава.</div>';
        }
        renderPalletResults(latestPalletClusters, latestWarehouseAcceptance);
        return true;
      } catch (error) {
        if (stageStatus) {
          stageStatus.innerHTML = `<div style="padding: 8px 10px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">Ошибка пересчета: ${fmt(error.message)}</div>`;
        }
        return false;
      }
    }

    function renderPalletResults(clusters, warehouseAcceptance = null) {
      const container = document.getElementById('supply-plan-pallet-results');
      
      if (!container) {
        console.error('Container supply-plan-pallet-results not found');
        return;
      }
      const currentlyOpened = new Set(openedPalletDetails);
      container.querySelectorAll('[id^="pallet-"]').forEach((el) => {
        if (el && el.style && el.style.display !== 'none') {
          currentlyOpened.add(el.id);
        }
      });
      openedPalletDetails = currentlyOpened;

      if (Array.isArray(clusters) && clusters.length > 0) {
        persistPalletizationState();
      }
      
      if (!clusters || clusters.length === 0) {
        let restoreNote = "";
        try {
          const raw = localStorage.getItem(PALLETIZATION_STATE_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : null;
          const savedAt = parsed?.saved_at ? new Date(parsed.saved_at) : null;
          const savedLabel = savedAt && !Number.isNaN(savedAt.getTime())
            ? savedAt.toLocaleString("ru-RU")
            : "";
          if (Array.isArray(parsed?.clusters) && parsed.clusters.length > 0) {
            restoreNote = `<div style="margin-top: 10px; font-size: 12px; color: #2b5a9e;">Есть автосохранение${savedLabel ? ` от ${fmt(savedLabel)}` : ""}. Нажмите «Восстановить паллеты» выше.</div>`;
          }
        } catch (_) {
          // ignore parse errors
        }
        container.innerHTML = `<div style="padding: 20px; background: #f8f9fa; border-radius: 8px;">Нет данных для отображения${restoreNote}</div>`;
        return;
      }
      
      // Проверяем на отсутствующие товары
      const allMissing = clusters.flatMap(c => c.missing_products || []);
      
      let html = '';
      const stage1Active = true;

      const filterReasonLabel = (reason) => {
        const key = String(reason || "");
        const map = {
          DIRECT_OVERSIZE_WAREHOUSE_EXCLUDED: "исключен как негабаритный (КГТ)",
          DIRECT_NAME_NOT_IN_INCLUDE_LIST: "не входит в список включенных названий",
          DIRECT_NAME_IN_EXCLUDE_LIST: "исключен по списку названий",
          DIRECT_NOT_AVAILABLE_RANK_DISABLED: "статус NOT_AVAILABLE_RANK отключен",
          DIRECT_NOT_AVAILABLE_RANK_TOO_LOW_PRIORITY: "слишком низкий приоритет по rank",
          DIRECT_NOT_AVAILABLE_MATRIX_EXCLUDED: "исключен по причине MATRIX",
        };
        return map[key] || key || "прочее";
      };

      if (stage1Active && clusters.length > 0) {
        html += `
          <div style="margin-bottom: 14px; padding: 10px 14px; background: #eef9f1; border: 1px solid #cdebd5; border-radius: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <span style="font-size: 13px; font-weight: 700; color: #1f6f45;">📦 Заполнить черновик Ozon из паллетизации:</span>
            <input
              id="fill-draft-id-input"
              type="text"
              placeholder="ID черновика (напр. 96594991)"
              style="width: 210px; padding: 6px 10px; border: 1px solid #a8d5b5; border-radius: 8px; font-size: 13px; color: #1a3a28;"
            />
            <input
              id="shipment-date-input"
              type="date"
              title="Дата отгрузки (пусто = сегодня +2 дня)"
              style="width: 150px; padding: 6px 10px; border: 1px solid #a8d5b5; border-radius: 8px; font-size: 13px; color: #1a3a28;"
            />
            <button type="button" onclick="document.getElementById('transit-wh-panel').style.display = document.getElementById('transit-wh-panel').style.display === 'none' ? 'block' : 'none';"
              style="width: auto; padding: 6px 12px; background: #fff; color: #555; border: 1px solid #ccc; font-size: 12px; border-radius: 8px;" title="Выбрать склады для перебора">
              Склады ▾
            </button>
            <button type="button" onclick="runFillDraft(true)"
              style="width: auto; padding: 6px 12px; background: #fff; color: #1f6f45; border: 1px solid #1f6f45; font-size: 13px; border-radius: 8px;">
              Проверить (dry-run)
            </button>
            <button type="button" onclick="runFillDraft(false)"
              style="width: auto; padding: 6px 12px; background: #1f6f45; border-color: #1f6f45; color: #fff; font-size: 13px; border-radius: 8px;">
              Заполнить черновик
            </button>
            <button type="button" onclick="runMultiClusterApi()"
              style="width: auto; padding: 6px 12px; background: #6f45a0; border: 1px solid #6f45a0; color: #fff; font-size: 13px; border-radius: 8px;">
              Черновик мульти API
            </button>
            <button type="button" onclick="exportSupplyPlanPallets()"
              style="width: auto; padding: 6px 12px; background: #fff; color: #2b5a9e; border: 1px solid #2b5a9e; font-size: 13px; border-radius: 8px;">
              Сохранить XLSX
            </button>
            <label style="display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #5f6f85; cursor: pointer; user-select: none;">

              ${[

                "МСК_КАВКАЗСКИЙ_2_ХАБ","МО_ЗАМОСКВОРЕЧЬЕ_XD","МСК_ВОЛГОГРАДСКИЙ_3_Х","МО_ДАВЫДОВСКОЕ_ФБС",
                "МО_ТСЦ_НОВАЯ_РИГА","ПЕТРОВСКОЕ_РФЦ_КРОСС","МСК_ЧЕРМЯНСКАЯ_ФБС","МО_ОСТАШКОВСКИЙ_ХАБ",
                "МО_ОСТАШКОВСКИЙ_3_Х","МСК_МОЛЖАНИНОВО_3_ХА","МО_ТСЦ_НИКОЛЬСКОЕ","ХОРУГВИНО_РФЦ_КРОССДОК",
                "ЖУКОВСКИЙ_РФЦ_КРОССДОК","СОФЬИНО_РФЦ_КРОССДОК","ПУШКИНО_1_РФЦ_КРОССДОК"

        html += `
          <div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
            <strong>⚠️ Внимание!</strong> Для следующих артикулов нет данных в справочнике паллетизации:

              ${[...new Set(allMissing)].map(sku => `
                ${(() => {
                  const skuText = String(sku);
                  const article = String(supplySkuToOfferMap[skuText] || "Артикул не найден");
                  const addUrl = `/palletization/?action=add&sku=${encodeURIComponent(skuText)}&name=${encodeURIComponent(article)}`;

            </div>

              <a href="/palletization/" target="_blank" style="color: #005bff; text-decoration: underline;">

            </p>

        `;
      }
      
      if (stage1Active) {
      const supplyArticleOptionsHtml = buildSupplyArticleOptionsHtml();
      html += clusters.map((cluster, clusterIdx) => {
        const hasPallets = cluster.pallets && cluster.pallets.length > 0;
        const crossdock = cluster.crossdock_estimate || {};
        const crossdockEnabled = !!crossdock.available;
        const remainingBySku = {};
        getSupplyPlanItemsSource().forEach((group) => {

          if (!skuKey) return;
          const stockTotal = toNonNegativeInt(group?.supply_stock ?? 0, 0);
          const allocatedTotal = (group?.details || []).reduce((sum, detail, detailIndex) => {
            const effective = getEffectiveSupplyDetail(group, detail, detailIndex);
            return sum + toNonNegativeInt(effective?.allocated_supply ?? 0, 0);
          }, 0);
          remainingBySku[skuKey] = stockTotal - allocatedTotal;
        });
        
        return `

                  `<span style="background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; font-size: 12px; margin-left: 10px;">кроссдок: нет тарифа</span>`
                }
              </div>
              <div style="display: flex; gap: 8px; align-items: center;">
                <select id="cluster-add-sku-${clusterIdx}" style="width: 290px; padding: 6px 8px; border: 1px solid rgba(255,255,255,0.45); background: #fff; color: #1f2b40; font-size: 12px;">
                  ${supplyArticleOptionsHtml}

    function daysInMonth(value) {
      const [year, month] = value.split("-").map(Number);
      return new Date(year, month, 0).getDate();
    }

    function syncDatesFromMonth() {
      if (!reportMonth.value) return;
      const lastDay = String(daysInMonth(reportMonth.value)).padStart(2, "0");
      dateFrom.value = `${reportMonth.value}-01`;
      dateTo.value = `${reportMonth.value}-${lastDay}`;
      if (quick7d) quick7d.checked = false;
      if (quick30d) quick30d.checked = false;
    }

    function applyQuickRange(daysBack) {
      const nowLocal = new Date();
      const to = new Date(nowLocal.getFullYear(), nowLocal.getMonth(), nowLocal.getDate());
      const from = new Date(to);
      from.setDate(from.getDate() - Math.max(0, Number(daysBack || 0)) + 1);
      dateFrom.value = `${from.getFullYear()}-${pad(from.getMonth() + 1)}-${pad(from.getDate())}`;
      dateTo.value = `${to.getFullYear()}-${pad(to.getMonth() + 1)}-${pad(to.getDate())}`;
      if (reportMonth) reportMonth.value = "";
    }

    function formatFinanceValue(value, format) {
      if (value === null || value === undefined) return "";
      if (format === "percent") {
        const percent = Number(value) * 100;
        if (Number.isNaN(percent) || Math.abs(percent) < 0.000001) return "";
        // Procenty - 1 znak posle zapyatoy
        return `${new Intl.NumberFormat("ru-RU", { minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(percent)}%`;
      }
      const number = Number(value);
      if (Number.isNaN(number)) return "";
      if (Math.abs(number) < 0.000001) return "";
      // Denezhnye znacheniya - bez desyatichnyh (tselye)
      return new Intl.NumberFormat("ru-RU", { minimumFractionDigits: 0, maximumFractionDigits: 0, useGrouping: true }).format(number);
    }

    function formatFinanceDecimal(value, fractionDigits = 1) {
      const number = Number(value);
      if (Number.isNaN(number) || Math.abs(number) < 0.000001) return "0";
      return new Intl.NumberFormat("ru-RU", {
        minimumFractionDigits: 0,
        maximumFractionDigits: fractionDigits,
        useGrouping: true,
      }).format(number);
    }

    function formatFinanceDayLabel(day) {
      if (!day) return "не закончится в этом месяце";
      const parsed = new Date(`${day}T00:00:00`);
      if (Number.isNaN(parsed.getTime())) return day;
      return `${String(parsed.getDate()).padStart(2, "0")}.${String(parsed.getMonth() + 1).padStart(2, "0")}`;
    }

    function renderFinanceReport(data) {
      const dayHeaders = (data.days || []).map((day) => {
        const d = new Date(day);
        return `${d.getDate()}`;
      });
      financeHead.innerHTML = `<tr><th>Показатель</th><th>Итого</th>${dayHeaders.map((day) => `<th>${day}</th>`).join("")}</tr>`;

      // Находим индексы строк для сравнения плана и факта
      const rows = data.rows || [];
      const planIdx = rows.findIndex(r => r.key === "revenue_plan");
      const days = data.days || [];
      const forecastDays = new Set(data.forecast_days || []);
      const revenueArticles = Array.isArray(data.revenue_breakdown?.articles) ? data.revenue_breakdown.articles : [];
      
      financeBody.innerHTML = "";
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const tr = document.createElement("tr");
        tr.dataset.key = row.key || "";
        tr.className = row.kind || "";
        const isRevenueArticleGroup = data.variant === "v2" && row.key === "revenue" && revenueArticles.length > 0;
        const isGroup = Boolean(FINANCE_GROUPS[row.key]) || isRevenueArticleGroup;
        const isDetail = Object.values(FINANCE_GROUPS).some((items) => items.includes(row.key)) && !isRevenueArticleGroup;
        if (isGroup) tr.classList.add("group-row");
        if (isDetail) tr.classList.add("detail-row");
        if (isDetail && !financeExpanded.has(Object.keys(FINANCE_GROUPS).find((groupKey) => FINANCE_GROUPS[groupKey].includes(row.key)))) {
          tr.classList.add("hidden-row");
        }
        if (row.kind !== "section" && row.kind !== "spacer" && !FINANCE_VISIBLE_ROWS.has(row.key)) {
          const isNonZero = (v) => v !== null && v !== undefined && Math.abs(Number(v) || 0) >= 0.01;
          const hasValue = isNonZero(row.total) || (row.daily || []).some(isNonZero);
          if (!hasValue) tr.classList.add("hidden-row");
        }

        if (row.kind === "section" || row.kind === "spacer") {
          if (!FINANCE_VISIBLE_ROWS.has(row.key)) {
            tr.classList.add("hidden-row");
          }
          tr.innerHTML = `<td>${row.label || ""}</td><td></td>${days.map(() => "<td></td>").join("")}`;
        } else {
          const toggle = isGroup ? `<button type="button" class="toggle-btn" data-group="${row.key}">${financeExpanded.has(row.key) ? "−" : "+"}</button>` : `<span class="toggle-spacer"></span>`;
          const totalClass = forecastDays.size ? "forecast-total" : "";

          // Формируем ячейки с подсветкой для revenue_cumulative
          let dailyCells;
          if (row.key === "revenue_cumulative" && planIdx >= 0) {
            const planRow = rows[planIdx];
            dailyCells = (row.daily || []).map((value, idx) => {
              const dayKey = days[idx];
              const planValue = planRow.daily?.[idx] || 0;
              // Если факт меньше плана - красный, если больше - зелёный
              const trendClass = value < planValue ? "plan-below" : (value > planValue ? "plan-above" : "");
              const forecastClass = forecastDays.has(dayKey) ? "forecast-cell" : "";
              const cellClass = [trendClass, forecastClass].filter(Boolean).join(" ");
              return `<td class="${cellClass}">${formatFinanceValue(value, row.format)}</td>`;
            }).join("");
          } else {
            dailyCells = (row.daily || []).map((value, idx) => {
              const dayKey = days[idx];
              const forecastClass = forecastDays.has(dayKey) ? "forecast-cell" : "";
              return `<td class="${forecastClass}">${formatFinanceValue(value, row.format)}</td>`;
            }).join("");
          }

          tr.innerHTML = `<td>${toggle}${row.label}</td><td class="${totalClass}">${formatFinanceValue(row.total, row.format)}</td>${dailyCells}`;
          if (!isGroup && !isDetail && !FINANCE_VISIBLE_ROWS.has(row.key)) {
            tr.classList.add("hidden-row");
          }
        }
        financeBody.appendChild(tr);

        if (data.variant === "v2" && row.key === "revenue" && financeExpanded.has("revenue") && revenueArticles.length) {
          revenueArticles.forEach((article) => {
            const articleTr = document.createElement("tr");
            articleTr.className = "article-breakdown-row";
            const metaParts = [
              `остаток ${formatFinanceDecimal(article.stock, 0)}`,
              `скорость ${formatFinanceDecimal(article.avg_daily_sales, 2)}/день`,
              `цена ${formatFinanceValue(article.avg_price, "number")}`,
            ];
            if (article.depletion_day) {
              metaParts.push(`закончится после ${formatFinanceDayLabel(article.depletion_day)}`);
            } else {
              metaParts.push("хватит до конца прогноза");
            }
            const totalClass = forecastDays.size ? "forecast-total" : "";
            const dailyCells = (article.daily || []).map((value, idx) => {
              const dayKey = days[idx];
              const forecastClass = forecastDays.has(dayKey) ? "forecast-cell" : "";
              return `<td class="${forecastClass}">${formatFinanceValue(value, "number")}</td>`;
            }).join("");
            articleTr.innerHTML = `
              <td>
                <span class="toggle-spacer"></span>
                <span class="article-title">
                  <span class="article-name">${article.label || article.offer_id || ""}</span>
                  <span class="article-meta">${metaParts.join(" · ")}</span>
                </span>
              </td>
              <td class="${totalClass}">${formatFinanceValue(article.net_total, "number")}</td>
              ${dailyCells}
            `;
            financeBody.appendChild(articleTr);
          });
        }
      }

      financeBody.querySelectorAll(".toggle-btn").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.group;
          if (financeExpanded.has(key)) {
            financeExpanded.delete(key);
          } else {
            financeExpanded.add(key);
          }
          renderFinanceReport(data);
        });
      });

    }
