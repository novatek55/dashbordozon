    }

    /**
     * globalTsBollingerSvg — рисует BB-полосу + MA + линию тренда на SVG-графике.
     * @param {number[]} series — массив значений (по дням)
     * @param {Function} xFor(idx) — координата X для точки idx
     * @param {Function} yFor(value) — координата Y для значения
     * @param {number} bbWin — окно Bollinger (default 7)
     * @returns {string} SVG-разметка (polygon + polylines)
     */
    /**
     * globalTsBollingerSvg — BB-полоса + MA (без точек, они отдельно).
     * globalTsBollingerDots — критические точки поверх всего.
     * Вызывать: bands перед bars, dots после bars/трендов.
     */
    function _globalBbCalc(series, bbWin = 7) {
      if (!series || series.length < 3) return null;
      return series.map((_, idx) => {
        const start = Math.max(0, idx - bbWin + 1);
        const slice = series.slice(start, idx + 1);
        const ma = slice.reduce((s, v) => s + v, 0) / slice.length;
        const std = Math.sqrt(slice.reduce((s, v) => s + (v - ma) ** 2, 0) / slice.length);
        return { ma, upper: ma + 2 * std, lower: ma - 2 * std };
      });
    }
    function globalTsBollingerSvg(series, xFor, yFor, bbWin = 7) {
      const bb = _globalBbCalc(series, bbWin);
      if (!bb) return "";
      const n = series.length;
      const upperPts = bb.map((b, i) => `${xFor(i).toFixed(1)},${yFor(b.upper).toFixed(1)}`).join(" ");
      const lowerPts = [...bb].reverse().map((b, i) => `${xFor(n - 1 - i).toFixed(1)},${yFor(b.lower).toFixed(1)}`).join(" ");
      const polygon = `<polygon points="${upperPts} ${lowerPts}" fill="rgba(99,102,241,0.07)" stroke="none" />`;
      const upperLine = `<polyline points="${bb.map((b, i) => `${xFor(i).toFixed(1)},${yFor(b.upper).toFixed(1)}`).join(" ")}" fill="none" stroke="#6366f1" stroke-width="0.7" stroke-dasharray="2,3" opacity="0.3" />`;
      const lowerLine = `<polyline points="${bb.map((b, i) => `${xFor(i).toFixed(1)},${yFor(b.lower).toFixed(1)}`).join(" ")}" fill="none" stroke="#6366f1" stroke-width="0.7" stroke-dasharray="2,3" opacity="0.3" />`;
      const maLine = `<polyline points="${bb.map((b, i) => `${xFor(i).toFixed(1)},${yFor(b.ma).toFixed(1)}`).join(" ")}" fill="none" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4" />`;
      return `${polygon}${upperLine}${lowerLine}${maLine}`;
    }
    function globalTsBollingerDots(series, xFor, yFor, bbWin = 7) {
      const bb = _globalBbCalc(series, bbWin);
      if (!bb) return "";
      return series.map((val, i) => {
        const x = xFor(i).toFixed(1), y = yFor(val).toFixed(1);
        const b = bb[i];
        let color, r, stroke = "";
        if (val < b.lower || val > b.upper) {
          color = "#dc2626"; r = 4.5; stroke = `stroke="#fff" stroke-width="1.5"`;
        } else if (val < b.ma) {
          color = "#f59e0b"; r = 3;
        } else {
          return "";
        }
        const pctFromMa = b.ma > 0 ? (((val - b.ma) / b.ma) * 100).toFixed(1) : "0";
        const tip = val < b.lower ? "⚠ за нижней BB" : (val > b.upper ? "⚠ за верхней BB" : "ниже MA");
        return `<circle cx="${x}" cy="${y}" r="${r}" fill="${color}" ${stroke} opacity="0.9"><title>${tip} · ${formatMetric(val, 0)} · MA ${formatMetric(b.ma, 0)} · ${pctFromMa}%</title></circle>`;
      }).join("");
    }

    /**
     * globalPromoEventsSvg — вертикальные маркеры акций на SVG-графиках.
     * @param {Array} promos — item.promos [{date_start, date_end, title, is_participating}]
     * @param {Array} points — daily points [{day: "2026-04-03", ...}]
     * @param {Function} xFor(idx) — x-координата для точки idx
     * @param {number} topY — верхняя граница области графика
     * @param {number} bottomY — нижняя граница области графика
     */
    function globalPromoEventsSvg(promos, points, xFor, topY, bottomY) {
      if (!Array.isArray(promos) || !promos.length || !points.length) return "";
      const dayIndex = new Map(points.map((p, i) => [String(p.day || "").slice(0, 10), i]));
      const firstDay = String(points[0].day || "").slice(0, 10);
      const lastDay = String(points[points.length - 1].day || "").slice(0, 10);
      const lastIdx = points.length - 1;
      const lines = [];
      // Стек горизонтальных полосок сверху графика (если несколько акций идут одновременно)
      const bandHeight = 3;
      const bandGap = 12;
      let bandRow = 0;
      promos.forEach((promo) => {
        const participating = promo.is_participating;
        const events = Array.isArray(promo.events) ? promo.events : [];
        // Кандидат (не участвует и нет событий) — пропускаем: товара в акции не было.
        if (!participating && events.length === 0) return;
        const title = (promo.title || "").replace(/"/g, "&quot;");
        // Диапазон участия товара: ADDED → REMOVED, либо first_seen_at → (сейчас, если participating).
        // date_start/date_end самой акции НЕ используем — это лайфцикл акции, а не товара в ней.
        const firstSeen = String(promo.first_seen_at || "").slice(0, 10);
        const added = events.filter((ev) => ev.event_type === "ADDED")
          .map((ev) => String(ev.detected_at || "").slice(0, 10))
          .filter(Boolean).sort();
        const removed = events.filter((ev) => ev.event_type === "REMOVED")
          .map((ev) => String(ev.detected_at || "").slice(0, 10))
          .filter(Boolean).sort();
        const entryDate = added[0] || firstSeen || "";
        const exitDate = removed[removed.length - 1] || "";
        // Если товар сейчас не в акции и нет REMOVED — непонятно когда вышел, не рисуем.
        if (!participating && !exitDate) return;
        // Вычисляем индексы начала/конца полоски в окне графика
        let startIdx;
        if (!entryDate || entryDate <= firstDay) startIdx = 0;
        else if (entryDate > lastDay) return;
        else if (dayIndex.has(entryDate)) startIdx = dayIndex.get(entryDate);
        else return;
        let endIdx;
        if (participating && !exitDate) endIdx = lastIdx;
        else if (!exitDate || exitDate >= lastDay) endIdx = lastIdx;
        else if (exitDate < firstDay) return;
        else if (dayIndex.has(exitDate)) endIdx = dayIndex.get(exitDate);
        else return;
        if (endIdx < startIdx) return;
        // Полоска сверху графика на период участия
        const x1 = xFor(startIdx);
        const x2 = xFor(endIdx);
        const w = Math.max(x2 - x1, 2);
        const bandY = topY + bandRow * bandGap;
        const color = participating ? "#16a34a" : "#94a3b8";
        const shortTitle = title.length > 24 ? title.slice(0, 24) + "…" : title;
        lines.push(`<rect x="${x1.toFixed(1)}" y="${bandY.toFixed(1)}" width="${w.toFixed(1)}" height="${bandHeight}" fill="${color}" opacity="0.6" rx="1" ry="1"><title>${title}${participating ? " (идёт)" : ""}</title></rect>`);
        lines.push(`<text x="${(x1 + 3).toFixed(1)}" y="${(bandY + bandHeight + 7).toFixed(1)}" font-size="9" fill="${color}" opacity="0.9">${shortTitle}</text>`);
        bandRow += 1;
        // Точечная зелёная линия на дне входа (если дата входа попала в окно)
        if (entryDate && dayIndex.has(entryDate)) {
          const x = xFor(dayIndex.get(entryDate)).toFixed(1);
          lines.push(`<line x1="${x}" y1="${topY}" x2="${x}" y2="${bottomY}" stroke="#16a34a" stroke-width="1" opacity="0.45" />`);
        }
        // Точечная красная линия на дне выхода (если дата выхода попала в окно)
        if (exitDate && dayIndex.has(exitDate)) {
          const x = xFor(dayIndex.get(exitDate)).toFixed(1);
          lines.push(`<line x1="${x}" y1="${topY}" x2="${x}" y2="${bottomY}" stroke="#d93025" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6" />`);
        }
      });
      return lines.join("");
    }

        const height = 180;
        const left = 60;
        const right = 22;
        const top = 18;
        const bottom = 32;
        const usableW = width - left - right;
        const usableH = height - top - bottom;
        const maxRev = Math.max(1, ...points.map((p) => Number(p.revenue || 0)));
        const xFor = (idx) => left + (usableW * idx) / Math.max(points.length - 1, 1);
        const yFor = (value) => top + usableH - (Math.max(0, Number(value || 0)) / maxRev) * usableH;
        const linePoints = points.map((p, idx) => `${xFor(idx).toFixed(2)},${yFor(p.revenue).toFixed(2)}`).join(" ");
        const areaPoints = `${xFor(0).toFixed(2)},${(top + usableH).toFixed(2)} ${linePoints} ${xFor(points.length - 1).toFixed(2)},${(top + usableH).toFixed(2)}`;
        const grid = [0, Math.round(maxRev / 3), Math.round((maxRev * 2) / 3), maxRev]
          .reverse()
          .map((v) => {
            const y = yFor(v);
            return `
              <line x1="${left}" y1="${y.toFixed(2)}" x2="${(width - right).toFixed(2)}" y2="${y.toFixed(2)}" stroke="#e6ecf5" stroke-width="1" />
              <text x="${(left - 8).toFixed(2)}" y="${(y + 4).toFixed(2)}" text-anchor="end" font-size="11" fill="#8a97aa">${formatMetric(v, 0)}</text>
            `;
          })
          .join("");
        const dots = points.map((p, idx) => {
          const x = xFor(idx);
          const y = yFor(p.revenue);
          return `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="3.4" fill="#10b981"><title>${String(p.day).slice(5)}: ${formatMetric(p.revenue, 0)} ₽</title></circle>`;
        }).join("");
        const xTicks = points.map((p, idx) => {
          const x = xFor(idx);
          return `<text x="${x.toFixed(2)}" y="${(height - 10).toFixed(2)}" text-anchor="middle" font-size="10" fill="#8a97aa">${String(p.day).slice(5)}</text>`;
        }).join("");
        return `
          <div class="analytics-chart sku-impressions-chart">
            <div class="sku-impressions-meta">
              <div>
                <div class="sku-impressions-title">Динамика выручки за 7 дней, ₽</div>
                <div class="sku-impressions-summary">Суммарная выручка по всем артикулам по дням</div>
              </div>
            </div>
            <div class="sku-chart-wrap">
              <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                ${grid}
                <line x1="${left}" y1="${(top + usableH).toFixed(2)}" x2="${(width - right).toFixed(2)}" y2="${(top + usableH).toFixed(2)}" stroke="#ccd6e3" stroke-width="1" />
                <polygon points="${areaPoints}" fill="rgba(16,185,129,0.10)" />
                <polyline points="${linePoints}" fill="none" stroke="#10b981" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round" />
                ${dots}
                ${xTicks}
              </svg>
            </div>
          </div>
        `;
      };
      const buildRnpSnapshot = (daily) => {
        if (!Array.isArray(daily) || daily.length < 2) return "";
        const cur = daily[daily.length - 1];
        const prev = daily[daily.length - 2];
        const convTocartCur = safeRatio(cur.hits_tocart, cur.hits_view) * 100;
        const convTocartPrev = safeRatio(prev.hits_tocart, prev.hits_view) * 100;
        const convOrderCur = safeRatio(cur.ordered_units, cur.hits_tocart) * 100;
        const convOrderPrev = safeRatio(prev.ordered_units, prev.hits_tocart) * 100;
        return `
          <div class="analytics-summary" style="grid-template-columns: repeat(5, 1fr); margin-top: 10px;">
            <div class="analytics-summary-card"><div class="label">Заказы D-1 vs D-2</div><div class="value">${formatMetric(cur.ordered_units || 0, 0)} / ${formatMetric(prev.ordered_units || 0, 0)}</div><div class="subvalue">${fmtDelta(deltaPct(cur.ordered_units, prev.ordered_units))}</div></div>
            <div class="analytics-summary-card"><div class="label">Выручка D-1 vs D-2</div><div class="value">${money(cur.revenue || 0)} / ${money(prev.revenue || 0)}</div><div class="subvalue">${fmtDelta(deltaPct(cur.revenue, prev.revenue))}</div></div>
            <div class="analytics-summary-card"><div class="label">Показы D-1 vs D-2</div><div class="value">${formatMetric(cur.hits_view || 0, 0)} / ${formatMetric(prev.hits_view || 0, 0)}</div><div class="subvalue">${fmtDelta(deltaPct(cur.hits_view, prev.hits_view))}</div></div>
            <div class="analytics-summary-card"><div class="label">CR toCart</div><div class="value">${pct(convTocartCur)} / ${pct(convTocartPrev)}</div><div class="subvalue">${fmtDelta(deltaPct(convTocartCur, convTocartPrev))}</div></div>
            <div class="analytics-summary-card"><div class="label">CR заказ из корзины</div><div class="value">${pct(convOrderCur)} / ${pct(convOrderPrev)}</div><div class="subvalue">${fmtDelta(deltaPct(convOrderCur, convOrderPrev))}</div></div>
          </div>
        `;
      };
      const buildRnpDataset = (sourceRows, daily7) => {
        const days = (Array.isArray(daily7) ? daily7 : []).map((d) => String(d.day).slice(0, 10));
        if (!days.length) return [];
        const lastDay = days[days.length - 1];
        const prevDay = days.length > 1 ? days[days.length - 2] : null;
        return (Array.isArray(sourceRows) ? sourceRows : []).map((item) => {
          const byDay = new Map((Array.isArray(item?.daily) ? item.daily : []).map((point) => [String(point?.day || "").slice(0, 10), point]));
          const orderSeries = days.map((day) => Number(byDay.get(day)?.ordered_units || 0));
          const revenueSeries = days.map((day) => Number(byDay.get(day)?.revenue || 0));
          const totals = {
            orders_7d: orderSeries.reduce((s, v) => s + v, 0),
            revenue_7d: revenueSeries.reduce((s, v) => s + v, 0),
          };
          const last = byDay.get(lastDay) || {};
          const prev = prevDay ? (byDay.get(prevDay) || {}) : {};
          const hitsLast = Number(last.hits_view || 0);
          const hitsPrev = Number(prev.hits_view || 0);
          const tocartLast = Number(last.hits_tocart || 0);
          const tocartPrev = Number(prev.hits_tocart || 0);
          const ordersLast = Number(last.ordered_units || 0);
          const ordersPrev = Number(prev.ordered_units || 0);
          const convOrderLast = safeRatio(ordersLast, tocartLast) * 100;
          const convOrderPrev = safeRatio(ordersPrev, tocartPrev) * 100;
          const metricDrops = [
            { key: "traffic", label: "Показы", delta: deltaPct(hitsLast, hitsPrev) },
            { key: "tocart", label: "В корзину", delta: deltaPct(tocartLast, tocartPrev) },
            { key: "checkout", label: "Конверсия заказа", delta: deltaPct(convOrderLast, convOrderPrev) },
          ];
          const mainDrop = metricDrops
            .filter((m) => m.delta !== null)
            .sort((a, b) => Number(a.delta) - Number(b.delta))[0];
          return {
            offer_id: item.offer_id || "",
            sku: item.sku || "",
            trend_orders: orderSeries,
            orders_7d: totals.orders_7d,
            revenue_7d: totals.revenue_7d,
            orders_last: ordersLast,
            orders_prev: ordersPrev,
            delta_orders_pct: deltaPct(ordersLast, ordersPrev),
            delta_revenue_abs: Number(last.revenue || 0) - Number(prev.revenue || 0),
            delta_hits_pct: deltaPct(hitsLast, hitsPrev),
            delta_tocart_pct: deltaPct(tocartLast, tocartPrev),
            delta_checkout_pct: deltaPct(convOrderLast, convOrderPrev),
            reason: mainDrop ? `${mainDrop.label}: ${fmtDelta(mainDrop.delta)}` : "—",
          };
        }).filter((row) => row.orders_7d > 0 || row.revenue_7d > 0);
      };
      const buildRnpBlocks = (sourceRows) => {
        const daily7 = aggregateRnpDaily(sourceRows, 7);
        if (!daily7.length) {
          return `<div class="analytics-chart-empty">Нет данных для блока РНП</div>`;
        }
        const skuRows = buildRnpDataset(sourceRows, daily7);
        const dayLabels = daily7.map((d) => String(d.day).slice(5));
        const tableRows = [...skuRows]
          .sort((a, b) => Number(b.orders_7d) - Number(a.orders_7d))
          .slice(0, 60)
          .map((row) => `
            <tr>
              <td>${fmt(row.offer_id)}</td>
              <td>${fmt(row.sku)}</td>
              <td class="num">${row.trend_orders.map((v) => formatMetric(v, 0)).join(" · ")}</td>
              <td class="num">${formatMetric(row.orders_7d, 0)}</td>
              <td class="num">${money(row.revenue_7d)}</td>
              <td class="num">${fmtDelta(row.delta_orders_pct)}</td>
              <td class="num">${fmtDelta(row.delta_hits_pct)}</td>
              <td class="num">${fmtDelta(row.delta_tocart_pct)}</td>
              <td class="num">${fmtDelta(row.delta_checkout_pct)}</td>
              <td>${fmt(row.reason)}</td>
            </tr>
          `).join("");
        const negatives = skuRows.filter((row) => Number(row.delta_revenue_abs) < 0);
        const totalNegative = negatives.reduce((s, row) => s + Math.abs(Number(row.delta_revenue_abs || 0)), 0);
        const topRows = negatives
          .sort((a, b) => Number(a.delta_revenue_abs) - Number(b.delta_revenue_abs))
          .slice(0, 12)
          .map((row, idx) => {
            const contrib = totalNegative > 0 ? (Math.abs(Number(row.delta_revenue_abs || 0)) / totalNegative) * 100 : 0;
            return `
              <tr>
                <td>${idx + 1}</td>
                <td>${fmt(row.offer_id)}</td>
                <td>${fmt(row.sku)}</td>
                <td class="num" style="color:#b42318;">${formatMetric(row.delta_revenue_abs, 0)}</td>
                <td class="num">${formatMetric(contrib, 2)}%</td>
                <td class="num">${fmtDelta(row.delta_orders_pct)}</td>
                <td class="num">${fmtDelta(row.delta_hits_pct)}</td>
                <td class="num">${fmtDelta(row.delta_tocart_pct)}</td>
                <td class="num">${fmtDelta(row.delta_checkout_pct)}</td>
                <td>${fmt(row.reason)}</td>
              </tr>
            `;
          }).join("");
        const tableHint = dayLabels.length ? `Заказы по дням: ${dayLabels.join(" · ")}` : "Заказы по дням";
        return `
          ${buildOrdersTrendChart(daily7)}
          ${buildRevenueTrendChart(daily7)}
          ${buildRnpSnapshot(daily7)}
          <section class="analytics-group" style="margin-top:12px;">
            <div class="analytics-group-head" style="display:block;padding:12px 14px;">
              <div class="analytics-name" style="font-size:16px;">Блок 2. Таблица по артикулам за 7 дней</div>
              <div class="analytics-meta-line" style="margin-top:4px;"><span class="analytics-chip">${tableHint}</span></div>
            </div>
            <div class="analytics-detail" style="display:block;">
              <table class="analytics-detail-table data-table report-table">
                <thead>
                  <tr>
                    <th>Артикул</th>
                    <th>SKU</th>
                    <th>Тренд заказов 7д</th>
                    <th>Заказы 7д</th>
                    <th>Выручка 7д</th>
                    <th>Заказы D-1</th>
                    <th>Показы D-1</th>
                    <th>ToCart D-1</th>
                    <th>CR заказа D-1</th>
                    <th>Что просело</th>
                  </tr>
                </thead>
                <tbody>${tableRows || '<tr><td colspan="10" style="text-align:center;color:#8a97aa;">Нет данных</td></tr>'}</tbody>
              </table>
            </div>
          </section>
          <section class="analytics-group" style="margin-top:12px;">
            <div class="analytics-group-head" style="display:block;padding:12px 14px;">
              <div class="analytics-name" style="font-size:16px;">Блок 3. ТОП вклад в падение по артикулам</div>
              <div class="analytics-meta-line" style="margin-top:4px;"><span class="analytics-chip">Сортировка по падению выручки D-1 vs D-2</span></div>
            </div>
            <div class="analytics-detail" style="display:block;">
              <table class="analytics-detail-table data-table report-table">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Артикул</th>
                    <th>SKU</th>
                    <th>Δ выручка</th>
                    <th>Вклад</th>
                    <th>Δ заказы</th>
                    <th>Δ показы</th>
                    <th>Δ toCart</th>
                    <th>Δ CR заказа</th>
                    <th>Ключевая просадка</th>
                  </tr>
                </thead>
                <tbody>${topRows || '<tr><td colspan="10" style="text-align:center;color:#8a97aa;">Нет падения по выбранному периоду</td></tr>'}</tbody>
              </table>
            </div>
          </section>
        `;
      };

      function buildHtmlXTicks(points, svgWidth, svgLeft, svgRight, barWidth, useLineStep) {
        const usableW = svgWidth - svgLeft - svgRight;
        const step = useLineStep ? usableW / Math.max(points.length - 1, 1) : usableW / Math.max(points.length, 1);
        return points.map((point, idx) => {
          if (!(idx === 0 || idx === points.length - 1 || idx % 5 === 0)) return "";
          const x = useLineStep ? svgLeft + idx * step : svgLeft + idx * step + barWidth / 2;
          const pct = (x / svgWidth * 100).toFixed(2);
          const dayLabel = String(point.day || "").slice(8, 10);
          return `<span style="position:absolute;left:${pct}%;transform:translateX(-50%);font-size:10px;color:#8a97aa;white-space:nowrap;">${dayLabel}</span>`;
        }).join("");
      }

      function buildCorrelationOverlay(item, corrId) {
        const points = Array.isArray(item.daily) ? item.daily : [];
        if (points.length < 3) return "";

        // Метрики для наложения
        const metrics = [
          { key: "views", label: "Показы", color: "#3b82f6", fn: (p) => Number(p.hits_view || 0) },
          { key: "clicks", label: "Клики (карточка)", color: "#f59e0b", fn: (p) => Number(p.session_view_pdp || 0) },
          { key: "cart_cr", label: "CR корзина %", color: "#a855f7", fn: (p) => { const c = Number(p.session_view_pdp || 0); const t = Number(p.hits_tocart || 0); return c > 0 ? (t / c) * 100 : 0; } },
          { key: "orders", label: "Заказы", color: "#ef4444", fn: (p) => Number(p.ordered_units || 0) },
          { key: "position", label: "Позиция (инверт.)", color: "#f97316", fn: (p) => Number(p.position_category || 0), invert: true },
          { key: "ad_views", label: "Рекл. показы", color: "#06b6d4", fn: (p) => Number(p.ad_impressions || 0) },
          { key: "seo_views", label: "SEO показы", color: "#10b981", fn: (p) => Math.max(0, Number(p.hits_view || 0) - Number(p.ad_impressions || 0)) },
        ];

        // Собираем raw-серии
        const rawSeries = {};
        metrics.forEach((m) => { rawSeries[m.key] = points.map(m.fn); });

        // Нормализация: z-score → clip к 0..1 (среднее=0.5, ±2σ = 0..1)
        // Сохраняет реальный масштаб колебаний — если метрика стабильна, кривая плоская
        const normSeries = {};
        metrics.forEach((m) => {
          const vals = rawSeries[m.key];
          const mean = vals.reduce((s, v) => s + v, 0) / (vals.length || 1);
          const sd = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / (vals.length || 1)) || 1;
          normSeries[m.key] = vals.map((v) => {
            const z = (v - mean) / sd;
            const n = Math.max(0, Math.min(1, 0.5 + z * 0.2)); // ±2.5σ → 0..1
            return m.invert ? 1 - n : n;
          });
        });

        // Двойное сглаживание (скользящее среднее, окно 5, 2 прохода)
        const smoothOnce = (arr, w) => arr.map((_, i) => {
          const half = Math.floor(w / 2);
          const start = Math.max(0, i - half);
          const end = Math.min(arr.length, i + half + 1);
          const slice = arr.slice(start, end);
          return slice.reduce((s, v) => s + v, 0) / slice.length;
        });
        const smooth = (arr) => smoothOnce(smoothOnce(arr, 5), 3);
        const smoothSeries = {};
        metrics.forEach((m) => { smoothSeries[m.key] = smooth(normSeries[m.key]); });

        const width = 920, height = 220, left = 42, top = 20, right = 16, bottom = 28;
        const usableW = width - left - right;
        const usableH = height - top - bottom;
        const chartBottom = top + usableH;

        // Строим сплайн (cubic bezier) для каждой метрики
        const buildLine = (key, color) => {
          const vals = smoothSeries[key];
          const pts = vals.map((v, i) => ({
            x: left + (i / Math.max(vals.length - 1, 1)) * usableW,
            y: chartBottom - v * usableH,
          }));
          if (pts.length < 2) return "";
          // Catmull-Rom → cubic bezier control points
          let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
          for (let i = 0; i < pts.length - 1; i++) {
            const p0 = pts[Math.max(i - 1, 0)];
            const p1 = pts[i];
            const p2 = pts[i + 1];
            const p3 = pts[Math.min(i + 2, pts.length - 1)];
            const t = 0.35; // tension
            const cp1x = p1.x + (p2.x - p0.x) * t;
            const cp1y = p1.y + (p2.y - p0.y) * t;
            const cp2x = p2.x - (p3.x - p1.x) * t;
            const cp2y = p2.y - (p3.y - p1.y) * t;
            d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
          }
          return `<path data-corr-key="${key}" d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" opacity="0.85" />`;
        };

        const allLines = metrics.map((m) => buildLine(m.key, m.color)).join("\n");

        // Горизонтальные линии-ориентиры
        const gridLines = [0, 0.25, 0.5, 0.75, 1].map((v) => {
          const y = chartBottom - v * usableH;
          return `<line x1="${left}" y1="${y.toFixed(1)}" x2="${width - right}" y2="${y.toFixed(1)}" stroke="#e4eaf2" stroke-width="0.5" />`;
        }).join("");

        // X-подписи
        const xLabels = points.map((p, i) => {
          if (!(i === 0 || i === points.length - 1 || i % 5 === 0)) return "";
          const x = left + (i / Math.max(points.length - 1, 1)) * usableW;
          const d = String(p.day || "").slice(8, 10);
          return `<text x="${x.toFixed(1)}" y="${height - 6}" text-anchor="middle" font-size="10" fill="#8a97aa">${d}</text>`;
        }).join("");

        // Чекбоксы
        const checks = metrics.map((m) =>
          `<label class="corr-check" style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:12px;cursor:pointer;color:#475569;">` +
          `<input type="checkbox" data-corr-target="${corrId}" data-corr-key="${m.key}" checked style="accent-color:${m.color};" />` +
          `<span style="display:inline-block;width:12px;height:3px;background:${m.color};border-radius:2px;"></span> ${m.label}</label>`
        ).join("");

        return `
          <div class="analytics-chart sku-impressions-chart" id="${corrId}" style="margin-bottom:8px;">
            <div class="sku-impressions-meta">
              <div>
                <div class="sku-impressions-title"><button class="sku-collapse-btn" onclick="this.classList.toggle('collapsed');this.closest('.sku-impressions-chart').querySelector('.sku-collapsible').classList.toggle('collapsed')"><span class="arrow">&#9660;</span></button> Наложение динамики (нормализованные кривые)</div>
                <div class="sku-impressions-summary">Сглаженные тренды, 0–1 шкала. Отметь метрики для сравнения.</div>
              </div>
            </div>
            <div class="sku-collapsible sku-chart-wrap">
              <div style="padding:6px 10px;display:flex;flex-wrap:wrap;gap:2px 0;">${checks}</div>
              <svg class="corr-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;">
                ${gridLines}
                <line x1="${left}" y1="${chartBottom}" x2="${width - right}" y2="${chartBottom}" stroke="#ccd6e3" stroke-width="1" />
                ${allLines}
                ${xLabels}
              </svg>
            </div>
          </div>
        `;
      }

      function buildOverlayChart(item, chartId) {
        const points = Array.isArray(item.daily) ? item.daily : [];
        if (!points.length) {
          return `<div class="analytics-chart-empty">Нет динамики за период</div>`;
        }
        const width = 920;
        const height = 180;
        const left = 42;
        const top = 16;
        const bottom = 28;
        const right = 16;
        const usableW = width - left - right;
        const usableH = height - top - bottom;
        const barGap = 4;
        const barWidth = Math.max(6, ((usableW / Math.max(points.length, 1)) - barGap) * 0.92);
        const seoColor = "#4f83e3";
        const adColor = "#ffb703";
        const seoTrendColor = "#2f5bc4";
        const adTrendColor = "#d99600";
        const barBottom = top + usableH;
        const totals = points.map((p) => Number(p.hits_view || 0));
        const seoSeries = points.map((p) => Number(p.seo_impressions || 0));
        const adSeries = points.map((p) => Number(p.ad_impressions || 0));
        const maxValue = Math.max(1, ...totals);
        const totalSeo = seoSeries.reduce((sum, value) => sum + value, 0);
        const totalAds = adSeries.reduce((sum, value) => sum + value, 0);
        const yForValue = (value) => barBottom - (Math.max(0, value) / maxValue) * usableH;
        const gridValues = Array.from({ length: 4 }, (_, idx) => Math.round((maxValue / 3) * idx)).reverse();
        const gridLines = gridValues.map((value) => {
          const y = yForValue(value);
          return `
            <line x1="${left}" y1="${y.toFixed(2)}" x2="${(width - right).toFixed(2)}" y2="${y.toFixed(2)}" stroke="#e4eaf2" stroke-width="1" />
            <text x="${(left - 8).toFixed(2)}" y="${(y + 4).toFixed(2)}" text-anchor="end" font-size="11" fill="#8a97aa">${formatMetric(value, 0)}</text>
          `;
        }).join("");
        const xTicks = points.map((point, idx) => {
          if (!(idx === 0 || idx === points.length - 1 || idx % 5 === 0)) return "";
          const x = left + idx * (usableW / Math.max(points.length, 1)) + barWidth / 2;
          const dayLabel = String(point.day || "").slice(8, 10);
          return `<text x="${x.toFixed(2)}" y="${(height - 8).toFixed(2)}" text-anchor="middle" font-size="10" fill="#8a97aa">${dayLabel}</text>`;

      function buildPriceChart(item, chartId) {
        const points = Array.isArray(item.daily) ? item.daily : [];

        }
        const width = 920;
        const height = 160;
        const left = 42;
        const top = 14;
        const right = 16;
        const bottom = 24;
        const usableW = width - left - right;
        const usableH = height - top - bottom;
        const baseY = top + usableH;
        const sellerColor = "#4f83e3";
        const buyerColor = "#ef4444";
        const sellerFill = "rgba(79,131,227,0.18)";
        const buyerFill = "rgba(239,68,68,0.16)";
        const sellerSeriesRaw = points.map((p) => Number(p.avg_seller_price || 0));
        const buyerSeriesRaw = points.map((p) => Number(p.avg_buyer_paid || 0));
        const fallbackSeller = Number(item.seller_price || 0);
        const fallbackBuyer = Number(item.client_price || 0);
        const fillForward = (series, fallbackValue) => {
          let last = fallbackValue > 0 ? fallbackValue : 0;
          return series.map((value) => {
            if (value > 0) {
              last = value;
              return value;
            }
            return last;
          });
        };
        const sellerSeries = fillForward(sellerSeriesRaw, fallbackSeller);
        const buyerSeries = fillForward(buyerSeriesRaw, fallbackBuyer);
        const maxValue = Math.max(1, ...sellerSeries, ...buyerSeries);
        const yForValue = (value) => baseY - (Math.max(0, value) / maxValue) * usableH;
        const stepX = usableW / Math.max(points.length - 1, 1);
        const gridValues = Array.from({ length: 4 }, (_, idx) => Math.round((maxValue / 3) * idx)).reverse();
        const gridLines = gridValues.map((value) => {
          const y = yForValue(value);
          return `
            <line x1="${left}" y1="${y.toFixed(2)}" x2="${(width - right).toFixed(2)}" y2="${y.toFixed(2)}" stroke="#e4eaf2" stroke-width="1" />
            <text x="${(left - 8).toFixed(2)}" y="${(y + 4).toFixed(2)}" text-anchor="end" font-size="10" fill="#8a97aa">${formatMetric(value, 0)}</text>
          `;
        }).join("");
        const xTicks = points.map((point, idx) => {

        }).join("");
        const buildStepPoints = (series) => {
          if (!series.length) return "";
          const stepPoints = [`${left.toFixed(2)},${yForValue(series[0]).toFixed(2)}`];
          for (let idx = 1; idx < series.length; idx += 1) {
            const x = left + idx * stepX;
            const prevY = yForValue(series[idx - 1]);
            const curY = yForValue(series[idx]);
            stepPoints.push(`${x.toFixed(2)},${prevY.toFixed(2)}`);
            stepPoints.push(`${x.toFixed(2)},${curY.toFixed(2)}`);
          }
          return stepPoints.join(" ");
        };
        const buildStepArea = (series) => {
          if (!series.length) return "";
          const endX = left + (points.length - 1) * stepX;
          return `${left.toFixed(2)},${baseY.toFixed(2)} ${buildStepPoints(series)} ${endX.toFixed(2)},${baseY.toFixed(2)}`;

      function buildStockHistoryChart(item, chartId) {
        const points = Array.isArray(item.daily) ? item.daily : [];
        if (!points.length) {
          return `<div class="analytics-chart-empty">Нет динамики за период</div>`;
        }
        const width = 920;
        const height = 152;
        const left = 42;
        const top = 12;
        const right = 16;
        const bottom = 24;
        const usableW = width - left - right;
        const usableH = height - top - bottom;
        const baseY = top + usableH;
        const barGap = 5;
        const barSlot = usableW / Math.max(points.length, 1);
        const barWidth = Math.max(6, (barSlot - barGap) * 0.92);
        const fboColor = "#4f83e3";
        const fbsColor = "#f59e0b";
        const salesFboSeries = points.map((p) => Math.max(0, Number(p.ordered_units_fbo || 0)));
        const salesFbsSeries = points.map((p) => Math.max(0, Number(p.ordered_units_fbs || 0)));
        const currentStockFbo = Math.max(0, Number(item.stock_fbo || 0));
        const currentStockFbs = Math.max(0, Number(item.stock_fbs || 0));
        const currentStockTotal = currentStockFbo + currentStockFbs;
        const stepX = usableW / Math.max(points.length - 1, 1);
        const rebuildHistoricalSeries = (salesSeries, currentStock) => {
          const histCount = salesSeries.length;
          const firstSaleIndex = salesSeries.findIndex((value) => Number(value || 0) > 0);
          const appearanceIndex = firstSaleIndex >= 0 ? firstSaleIndex : Math.max(0, histCount - 1);
          const stockAtAppearance = currentStock + salesSeries
            .slice(appearanceIndex)
            .reduce((sum, value) => sum + Number(value || 0), 0);
          const histStock = Array.from({ length: histCount }, () => 0);
          let runningStock = stockAtAppearance;
          histStock[appearanceIndex] = Math.max(0, runningStock);
          for (let idx = appearanceIndex + 1; idx < histCount; idx += 1) {
            runningStock -= Number(salesSeries[idx - 1] || 0);
            histStock[idx] = Math.max(0, runningStock);
          }
          if (firstSaleIndex < 0 && currentStock > 0) {
            for (let idx = 0; idx < histCount; idx += 1) {
              histStock[idx] = currentStock;
            }
          }
          return histStock;
        };
        const stockFboSeries = rebuildHistoricalSeries(salesFboSeries, currentStockFbo);
        const stockFbsSeries = rebuildHistoricalSeries(salesFbsSeries, currentStockFbs);
        const stockTotalSeries = stockFboSeries.map((value, idx) => value + stockFbsSeries[idx]);
        const maxValue = Math.max(1, ...stockTotalSeries);
        const yForValue = (value) => baseY - (Math.max(0, value) / maxValue) * usableH;
        const gridValues = Array.from({ length: 4 }, (_, idx) => Math.round((maxValue / 3) * idx)).reverse();
        const gridLines = gridValues.map((value) => {
          const y = yForValue(value);
          return `
            <line x1="${left}" y1="${y.toFixed(2)}" x2="${(width - right).toFixed(2)}" y2="${y.toFixed(2)}" stroke="#e4eaf2" stroke-width="1" />
            <text x="${(left - 8).toFixed(2)}" y="${(y + 4).toFixed(2)}" text-anchor="end" font-size="10" fill="#8a97aa">${formatMetric(value, 0)}</text>
          `;
        }).join("");
        const xTicks = points.map((point, idx) => {
          if (!(idx === 0 || idx === points.length - 1 || idx % 5 === 0)) return "";
          const x = left + idx * barSlot + barWidth / 2;
          const dayLabel = String(point.day || "").slice(8, 10);
          return `<text x="${x.toFixed(2)}" y="${(height - 6).toFixed(2)}" text-anchor="middle" font-size="10" fill="#8a97aa">${dayLabel}</text>`;
        }).join("");
        const bars = stockTotalSeries.map((_, idx) => {
          const x = left + idx * barSlot + barGap / 2;
          const fboValue = stockFboSeries[idx];
          const fbsValue = stockFbsSeries[idx];
          const fboHeight = (fboValue / maxValue) * usableH;
          const fbsHeight = (fbsValue / maxValue) * usableH;
          const fboY = baseY - fboHeight;
          const fbsY = fboY - fbsHeight;
          return `
            <rect x="${x.toFixed(2)}" y="${fboY.toFixed(2)}" width="${barWidth.toFixed(2)}" height="${Math.max(fboHeight, 1).toFixed(2)}" rx="2" fill="${fboColor}" />
            <rect x="${x.toFixed(2)}" y="${fbsY.toFixed(2)}" width="${barWidth.toFixed(2)}" height="${Math.max(fbsHeight, 1).toFixed(2)}" rx="2" fill="${fbsColor}" />
          `;
        }).join("");

        const htmlXTicks = buildHtmlXTicks(points, width, left, right, barWidth);
        return `
          <div class="analytics-chart sku-impressions-chart sku-stock-chart" id="${chartId}">
            <div class="sku-impressions-meta">
              <div>
                <div class="sku-impressions-title"><button class="sku-collapse-btn" onclick="this.classList.toggle('collapsed');this.closest('.sku-impressions-chart').querySelector('.sku-collapsible').classList.toggle('collapsed')"><span class="arrow">&#9660;</span></button> Остатки по дням</div>
                <div class="sku-impressions-summary">Текущий остаток FBO + FBS: ${formatMetric(currentStockTotal, 0)} = ${formatMetric(currentStockFbo, 0)} + ${formatMetric(currentStockFbs, 0)}</div>
              </div>
              <div class="sku-chart-legend">
                <span class="sku-chart-legend-item"><i class="sku-chart-legend-swatch" style="background:${fboColor};"></i>FBO</span>
                <span class="sku-chart-legend-item"><i class="sku-chart-legend-swatch" style="background:${fbsColor};"></i>FBS</span>
              </div>
            </div>
            <div class="sku-collapsible sku-chart-wrap">
              <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                ${gridLines}
                <line x1="${left}" y1="${baseY}" x2="${width-right}" y2="${baseY}" stroke="#ccd6e3" stroke-width="1" />
                ${bars}
              </svg>
              <div class="sku-chart-xticks">${htmlXTicks}</div>
            </div>
          </div>
        `;
      }

      function buildReviewsChart(item, chartId) {
        const points = Array.isArray(item.daily) ? item.daily : [];
        if (!points.length) return "";
        const hasAny = points.some((p) => Number(p.review_count_cum || 0) > 0);
        if (!hasAny) {
          return `
            <div class="analytics-chart sku-impressions-chart" id="${chartId}">
              <div class="sku-impressions-meta">
                <div>
                  <div class="sku-impressions-title"><button class="sku-collapse-btn" onclick="this.classList.toggle('collapsed');this.closest('.sku-impressions-chart').querySelector('.sku-collapsible').classList.toggle('collapsed')"><span class="arrow">&#9660;</span></button> Рейтинг и отзывы по дням</div>
                  <div class="sku-impressions-summary">Отзывов нет</div>
                </div>
              </div>
            </div>

        const width = 920, height = 152, left = 42, top = 12, right = 38, bottom = 24;
        const usableW = width - left - right;
        const usableH = height - top - bottom;
        const baseY = top + usableH;
        const barSlot = usableW / Math.max(points.length, 1);
        const barGap = 5;
        const barWidth = Math.max(4, (barSlot - barGap) * 0.92);
        const addedSeries = points.map((p) => Math.max(0, Number(p.review_count_day || 0)));
        const ratingSeries = points.map((p) => Number(p.review_avg_cum || 0));
        const maxAdded = Math.max(1, ...addedSeries);
        const yBar = (v) => baseY - (v / maxAdded) * usableH;
        const yLine = (v) => {
          const clamped = Math.max(1, Math.min(5, v || 0));
          return baseY - ((clamped - 1) / 4) * usableH;
        };
        const grid = [1, 2, 3, 4, 5].map((v) => {
          const y = yLine(v);
          return `
            <line x1="${left}" y1="${y.toFixed(2)}" x2="${(width - right).toFixed(2)}" y2="${y.toFixed(2)}" stroke="#f0f3f8" stroke-width="1" />
            <text x="${(width - right + 6).toFixed(2)}" y="${(y + 4).toFixed(2)}" text-anchor="start" font-size="10" fill="#f59e0b">${v}</text>
          `;
        }).join("");
        const leftAxis = [0, Math.ceil(maxAdded / 2), maxAdded].map((v) => {
          const y = yBar(v);
          return `<text x="${(left - 6).toFixed(2)}" y="${(y + 4).toFixed(2)}" text-anchor="end" font-size="10" fill="#8a97aa">${v}</text>`;
        }).join("");
        const bars = addedSeries.map((v, idx) => {
          if (v <= 0) return "";
          const x = left + idx * barSlot + barGap / 2;
          const h = (v / maxAdded) * usableH;
          return `<rect x="${x.toFixed(2)}" y="${(baseY - h).toFixed(2)}" width="${barWidth.toFixed(2)}" height="${Math.max(h, 1).toFixed(2)}" rx="2" fill="#94a3b8" />`;
        }).join("");
        const linePts = [];
        ratingSeries.forEach((v, idx) => {
          if ((Number(points[idx].review_count_cum) || 0) <= 0) return;
          const x = left + idx * barSlot + barWidth / 2 + barGap / 2;
          const y = yLine(v);
          linePts.push(`${x.toFixed(2)},${y.toFixed(2)}`);
        });
        const linePoly = linePts.length >= 2
          ? `<polyline points="${linePts.join(" ")}" fill="none" stroke="#f59e0b" stroke-width="2.4" stroke-linejoin="round" />`
          : "";
        const lineDots = linePts.map((pt) => {
          const [cx, cy] = pt.split(",");
          return `<circle cx="${cx}" cy="${cy}" r="3" fill="#f59e0b" />`;
        }).join("");
        const totalCount = Number(item.reviews_count || 0);
        const curRating = Number(item.rating || 0);
        const delta30 = Number(item.reviews_delta_30d || 0);
        const htmlXTicks = buildHtmlXTicks(points, width, left, right, barWidth);
        return `
          <div class="analytics-chart sku-impressions-chart" id="${chartId}">
            <div class="sku-impressions-meta">
              <div>
                <div class="sku-impressions-title"><button class="sku-collapse-btn" onclick="this.classList.toggle('collapsed');this.closest('.sku-impressions-chart').querySelector('.sku-collapsible').classList.toggle('collapsed')"><span class="arrow">&#9660;</span></button> Рейтинг и отзывы по дням</div>
                <div class="sku-impressions-summary">Текущий рейтинг: <b>${curRating.toFixed(2)}</b> · отзывов всего: ${formatMetric(totalCount, 0)} · за 30д: ${delta30 >= 0 ? "+" : ""}${formatMetric(delta30, 0)}</div>
              </div>
              <div class="sku-chart-legend">
                <span class="sku-chart-legend-item"><i class="sku-chart-legend-swatch" style="background:#94a3b8;"></i>Новых отзывов</span>
                <span class="sku-chart-legend-item"><i class="sku-chart-legend-swatch" style="background:#f59e0b;"></i>Средний рейтинг (накоп.)</span>
              </div>
            </div>
            <div class="sku-collapsible sku-chart-wrap">
              <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                ${grid}
                ${leftAxis}
                <line x1="${left}" y1="${baseY}" x2="${width - right}" y2="${baseY}" stroke="#ccd6e3" stroke-width="1" />
                ${bars}
                ${linePoly}
                ${lineDots}
              </svg>
              <div class="sku-chart-xticks">${htmlXTicks}</div>
            </div>
          </div>
        `;
      }

      function buildClustersCard(item) {

            </div>
          </div>
        `;
      }

      const queryMetricMeta = {
        coverage: { label: "Охват", decimals: 1, suffix: "%", deltaKey: "coverage_delta_7v7", curKey: "coverage_cur7", prevKey: "coverage_prev7" },
        views: { label: "Показы", decimals: 0, suffix: "", deltaKey: "views_delta_7v7", curKey: "views_cur7", prevKey: "views_prev7" },
        searches: { label: "Спрос", decimals: 0, suffix: "", deltaKey: "searches_delta_7v7", curKey: "searches_cur7", prevKey: "searches_prev7" },
        avg_position: { label: "Позиция", decimals: 1, suffix: "", deltaKey: "position_delta_7v7", curKey: "position_cur7", prevKey: "position_prev7" },
        conversion: { label: "Конверсия", decimals: 2, suffix: "%", deltaKey: "conversion_delta_7v7", curKey: "conversion_cur7", prevKey: "conversion_prev7" },
        gmv: { label: "купили р.", decimals: 0, suffix: "", deltaKey: "gmv_delta_7v7", curKey: "gmv_cur7", prevKey: "gmv_prev7" },
      };
      const queryMetricOrder = ["coverage", "views", "searches", "avg_position", "conversion", "gmv"];
      const queryMatrixCache = new Map();
      const queryMatrixInflight = new Map();
      const QUERY_MATRIX_STATE_STORAGE_KEY = "article_query_matrix_state_v1";
      let _queryMatrixStateBySku = null;
      const loadQueryMatrixStateBySku = () => {
        if (_queryMatrixStateBySku) return _queryMatrixStateBySku;
        try {
          const raw = localStorage.getItem(QUERY_MATRIX_STATE_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          _queryMatrixStateBySku = parsed && typeof parsed === "object" ? parsed : {};
        } catch (_) {
          _queryMatrixStateBySku = {};
        }
        return _queryMatrixStateBySku;
      };
      const getQueryMatrixState = (sku) => {
        const skuKey = String(sku || "").trim();

        const state = stateMap[skuKey];
        return state && typeof state === "object" ? state : null;
      };
      const saveQueryMatrixState = (sku, state) => {
        const skuKey = String(sku || "").trim();
        if (!skuKey || !state || typeof state !== "object") return;
        const stateMap = loadQueryMatrixStateBySku();
        stateMap[skuKey] = state;
        try {
          localStorage.setItem(QUERY_MATRIX_STATE_STORAGE_KEY, JSON.stringify(stateMap));
        } catch (_) {}
      };
      const escapeHtml = (value) => String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")

        .replace(/'/g, "&#39;");
      const formatQueryMetricValue = (metric, value) => {
        const num = Number(value || 0);

        if (!Number.isFinite(num) || num <= 0) return metric === "avg_position" ? "—" : (metaInfo.suffix ? `0${metaInfo.suffix}` : "0");
        const base = formatMetric(num, metaInfo.decimals);
        return metaInfo.suffix ? `${base}${metaInfo.suffix}` : base;
      };
      const queryDeltaClass = (value) => {
        const num = Number(value);
        if (!Number.isFinite(num)) return "flat";
        if (num >= 5) return "up";
        if (num <= -5) return "down";
        return "flat";
      };
      const queryDeltaText = (value) => {
        const num = Number(value);
        if (!Number.isFinite(num)) return "—";
        return `${num >= 0 ? "+" : ""}${formatMetric(num, 1)}%`;
      };
      const buildArticleQueryMatrixShell = (item, matrixId) => `
        <section class="query-matrix" id="${matrixId}" data-sku="${fmt(item.sku)}" data-offer-id="${escapeHtml(item.offer_id || "")}" data-loaded="0" data-metric="coverage">

              ${queryMetricOrder.map((metric) => `<button type="button" class="query-matrix-tab${metric === "coverage" ? " active" : ""}" data-metric="${metric}">${queryMetricMeta[metric].label}</button>`).join("")}
            </div>

          <div class="query-matrix-status">Загрузка запросов...</div>
        </section>
      `;
      const buildMatrixCellTitle = (dayPoint) => [
        String(dayPoint.day || ""),
        `Охват: ${formatQueryMetricValue("coverage", dayPoint.coverage)}`,
        `Показы: ${formatQueryMetricValue("views", dayPoint.views)}`,
        `Спрос: ${formatQueryMetricValue("searches", dayPoint.searches)}`,
        `Позиция: ${formatQueryMetricValue("avg_position", dayPoint.avg_position)}`,
        `Конверсия: ${formatQueryMetricValue("conversion", dayPoint.conversion)}`,
        `купили р.: ${formatQueryMetricValue("gmv", dayPoint.gmv)}`,
      ].join(" | ");
      function renderArticleQueryMatrix(container, payload, metric, sortDir, uncheckedSet, hideUnchecked) {
        const safePayload = payload && typeof payload === "object" ? payload : { items: [], summary: {} };
        const items = Array.isArray(safePayload.items) ? [...(safePayload.items || [])] : [];
        const summaryData = safePayload.summary && typeof safePayload.summary === "object" ? safePayload.summary : {};
        const skuState = getQueryMatrixState(container?.dataset?.sku);
        const selectedMetric = queryMetricMeta[metric]
          ? metric
          : (queryMetricMeta[skuState?.metric] ? skuState.metric : (summaryData.default_metric || "coverage"));
        const currentSort = sortDir || skuState?.sort_dir || "desc";
        const effectiveUncheckedSet = uncheckedSet instanceof Set
          ? uncheckedSet
          : new Set(Array.isArray(skuState?.unchecked_queries) ? skuState.unchecked_queries.map((value) => String(value || "")) : []);
        const effectiveHideUnchecked = typeof hideUnchecked === "boolean" ? hideUnchecked : !!skuState?.hide_unchecked;
        container.dataset.metric = selectedMetric;
        container.dataset.sortDir = currentSort;

        const sortKeyMap = {
          coverage: "coverage_total", views: "views_total", searches: "searches_total",
          avg_position: "avg_position_total", conversion: "conversion_total", gmv: "gmv_total",
        };
        const sortKey = sortKeyMap[selectedMetric] || "views_total";
        const sortMul = currentSort === "asc" ? 1 : -1;
        items.sort((a, b) => sortMul * (Number(a[sortKey] || 0) - Number(b[sortKey] || 0)));

        const values = items.flatMap((item) => {
          const daily = Array.isArray(item.daily) ? item.daily : [];
          return daily
            .map((point) => Number(point?.[selectedMetric] || 0))
            .filter((value) => Number.isFinite(value) && value > 0);
        });
        const maxValue = values.length ? Math.max(...values) : 0;
        const minPositiveValue = values.length ? Math.min(...values) : 0;
        const days = Array.isArray(summaryData.days) ? summaryData.days : [];
        const metricLabel = queryMetricMeta[selectedMetric]?.label || selectedMetric;

        const svgW = 920;
        const svgBarH = 72;
        const svgDaysH = 20;
        const svgLeft = 42;
        const svgRight = 16;
        const usableW = svgW - svgLeft - svgRight;
        const barGap = 4;
        const n = days.length || 1;
        const barSlot = usableW / n;
        const barWidth = Math.max(4, (barSlot - barGap) * 0.92);

        const metricColors = {
          coverage: ["#8dbbff", "#2f67d8"],
          views: ["#f4c25f", "#e39a00"],
          searches: ["#88d7bb", "#279b6b"],
          avg_position: ["#ffbf8f", "#f28f3b"],
          conversion: ["#b9a6ff", "#6d52d9"],
          gmv: ["#ffb8b0", "#e16051"],
        };
        const [colorTop, colorBot] = metricColors[selectedMetric] || metricColors.coverage;

        const headerDaysItems = days.map((day, idx) => {
          const show = days.length <= 35 || idx === 0 || idx === days.length - 1 || idx % 5 === 0;
          if (!show) return "";
          const centerPct = ((svgLeft + idx * barSlot + barSlot / 2) / svgW * 100).toFixed(2);
          const label = String(day).slice(8, 10);
          return `<span style="position:absolute;left:${centerPct}%;transform:translateX(-50%);font-size:10px;color:#8a97aa;white-space:nowrap;">${label}</span>`;
        }).join("");

        const rowsHtml = items.map((item) => {
          const daily = Array.isArray(item.daily) ? item.daily : [];
          const metricMaxForRow = daily.reduce((acc, point) => {
            const raw = Number(point?.[selectedMetric] || 0);
            return Number.isFinite(raw) ? Math.max(acc, raw) : acc;
          }, 0);
          const deltaKey = queryMetricMeta[selectedMetric]?.deltaKey || "coverage_delta_7v7";
          const deltaValue = item?.[deltaKey];
          const metaCur = queryMetricMeta[selectedMetric]?.curKey;
          const metaPrev = queryMetricMeta[selectedMetric]?.prevKey;
          const curVal = metaCur ? formatQueryMetricValue(selectedMetric, item?.[metaCur]) : "—";
          const prevVal = metaPrev ? formatQueryMetricValue(selectedMetric, item?.[metaPrev]) : "—";
          const deltaTitle = `7д vs prev 7д&#10;Текущие 7д: ${curVal}&#10;Предыдущие 7д: ${prevVal}`;

          const svgBars = daily.map((point, idx) => {
            const raw = Number(point?.[selectedMetric] || 0);
            const safeRaw = Number.isFinite(raw) ? raw : 0;
            let ratio = 0;
            if (selectedMetric === "avg_position") {
              if (safeRaw > 0 && maxValue > 0) {
                if (Math.abs(maxValue - minPositiveValue) < 1e-9) {
                  ratio = 0.66;
                } else {
                  ratio = (maxValue - safeRaw) / (maxValue - minPositiveValue);
                }
              }
            } else if (metricMaxForRow > 0) {
              ratio = safeRaw / metricMaxForRow;
            }
            const barH = Math.max(1, Math.round(Math.max(0, Math.min(1, ratio)) * (svgBarH - 4)));
            const x = svgLeft + idx * barSlot + barGap / 2;
            const y = svgBarH - barH;
            const opacity = safeRaw <= 0 ? "0.15" : "0.92";
            const title = buildMatrixCellTitle(point);
            return `<rect x="${x.toFixed(1)}" y="${y}" width="${barWidth.toFixed(1)}" height="${barH}" rx="2" fill="${colorBot}" opacity="${opacity}"><title>${escapeHtml(title)}</title></rect>`;
          }).join("");

          return `
            <div class="query-matrix-row">
              <div class="query-matrix-query">
                <div class="query-matrix-query-name"><input type="checkbox" class="qm-check" data-qi="${items.indexOf(item)}" ${effectiveUncheckedSet.has(String(item.query_text || "")) ? "" : "checked"} /><span onclick="this.closest('.query-matrix-row').classList.toggle('collapsed')" style="cursor:pointer;">${escapeHtml(item.query_text || "")}</span></div>
                <div class="query-matrix-query-metrics">
                  <div class="query-matrix-query-metric">
                    <div class="query-matrix-query-metric-label">Трафик</div>
                    <div class="query-matrix-query-metric-value">${formatQueryMetricValue("views", item.views_total)}</div>
                  </div>
                  <div class="query-matrix-query-metric">
                    <div class="query-matrix-query-metric-label">Спрос</div>
                    <div class="query-matrix-query-metric-value">${formatQueryMetricValue("searches", item.searches_total)}</div>
                  </div>
                  <div class="query-matrix-query-metric">
                    <div class="query-matrix-query-metric-label">Охват</div>
                    <div class="query-matrix-query-metric-value">${formatQueryMetricValue("coverage", item.coverage_total)}</div>
                  </div>
                  <div class="query-matrix-query-metric">
                    <div class="query-matrix-query-metric-label">Позиция</div>
                    <div class="query-matrix-query-metric-value">${formatQueryMetricValue("avg_position", item.avg_position_total)}</div>
                  </div>
                  <div class="query-matrix-query-metric">
                    <div class="query-matrix-query-metric-label">Конверсия</div>
                    <div class="query-matrix-query-metric-value">${formatQueryMetricValue("conversion", item.conversion_total)}</div>
                  </div>
                  <div class="query-matrix-query-metric">
                    <div class="query-matrix-query-metric-label">купили р.</div>
                    <div class="query-matrix-query-metric-value">${formatQueryMetricValue("gmv", item.gmv_total)}</div>
                  </div>
                </div>
                <div class="query-matrix-delta ${queryDeltaClass(deltaValue)}" title="${deltaTitle}">${queryDeltaText(deltaValue)}</div>
              </div>
              <div class="query-matrix-series">
                <svg viewBox="0 0 ${svgW} ${svgBarH}" preserveAspectRatio="none" style="height:72px;">
                  ${svgBars}
                </svg>
              </div>
            </div>
          `;
        }).join("");

        const headerDaysHtml = days.length ? `<div style="position:relative;height:18px;width:100%;">${headerDaysItems}</div>` : "";

        container.innerHTML = `
          <div class="query-matrix-head">
            <div>
              <div class="query-matrix-title"><button class="sku-collapse-btn" onclick="this.classList.toggle('collapsed');this.closest('.query-matrix').querySelector('.query-matrix-body').classList.toggle('collapsed')"><span class="arrow">&#9660;</span></button> Запросы товара</div>
              <div class="query-matrix-subtitle">${items.length ? `Сортировка: ${metricLabel} ${currentSort === "desc" ? "по убыванию" : "по возрастанию"}. Кликните на метрику для сортировки.` : "За выбранный период нет данных по запросам."}</div>
            </div>
            <div class="query-matrix-tabs">
              ${queryMetricOrder.map((key) => {
                const isActive = key === selectedMetric;
                const arrow = isActive ? (currentSort === "desc" ? " &#9660;" : " &#9650;") : "";
                return `<button type="button" class="query-matrix-tab${isActive ? " active" : ""}" data-metric="${key}">${queryMetricMeta[key].label}${arrow}</button>`;
              }).join("")}
            </div>
          </div>
          <div class="query-matrix-body sku-collapsible">
            <div class="query-matrix-summary">
              <span class="query-matrix-summary-chip">Запросов: ${formatMetric(summaryData.queries_total || items.length || 0, 0)}</span>
              <span class="query-matrix-summary-chip">Показы SKU: ${formatQueryMetricValue("views", summaryData.views_total || 0)}</span>
              <span class="query-matrix-summary-chip">Спрос: ${formatQueryMetricValue("searches", summaryData.searches_total || 0)}</span>
              <span class="query-matrix-summary-chip">Охват: ${formatQueryMetricValue("coverage", summaryData.coverage_total || 0)}</span>
              <span class="query-matrix-summary-chip">купили р.: ${formatQueryMetricValue("gmv", summaryData.gmv_total || 0)}</span>
              <button type="button" class="qm-toggle-all query-matrix-summary-chip" style="cursor:pointer;font-weight:600;">Снять все</button>
              <button type="button" class="qm-toggle-hide query-matrix-summary-chip" style="cursor:pointer;font-weight:600;">Скрыть невыбранные</button>
            </div>
            <div class="query-matrix-stacked-wrap"></div>
            <div class="query-matrix-grid">
              <div class="query-matrix-days">${headerDaysHtml}</div>
              ${rowsHtml || `<div class="query-matrix-status">Нет данных по запросам за выбранный период.</div>`}
            </div>
          </div>
        `;
        if (effectiveHideUnchecked) {
          container.querySelector(".query-matrix-grid")?.classList.add("hide-unchecked");
        }
        const collectUncheckedQueryNames = () => {
          const values = [];
          container.querySelectorAll(".qm-check").forEach((cb) => {
            if (!cb.checked) {
              const row = cb.closest(".query-matrix-row");
              const name = row?.querySelector(".query-matrix-query-name span");
              const queryText = String(name?.textContent || "").trim();
              if (queryText) values.push(queryText);
            }
          });
          return [...new Set(values)];
        };
        const persistMatrixState = () => {
          const sku = String(container?.dataset?.sku || "").trim();
          if (!sku) return;
          const grid = container.querySelector(".query-matrix-grid");
          saveQueryMatrixState(sku, {
            metric: container.dataset.metric || selectedMetric,
            sort_dir: container.dataset.sortDir || currentSort,
            hide_unchecked: !!grid?.classList.contains("hide-unchecked"),
            unchecked_queries: collectUncheckedQueryNames(),
          });
        };
        container.querySelectorAll(".query-matrix-tab").forEach((button) => {
          button.addEventListener("click", () => {
            const clickedMetric = button.dataset.metric || "coverage";
            let newDir = "desc";
            if (clickedMetric === selectedMetric) {
              newDir = currentSort === "desc" ? "asc" : "desc";
            }
            const unc = new Set(collectUncheckedQueryNames());
            const isHideUnchecked = !!container.querySelector(".query-matrix-grid")?.classList.contains("hide-unchecked");
            renderArticleQueryMatrix(container, safePayload, clickedMetric, newDir, unc, isHideUnchecked);
          });
        });

        // Stacked area chart — rebuild from checked items
        const stackColors = ["#4f83e3","#f28f3b","#6d52d9","#279b6b","#e16051","#e39a00","#8dbbff","#b9a6ff","#88d7bb","#ffb8b0"];
        const stackWrap = container.querySelector(".query-matrix-stacked-wrap");
        function rebuildStackedChart() {
          if (!stackWrap || !days.length) return;
          const checkedIdxs = [];
          container.querySelectorAll(".qm-check:checked").forEach((cb) => checkedIdxs.push(Number(cb.dataset.qi)));
          const checkedItems = checkedIdxs.map((i) => items[i]).filter(Boolean);
          if (!checkedItems.length) { stackWrap.innerHTML = ""; return; }
          const sW = 920, sH = 180, sL = 42, sR = 16, sT = 16, sB = 28;
          const sUW = sW - sL - sR, sUH = sH - sT - sB, sBaseY = sT + sUH;
          const stepX = sUW / Math.max(days.length - 1, 1);
          const dayTotals = days.map((_, di) => checkedItems.reduce((sum, it) => {
            const d = Array.isArray(it.daily) ? it.daily : [];
            return sum + Math.max(0, Number(d[di]?.[selectedMetric] || 0));
          }, 0));
          const sMax = Math.max(1, ...dayTotals);
          const yFor = (v) => sBaseY - (v / sMax) * sUH;
          const gridVals = [0, Math.round(sMax / 3), Math.round(sMax * 2 / 3), sMax].reverse();
          const gridSvg = gridVals.map((v) => `<line x1="${sL}" y1="${yFor(v).toFixed(1)}" x2="${sW - sR}" y2="${yFor(v).toFixed(1)}" stroke="#e4eaf2" stroke-width="1" /><text x="${sL - 8}" y="${(yFor(v) + 4).toFixed(1)}" text-anchor="end" font-size="11" fill="#8a97aa">${formatMetric(v, 0)}</text>`).join("");
          let areas = "";
          for (let qi = checkedItems.length - 1; qi >= 0; qi--) {
            const cumTop = days.map((_, di) => {
              let s = 0;
              for (let k = 0; k <= qi; k++) {
                const d = Array.isArray(checkedItems[k].daily) ? checkedItems[k].daily : [];
                s += Math.max(0, Number(d[di]?.[selectedMetric] || 0));
              }
              return s;
            });
            const cumBot = qi === 0 ? days.map(() => 0) : days.map((_, di) => {
              let s = 0;
              for (let k = 0; k < qi; k++) {
                const d = Array.isArray(checkedItems[k].daily) ? checkedItems[k].daily : [];
                s += Math.max(0, Number(d[di]?.[selectedMetric] || 0));
              }
              return s;
            });
            const tp = cumTop.map((v, i) => `${(sL + i * stepX).toFixed(1)},${yFor(v).toFixed(1)}`);
            const bp = cumBot.map((v, i) => `${(sL + i * stepX).toFixed(1)},${yFor(v).toFixed(1)}`).reverse();
            const qName = escapeHtml(checkedItems[qi].query_text || "");
            const qTotal = formatQueryMetricValue(selectedMetric, checkedItems[qi][sortKeyMap[selectedMetric]] || 0);
            areas += `<polygon points="${tp.join(" ")} ${bp.join(" ")}" fill="${stackColors[qi % stackColors.length]}" opacity="0.7"><title>${qName}: ${qTotal}</title></polygon>`;
          }
          const xTicksHtml = buildHtmlXTicks(days.map((d) => ({day: d})), sW, sL, sR, 0, true);
          stackWrap.innerHTML = `
            <div class="analytics-chart sku-impressions-chart query-matrix-stacked-chart">
              <div class="sku-impressions-meta">
                <div>
                  <div class="sku-impressions-title">Структура по запросам</div>
                  <div class="sku-impressions-summary">Отмечено: ${checkedItems.length} из ${items.length}</div>
                </div>
              </div>
              <div class="sku-chart-wrap">
                <svg viewBox="0 0 ${sW} ${sH}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                  ${gridSvg}
                  <line x1="${sL}" y1="${sBaseY}" x2="${sW - sR}" y2="${sBaseY}" stroke="#ccd6e3" stroke-width="1" />
                  ${areas}
                </svg>
                <div class="sku-chart-xticks">${xTicksHtml}</div>
              </div>
            </div>`;
        }
        function recalcSummary() {
          const checkedIdxs = [];
          container.querySelectorAll(".qm-check:checked").forEach((cb) => checkedIdxs.push(Number(cb.dataset.qi)));
          const checked = checkedIdxs.map((i) => items[i]).filter(Boolean);
          const sumChips = container.querySelector(".query-matrix-summary");
          if (!sumChips) return;
          const viewsSum = checked.reduce((s, it) => s + (Number(it.views_total) || 0), 0);
          const searchesSum = checked.reduce((s, it) => s + (Number(it.searches_total) || 0), 0);
          const gmvSum = checked.reduce((s, it) => s + (Number(it.gmv_total) || 0), 0);
          const coverageAvg = checked.length ? checked.reduce((s, it) => s + (Number(it.coverage_total) || 0), 0) / checked.length : 0;
          sumChips.innerHTML = `
            <span class="query-matrix-summary-chip">Запросов: ${formatMetric(checked.length, 0)}</span>
            <span class="query-matrix-summary-chip">Показы SKU: ${formatQueryMetricValue("views", viewsSum)}</span>
            <span class="query-matrix-summary-chip">Спрос: ${formatQueryMetricValue("searches", searchesSum)}</span>
            <span class="query-matrix-summary-chip">Охват: ${formatQueryMetricValue("coverage", coverageAvg)}</span>
            <span class="query-matrix-summary-chip">купили р.: ${formatQueryMetricValue("gmv", gmvSum)}</span>
            <button type="button" class="qm-toggle-all query-matrix-summary-chip" style="cursor:pointer;font-weight:600;">${checked.length === items.length ? "Снять все" : "Выделить все"}</button>
            <button type="button" class="qm-toggle-hide query-matrix-summary-chip" style="cursor:pointer;font-weight:600;">${container.querySelector(".query-matrix-grid.hide-unchecked") ? "Показать все" : "Скрыть невыбранные"}</button>`;
          sumChips.querySelector(".qm-toggle-all")?.addEventListener("click", toggleAllChecks);
          sumChips.querySelector(".qm-toggle-hide")?.addEventListener("click", toggleHideUnchecked);
        }
        function toggleAllChecks() {
          const cbs = container.querySelectorAll(".qm-check");
          const allChecked = [...cbs].every((c) => c.checked);
          cbs.forEach((c) => c.checked = !allChecked);
          rebuildStackedChart();
          recalcSummary();
          persistMatrixState();
        }
        function toggleHideUnchecked() {
          const grid = container.querySelector(".query-matrix-grid");
          if (!grid) return;
          grid.classList.toggle("hide-unchecked");
          recalcSummary();
          persistMatrixState();
        }
        rebuildStackedChart();
        container.querySelectorAll(".qm-check").forEach((cb) => {
          cb.addEventListener("change", () => { rebuildStackedChart(); recalcSummary(); persistMatrixState(); });
        });
        container.querySelector(".qm-toggle-all")?.addEventListener("click", toggleAllChecks);
        container.querySelector(".qm-toggle-hide")?.addEventListener("click", toggleHideUnchecked);
        if ((effectiveUncheckedSet && effectiveUncheckedSet.size) || effectiveHideUnchecked) recalcSummary();
        persistMatrixState();
      }
      async function ensureArticleQueryMatrixLoaded(item, container) {
        const sku = String(item?.sku || "").trim();
        if (!sku || !container) return;
        const fromValue = dateFrom?.value || "";
        const toValue = dateTo?.value || "";
        const cacheKey = `${sku}|${fromValue}|${toValue}`;
        const matrixState = getQueryMatrixState(sku);
        const initialMetric = queryMetricMeta[matrixState?.metric] ? matrixState.metric : (container.dataset.metric || "coverage");
        const initialSortDir = matrixState?.sort_dir || container.dataset.sortDir || "desc";
        const initialUncheckedSet = new Set(Array.isArray(matrixState?.unchecked_queries) ? matrixState.unchecked_queries.map((value) => String(value || "")) : []);
        const initialHideUnchecked = !!matrixState?.hide_unchecked;
        if (queryMatrixCache.has(cacheKey)) {
          renderArticleQueryMatrix(
            container,
            queryMatrixCache.get(cacheKey),
            initialMetric,
            initialSortDir,
            initialUncheckedSet,
            initialHideUnchecked,
          );
          container.dataset.loaded = "1";
          return;
        }
        if (queryMatrixInflight.has(cacheKey)) {
          try {
            const payload = await queryMatrixInflight.get(cacheKey);
            renderArticleQueryMatrix(
              container,
              payload,
              initialMetric,
              initialSortDir,
              initialUncheckedSet,
              initialHideUnchecked,
            );
            container.dataset.loaded = "1";
          } catch (error) {
            container.innerHTML = `<div class="query-matrix-status error">${escapeHtml(error?.message || "Не удалось загрузить запросы товара")}</div>`;
          }
          return;
        }
        container.innerHTML = `
          <div class="query-matrix-head">
            <div>
              <div class="query-matrix-title">Запросы товара</div>
              <div class="query-matrix-subtitle">Забираем дневную историю запросов по SKU из локальной БД.</div>
            </div>
            <div class="query-matrix-tabs">
              ${queryMetricOrder.map((metric) => `<button type="button" class="query-matrix-tab${metric === "coverage" ? " active" : ""}" data-metric="${metric}" disabled>${queryMetricMeta[metric].label}</button>`).join("")}
            </div>
          </div>
          <div class="query-matrix-status">Загрузка запросов...</div>
        `;
        const url = new URL("/api/article-query-matrix", window.location.origin);
        url.searchParams.set("sku", sku);
        url.searchParams.set("limit", "30");
        if (fromValue) url.searchParams.set("date_from", fromValue);
        if (toValue) url.searchParams.set("date_to", toValue);
        const requestPromise = fetchJson(url.toString()).then((payload) => {
          queryMatrixCache.set(cacheKey, payload);
          return payload;
        });
        queryMatrixInflight.set(cacheKey, requestPromise);
        try {
          const payload = await requestPromise;
          renderArticleQueryMatrix(
            container,
            payload,
            initialMetric,
            initialSortDir,
            initialUncheckedSet,
            initialHideUnchecked,
          );
          container.dataset.loaded = "1";
        } catch (error) {
          container.innerHTML = `<div class="query-matrix-status error">${escapeHtml(error?.message || "Не удалось загрузить запросы товара")}</div>`;
        } finally {
          queryMatrixInflight.delete(cacheKey);
        }
      }

      const summaryHtml = `
        <div class="analytics-summary" style="grid-template-columns: repeat(6, 1fr);">
          <div class="analytics-summary-card"><div class="label">SKU в отчете</div><div class="value">${formatMetric(rows.length)}</div></div>
          <div class="analytics-summary-card"><div class="label">Выручка 30д</div><div class="value">${money(summary.revenue_total || 0)}</div></div>
          <div class="analytics-summary-card"><div class="label">Реклама 30д</div><div class="value">${money(summary.ad_spend_total || 0)}</div></div>
          <div class="analytics-summary-card"><div class="label">KPI score (ср.)</div><div class="value">${formatMetric(avgScore, 1)}</div></div>
          <div class="analytics-summary-card"><div class="label">Проблема</div><div class="value">${formatMetric(summary.red_count || 0)}</div></div>
          <div class="analytics-summary-card"><div class="label">Внимание</div><div class="value">${formatMetric(summary.yellow_count || 0)}</div></div>
        </div>
      `;

      const rowsHtml = rows.map((item, idx) => {
        const detailId = `article_analytics_detail_${idx}`;
        const chartId = `article_analytics_chart_${idx}`;
        const pdpChartId = `article_analytics_pdp_chart_${idx}`;
        const cartConvChartId = `article_analytics_cart_conv_chart_${idx}`;
        const positionChartId = `article_analytics_position_chart_${idx}`;
        const priceChartId = `article_analytics_price_chart_${idx}`;
        const stockChartId = `article_analytics_stock_chart_${idx}`;
        const queryMatrixId = `article_analytics_query_matrix_${idx}`;
        const alerts = Array.isArray(item.alerts) ? item.alerts : [];
        const alertsHtml = alerts.length
          ? alerts.map((a) => `<span class="analytics-chip alert">${fmt(a)}</span>`).join(" ")
          : `<span class="analytics-chip ok">без критичных сигналов</span>`;
        const sources = item.traffic_sources || {};
        const trendWindowDays = Number(item.trend_window_days || 3);
        const trendHint = `${trendWindowDays}д vs ${trendWindowDays}д`;
        const oosPctValue = Number(summary.period_days || 0) > 0
          ? (Number(item.oos_days_30d || 0) / Number(summary.period_days || 1)) * 100
          : 0;
        const priceIndex = medianPrice && Number(item.client_price || 0) > 0
          ? Number(item.client_price || 0) / medianPrice
          : null;
        const skuStatus = resolveSkuStatus(item, oosPctValue);
        const dailyArr = Array.isArray(item.daily) ? item.daily : [];
        const sumWindow = (arr, key, from, to) => {
          let s = 0;
          for (let j = Math.max(0, from); j < Math.min(arr.length, to); j += 1) s += Number(arr[j]?.[key] || 0);
          return s;
        };
        const dLen = dailyArr.length;
        const carts7 = sumWindow(dailyArr, "hits_tocart", dLen - 7, dLen);
        const orders7 = sumWindow(dailyArr, "ordered_units", dLen - 7, dLen);
        const cartsPrev7 = sumWindow(dailyArr, "hits_tocart", dLen - 14, dLen - 7);
        const ordersPrev7 = sumWindow(dailyArr, "ordered_units", dLen - 14, dLen - 7);
        const cartsAll = sumWindow(dailyArr, "hits_tocart", 0, dLen);
        const ordersAll = sumWindow(dailyArr, "ordered_units", 0, dLen);
        const crC2O7 = carts7 > 0 ? (orders7 / carts7) * 100 : null;
        const crC2OPrev7 = cartsPrev7 > 0 ? (ordersPrev7 / cartsPrev7) * 100 : null;
        const crC2OAll = cartsAll > 0 ? (ordersAll / cartsAll) * 100 : null;
        const crC2O7vs7Cell = crC2O7 != null && crC2OPrev7 != null
          ? `${pct(crC2O7)} / ${pct(crC2OPrev7)}`
          : (crC2O7 != null ? `${pct(crC2O7)} / —` : "—");
        const crC2O7vs7Delta = crC2O7 != null && crC2OPrev7 != null
          ? fmtDelta(deltaPct(crC2O7, crC2OPrev7))
          : "—";
        const crC2OAllCell = crC2OAll != null ? pct(crC2OAll) : "—";
        const crC2OAllHint = `${formatMetric(ordersAll, 0)} заказов / ${formatMetric(cartsAll, 0)} корзин`;
        const allPromos = Array.isArray(item.promos) ? item.promos : [];
        const activePromos = allPromos.filter((p) => p && p.is_participating);
        let promoCellHtml = '<div class="sku-cell-value" style="color:#999;font-size:12px;">—</div><div class="sku-cell-sub">не участвует</div>';
        if (activePromos.length) {
          const first = activePromos[0];
          const more = activePromos.length > 1 ? ' +' + (activePromos.length - 1) : '';

          const titleText = (first.title || '');
          const titleShort = titleText.length > 28 ? titleText.slice(0, 28) + '…' : titleText;
          const stockTxt = first.stock != null ? ' • ост. ' + formatMetric(first.stock, 0) : '';
          promoCellHtml = '<div class="sku-cell-value" title="' + tipText + '" style="font-size:13px;line-height:1.2;">' + titleShort + more + '</div>' +
            '<div class="sku-cell-sub">−' + formatMetric(first.discount_percent || 0, 0) + '%' + stockTxt + '</div>';

        let promoTableRowsHtml = '<tr><td>Акции</td><td>Участие</td><td>—</td><td>Товар не в акциях и не кандидат</td></tr>';
        if (allPromos.length) {
          promoTableRowsHtml = allPromos.map((p) => {
            const status = p.is_participating ? 'участвует' : 'кандидат';
            const ds = (p.date_start || '').slice(0, 10);

            const period = ds + ' → ' + de;

            const stockInfo = p.stock != null ? ' • остаток ' + formatMetric(p.stock, 0) + ' (мин ' + formatMetric(p.min_stock || 0, 0) + ')' : '';
            const titleSafe = (p.title || '').replace(/</g, '&lt;');
            return '<tr><td>Акции</td><td>' + titleSafe + '</td><td>' + priceInfo + ' • −' + formatMetric(p.discount_percent || 0, 0) + '%</td><td>' + status + ' • ' + period + stockInfo + '</td></tr>';
          }).join('');
        }
        return `
          <section class="analytics-group">
            <div class="analytics-group-head compact">
              <div class="sku-compact-row">
                <div class="sku-compact-main">
                  <button type="button" class="analytics-article-toggle" data-target="${detailId}">
                    <span class="analytics-toggle-sign">+</span>
