        // Fallback: читаем из DOM таблиц паллет
        const cont = document.getElementById("supply-plan-pallet-results");
        if (cont) {
          cont.querySelectorAll(":scope > div[style*='border-radius']").forEach(block => {
            const hdr = block.querySelector("div[style*='gradient'] div");
            const clusterName = hdr
              ? [...hdr.childNodes].filter(n => n.nodeType === 3).map(n => n.textContent.trim()).join("").replace(/📍|🔴/g, "").trim()
              : "";
            if (!clusterName) return;
            const skuMap = {};
            block.querySelectorAll("input.pallet-item-quantity-input").forEach(inp => {
              const tr = inp.closest("tr");
              const skuEl = tr?.querySelector("td:first-child div:nth-child(2)");
              const sku = skuEl?.textContent?.replace("SKU:", "").trim();
              const qty = Number(inp.value || 0);
              if (sku && qty > 0) skuMap[sku] = (skuMap[sku] || 0) + qty;
            });
            const items = Object.entries(skuMap).map(([sku, qty]) => ({ sku, quantity: qty }));
            if (items.length > 0) clustersData.push({ cluster_name: clusterName, items });
          });
        }
      }

      if (!clustersData.length) {
        if (statusEl) statusEl.innerHTML = `<div style="padding: 8px 10px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">Нет данных паллетизации. Сначала нажмите «Рассчитать паллеты».</div>`;
        return;
      }

      // Синхронизируем draft_id между двумя полями
      { const el = document.getElementById("fill-draft-id-input"); if (el && !el.value) el.value = draftId; }

      const progress = createServerProgressReporter(statusEl, isDryRun
        ? [
            "Проверка состава кластеров",
            "Подготовка черновика",
            "Проверка товаров по кластерам",
          ]
        : [
            draftId ? "Открытие существующего черновика" : "Открытие сайта и создание черновика",
            "Заполнение товаров по кластерам",
            `Выбор складов из отмеченных (${selectedTransitWarehouses.length || 0})`,
            "Переход на следующий шаг и сбор таймслотов",
          ],
        {
          title: isDryRun ? "Проверка черновика" : "Полный флоу черновика",
          waitingStage: isDryRun ? "Проверяю состав" : "Работаю с seller.ozon.ru",
          waitingHintText: isDryRun
            ? ""
            : "Если Chrome просит логин в Ozon, завершите вход в открывшемся окне.",
          waitingHintAfterSec: isDryRun ? 0 : 10,
        }
      );

      try {
        const resp = await fetch("/api/supply-plan/fill-draft", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ draft_id: draftId, clusters: clustersData, dry_run: isDryRun }),
          signal: AbortSignal.timeout(600000),
        });
        const data = await resp.json();
        if (!data.success) {
          progress.fail(data.error || "Не удалось заполнить черновик");
          if (statusEl) statusEl.innerHTML = buildFillDraftResultHtml(data);
          return;
        }
        if (statusEl) statusEl.innerHTML = buildFillDraftResultHtml(data);
        const adjustedClusters = await applyFillDraftAdjustmentsToPalletization(data);
        const effectiveClustersData = Array.isArray(latestPalletClusters)
          ? latestPalletClusters
              .map((cluster) => {
                const clusterName = String(cluster?.cluster || cluster?.cluster_name || "").trim();
                const skuMap = collectClusterSkuQuantitiesEffective(cluster);
                const items = Object.entries(skuMap)
                  .map(([sku, quantity]) => ({ sku, quantity: toNonNegativeInt(quantity, 0) }))
                  .filter((item) => item.quantity > 0);
                return items.length > 0 ? { cluster_name: clusterName, items } : null;
              })
              .filter(Boolean)
          : clustersData;
        if (adjustedClusters.length && statusEl) {
          statusEl.innerHTML += `<div style="padding: 8px 10px; margin-top: 8px; background: #fff3e0; border: 1px solid #ffcc80; border-radius: 8px; color: #8a4b00; font-size: 12px;">Из паллетизации сняты товары, которые Ozon не добавил в черновик: ${fmt(adjustedClusters.join(", "))}.</div>`;
        }
        if (!effectiveClustersData.length) {
          progress.fail("Ozon не принял товары ни в один кластер");
          if (statusEl) {
            statusEl.innerHTML += `<div style="padding: 8px 10px; margin-top: 8px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">После сверки с черновиком в паллетизации не осталось товаров для отправки. Проверьте ограничения складов.</div>`;
          }
          return;
        }

        // После fill-draft: продолжаем полный флоу через UI seller.ozon.ru
        if (!isDryRun) {
          const actualDraftId = data.draft_id || draftId;
          if (actualDraftId && draftInput) draftInput.value = actualDraftId;
          if (!actualDraftId) {
            progress.fail("Черновик не был создан");
            return;
          }
          const collectTimeslots = !!(document.getElementById("collect-timeslots-cb") || {}).checked;
          if (statusEl) statusEl.innerHTML += `<div style="padding: 8px 10px; margin-top: 8px; background: #fff3e0; border: 1px solid #ffcc02; border-radius: 8px; color: #e65100; font-size: 12px;">Открываю seller.ozon.ru, выбираю склады из отмеченных${collectTimeslots ? ' и собираю слоты' : ''}. Это может занять ${collectTimeslots ? '3-10' : '1-3'} минут.</div>`;
          try {
            const scanResp = await fetch("/api/supply-plan/scan-warehouses-ui", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                draft_id: actualDraftId,
                expected_clusters: effectiveClustersData.map(c => c.cluster_name),
                transit_warehouses: selectedTransitWarehouses,
                clusters: effectiveClustersData,
                collect_timeslots: collectTimeslots,
              }),
              signal: AbortSignal.timeout(900000),
            });
            const scanData = await scanResp.json();
            let adjustedAfterWarehouses = await applyScanQuantityAdjustmentsToPalletization(scanData);

            // Fallback: если UI reconciliation провалилась (modal_open_error), пробуем BFF API
            const uiReconciliation = scanData?.quantity_reconciliation;
            const uiRecClusters = Array.isArray(uiReconciliation?.clusters) ? uiReconciliation.clusters : [];
            const uiRecAllFailed = uiRecClusters.length > 0 && uiRecClusters.every(c => c.status !== "ok");
            if (uiRecAllFailed && effectiveClustersData.length > 0) {
              try {
                const reconcileResp = await fetch("/api/supply-plan/reconcile-draft-quantities", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ draft_id: actualDraftId, clusters: effectiveClustersData }),
                  signal: AbortSignal.timeout(300000),
                });
                const reconcileData = await reconcileResp.json();
                if (reconcileData.success && reconcileData.removed_total > 0) {
                  // Применяем корректировки из BFF API
                  const bffAdjusted = [];
                  for (const cr of (reconcileData.clusters || [])) {
                    const items = (cr.items || []).filter(i => i.removed_quantity > 0);
                    if (!items.length) continue;
                    const clusterName = String(cr.cluster_name || cr.matched_name || "").trim();
                    if (!clusterName) continue;
                    const clusterIndex = (Array.isArray(latestPalletClusters) ? latestPalletClusters : []).findIndex(c => {
                      const cn = String(c?.cluster || c?.cluster_name || "").trim();
                      return normalizeWarehouseKey(cn) === normalizeWarehouseKey(clusterName);
                    });
                    if (clusterIndex < 0) continue;
                    const skuMap = collectClusterSkuQuantitiesEffective(latestPalletClusters[clusterIndex]);
                    let changed = false;
                    for (const item of items) {
                      const sku = String(item.sku || "").trim();
                      const acceptedQty = toNonNegativeInt(item.accepted_quantity ?? 0, 0);
                      if (sku && toNonNegativeInt(skuMap[sku] ?? 0, 0) !== acceptedQty) {
                        skuMap[sku] = acceptedQty;
                        changed = true;
                      }
                    }
                    if (changed) {
                      await repackClusterBySkuMap(clusterIndex, skuMap, { skipSupplyLimit: true });
                      bffAdjusted.push(clusterName);
                    }
                  }
                  if (bffAdjusted.length) {
                    adjustedAfterWarehouses = bffAdjusted;
                    persistPalletizationState();
                  }
                  scanData._bffReconciliation = reconcileData;
                }
              } catch (bffErr) {
                console.error("BFF reconciliation fallback error:", bffErr);
              }
            }

            let scanHtml = buildFillDraftResultHtml(data) + buildScanWarehousesResultHtml(scanData);
            if (adjustedAfterWarehouses.length) {
              scanHtml += `<div style="padding: 8px 10px; margin-top: 8px; background: #fff3e0; border: 1px solid #ffcc80; border-radius: 8px; color: #8a4b00; font-size: 12px;">После назначения складов Ozon скорректировал товары в кластерах: ${fmt(adjustedAfterWarehouses.join(", "))}.</div>`;
            }
            // Фильтрация таймслотов — только если собраны (scan дошёл до этапа 2)
            if (scanData.timeslots && scanData.timeslots.total_slots > 0) {
              const filterData = await runFilterTimeslots(actualDraftId);
              if (filterData.success) scanHtml += buildTimeslotFilterHtml(filterData);
            }
            progress.done(collectTimeslots ? "Черновик создан, товары заполнены, склады выбраны." : "Черновик создан, товары заполнены, склады выбраны. Слоты не собирались.");
            if (statusEl) statusEl.innerHTML = scanHtml;
          } catch (e2) {
            progress.fail(`Ошибка выбора складов: ${String(e2?.message || e2)}`);
            if (statusEl) statusEl.innerHTML += `<div style="padding: 8px 10px; margin-top: 8px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">Ошибка сканирования складов: ${fmt(String(e2?.message || e2))}</div>`;
          }
        } else {
          progress.done("Проверка черновика завершена.");
          if (statusEl) statusEl.innerHTML = buildFillDraftResultHtml(data);
        }
      } catch (e) {
        progress.fail(String(e?.message || e));
        if (statusEl) statusEl.innerHTML = `<div style="padding: 8px 10px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">Ошибка: ${fmt(String(e?.message || e))}</div>`;
      }
    }

        localStorage.setItem(PALLETIZATION_STATE_STORAGE_KEY, JSON.stringify({
          saved_at: new Date().toISOString(),
          clusters,
        }));
      } catch (_) {
        // ignore storage issues
      }
    }

      try {
        localStorage.removeItem(PALLETIZATION_STATE_STORAGE_KEY);
      } catch (_) {
        // ignore storage issues
      }
    }

    function restorePersistedPalletizationState() {
      try {
        const raw = localStorage.getItem(PALLETIZATION_STATE_STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        const clusters = Array.isArray(parsed?.clusters) ? parsed.clusters : [];
        if (!clusters.length) return false;
        latestPalletClusters = clusters;
        latestWarehouseAcceptance = null;
        renderPalletResults(latestPalletClusters, latestWarehouseAcceptance);
        return true;
      } catch (_) {
        return false;
      }
    }

        if (statusEl) statusEl.innerHTML = buildMultiClusterApiResultHtml(data);
        // Сохраняем draft_id в поле ввода
        if (data.draft_id) {
          const inp = document.getElementById("fill-draft-id-input");
          if (inp) inp.value = data.draft_id;
        }
      } catch (e) {
        if (statusEl) statusEl.innerHTML = `<div style="padding: 8px 10px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">Ошибка: ${fmt(String(e?.message || e))}</div>`;
      }

    function buildScanWarehousesResultHtml(data) {
      if (!data.success && data.error) {
        return `<div style="padding: 10px 12px; margin-top: 8px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 13px;">
          <b>Ошибка сканирования:</b> ${fmt(data.error)}</div>`;

        <b>Склады МСК/МО — доступные таймслоты:</b>`;
      for (const cluster of clusters) {
        const whWith = cluster.warehouses_with_timeslots || [];
        const whWithout = cluster.warehouses_no_timeslots || [];

    function buildTimeslotFilterHtml(filterResult) {
      if (!filterResult || !filterResult.success) {
        const err = filterResult ? (filterResult.error || "Unknown") : "Нет данных";
        return `<div style="padding: 10px 12px; margin-top: 8px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 13px;">
          <b>Ошибка фильтрации:</b> ${fmt(err)}</div>`;
      }
      const clusters = filterResult.clusters || {};
      const targetDate = filterResult.target_date || "?";
      const warehouses = filterResult.warehouses || {};
      const clusterNames = Object.keys(clusters);

      const mn = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
      const dn = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
      const fmtD = (s) => { const d = new Date(s+"T00:00:00"); return d.getDate()+" "+mn[d.getMonth()]; };
      const fmtDW = (s) => { const d = new Date(s+"T00:00:00"); return dn[d.getDay()]; };

      // Собираем все склады и даты по кластерам для поиска совпадений
      // whDates[clusterName] = {whName: Set(dateKeys)}
      const whDates = {};
      for (const cn of clusterNames) {
        whDates[cn] = {};
        for (const wh of (warehouses[cn] || [])) {
          whDates[cn][wh.warehouse] = new Set(Object.keys(wh.dates || {}));
        }
      }
      // commonWarehouses — склады присутствующие во ВСЕХ кластерах
      const allWhSets = clusterNames.map(cn => new Set(Object.keys(whDates[cn] || {})));
      const commonWh = allWhSets.length > 0
        ? [...allWhSets[0]].filter(w => allWhSets.every(s => s.has(w)))
        : [];
      const commonWhSet = new Set(commonWh);

      // commonSlots[date][time] = true если слот есть во всех кластерах (хотя бы на одном складе)
      const allDateSlots = {};
      for (const cn of clusterNames) {
        const cSlots = {};
        for (const wh of (warehouses[cn] || [])) {
          for (const [dk, slots] of Object.entries(wh.dates || {})) {
            if (!cSlots[dk]) cSlots[dk] = new Set();
            for (const s of slots) cSlots[dk].add(s.from + "-" + s.to);
          }
        }
        allDateSlots[cn] = cSlots;
      }
      const commonDates = new Set();
      const commonTimeSlots = {};
      if (clusterNames.length > 1) {
        const firstDates = Object.keys(allDateSlots[clusterNames[0]] || {});
        for (const dk of firstDates) {
          if (clusterNames.every(cn => allDateSlots[cn]?.[dk])) {
            commonDates.add(dk);
            const inter = [...allDateSlots[clusterNames[0]][dk]].filter(t =>
              clusterNames.every(cn => allDateSlots[cn]?.[dk]?.has(t))
            );
            if (inter.length > 0) commonTimeSlots[dk] = new Set(inter);
          }
        }
      }

      window._tsSlotData = window._tsSlotData || {};
      window._tsSelection = window._tsSelection || {};

      let html = `<div style="margin-top: 10px;" id="timeslot-picker">
        <div style="font-weight: 700; font-size: 15px; margin-bottom: 8px;">📅 Выбор даты и времени отгрузки <span style="font-weight:400;font-size:13px;color:#5f6f85;">(целевая: ${fmt(targetDate)})</span></div>`;

      for (const [clusterName, info] of Object.entries(clusters)) {
        if (info.error) {
          html += `<div style="margin-top: 6px; padding: 6px 10px; background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; font-size: 12px;">
            <b>${fmt(clusterName)}</b>: <span style="color: #e65100;">${fmt(info.error)}</span></div>`;
          continue;
        }

        const best = info;
        const cWh = (warehouses[clusterName] || []).slice().sort((a, b) => (b.itemsCount || 0) - (a.itemsCount || 0));

        html += `<div style="margin-top: 8px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">
          <div style="background: linear-gradient(135deg, #1565c0, #1e88e5); color: #fff; padding: 8px 12px; font-weight: 700; font-size: 13px;">
            ${fmt(clusterName)}
          </div>`;

        for (const wh of cWh) {
          const dates = wh.dates || {};
          const dateKeys = Object.keys(dates).sort();
          const isBest = wh.warehouse === best.warehouse;
          const isCommon = commonWhSet.has(wh.warehouse);
          const uid = `tswh_${clusterName}_${wh.warehouse}`.replace(/[^a-zA-Z0-9]/g, '_');
          window._tsSlotData[uid] = dates;
          const transit = wh.transitWarehouse ? ` → ${fmt(wh.transitWarehouse)}` : "";
          const defaultDate = best.date && dates[best.date] ? best.date : dateKeys[0] || "";

          html += `<div style="border-top: 1px solid #eee; padding: 6px 10px;">
            <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 4px; cursor: pointer;" onclick="const p=this.nextElementSibling; p.style.display=p.style.display==='none'?'flex':'none';">
              ${isCommon ? '<span style="color:#4caf50;" title="Есть во всех кластерах">●</span>' : '<span style="color:#ccc;">○</span>'}
              ${isBest ? '<span style="color:#1565c0;">★</span>' : ''}
              <b style="font-size: 12px;">${fmt(wh.warehouse)}</b>
              <span style="font-size: 11px; color: #888;">${wh.itemsCount||'?'}шт · ${wh.volumeLiters||'?'}л${transit}</span>
              <span style="margin-left: auto; font-size: 11px; color: #1565c0;">${wh.totalSlots}сл · ${dateKeys.length}дн</span>
            </div>
            <div style="${isBest ? 'display:flex;' : 'display:none;'} gap: 0; max-height: 120px;" id="${uid}">
              <div style="min-width: 100px; max-height: 120px; overflow-y: auto; border-right: 1px solid #e8e8e8; padding-right: 4px;">`;

          // Даты — компактно, 2 строки видимых, остальные скролл
          for (const dk of dateKeys) {
            const cnt = dates[dk].length;
            const isActive = dk === defaultDate;
            const isCommonDate = commonDates.has(dk);
            html += `<div data-ts-uid="${uid}" data-ts-date="${dk}" data-cluster="${clusterName}" data-wh="${wh.warehouse}"
              class="ts-date" style="padding: 2px 6px; cursor: pointer; font-size: 11px; border-radius: 3px; margin-bottom: 1px; ${isActive ? 'background:#e3f2fd;font-weight:700;' : ''} display: flex; justify-content: space-between; gap: 4px; white-space: nowrap;">
              <span>${isCommonDate ? '<span style="color:#4caf50;font-size:8px;">●</span> ' : ''}${fmtDW(dk)} ${fmtD(dk)}</span>
              <span style="color: #aaa; font-size: 10px;">${cnt}</span>
            </div>`;
          }

          // Слоты справа — компактно
          const defSlots = dates[defaultDate] || [];
          html += `</div>
              <div style="flex: 1; padding-left: 8px; max-height: 120px; overflow-y: auto;" id="${uid}_slots">
                <div style="display: flex; flex-wrap: wrap; gap: 0;">`;
          for (const s of defSlots) {
            const timeKey = s.from + "-" + s.to;
            const isCommonTime = commonTimeSlots[defaultDate]?.has(timeKey);
            html += `<span data-ts-uid="${uid}" data-ts-date="${defaultDate}" data-ts-time="${timeKey}" data-cluster="${clusterName}" data-wh="${wh.warehouse}"
              class="ts-slot" style="display:inline-block;padding:2px 8px;margin:2px;border:1px solid ${isCommonTime ? '#a5d6a7' : '#bbdefb'};border-radius:5px;font-size:11px;color:${isCommonTime ? '#2e7d32' : '#1565c0'};background:#fff;cursor:pointer;"
              >${isCommonTime ? '<span style="font-size:8px;">●</span>' : ''}${s.from}\u2013${s.to}</span>`;
          }
          html += `</div></div>
            </div>
          </div>`;
        }
        html += `</div>
          <div id="ts-selection-${clusterName.replace(/[^a-zA-Z0-9]/g,'_')}" style="margin-top: 4px; font-size: 12px; color: #e65100; padding: 0 4px;"></div>`;
      }

      // Кнопка сохранения
      html += `<div style="margin-top: 12px; display: flex; gap: 10px; align-items: center;">
        <button type="button" id="save-timeslots-btn" onclick="saveTimeslotSelection()"
          style="padding: 8px 16px; background: #1565c0; border: none; color: #fff; font-size: 13px; border-radius: 8px; font-weight: 600; cursor: pointer;">
          Сохранить слоты в черновик
        </button>
        <div id="save-timeslots-status" style="font-size: 12px;"></div>
      </div>`;
      html += `</div>`;

      // Event listeners
      setTimeout(() => {
        // Клик по дате — показать слоты
        document.querySelectorAll("#timeslot-picker .ts-date[data-ts-uid]").forEach(el => {
          el.addEventListener("click", (ev) => {
            ev.stopPropagation();
            const uid = el.dataset.tsUid;
            const dk = el.dataset.tsDate;
            const dates = (window._tsSlotData || {})[uid] || {};
            const slots = dates[dk] || [];
            const container = document.getElementById(uid);
            if (container) container.querySelectorAll(".ts-date").forEach(d => { d.style.background = ""; d.style.fontWeight = ""; });
            el.style.background = "#e3f2fd";
            el.style.fontWeight = "700";
            const slotsEl = document.getElementById(uid + "_slots");
            if (slotsEl) {
              const cdk = commonTimeSlots[dk] || new Set();
              slotsEl.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:0;">' + slots.map(s => {
                const tk = s.from+"-"+s.to;
                const isCT = cdk.has(tk);
                return `<span data-ts-uid="${uid}" data-ts-date="${dk}" data-ts-time="${tk}" data-cluster="${el.dataset.cluster}" data-wh="${el.dataset.wh}"
                  class="ts-slot" style="display:inline-block;padding:2px 8px;margin:2px;border:1px solid ${isCT?'#a5d6a7':'#bbdefb'};border-radius:5px;font-size:11px;color:${isCT?'#2e7d32':'#1565c0'};background:#fff;cursor:pointer;"
                  >${isCT?'<span style="font-size:8px;">●</span>':''}${s.from}\u2013${s.to}</span>`;
              }).join("") + '</div>';
              // Rebind slot clicks
              slotsEl.querySelectorAll(".ts-slot").forEach(bindSlotClick);
            }
          });
        });
        // Клик по слоту — выбор
        function bindSlotClick(el) {
          el.addEventListener("click", () => {
            const cluster = el.dataset.cluster;
            const wh = el.dataset.wh;
            const date = el.dataset.tsDate;
            const time = el.dataset.tsTime;
            window._tsSelection[cluster] = { warehouse: wh, date, time };
            // Подсветка выбранного
            const uid = el.dataset.tsUid;
            document.querySelectorAll(`#${uid}_slots .ts-slot`).forEach(s => {
              s.style.background = "#fff";
              s.style.borderWidth = "1px";
            });
            el.style.background = "#e3f2fd";
            el.style.borderWidth = "2px";
            // Показать выбор
            const selId = "ts-selection-" + cluster.replace(/[^a-zA-Z0-9]/g, '_');
            const selEl = document.getElementById(selId);
            if (selEl) selEl.innerHTML = `<span style="color:#1565c0;">Выбрано: <b>${wh}</b> · ${date} · ${time.replace('-',' \u2013 ')}</span>`;
          });
        }
        document.querySelectorAll("#timeslot-picker .ts-slot").forEach(bindSlotClick);
      }, 0);

      // Глобальная функция сохранения — сохраняем clusterNames в замыкании
      window._tsClusterNames = clusterNames;
      window.saveTimeslotSelection = async function() {
        const statusEl = document.getElementById("save-timeslots-status");
        const allClusters = window._tsClusterNames || [];
        const missing = allClusters.filter(c => !window._tsSelection[c]);
        if (missing.length > 0) {
          if (statusEl) statusEl.innerHTML = '<span style="color:#e65100;">Выберите слот для: <b>' + missing.join(", ") + '</b></span>';
          return;
        }

        // Получаем draft_id
        const draftInput = document.getElementById("fill-draft-id-input");
        const draftId = (draftInput ? draftInput.value : "").trim();
        if (!draftId) {
          if (statusEl) statusEl.innerHTML = '<span style="color:#e65100;">Не указан ID черновика</span>';
          return;
        }

        // Собираем текущие количества из паллетизации для сверки
        const clustersForReconcile = allClusters.map(clusterName => {
          const clusterIndex = (Array.isArray(latestPalletClusters) ? latestPalletClusters : []).findIndex(c => {
            const cn = String(c?.cluster || c?.cluster_name || "").trim();
            return normalizeWarehouseKey(cn) === normalizeWarehouseKey(clusterName);
          });
          if (clusterIndex < 0) return null;
          const cluster = latestPalletClusters[clusterIndex];
          const skuMap = collectClusterSkuQuantitiesEffective(cluster);
          const items = Object.entries(skuMap)
            .map(([sku, quantity]) => ({ sku, quantity: toNonNegativeInt(quantity, 0) }))
            .filter(item => item.quantity > 0);
          return items.length > 0 ? { cluster_name: clusterName, items } : null;
        }).filter(Boolean);

        if (!clustersForReconcile.length) {
          if (statusEl) statusEl.innerHTML = '<span style="color:#e65100;">Нет товаров в паллетизации для сверки</span>';
          return;
        }

        // ШАГ 1: Сверка количеств через BFF API
        if (statusEl) statusEl.innerHTML = '<span style="color:#1565c0;">Сверяю количества в черновике с паллетизацией...</span>';
        try {
          const reconcileResp = await fetch("/api/supply-plan/reconcile-draft-quantities", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ draft_id: draftId, clusters: clustersForReconcile }),
            signal: AbortSignal.timeout(300000),
          });
          const reconcileData = await reconcileResp.json();
          console.log("Reconcile result:", reconcileData);

          if (reconcileData.success && reconcileData.removed_total > 0) {
            // Есть урезания — показать и обновить паллетизацию
            const changedClusters = reconcileData.changed_clusters || [];
            const clusters = reconcileData.clusters || [];

            // Формируем отчёт об урезаниях
            let reportHtml = `<div style="padding: 10px 12px; margin-top: 8px; background: #fff3e0; border: 1px solid #ffcc80; border-radius: 8px; font-size: 12px;">
              <div style="font-weight: 700; color: #e65100; margin-bottom: 6px;">⚠ Склады урезали количество: снято ${reconcileData.removed_total} шт.</div>`;
            for (const cr of clusters) {
              const items = (cr.items || []).filter(i => i.removed_quantity > 0);
              if (!items.length) continue;
              reportHtml += `<div style="margin-top: 4px;"><b>${fmt(cr.cluster_name)}</b>:</div>`;
              for (const item of items) {
                const reasons = [...(item.restriction_reasons || []), ...(item.rejected_reasons || [])].join("; ");
                reportHtml += `<div style="padding-left: 12px;">SKU ${fmt(item.sku)}: ${item.requested_quantity} → ${item.accepted_quantity} шт (снято ${item.removed_quantity})${reasons ? ' — ' + fmt(reasons) : ''}</div>`;
              }
            }
            reportHtml += `</div>`;

            // Обновляем паллетизацию
            const adjustedClusters = [];
            for (const cr of clusters) {
              const items = cr.items || [];
              if (!items.some(i => i.removed_quantity > 0)) continue;
              const clusterName = String(cr.cluster_name || cr.matched_name || "").trim();
              if (!clusterName) continue;
              const clusterIndex = (Array.isArray(latestPalletClusters) ? latestPalletClusters : []).findIndex(c => {
                const cn = String(c?.cluster || c?.cluster_name || "").trim();
                return normalizeWarehouseKey(cn) === normalizeWarehouseKey(clusterName);
              });
              if (clusterIndex < 0) continue;
              const cluster = latestPalletClusters[clusterIndex];
              const skuMap = collectClusterSkuQuantitiesEffective(cluster);
              let changed = false;
              for (const item of items) {
                const sku = String(item.sku || "").trim();
                const acceptedQty = toNonNegativeInt(item.accepted_quantity ?? 0, 0);
                if (!sku) continue;
                const currentQty = toNonNegativeInt(skuMap[sku] ?? 0, 0);
                if (currentQty !== acceptedQty) {
                  skuMap[sku] = acceptedQty;
                  changed = true;
                }
              }
              if (changed) {
                await repackClusterBySkuMap(clusterIndex, skuMap, { skipSupplyLimit: true });
                adjustedClusters.push(clusterName);
              }
            }

            if (adjustedClusters.length) {
              reportHtml += `<div style="padding: 8px 10px; margin-top: 6px; background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; color: #2e7d32; font-size: 12px;">Паллетизация обновлена для: ${fmt(adjustedClusters.join(", "))}</div>`;
              persistPalletizationState();
            }

            if (statusEl) statusEl.innerHTML = reportHtml;
          } else if (reconcileData.success) {
            // Нет урезаний
            if (statusEl) statusEl.innerHTML = '<span style="color:#4caf50;">✓ Сверка OK — все количества совпадают. Слоты выбраны.</span>';
          } else {
            if (statusEl) statusEl.innerHTML = `<span style="color:#a40000;">Ошибка сверки: ${fmt(reconcileData.error || "Unknown")}</span>`;
          }
        } catch (e) {
          console.error("Reconcile error:", e);
          if (statusEl) statusEl.innerHTML = `<span style="color:#a40000;">Ошибка сверки: ${fmt(String(e?.message || e))}</span>`;
        }

        // Логируем выбор слотов
        const selection = window._tsSelection;
        console.log("Timeslot selection:", selection);
      };

      return html;
    }

    async function runFilterTimeslots(draftId) {
      const shipmentDateEl = document.getElementById("shipment-date-input");
      const targetDate = shipmentDateEl ? shipmentDateEl.value : "";
      try {
        const resp = await fetch("/api/supply-plan/filter-timeslots", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ draft_id: draftId, target_date: targetDate }),
        });
        return await resp.json();
      } catch (e) {
        return { success: false, error: String(e?.message || e) };
      }
    }

    function buildMultiClusterApiResultHtml(data) {
      if (!data.success) {
        return `<div style="padding: 10px 12px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 13px;">
          Ошибка: ${fmt(data.error || JSON.stringify(data.resolve_log || []))}
        </div>`;
      }

      let html = `<div style="padding: 12px; background: #f5f0ff; border: 1px solid #d4c5f0; border-radius: 8px; font-size: 13px;">`;
      html += `<div style="font-weight: 700; color: #6f45a0; margin-bottom: 8px;">Черновик <a href="${fmt(data.draft_url || "")}" target="_blank">${data.draft_id}</a></div>`;

      // Кластеры и склады
      const s2 = data.step2_info || {};
      if (s2.status === "SUCCESS" && Array.isArray(s2.clusters)) {
        html += `<table style="width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 8px;">
          <tr style="background: #e8e0f4;"><th style="padding: 4px 8px; text-align: left;">Кластер</th><th>Score</th><th>Статус</th></tr>`;
        for (const c of s2.clusters) {
          for (const wh of (c.warehouses || [])) {
            const color = wh.available ? "#1f6f45" : "#a40000";
            html += `<tr><td style="padding: 3px 8px;">${fmt(c.cluster_name)}</td>
              <td style="text-align: center;">${wh.score != null ? Number(wh.score).toFixed(3) : "—"}</td>
              <td style="text-align: center; color: ${color};">${fmt(wh.state)}</td></tr>`;
          }
        }
        html += `</table>`;
      }

      // Таймслоты
      const s3 = data.step3_timeslots || {};
      if (s3.total_slots > 0) {
        html += `<div style="font-weight: 600; color: #6f45a0; margin: 6px 0 4px;">Таймслоты (${s3.timezone || ""}): ${s3.total_slots} слотов на ${s3.days_count} дней</div>`;
        // Группируем по дате
        const byDate = {};
        for (const slot of (s3.slots || [])) {
          const d = slot.date;
          if (!byDate[d]) byDate[d] = [];
          byDate[d].push(slot);
        }
        html += `<div style="max-height: 200px; overflow-y: auto;">`;
        html += `<table style="width: 100%; border-collapse: collapse; font-size: 11px;">`;
        for (const [dt, slots] of Object.entries(byDate)) {
          const dayName = new Date(dt + "T00:00:00").toLocaleDateString("ru-RU", { weekday: "short", day: "numeric", month: "short" });
          const times = slots.map(s => s.from.split("T")[1]?.substring(0, 5) || "").join(", ");
          html += `<tr><td style="padding: 2px 8px; font-weight: 600; white-space: nowrap;">${dayName}</td><td style="padding: 2px 8px;">${fmt(times)}</td></tr>`;
        }

    async function applyFillDraftAdjustmentsToPalletization(fillDraftData) {
      const results = Array.isArray(fillDraftData?.results) ? fillDraftData.results : [];
      const changedClusters = [];
      for (const result of results) {
        const removedItems = Array.isArray(result?.removed_items) ? result.removed_items : [];
        if (!removedItems.length) continue;
        const clusterName = String(result?.cluster_name || result?.matched_name || "").trim();
        if (!clusterName) continue;
        const clusterIndex = (Array.isArray(latestPalletClusters) ? latestPalletClusters : []).findIndex((cluster) => {
          const currentName = String(cluster?.cluster || cluster?.cluster_name || "").trim();
          return normalizeWarehouseKey(currentName) === normalizeWarehouseKey(clusterName);
        });
        if (clusterIndex < 0) continue;
        const cluster = latestPalletClusters?.[clusterIndex];
        if (!cluster) continue;
        const skuMap = collectClusterSkuQuantitiesEffective(cluster);
        let clusterChanged = false;
        removedItems.forEach((item) => {
          const sku = String(item?.sku || "").trim();
          const removedQty = toNonNegativeInt(item?.removed_quantity ?? item?.requested_quantity ?? 0, 0);
          if (!sku || removedQty <= 0) return;
          const currentQty = toNonNegativeInt(skuMap[sku] ?? 0, 0);
          const nextQty = Math.max(0, currentQty - removedQty);
          if (nextQty !== currentQty) {
            skuMap[sku] = nextQty;
            clusterChanged = true;
          }
        });
        if (!clusterChanged) continue;
        await repackClusterBySkuMap(clusterIndex, skuMap, { skipSupplyLimit: true });
        changedClusters.push(clusterName);
      }
      return changedClusters;
    }

    async function postJsonWithRetry(url, payload, options = {}) {
      const retries = Number.isFinite(Number(options.retries)) ? Math.max(0, Number(options.retries)) : 2;
      const timeoutMs = Number.isFinite(Number(options.timeoutMs)) ? Math.max(1000, Number(options.timeoutMs)) : 90000;
      const fallbackUrls = Array.isArray(options.fallbackUrls) ? options.fallbackUrls.filter(Boolean) : [];
      const urls = [url, ...fallbackUrls];
      let lastError = null;
      for (const oneUrl of urls) {
        for (let attempt = 0; attempt <= retries; attempt += 1) {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
          try {
            const response = await fetch(oneUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload || {}),
              signal: controller.signal,
            });
            clearTimeout(timeoutId);
            return response;
          } catch (error) {
            clearTimeout(timeoutId);
            lastError = error;
            if (attempt >= retries) break;
            await new Promise((resolve) => setTimeout(resolve, 500 * (attempt + 1)));
          }
        }
      }
      throw lastError || new Error("Network request failed");
    }

    function parsePossiblyPrefixedJson(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error("Пустой ответ сервера");
      try {
        return JSON.parse(trimmed);
      } catch (_) {
        const objectStart = trimmed.indexOf("{");
        const arrayStart = trimmed.indexOf("[");
        let start = -1;
        if (objectStart >= 0 && arrayStart >= 0) start = Math.min(objectStart, arrayStart);
        else if (objectStart >= 0) start = objectStart;
        else if (arrayStart >= 0) start = arrayStart;
        if (start < 0) throw new Error(trimmed.slice(0, 300));
        return JSON.parse(trimmed.slice(start));
      }
    }

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      const text = await res.text();
      let data;
      try {
        data = parsePossiblyPrefixedJson(text);
      } catch (e) {
        throw new Error(`Некорректный JSON от сервера: ${e.message}`);
      }
      if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);
      return data;
    }

    function fmtRub(v) {

    function fmtPerUnit(val, units) {
      if (!units || Math.abs(val) < 0.005) return "";

      return n.toLocaleString("ru-RU", { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + " ₽";

    function buildArticleTreeHtml(values, treeDef, revSales, netUnits, parentPath) {
      let html = "";
      for (const node of treeDef) {
        const val = Number(values[node.key] || 0);
        if (Math.abs(val) < 0.01) continue;
        const hasKids = node.children && node.children.length > 0;
        const path = parentPath + "/" + node.key;
        const isOpen = _articleTreeExpanded.has(path);
        const pctStr = revSales ? ((val / revSales) * 100).toFixed(1) + " %" : "";
        const hasNonZeroKids = hasKids && node.children.some(c => Math.abs(Number(values[c.key] || 0)) >= 0.01);
        const warnIcon = hasKids && Math.abs(val) >= 0.01 && !hasNonZeroKids ? '<span class="at-warn">⚠</span>' : "";
        html += `<div class="at-node">`;
        html += `<div class="at-row${hasKids ? " at-parent" : ""}" data-at-path="${path}">`;
        if (hasKids) {
          html += `<span class="at-chevron${isOpen ? " open" : ""}">▶</span>`;
        } else {
          html += `<span class="at-chevron"></span>`;
        }
        html += `<span class="at-name">${node.label}${warnIcon}</span>`;
        html += `<span class="at-vals"><span class="at-rub">${fmtRub(val)}</span><span class="at-unit">${fmtPerUnit(val, netUnits)}</span><span class="at-pct">${pctStr}</span></span>`;
        html += `</div>`;
        if (hasKids) {
          html += `<div class="at-children${isOpen ? "" : " collapsed"}">`;
          html += buildArticleTreeHtml(values, node.children, revSales, netUnits, path);
          html += `</div>`;
        }
        html += `</div>`;
      }

      html += `<span class="at-vals"><span class="at-rub">${fmtRub(accrued)}</span><span class="at-unit">${fmtPerUnit(accrued, netUnits)}</span><span class="at-pct">${revSales ? ((accrued / revSales) * 100).toFixed(1) + " %" : ""}</span></span></div>`;
      if (Math.abs(materialCost) >= 0.01) {
        html += `<div class="at-row"><span class="at-chevron"></span><span class="at-name" style="font-weight:700">Себестоимость</span>`;
        html += `<span class="at-vals"><span class="at-rub">${fmtRub(-materialCost)}</span><span class="at-unit">${fmtPerUnit(-materialCost, netUnits)}</span><span class="at-pct">${revSales ? ((-materialCost / revSales) * 100).toFixed(1) + " %" : ""}</span></span></div>`;
      }
      if (Math.abs(tax) >= 0.01) {
        html += `<div class="at-row"><span class="at-chevron"></span><span class="at-name" style="font-weight:700">Налог (${getAccrualTaxRate()}%)</span>`;
        html += `<span class="at-vals"><span class="at-rub">${fmtRub(-tax)}</span><span class="at-unit">${fmtPerUnit(-tax, netUnits)}</span><span class="at-pct">${revSales ? ((-tax / revSales) * 100).toFixed(1) + " %" : ""}</span></span></div>`;
      }
      html += `<div class="at-sep"></div>`;
      html += `<div class="at-row" style="font-weight:800;font-size:14px"><span class="at-chevron"></span><span class="at-name">Валовая прибыль</span>`;
      html += `<span class="at-vals"><span class="at-rub">${fmtRub(grossProfit)}</span><span class="at-unit">${fmtPerUnit(grossProfit, netUnits)}</span><span class="at-pct">${gpPct}</span></span></div>`;
      html += `</div>`;
      return html;
    }

    var _articleTreeOpenSet = new Set(); // stores offer_ids with open trees

    function renderAccrualUnitkaVisual(items, summary = {}, columns = []) {
      const rows = Array.isArray(items) ? items : [];
      const cols = Array.isArray(columns) && columns.length ? columns : [];
      const fitContentKeys = new Set(["ordered_units", "returned_units", "returns_pct"]);
      const rowsWithTags = rows.map((row) => {
        const tags = accrualDynamicTags
          .filter((tagDef) => matchAccrualTag(row, tagDef))
          .map((tagDef) => String(tagDef.name));
        return { ...row, article_tags: tags };
      });
      const accrualFilterColumns = [
        { key: "offer_id", label: "Артикул", accessor: (item) => item?.offer_id, kind: "text", values: [] },
      ];
      const filteredRows = applyReportFilters("accruals_comp_by_article", rowsWithTags, accrualFilterColumns);
      const hasReturnsTotal = cols.some((col) => String(col?.key || "") === "returns_total");
      const existingKeys = new Set(cols.map((col) => String(col?.key || "")));
      const colsByKey = new Map(cols.map((col) => [String(col?.key || ""), col]));
      const groupedChildren = new Set();
      Object.values(ACCRUAL_COLUMN_GROUPS).forEach((children) => {
        (children || []).forEach((childKey) => groupedChildren.add(String(childKey)));
      });

      const visibleCols = [];
      const emitted = new Set();
      const appendVisible = (key) => {
        const normalizedKey = String(key || "");
        if (!normalizedKey || emitted.has(normalizedKey) || !existingKeys.has(normalizedKey)) return;
        if (hasReturnsTotal && normalizedKey === "returns_revenue") return;
        const col = colsByKey.get(normalizedKey);
        if (!col) return;
        const children = Array.isArray(ACCRUAL_COLUMN_GROUPS[normalizedKey]) ? ACCRUAL_COLUMN_GROUPS[normalizedKey] : [];
        const hideParentWhenExpanded = ACCRUAL_HIDE_PARENT_WHEN_EXPANDED.has(normalizedKey);
        if (children.length && accrualColumnExpanded.has(normalizedKey)) {
          children.forEach((childKey) => appendVisible(childKey));
          if (hideParentWhenExpanded) {
            emitted.add(normalizedKey);
            return;
          }
        }
        visibleCols.push(col);
        emitted.add(normalizedKey);
      };

      cols.forEach((col) => {
        const key = String(col?.key || "");
        if (groupedChildren.has(key)) return;
        appendVisible(key);
      });

      // Inject synthetic "tax" column after material_cost
      const accrualTaxRate = getAccrualTaxRate();
      const TAX_COL = { key: "tax", label: `Налог (${accrualTaxRate}%)` };
      const taxInsertIdx = visibleCols.findIndex((c) => String(c?.key || "") === "material_cost");
      if (taxInsertIdx >= 0) {
        visibleCols.splice(taxInsertIdx + 1, 0, TAX_COL);
      } else {
        visibleCols.push(TAX_COL);
      }
      existingKeys.add("tax");

      // ABC analysis: compute class maps for selected columns and inject synthetic columns
      const abcEligibleKeys = new Set(visibleCols.map((c) => String(c?.key || "")).filter((k) => k && k !== "offer_id"));
      const abcActiveKeys = [...accrualAbcColumns].filter((k) => abcEligibleKeys.has(k));
      const abcClassByCol = new Map();
      if (abcActiveKeys.length) {
        const getNumericValue = (rawValues, key) => {
          if (key === "tax" || key === "gross_profit" || key === "gross_profit_pct_oz" || key === "gross_profit_pct_accrued") {
            const tmp = { ...rawValues };
            applyTaxRecalc(tmp);
            return Number(tmp[key] || 0);
          }
          return Number(rawValues?.[key] || 0);
        };
        abcActiveKeys.forEach((abcKey) => {
          const entries = filteredRows.map((row) => ({
            offer_id: String(row.offer_id || ""),
            val: getNumericValue(row?.values || {}, abcKey),
          })).filter((e) => e.offer_id && e.val > 0);
          const total = entries.reduce((s, e) => s + e.val, 0);
          entries.sort((a, b) => b.val - a.val);
          const classMap = new Map();
          let cum = 0;
          entries.forEach((e) => {
            cum += e.val;
            const share = total ? cum / total : 0;
            let cls = "C";
            if (share <= 0.8) cls = "A";
            else if (share <= 0.95) cls = "B";
            classMap.set(e.offer_id, cls);
          });
          abcClassByCol.set(abcKey, classMap);
        });
        const withAbc = [];
        for (const col of visibleCols) {
          withAbc.push(col);
          const key = String(col?.key || "");
          if (abcClassByCol.has(key)) {
            withAbc.push({
              key: `__abc__${key}`,
              label: `ABC (${col.label || key})`,
              isAbc: true,
              abcParent: key,
            });
          }
        }
        visibleCols.splice(0, visibleCols.length, ...withAbc);
      }

      // Column group definitions for the group header row
      const COL_GROUP_MAP = {
        ordered_units: "orders", returned_units: "orders", returns_pct: "orders",
        revenue_sales: "revenue", client_revenue: "revenue", marketplace_expenses: "mp-expenses", revenue: "revenue", returns_total: "revenue", returns_revenue: "revenue",
        ozon_fee_total: "ozon-fee", sale_commission: "ozon-fee", return_commission: "ozon-fee",
        delivery_services_total: "delivery", pickup_processing: "delivery", courier_departure: "delivery",
        dropoff_processing: "delivery", logistics: "delivery", reverse_logistics: "delivery", pickup_courier_delivery: "delivery",
        agent_services_total: "mp-expenses", partner_returns_processing: "mp-expenses", star_products: "mp-expenses",
        temporary_partner_storage: "mp-expenses", partner_dropoff_processing: "mp-expenses", partner_packaging: "mp-expenses",
        delivery_to_pickup: "mp-expenses", acquiring: "mp-expenses",
        fbo_services_total: "fbo", fbo_booking_slot_staff: "fbo", cross_docking: "fbo",
        fbo_acceptance_services: "fbo", fbo_delivery_to_warehouse: "fbo", fbo_storage_services: "fbo",
        valid_preparation: "fbo", ozon_delivery_to_pvz: "fbo", warehouse_placement: "fbo",
        piece_acceptance: "fbo", zone_sorting: "fbo", excess_processing: "fbo",
        promotion_total: "promo", ad_spend: "promo", premium_plus_subscription: "promo",
        pay_per_click: "promo", review_points: "promo", review_pin: "promo",
        seller_bonus_mailing: "promo", seller_bonus: "promo", premium_subscription: "promo",
        top_search: "promo", internet_ads: "promo",
        other_services: "mp-expenses", penalties_total: "mp-expenses", penalty_non_recommended_slot: "mp-expenses",
        other_grouped: "mp-expenses", pickup_collection_total: "mp-expenses", accelerated_reviews: "mp-expenses",
        other_services_misc: "mp-expenses", packaging_materials: "mp-expenses", operational_errors: "mp-expenses",
        temporary_sc_storage: "mp-expenses", utilization: "mp-expenses", loans_factoring: "mp-expenses",
        other_accrual_adjustments: "mp-expenses", shortage_retention: "mp-expenses",
        compensations: "comp",
        marketplace_expenses_pct: "totals", marketing_pct: "totals",
        accrued: "totals", material_cost: "totals", gross_profit: "totals",
        gross_profit_pct_oz: "totals", gross_profit_pct_accrued: "totals", tax: "totals",
      };
      const COL_GROUP_LABELS = {
        "orders": "Заказы", "revenue": "Выручка", "mp-expenses": "Расходы МП", "ozon-fee": "Вознагр. Ozon",
        "delivery": "Доставка", "partners": "Партнёры", "fbo": "FBO",
        "promo": "Реклама", "other": "Прочее", "comp": "Компенс.", "totals": "Итоги",
      };
      const COL_GROUP_CSS = {
        "orders": "cg-orders", "revenue": "cg-revenue", "mp-expenses": "cg-delivery", "ozon-fee": "cg-ozon-fee",
        "delivery": "cg-delivery", "partners": "cg-partners", "fbo": "cg-fbo",
        "promo": "cg-promo", "other": "cg-other", "comp": "cg-comp", "totals": "cg-totals",
      };

      // Map group name → expandable parent keys that belong to it
      const COL_GROUP_EXPANDABLE_KEYS = {};
      for (const [parentKey, children] of Object.entries(ACCRUAL_COLUMN_GROUPS)) {
        if (!children || !children.length) continue;
        const group = COL_GROUP_MAP[parentKey];
        if (!group) continue;
        if (!COL_GROUP_EXPANDABLE_KEYS[group]) COL_GROUP_EXPANDABLE_KEYS[group] = [];
        if (!COL_GROUP_EXPANDABLE_KEYS[group].includes(parentKey)) COL_GROUP_EXPANDABLE_KEYS[group].push(parentKey);
      }

      const colGroupOf = (col) => {
        if (col?.isAbc && col?.abcParent) return COL_GROUP_MAP[col.abcParent] || "other";
        return COL_GROUP_MAP[String(col?.key || "")] || "other";
      };

      // Build group header spans
      const groupSpans = [];
      let prevGroup = null;
      for (const col of visibleCols) {
        const group = colGroupOf(col);
        if (group === prevGroup && groupSpans.length) {
          groupSpans[groupSpans.length - 1].count++;
        } else {
          groupSpans.push({ group, count: 1 });
        }
        prevGroup = group;
      }
      const groupRowHtml = `<tr class="col-group-row"><th class="cg-orders"></th>${groupSpans.map((span) => {
        const expandKeys = COL_GROUP_EXPANDABLE_KEYS[span.group] || [];
        const hasExpand = expandKeys.length > 0 && expandKeys.some((k) => existingKeys.has(k));
        const anyExpanded = expandKeys.some((k) => accrualColumnExpanded.has(k));
        const toggleAttr = hasExpand ? ` data-col-group-toggle="${span.group}"` : "";
        const cursor = hasExpand ? ' style="cursor:pointer"' : "";
        const indicator = hasExpand ? (anyExpanded ? " −" : " +") : "";
        const perUnitBtn = span.group === "totals"
          ? `<button type="button" class="head-perunit-toggle${accrualTotalsPerUnit.enabled ? " active" : ""}" data-totals-perunit title="Показывать итоги в пересчёте на 1 ед."><span class="head-perunit-label">на 1 ед.</span><span class="head-perunit-switch"></span></button>`
          : "";
        return `<th colspan="${span.count}" class="${COL_GROUP_CSS[span.group] || "cg-other"} group-start"${toggleAttr}${cursor}><span class="head-title">${COL_GROUP_LABELS[span.group] || ""}${indicator}</span>${perUnitBtn}</th>`;
      }).join("")}</tr>`;

      // Track first column of each group for border
      const groupStartIndices = new Set();
      let prevGroupIdx = null;
      visibleCols.forEach((col, idx) => {
        const group = colGroupOf(col);
        if (group !== prevGroupIdx) {
          groupStartIndices.add(idx);
          prevGroupIdx = group;
        }
      });

      // Set of keys that are group totals (have expandable children)
      const groupTotalKeys = new Set(Object.keys(ACCRUAL_COLUMN_GROUPS).filter((k) => {
        const ch = ACCRUAL_COLUMN_GROUPS[k];
        return Array.isArray(ch) && ch.length > 0 && ch.some((c) => existingKeys.has(c));
      }));

      const colsHtml = visibleCols.map((col, idx) => {
        const key = String(col?.key || "");
        const label = String(col?.label || key);
        const groupCls = groupStartIndices.has(idx) ? " group-start" : "";
        if (col?.isAbc) {
          const sortTools = `
            <span class="head-tools">
              <button type="button" class="head-sort${accrualSortState.column === key && accrualSortState.direction === "asc" ? " active" : ""}" data-col-sort="${key}" data-sort-dir="asc">↑</button>
              <button type="button" class="head-sort${accrualSortState.column === key && accrualSortState.direction === "desc" ? " active" : ""}" data-col-sort="${key}" data-sort-dir="desc">↓</button>
            </span>
          `;
          return `<th class="head-total vertical-head${groupCls}"><span class="head-title">${label}</span>${sortTools}</th>`;
        }
        const hasChildren = groupTotalKeys.has(key);
        const cls =
          key.includes("commission") || key.includes("compens") || key.includes("returns") ? "head-comp" :
          key.includes("profit") || key.includes("accrued") ? "head-accrual" :
          (key.includes("pct") ? "head-total" : "head-revenue");
        const fitCls = fitContentKeys.has(key) ? " fit-content-col" : "";
        const totalCls = groupTotalKeys.has(key) ? " col-group-total" : "";
        const toggle = hasChildren
          ? `<button type="button" class="head-toggle" data-col-group="${key}">${accrualColumnExpanded.has(key) ? "−" : "+"}</button>`
          : "";
        const sortTools = `
          <span class="head-tools">
            <button type="button" class="head-sort${accrualSortState.column === key && accrualSortState.direction === "asc" ? " active" : ""}" data-col-sort="${key}" data-sort-dir="asc">↑</button>
            <button type="button" class="head-sort${accrualSortState.column === key && accrualSortState.direction === "desc" ? " active" : ""}" data-col-sort="${key}" data-sort-dir="desc">↓</button>
          </span>
        `;
        const taxAttr = key === "tax" ? ' data-tax-edit style="cursor:pointer"' : "";
        const colorActive = getCellColorRanges("accruals_comp_by_article", key) ? " ccr-active" : "";
        return `<th class="${cls} vertical-head${fitCls}${groupCls}${totalCls}${colorActive}"${taxAttr} data-color-report="accruals_comp_by_article" data-color-col="${key}" data-color-label="${label}">${toggle}<span class="head-title">${label}</span>${sortTools}</th>`;
      }).join("");

      const formatValueByColumn = (value, col) => {
        if (col?.format === "percent") {
          const pct = Number(value || 0) * 100;
          return `${new Intl.NumberFormat("ru-RU", { minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(pct)}%`;
        }
        return formatReportMoney(value);
      };

      function applyTaxRecalc(v) {
        v.tax = Number(v.revenue_sales || 0) * accrualTaxRate / 100;
        v.gross_profit = Number(v.accrued || 0) - Number(v.material_cost || 0) - v.tax;
        const revSales = Number(v.revenue_sales || 0);
        const accrued = Number(v.accrued || 0);
        v.gross_profit_pct_oz = revSales ? v.gross_profit / revSales : 0;
        v.gross_profit_pct_accrued = accrued ? v.gross_profit / accrued : 0;
      }
      const totalRow = { ...(summary?.total_row || {}) };
      applyTaxRecalc(totalRow);
      const TOTALS_PER_UNIT_KEYS = new Set(["accrued", "material_cost", "gross_profit", "tax"]);
      const totalNetUnits = Number(totalRow.ordered_units || 0) - Number(totalRow.returned_units || 0);
      const perUnitOn = accrualTotalsPerUnit.enabled;
      const adjustValueForPerUnit = (key, rawValue, netUnits) => {
        if (!perUnitOn || !TOTALS_PER_UNIT_KEYS.has(key)) return rawValue;
        if (!(netUnits > 0)) return 0;
        return Number(rawValue || 0) / netUnits;
      };
      const totalsTopRowHtml = `
        <tr>
          <td>Итого</td>
          ${visibleCols.map((col, idx) => {
            const key = String(col?.key || "");
            const gCls = groupStartIndices.has(idx) ? " group-start" : "";
            if (col?.isAbc) {
              return `<td class="num${gCls}"></td>`;
            }
            const rawCell = totalRow[col.key];
            const displayCell = adjustValueForPerUnit(key, rawCell, totalNetUnits);
            const rawVal = Number(rawCell || 0);
            const bgColor = cellColorForValue("accruals_comp_by_article", key, rawVal);
            const bgStyle = bgColor ? ` style="background-color:${bgColor} !important"` : "";
            return `<td class="num${fitContentKeys.has(key) ? " fit-content-col" : ""}${gCls}${groupTotalKeys.has(key) ? " col-group-total" : ""}"${bgStyle}>${formatValueByColumn(displayCell, col)}</td>`;
          }).join("")}
        </tr>
      `;

      const sortedRows = [...filteredRows].sort((a, b) => {
        const sortKey = String(accrualSortState.column || "");
        const dir = accrualSortState.direction === "asc" ? 1 : -1;
        if (!sortKey) return 0;
        if (sortKey === "offer_id") {
          const av = String(a?.offer_id || "");
          const bv = String(b?.offer_id || "");
          return av.localeCompare(bv, "ru") * dir;
        }
        const getVal = (row, key) => {
          const v = row?.values || {};
          if (key.startsWith("__abc__")) {
            const parent = key.slice("__abc__".length);
            const cmap = abcClassByCol.get(parent);
            const cls = cmap ? cmap.get(String(row?.offer_id || "")) : null;
            // A=3, B=2, C=1, none=0 → desc shows A→B→C→blanks
            return cls === "A" ? 3 : cls === "B" ? 2 : cls === "C" ? 1 : 0;
          }
          if (key === "tax") return Number(v.revenue_sales || 0) * accrualTaxRate / 100;
          if (key === "gross_profit" || key === "gross_profit_pct_oz" || key === "gross_profit_pct_accrued") {
            const tmp = { ...v };
            applyTaxRecalc(tmp);
            return tmp[key];
          }
          return Number(v[key] || 0);
        };
        const av = getVal(a, sortKey);
        const bv = getVal(b, sortKey);
        return (av - bv) * dir;
      });

      const rowsHtml = sortedRows.map((row) => {
        const values = { ...(row?.values || {}) };
        applyTaxRecalc(values);
        const rowNetUnits = Number(values.ordered_units || 0) - Number(values.returned_units || 0);
        const offerId = String(row.offer_id || "");
        const isTreeOpen = _articleTreeOpenSet.has(offerId);
        let trHtml = `
          <tr>
            <td><span class="at-article-link" data-at-offer="${offerId.replace(/"/g, "&quot;")}">${fmt(offerId)}</span></td>
            ${visibleCols.map((col, idx) => {
              const key = String(col?.key || "");
              const gCls = groupStartIndices.has(idx) ? " group-start" : "";
              if (col?.isAbc) {
                const cmap = abcClassByCol.get(col.abcParent);
                const cls = cmap ? cmap.get(offerId) : null;
                const badge = cls ? `<span class="abc-badge abc-${cls}">${cls}</span>` : `<span style="color:#aaa">—</span>`;
                return `<td class="num${gCls}">${badge}</td>`;
              }
              const rawValue = Number(values?.[key] || 0);
              const isReturnsCell = key === "returned_units" || key === "returns_total";
              const canDrill = isReturnsCell && Math.abs(rawValue) > 1e-9 && offerId.trim() !== "";
              const displayCell = adjustValueForPerUnit(key, values[col.key], rowNetUnits);
              const formatted = formatValueByColumn(displayCell, col);
              const tCls = groupTotalKeys.has(key) ? " col-group-total" : "";
              const rawVal = Number(values[key] || 0);
              const bgColor = cellColorForValue("accruals_comp_by_article", key, rawVal);
              const bgStyle = bgColor ? ` style="background-color:${bgColor} !important"` : "";
              if (canDrill) {
                return `<td class="num${fitContentKeys.has(key) ? " fit-content-col" : ""}${gCls}${tCls}"${bgStyle}><button type="button" class="returns-drill-link" data-returns-drill="${offerId.replace(/"/g, "&quot;")}">${formatted}</button></td>`;
              }
              return `<td class="num${fitContentKeys.has(key) ? " fit-content-col" : ""}${gCls}${tCls}"${bgStyle}>${formatted}</td>`;
            }).join("")}
          </tr>`;
        if (isTreeOpen) {
          const colSpan = visibleCols.length + 1;
          trHtml += `<tr class="article-tree-row"><td colspan="${colSpan}">${renderArticleTree(values, String(summary?.mode || "cash"))}</td></tr>`;
        }
        return trHtml;
      }).join("");

      const articleFilterMeta = getColumnFilterMeta("accruals_comp_by_article", accrualFilterColumns[0]);
      const accrualTagState = reportFilterState["accruals_comp_by_article"] || { sort: null, filters: {}, tags: [] };
      const activeTagSet = new Set(Array.isArray(accrualTagState.tags) ? accrualTagState.tags : []);
      const availableTagNames = accrualDynamicTags.map((t) => String(t.name));
      if (Array.isArray(accrualTagState.tags)) {
        const cleaned = accrualTagState.tags.filter((tag) => availableTagNames.includes(String(tag)));
        if (cleaned.length !== accrualTagState.tags.length) {
          accrualTagState.tags = cleaned;
          reportFilterState["accruals_comp_by_article"] = accrualTagState;
          persistReportFilterState();
        }
      }
      const tagBarHtml = renderDynamicTagBar("accruals_comp_by_article");

      // Build ABC dropdown options from currently-visible numeric columns of the report
      const abcCandidateCols = [];
      const abcSeen = new Set();
      visibleCols.forEach((col) => {
        if (col?.isAbc) return;
        const k = String(col?.key || "");
        if (!k || k === "offer_id" || abcSeen.has(k)) return;
        abcSeen.add(k);
        abcCandidateCols.push({ key: k, label: String(col?.label || k) });
      });
      const abcSelectedCount = [...accrualAbcColumns].filter((k) => abcSeen.has(k)).length;
      const abcBtnLabel = abcSelectedCount ? `ABC-анализ (${abcSelectedCount})` : "ABC-анализ";
      const abcMenuHtml = accrualAbcMenuState.open
        ? `<div class="accrual-abc-menu" data-abc-menu>
            ${abcCandidateCols.map((c) => `
              <label><input type="checkbox" data-abc-toggle value="${c.key}"${accrualAbcColumns.has(c.key) ? " checked" : ""}><span>${c.label}</span></label>
            `).join("")}
            <div class="abc-menu-footer">
              <button type="button" data-abc-clear>Сбросить</button>
              <button type="button" data-abc-close>Закрыть</button>
            </div>
          </div>`
        : "";

      accrualVisualWrap.innerHTML = `
        <section class="accrual-screen">
          <div class="accrual-action-toolbar">
            <div class="accrual-abc-dropdown">
              <button type="button" class="accrual-abc-btn${abcSelectedCount ? " active" : ""}" data-abc-btn title="Добавить колонки ABC-анализа (классы A/B/C по кумулятивной доле 80/15/5%)">📊 ${abcBtnLabel}</button>
              ${abcMenuHtml}

      function exportAccrualsXlsx() {
        if (typeof XLSX === "undefined") {
          alert("Библиотека XLSX не загрузилась. Проверьте интернет-соединение.");
          return;
        }
        const UNIT_KEYS = new Set(["ordered_units", "returned_units"]);
        const headers = ["Артикул", ...visibleCols.map((c) => String(c?.label || c?.key || ""))];
        const cellNumber = (col, rawCell, netUnits) => {
          const key = String(col?.key || "");
          const display = adjustValueForPerUnit(key, rawCell, netUnits);
          const num = Number(display || 0);
          if (col?.format === "percent") return Math.round(num * 1000) / 10; // percent with 1 decimal
          if (UNIT_KEYS.has(key)) return Math.round(num);
          return Math.round(num);
        };
        const abcCellValue = (col, offerId) => {
          const cmap = abcClassByCol.get(col?.abcParent);
          return cmap ? (cmap.get(String(offerId || "")) || "") : "";
        };
        const totalRowData = ["Итого", ...visibleCols.map((col) => col?.isAbc ? "" : cellNumber(col, totalRow[col.key], totalNetUnits))];
        const dataRows = sortedRows.map((row) => {
          const values = { ...(row?.values || {}) };
          applyTaxRecalc(values);
          const rowNet = Number(values.ordered_units || 0) - Number(values.returned_units || 0);
          const offerId = String(row.offer_id || "");
          return [offerId, ...visibleCols.map((col) => col?.isAbc ? abcCellValue(col, offerId) : cellNumber(col, values[col.key], rowNet))];
        });
        const aoa = [headers, totalRowData, ...dataRows];
        const ws = XLSX.utils.aoa_to_sheet(aoa);
        // Column widths
        ws["!cols"] = [{ wch: 22 }, ...visibleCols.map(() => ({ wch: 12 }))];
        // Cell number formats: integers with thousand separator, pct with 1 decimal + %
        const INT_FMT = '#\u00a0##0;-#\u00a0##0;0';
        const PCT_FMT = '0.0"%"';
        const totalRows = aoa.length;
        for (let r = 1; r < totalRows; r++) {
          for (let c = 1; c <= visibleCols.length; c++) {
            const addr = XLSX.utils.encode_cell({ r, c });
            const cell = ws[addr];
            if (!cell || typeof cell.v !== "number") continue;
            cell.t = "n";
            cell.z = visibleCols[c - 1]?.format === "percent" ? PCT_FMT : INT_FMT;
          }
        }
        ws["!rows"] = [{ hpt: 32 }, { hpt: 18 }];
        const wb = XLSX.utils.book_new();
        wb.Workbook = { Views: [{ RTL: false }] };
        XLSX.utils.book_append_sheet(wb, ws, "Начисления");
        // Freeze header row + first column (SheetJS encodes via sheet Views)
        ws["!views"] = [{ state: "frozen", xSplit: 1, ySplit: 2, topLeftCell: "B3", activePane: "bottomRight" }];
        const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
        const suffix = accrualTotalsPerUnit.enabled ? "_per_unit" : "";
        XLSX.writeFile(wb, `accruals_by_article_${ts}${suffix}.xlsx`);
      }

    function highlightMinMax() {
      const table = document.querySelector('.accrual-unitka-table');
      if (!table) return;
      table.querySelectorAll('.cell-max-highlight, .cell-min-highlight')
        .forEach(c => c.classList.remove('cell-max-highlight', 'cell-min-highlight'));
      const rows = table.querySelectorAll('tbody tr:not(.article-tree-row)');
      if (rows.length < 2) return;
      const dataRows = Array.from(rows).slice(1);
      const numCols = (rows[0] || dataRows[0]).querySelectorAll('td').length;
      const zeroRows = new Set();
      dataRows.forEach((row, i) => {
        const cells = row.querySelectorAll('td');
        let allZero = true;
        for (let j = 1; j < cells.length; j++) {
          let v = parseFloat(cells[j].textContent.trim().replace('%','').replace(/\s/g,'').replace(',','.'));
          if (!isNaN(v) && v !== 0) { allZero = false; break; }
        }
        if (allZero) zeroRows.add(i);
      });
      for (let col = 1; col < numCols; col++) {
        let vals = [];
        dataRows.forEach((row, i) => {
          if (zeroRows.has(i)) return;
          const cell = row.querySelectorAll('td')[col];
          if (!cell) return;
          let v = parseFloat(cell.textContent.trim().replace('%','').replace(/\s/g,'').replace(',','.'));
          if (!isNaN(v)) vals.push({ v, cell });
        });
        if (vals.length < 3 || new Set(vals.map(x => x.v)).size < 3) continue;
        let max = Math.max(...vals.map(x => x.v));
        let min = Math.min(...vals.map(x => x.v));
        if (min === max) continue;
        if (vals.filter(x => x.v === max).length <= 2)
          vals.filter(x => x.v === max).forEach(x => x.cell.classList.add('cell-max-highlight'));
        if (vals.filter(x => x.v === min).length <= 2)
          vals.filter(x => x.v === min).forEach(x => x.cell.classList.add('cell-min-highlight'));
      }
    }

    function formatMetric(value, digits = 0) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "—";
      return new Intl.NumberFormat("ru-RU", { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(Number(value));
    }

    function normalizeGrade(grade) {
      const key = String(grade || "").toUpperCase();
      const map = {
        DEFICIT: "Дефицит",
        POPULAR: "Популярный",
        SURPLUS: "Излишек",
        ACTUAL: "Норма",
        NO_SALES: "Нет продаж",
        COLLECTING_DATA: "Сбор данных",
        WAITING_FOR_SUPPLY: "Ждёт поставку",
      };
      return map[key] || key || "Без оценки";
    }

    function gradeClass(grade, requestedTotal, availableTotal) {
      const key = String(grade || "").toUpperCase();
      if (requestedTotal > 0 && availableTotal === 0) return "alert";
      if (requestedTotal > 0) return "warn";
      if (key === "DEFICIT" || key === "WAITING_FOR_SUPPLY") return "warn";
      if (key === "SURPLUS") return "ok";
      return "";
    }

    function normalizeFilterValue(value) {
      if (value === null || value === undefined || value === "") return "(Пустые)";
      return String(value);
    }

    function getNestedValue(item, accessor) {
      return typeof accessor === "function" ? accessor(item) : item?.[accessor];
    }

    function applyReportFilters(reportKey, items, columns) {
      const state = reportFilterState[reportKey] || { sort: null, filters: {} };
      let result = Array.isArray(items) ? [...items] : [];

      if (Array.isArray(state.tags) && state.tags.length) {
        result = result.filter((item) => {
          const tags = Array.isArray(item?.article_tags) ? item.article_tags : [];
          return state.tags.some((tag) => tags.includes(tag));
        });
      }

      for (const column of columns) {
        const selected = state.filters?.[column.key];
        const allValues = Array.from(new Set((Array.isArray(items) ? items : []).map((item) => normalizeFilterValue(getNestedValue(item, column.accessor)))));
        column.values = allValues;
        if (selected && selected.size !== allValues.length) {
          result = result.filter((item) => selected.has(normalizeFilterValue(getNestedValue(item, column.accessor))));
        }
      }

      if (state.sort?.column) {
        const column = columns.find((c) => c.key === state.sort.column);
        if (column) {
          result.sort((a, b) => {
            const av = getNestedValue(a, column.accessor);
            const bv = getNestedValue(b, column.accessor);
            if (column.kind === "number") {
              const na = Number(av || 0);
              const nb = Number(bv || 0);
              return state.sort.direction === "asc" ? na - nb : nb - na;
            }
            const sa = normalizeFilterValue(av);
            const sb = normalizeFilterValue(bv);
            return state.sort.direction === "asc" ? sa.localeCompare(sb, "ru") : sb.localeCompare(sa, "ru");
          });
        }
      }

      return result;
    }

    // ─── ГЛОБАЛЬНЫЙ tsAnalyze: 5 методов анализа временного ряда ──────
    const _gTsMedian = (arr) => { const s = [...arr].sort((a, b) => a - b), n = s.length; return n % 2 ? s[n >> 1] : (s[(n >> 1) - 1] + s[n >> 1]) / 2; };
    const _gTsPercentile = (arr, p) => { const s = [...arr].sort((a, b) => a - b), idx = (p / 100) * (s.length - 1), lo = Math.floor(idx), hi = Math.ceil(idx); return lo === hi ? s[lo] : s[lo] + (s[hi] - s[lo]) * (idx - lo); };
    function globalTsAnalyze(data, win = 7) {
      if (!Array.isArray(data) || data.length < 3) return null;
      const n = data.length, val = data[n - 1];
      const mean = data.reduce((s, v) => s + v, 0) / n;
      const std = Math.sqrt(data.reduce((s, v) => s + (v - mean) ** 2, 0) / n);
      const median = _gTsMedian(data), absDevs = data.map((v) => Math.abs(v - median)), mad = _gTsMedian(absDevs);
      const pctRank = (data.filter((v) => v <= val).length / n) * 100;
      const zVal = std > 0 ? (val - mean) / std : 0;
      const zVerdict = Math.abs(zVal) < 1 ? "НОРМА" : (Math.abs(zVal) < 2 ? "ВНИМАНИЕ" : "ТРЕВОГА");
      const zModVal = mad > 0 ? 0.6745 * (val - median) / mad : 0;
      const zModVerdict = Math.abs(zModVal) < 2.5 ? "НОРМА" : (Math.abs(zModVal) < 3.5 ? "ВНИМАНИЕ" : "ТРЕВОГА");
      const q1 = _gTsPercentile(data, 25), q3 = _gTsPercentile(data, 75), iqr = q3 - q1;
      const iqrLower = q1 - 1.5 * iqr, iqrUpper = q3 + 1.5 * iqr;
      const iqrVerdict = (val >= iqrLower && val <= iqrUpper) ? "НОРМА" : "ТРЕВОГА";
      const w = Math.min(win, n), lastW = data.slice(-w);
      const bbMa = lastW.reduce((s, v) => s + v, 0) / w;
      const bbStd = Math.sqrt(lastW.reduce((s, v) => s + (v - bbMa) ** 2, 0) / w);
      const bbUpper = bbMa + 2 * bbStd, bbLower = bbMa - 2 * bbStd;
      const bbVerdict = (val >= bbLower && val <= bbUpper) ? "НОРМА" : "ВНИМАНИЕ";
      const w2 = Math.min(win, n), lastW2 = data.slice(-w2);
      const xMean = (w2 - 1) / 2, yMean = lastW2.reduce((s, v) => s + v, 0) / w2;
      const tNum = lastW2.reduce((s, v, i) => s + (i - xMean) * (v - yMean), 0);
      const tDen = lastW2.reduce((s, _, i) => s + (i - xMean) ** 2, 0);
      const slope = tDen > 0 ? tNum / tDen : 0;
      const slopePct = mean > 0 ? (slope / mean) * 100 : 0;
      const trendVerdict = slope > 0.3 ? "НОРМА" : (slope >= -0.5 ? "НОРМА" : "ВНИМАНИЕ");
      const verdicts = [zVerdict, zModVerdict, iqrVerdict, bbVerdict, trendVerdict];
      const normaCount = verdicts.filter((v) => v === "НОРМА").length;
      const hasAlarm = verdicts.some((v) => v === "ТРЕВОГА");
      const overall = hasAlarm ? "ТРЕВОГА" : (normaCount >= 4 ? "НОРМА" : (normaCount >= 2 ? "ВНИМАНИЕ" : "ТРЕВОГА"));
      return { val, mean, median, std, mad, pctRank, z: { value: zVal, verdict: zVerdict }, zMod: { value: zModVal, verdict: zModVerdict },
        iqr: { lower: iqrLower, upper: iqrUpper, verdict: iqrVerdict }, bollinger: { ma: bbMa, lower: bbLower, upper: bbUpper, std: bbStd, verdict: bbVerdict },
        trend: { slope, slopePct, verdict: trendVerdict }, normaCount, hasAlarm, overall };
    }
    function globalTsVerdictBadge(v) {
      const colors = { "НОРМА": "background:#dcfce7;color:#166534", "ВНИМАНИЕ": "background:#fef3c7;color:#92400e", "ТРЕВОГА": "background:#fee2e2;color:#991b1b" };

    }
    function globalTsStatsLine(data, win) {
      const a = globalTsAnalyze(data, win);
      if (!a) return "";
      const arrow = a.trend.slope > 0.3 ? "↑" : (a.trend.slope < -0.5 ? "↓↓" : (a.trend.slope < 0 ? "↓" : "→"));

        <span title="Модифиц. Z-score (робастный, на медиане)">MAD=${a.zMod.value >= 0 ? "+" : ""}${a.zMod.value.toFixed(2)}</span>
