    function renderKpiSummary(data) {
      const summary = data.kpi_summary || [];
      if (!summary.length) {
        financeKpiWrap.classList.add("hidden");
        return;
      }

      financeKpiWrap.classList.remove("hidden");
      financeKpiHead.innerHTML = "<tr><th>Показатель</th><th>Факт</th><th>Прогноз</th><th>План</th></tr>";
      financeKpiBody.innerHTML = "";

      for (const row of summary) {
        const tr = document.createElement("tr");
        let planCell = formatFinanceValue(row.plan, row.format);
        if (row.plan_editable) {
          const planValue = Number(row.plan || 0);
          const formattedValue = Number.isFinite(planValue) ? formatFinanceValue(planValue, row.format) : "0";
          planCell = `<span class="plan-text" id="revenue_plan_text" style="cursor: pointer; border-bottom: 1px dashed var(--accent);" title="Двойной клик для редактирования">${formattedValue}</span>`;
        }
        tr.innerHTML = `<td>${row.label}</td><td>${formatFinanceValue(row.fact, row.format)}</td><td>${formatFinanceValue(row.forecast, row.format)}</td><td>${planCell}</td>`;
        financeKpiBody.appendChild(tr);
      }

      const planText = document.getElementById("revenue_plan_text");
      if (planText) {
        planText.addEventListener("dblclick", async () => {
          const currentValue = (planText.textContent || "").replace(/\s/g, "").replace(",", ".");
          const td = planText.parentElement;
          
          td.innerHTML = `<input class="plan-input" id="revenue_plan_input" type="number" min="0" step="1" value="${currentValue}" style="width: 100px;" /><button class="plan-save-btn" id="save_revenue_plan_btn" type="button" style="margin-left: 5px; padding: 3px 8px; font-size: 11px;">OK</button>`;
          
          const input = document.getElementById("revenue_plan_input");
          const saveBtn = document.getElementById("save_revenue_plan_btn");
          
          input.focus();
          input.select();
          
          const doSave = async () => {
            const value = Number(input.value || 0);
            if (!Number.isFinite(value) || value < 0) {
              meta.textContent = "Ошибка: план должен быть числом >= 0";
              return;
            }
            try {
              saveBtn.disabled = true;
              await saveRevenuePlan(data.month, value);
              await loadReport();
            } catch (e) {
              meta.textContent = `Ошибка сохранения плана: ${e.message}`;
            }
          };
          
          saveBtn.addEventListener("click", doSave);
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") doSave();
            if (e.key === "Escape") loadReport();
          });
        });
      }
    }

    async function loadArticles(query = "") {
      const q = new URLSearchParams();
      if (query.trim()) q.set("query", query.trim());
      q.set("source", reportType.value === "returns" ? "returns" : (reportType.value === "sales" ? "sales" : ((reportType.value === "warehouse_stock" || reportType.value === "analytics_stocks" || reportType.value === "article_analytics" || reportType.value === "rnp_report" || reportType.value === "supply_plan" || reportType.value === "realization_v2") ? "warehouse_stock" : "all")));
      q.set("limit", "1000");
      const data = await fetchJson(`/api/articles?${q.toString()}`);
      articleList.innerHTML = "";
      for (const a of data.items || []) {
        const opt = document.createElement("option");
        opt.value = a;
        articleList.appendChild(opt);
      }
    }

    // ═════════════════════════════════════════════════════════════════
    // ЮНИТКА — юнит-экономика на 1 единицу, 2 блока side-by-side
    // ═════════════════════════════════════════════════════════════════
    const unitkaState = {
      A: unitkaEmptyBlock(),
      B: unitkaEmptyBlock(),
      clusters: null,
      shopAvg: null,
      inited: false,
      extReady: false,
    };

    // Bridge: window CustomEvent → content-script → extension background
    let __unitkaReqSeq = 0;
    function unitkaExtRequest(action, payload, timeoutMs = 30000) {
      return new Promise((resolve, reject) => {
        const requestId = `req_${++__unitkaReqSeq}_${Date.now()}`;
        const handler = (e) => {
          if (e.detail && e.detail.requestId === requestId) {
            window.removeEventListener("ozon-unitka:response", handler);
            clearTimeout(timer);
            const resp = e.detail.response || {};
            if (resp.ok) resolve(resp.data);
            else reject(new Error(resp.error || "unknown extension error"));
          }
        };
        const timer = setTimeout(() => {
          window.removeEventListener("ozon-unitka:response", handler);
          reject(new Error("Расширение не отвечает (timeout)"));
        }, timeoutMs);
        window.addEventListener("ozon-unitka:response", handler);
        window.dispatchEvent(new CustomEvent("ozon-unitka:request", {
          detail: { requestId, action, payload },
        }));
      });
    }

    async function unitkaProbeExtension() {
      try {
        await unitkaExtRequest("ping", {}, 500);
        unitkaState.extReady = true;
      } catch (e) {
        unitkaState.extReady = false;
      }
    }

    async function unitkaLoadCompetitorViaExt(b, query) {
      const s = unitkaState[b];
      s.loading = true; s.error = null; s.competitorCandidates = null;
      s.metrics = null;
      unitkaRenderBlock(b);
      try {
        const data = await unitkaExtRequest("lookup_calculator", { query });
        const items = data.items || [];
        if (!items.length) throw new Error("Ничего не найдено");
        const save = await fetch("/api/unitka/import/competitor", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ items }),
        }).then(x => x.json());
        const normalized = save.items || [];
        if (normalized.length === 1) {
          const picked = normalized[0];
          unitkaApplyCompetitor(b, picked);
        } else {
          s.competitorCandidates = normalized;
        }
      } catch (e) {
        s.error = e.message || String(e);
      } finally {
        s.loading = false; unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
      }
    }

    // Декларация по сессии: пользователь отказался открывать seller.ozon.ru — больше не спрашиваем
    let __unitkaBestsellersPromptDeclined = false;

    async function unitkaCallBestsellersWithPrompt(searchKey, period = "monthly", limit = 10) {
      const baseOpts = { period, limit, search: String(searchKey) };
      try {
        return await unitkaExtRequest("fetch_bestsellers", { options: baseOpts }, 25000);
      } catch (e) {
        const msg = (e && e.message) || "";
        if (msg === "NO_SELLER_TAB") {
          if (__unitkaBestsellersPromptDeclined) throw e;
          const ok = window.confirm("Вкладка seller.ozon.ru не открыта.\nОткрыть в фоне для подтяжки bestsellers?");
          if (!ok) {
            __unitkaBestsellersPromptDeclined = true;
            throw new Error("Открытие вкладки отменено пользователем");
          }
          return await unitkaExtRequest("fetch_bestsellers", {
            options: { ...baseOpts, autoOpen: true },
          }, 60000);
        }
        throw e;
      }
    }

    async function unitkaFetchBestsellersForSku(b, sku) {
      const s = unitkaState[b];
      // bestsellers API ищет по filter.name → числовой SKU не сматчится с названием.
      // Берём название товара (s.title) как поисковый ключ; SKU нужен только для матча в БД metrics.
      const searchKey = String(s.title || sku || "").trim();
      try {
        const data = await unitkaCallBestsellersWithPrompt(searchKey, "monthly", 50);
        const items = (data && data.items) || [];
        if (items.length) {
          await fetch("/api/unitka/import/bestsellers", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ items, period: "monthly" }),
          });
        }
      } catch (e) {
        // Не глушим молча — показываем сообщение в блоке
        s.error = `bestsellers: ${e.message || e}`;
        console.warn("bestsellers fetch failed:", e);
      }
      await unitkaFetchMetrics(b);
    }

    async function unitkaFetchMetrics(b) {
      const s = unitkaState[b];
      const params = new URLSearchParams();
      if (s.source === "competitor" && s.offerId) {
        params.set("sku", String(s.offerId));
      } else if ((s.source === "fact" || s.source === "calc") && s.offerId) {
        params.set("offer_id", String(s.offerId));
      } else {
        s.metrics = null;
        unitkaRenderBlock(b);
        return;
      }
      try {
        let r = await fetch("/api/unitka/metrics?" + params).then(x => x.json());
        // Для своего товара (fact) если bestsellers ещё не сохранён —
        // дёрнем расширение по offer_id (артикул в Ozon-отчёте) и перезапросим.
        if (s.source === "fact" && (!r || r.source !== "bestsellers")) {
          // bestsellers API ищет по filter.name (название), не по числовому SKU.
          // Приоритет: offer_id (часто содержит читаемые токены вроде "403 цинк") → title → resolved_sku.
          const searchKey = String(s.offerId || s.title || (r && r.resolved_sku) || "").trim();
          if (!searchKey) { s.metrics = r && r.source ? r : null; unitkaRenderBlock(b); return; }
          try {
            const data = await unitkaCallBestsellersWithPrompt(searchKey, "monthly", 50);
            const items = (data && data.items) || [];
            if (items.length) {
              await fetch("/api/unitka/import/bestsellers", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ items, period: "monthly" }),
              });
              r = await fetch("/api/unitka/metrics?" + params).then(x => x.json());
            }
          } catch (e) {
            s.error = `bestsellers: ${e.message || e}`;
            console.warn("bestsellers auto-fetch for fact failed:", e);
          }
        }
        s.metrics = r && r.source ? r : null;
      } catch (e) {
        s.metrics = null;
      }
      unitkaRenderBlock(b);
      if (b === "A") unitkaRenderBlock("B");
      unitkaRenderCompare();
    }

    function unitkaEmptyBlock() {
      return {
        source: "empty",
        offerId: null, title: "", sku: null,
        competitorQuery: "",
        competitorCandidates: null,
        cluster: { from: "Москва, МО и Дальние регионы", to: "Москва, МО и Дальние регионы" },
        fulfillment: "fbo",
        linkPrices: true,
        buyerToSellerRatio: 0.6,
        ratioSource: "default_40pct",
        fields: {
          priceBuyer: 0, priceSeller: 0,
          commissionAbs: 0, commissionPct: 0,
          logistics: 0, crossSurcharge: 0,
          partners: 0, fbo: 0, ads: 0,
          cost: 0, taxPct: 10,
        },
        derived: { accrued: 0, taxAbs: 0, gross: 0, grossPct: 0 },
        useShopAvg: { commissionPct: false, logistics: false, partners: false, fbo: false, ads: false },
        metrics: null,
        dims: { length: 0, width: 0, height: 0, weightKg: 0, volumeL: 0 },
        ref: null,
        loading: false, error: null,
        quantity: 1,
      };
    }

    function unitkaRecalcDerived(b) {
      const s = unitkaState[b];
      const f = s.fields;
      const accrued = f.priceSeller - f.commissionAbs - f.logistics - (f.crossSurcharge||0) - f.partners - f.fbo - f.ads;
      const taxAbs = f.priceSeller * (f.taxPct / 100);
      const gross = accrued - f.cost - taxAbs;
      const grossPct = f.priceSeller ? (gross / f.priceSeller * 100) : 0;
      s.derived = { accrued, taxAbs, gross, grossPct };
    }

    // ─── Общая таблица сравнения под блоками ─────────────────────
    // Колонки: каждая метрика; строки: A и B. Подсветка: better/worse.
    function unitkaRenderCompare() {
      const wrap = document.getElementById("unitka_compare_wrap");
      if (!wrap) return;
      const sA = unitkaState.A, sB = unitkaState.B;
      const showA = sA.source !== "empty" && sA.offerId;
      const showB = sB.source !== "empty" && sB.offerId;
      if (!showA && !showB) { wrap.innerHTML = ""; return; }

      // Описание колонок: [key, label, formatter, higherIsBetter]
      const columns = [
        ["sold_units",          "Заказано, шт",                v => unitkaFmt(v,0),                  true],
        ["sold_sum",            "На сумму, ₽",                 v => unitkaFmt(v,0),                  true],
        ["dynamic_pct",         "Динамика",                    v => (v>0?"+":"")+unitkaFmt(v,1)+"%", true],
        ["daily_sales",         "Среднесут. продажи",          v => unitkaFmt(v,1),                  true],
        ["avg_price",           "Средняя цена",                v => unitkaFmt(v,0)+" ₽",             null],
        ["min_price",           "Мин. цена",                   v => unitkaFmt(v,0)+" ₽",             null],
        ["discount",            "Скидка от цены, %",           v => unitkaFmt(v,1)+"%",              null],
        ["buyout_rate",         "Выкуп",                       v => (v*100).toFixed(0)+"%",          true],
        ["lost_sales",          "Упущено, ₽",                  v => unitkaFmt(v,0),                  false],
        ["days_without_stock",  "Дней без остатка",            v => unitkaFmt(v,0),                  false],
        ["stock",               "Остаток на конец периода",    v => unitkaFmt(v,0),                  true],
        ["views",               "Показы всего",                v => unitkaFmt(v,0),                  true],
        ["session_count_search","Показы в поиске/каталоге",    v => unitkaFmt(v,0),                  true],
        ["qty_view_pdp",        "Посещения карточки",          v => unitkaFmt(v,0),                  true],
        ["session_count",       "Сессий (PDP)",                v => unitkaFmt(v,0),                  true],
        ["conv_view_to_order",  "Конв. показ→заказ",           v => (v*100).toFixed(2)+"%",          true],
        ["conv_to_cart_search", "Конв. поиск→корзина",         v => (v*100).toFixed(2)+"%",          true],
        ["conv_to_cart",        "Конв. в корзину (общая)",     v => (v*100).toFixed(2)+"%",          true],
        ["conv_to_cart_pdp",    "В корзину из карточки",       v => unitkaFmt(v,2)+"%",              true],
        ["search_position",     "Позиция в поиске",            v => unitkaFmt(v,0),                  false],
        ["promo_revenue_share", "Доля оборота в акциях, %",    v => unitkaFmt(v,1)+"%",              null],
        ["days_in_promo",       "Дней в акциях",               v => unitkaFmt(v,0),                  null],
        ["days_with_trafarets", "Дней с продвижением",         v => unitkaFmt(v,0),                  null],
        ["drr",                 "Общая ДРР, %",                v => unitkaFmt(v,2)+"%",              false],
        ["avg_delivery_days",   "Средняя доставка, дн",        v => unitkaFmt(v,1),                  false],
        ["volume_l",            "Объём, л",                    v => unitkaFmt(v,2),                  null],
      ];

      function m(s, key) {
        if (!s.metrics) return null;
        const v = s.metrics[key];
        return (v === null || v === undefined) ? null : v;
      }

      // Заголовок с SKU и источником
      function labelFor(s) {
        if (!s.offerId) return "—";
        const src = s.metrics ? s.metrics.source : "нет";
        const srcLabel = src === "bestsellers" ? "bestsellers" : src === "fact_orders" ? "fact" : "нет данных";
        const title = s.title ? s.title.slice(0, 35) : "";
        return `<div><b>${s.offerId}</b><div style="font-weight:normal;color:#94a3b8;font-size:10px;">${title} · ${srcLabel}</div></div>`;
      }

      // Построчно: A / B; колонки — метрики
      // Для подсветки сравниваем попарно
      const rows = [
        { label: labelFor(sA), block: "A", state: sA },
        { label: labelFor(sB), block: "B", state: sB },
      ];

      // Определяем best/worst per column
      const cellClass = (key, val, otherVal, higherBetter) => {
        if (higherBetter === null || val === null || otherVal === null) return "";
        if (val === otherVal) return "";
        const isBetter = higherBetter ? val > otherVal : val < otherVal;
        return isBetter ? "cmp-better" : "cmp-worse";
      };

      // Вертикально: строки = метрики, колонки = SKU A / SKU B.
      // Столбцы 50% / 25% / 25% — разделитель A|B по центру совпадает с разделителем карточек.
      const th = `<tr><th class="first">Параметр</th><th class="col-a">${rows[0].label}</th><th class="col-b">${rows[1].label}</th></tr>`;

      const trs = columns.map(c => {
        const [key, label, fmt, higher] = c;
        const vA = m(sA, key);
        const vB = m(sB, key);
        const cell = (v, ov, side) => {
          if (v === null) return `<td class="col-${side}" style="color:#cbd5e1;">—</td>`;
          const cls = cellClass(key, v, ov, higher);
          return `<td class="col-${side} ${cls}">${fmt(v)}</td>`;
        };
        return `<tr><td class="first">${label}</td>${cell(vA, vB, "a")}${cell(vB, vA, "b")}</tr>`;
      }).join("");

      wrap.innerHTML = `
        <div class="cmp-title">Сравнение показателей <small>(30д · данные из Ozon Аналитика / fact_orders)</small></div>
        <div style="overflow-x:auto;"><table>
          <thead>${th}</thead>
          <tbody>${trs}</tbody>
        </table></div>
      `;
    }

    function unitkaMetricsHtml(s) {
      if (s.source === "empty" || s.source === "calc") return "";
      const m = s.metrics;
      if (!m || !m.source) return `
        <div class="unitka-metrics"><div class="unitka-metrics-title">Показатели 30д</div>
          <div class="unitka-metrics-empty">нет данных (для конкурента — нужен bestsellers)</div>
        </div>`;
      const rows = [
        ["Заказано, шт", m.sold_units, (v)=>unitkaFmt(v,0)],
        ["На сумму, ₽", m.sold_sum, (v)=>unitkaFmt(v,0)],
        ["Средняя цена", m.avg_price, (v)=>unitkaFmt(v,0)+" ₽"],
        ["Мин. цена", m.min_price, (v)=>unitkaFmt(v,0)+" ₽"],
        ["Среднесут. продажи", m.daily_sales, (v)=>unitkaFmt(v,1)],
        ["Выкуп %", m.buyout_rate, (v)=>(v*100).toFixed(0)+"%"],
        ["Конв. в корзину", m.conv_to_cart, (v)=>(v*100).toFixed(1)+"%"],
        ["Сессий", m.session_count, (v)=>unitkaFmt(v,0)],
        ["Позиция в поиске", m.search_position, (v)=>unitkaFmt(v,0)],
        ["Дней без остатка", m.days_without_stock, (v)=>unitkaFmt(v,0)],
        ["Упущено, ₽", m.lost_sales, (v)=>unitkaFmt(v,0)],
        ["Динамика", m.dynamic_pct, (v)=>(v>0?"+":"")+unitkaFmt(v,1)+"%"],
      ].filter(r => r[1] !== null && r[1] !== undefined);
      const srcLabel = m.source === "bestsellers" ? "bestsellers (28д)" : "fact_orders (30д)";
      return `
        <div class="unitka-metrics">
          <div class="unitka-metrics-title">Показатели · <span style="color:#94a3b8;font-weight:normal;">${srcLabel}</span></div>
          <table class="unitka-metrics-table">
            ${rows.map(([k,v,fmt]) => `
              <tr><td>${k}</td><td>${fmt(v)}</td></tr>
            `).join("")}
          </table>
        </div>`;
    }

    function unitkaFmt(v, frac=0) {
      if (v === null || v === undefined || isNaN(v)) return "0";
      const n = Number(v);
      return new Intl.NumberFormat("ru-RU", { minimumFractionDigits: 0, maximumFractionDigits: frac, useGrouping: true }).format(n);
    }

    async function unitkaFetchClusters() {
      if (unitkaState.clusters) return unitkaState.clusters;
      try {
        const r = await fetch("/api/unitka/clusters").then(x => x.json());
        unitkaState.clusters = r.clusters || [];
      } catch (e) { unitkaState.clusters = []; }
      return unitkaState.clusters;
    }

    async function unitkaFetchShopAvg() {
      try {
        const r = await fetch("/api/unitka/shop-averages?days=30").then(x => x.json());
        if (!r.error) unitkaState.shopAvg = r;
      } catch (e) { /* ignore */ }
      return unitkaState.shopAvg;
    }

    async function initUnitka() {
      if (!unitkaState.inited) {
        await Promise.all([unitkaFetchClusters(), unitkaFetchShopAvg(), unitkaProbeExtension()]);
        unitkaState.inited = true;
      } else {
        // На повторном открытии — перепробовать расширение (могло быть установлено/удалено)
        await unitkaProbeExtension();
      }
      unitkaRecalcDerived("A"); unitkaRecalcDerived("B");
      unitkaRenderBlock("A");
      unitkaRenderBlock("B");
      unitkaRenderCompare();
    }

    function unitkaRenderBlock(b) {
      const s = unitkaState[b];
      const el = document.querySelector(`.unitka-block[data-block="${b}"]`);
      if (!el) return;
      // Множитель «Кол-во»: все абсолютные значения отображаются × quantity.
      // Внутреннее хранилище (s.fields/s.derived) остаётся «на 1 ед».
      // Ввод в любое поле делится на quantity перед сохранением (см. unitkaOnFieldChange).
      const q = s.quantity || 1;
      const SCALE_SKIP = new Set(["commissionPct", "taxPct"]);
      const f = {};
      for (const k in s.fields) {
        const v = s.fields[k];
        f[k] = (typeof v === "number" && !SCALE_SKIP.has(k)) ? v * q : v;
      }
      const d = {
        accrued: (s.derived.accrued || 0) * q,
        taxAbs: (s.derived.taxAbs || 0) * q,
        gross: (s.derived.gross || 0) * q,
        grossPct: s.derived.grossPct || 0,  // % не скалируется
      };

      const srcClass = "src-" + s.source;
      const clusters = unitkaState.clusters || [];
      const cluFromOpts = clusters.map(c => `<option value="${c}" ${c===s.cluster.from?"selected":""}>${c}</option>`).join("");
      const cluToOpts = clusters.map(c => `<option value="${c}" ${c===s.cluster.to?"selected":""}>${c}</option>`).join("");

      const isFact = s.source === "fact";
      const isCompetitor = s.source === "competitor";
      const needArticle = s.source === "fact" || s.source === "calc";

      // Delta (only for block B when block A is not empty)
      const other = b === "B" ? unitkaState.A : null;
      const otherReady = other && other.source !== "empty";
      function deltaHtml(myVal, otherVal) {
        if (!otherReady) return "";
        const diff = myVal - otherVal;
        if (Math.abs(diff) < 0.5) return "";
        const cls = diff > 0 ? "pos" : "neg";
        const sign = diff > 0 ? "+" : "";
        return `<span class="unitka-delta ${cls}">${sign}${unitkaFmt(diff, 0)}</span>`;
      }

      const shopAvg = unitkaState.shopAvg;
      function avgBadge(fieldKey) {
        if (!shopAvg) return "";
        const pctMap = {
          logistics: shopAvg.avg_logistics_pct, partners: shopAvg.avg_partners_pct,
          fbo: shopAvg.avg_fbo_pct, ads: shopAvg.avg_ads_pct,
        };
        const pct = pctMap[fieldKey];
        if (pct === undefined) return "";
        const checked = s.useShopAvg[fieldKey] ? "checked" : "";
        return `<label title="Ставка магазина: ${pct.toFixed(1)}% от цены" style="display:inline-flex;align-items:center;gap:2px;margin-right:2px;cursor:pointer;">
          <input type="checkbox" ${checked} data-unitka-avgtoggle="${b}:${fieldKey}" style="margin:0;">
          <span style="font-size:9.5px;color:#94a3b8;">ø</span></label>`;
      }

      function row(rowClass, label, fieldKey, opts={}) {
        const val = f[fieldKey] || 0;
        const pctShow = opts.pct !== false && fieldKey !== "priceBuyer" && fieldKey !== "priceSeller" && fieldKey !== "cost";
        const pct = f.priceSeller ? (val / f.priceSeller * 100) : 0;
        // % редактируемы в любом непустом режиме (Факт/Расчёт/Конкурент):
        // ввод пересчитывает абсолют = priceSeller * pct / 100.
        let pctStr = `<td class="pct"></td>`;
        if (pctShow) {
          if (s.source === "empty") {
            pctStr = `<td class="pct">${unitkaFmt(pct,0)}%</td>`;
          } else {
            // value для type=number требует точку, не запятую — поэтому toFixed, а не unitkaFmt
            pctStr = `<td class="pct"><input class="input-inline pct" type="number" step="0.1" value="${Number(pct||0).toFixed(1)}"
              data-unitka-block="${b}" data-unitka-pctfield="${fieldKey}">%</td>`;
          }
        }
        const badge = avgBadge(fieldKey);
        let note = "";
        if (fieldKey === "logistics") {
          if (s.source === "calc" || s.source === "competitor") {
            note = ` <span style="font-size:10px;color:#94a3b8;" title="Расчёт логистики по прайсу Ozon (без возвратов и last-mile)">по прайсу</span>`;
          } else if (s.source === "fact") {
            note = ` <span style="font-size:10px;color:#94a3b8;" title="Фактические начисления из accruals (с возвратами, last-mile)">факт</span>`;
          }
        }
        return `<tr class="${rowClass}">
          <td class="label">${badge}${label}${note}</td>
          ${pctStr}
          <td class="val"><input class="input-inline" type="number" step="1" value="${Math.round(val)}"
              data-unitka-block="${b}" data-unitka-field="${fieldKey}"></td>
        </tr>`;
      }

      function commissionRow() {
        const checked = s.useShopAvg.commissionPct ? "checked" : "";
        const avgTip = shopAvg ? `Среднее по магазину: ${unitkaFmt(shopAvg.avg_commission_pct,1)}%` : "";
        const badge = shopAvg
          ? `<label title="${avgTip}" style="display:inline-flex;align-items:center;gap:2px;margin-right:2px;cursor:pointer;">
              <input type="checkbox" ${checked} data-unitka-avgtoggle="${b}:commissionPct" style="margin:0;">
              <span style="font-size:9.5px;color:#94a3b8;">ø</span></label>` : "";
        return `<tr>
          <td class="label">${badge}Вознаграждение Ozon</td>
          <td class="pct"><input class="input-inline pct" type="number" step="1" value="${Math.round(f.commissionPct||0)}"
              data-unitka-block="${b}" data-unitka-field="commissionPct">%</td>
          <td class="val"><input class="input-inline" type="number" step="1" value="${Math.round(f.commissionAbs||0)}"
              data-unitka-block="${b}" data-unitka-field="commissionAbs"></td>
        </tr>`;
      }

      const srcSelect = `<select class="${srcClass}" data-unitka-source="${b}">
        <option value="empty" ${s.source==="empty"?"selected":""}>—</option>
        <option value="fact" ${s.source==="fact"?"selected":""}>Факт</option>
        <option value="calc" ${s.source==="calc"?"selected":""}>Расчёт</option>
        <option value="competitor" ${s.source==="competitor"?"selected":""}>Конкурент</option>
      </select>`;

      let sourceInput = "";
      if (needArticle) {
        sourceInput = `<input class="unitka-title" type="text" placeholder="артикул…" value="${s.offerId || ''}"
                         data-unitka-offer-input="${b}">
                       <div style="position:relative;"><div class="unitka-search-dropdown" data-unitka-dropdown="${b}" style="display:none;"></div></div>`;
      } else if (isCompetitor) {
        sourceInput = `<input class="unitka-title" type="text" placeholder="URL / SKU / текст" style="flex:1;"
                         value="${s.competitorQuery}"
                         data-unitka-competitor-input="${b}">`;
      } else {
        sourceInput = `<span style="color:#94a3b8;flex:1;">выберите источник</span>`;
      }

      // Chips for cluster switching
      const chipMsk = s.cluster.from === "Москва, МО и Дальние регионы" && s.cluster.to === "Москва, МО и Дальние регионы";
      const chipMskNsk = s.cluster.from === "Москва, МО и Дальние регионы" && s.cluster.to === "Новосибирск";
      const chipsDisabled = isFact;
      const chipsHtml = `
        <span class="unitka-chip ${chipMsk?"active":""} ${chipsDisabled?"disabled":""}" data-unitka-chip="${b}:Мск↔Мск">Мск↔Мск</span>
        <span class="unitka-chip ${chipMskNsk?"active":""} ${chipsDisabled?"disabled":""}" data-unitka-chip="${b}:Мск↔Нск">Мск↔Нск</span>
      `;

      const fulfillmentHtml = isCompetitor ? `
        <span class="unitka-fulfillment">
          <button class="${s.fulfillment==='fbo'?'active':''}" data-unitka-ff="${b}:fbo">FBO</button>
          <button class="${s.fulfillment==='fbs'?'active':''}" data-unitka-ff="${b}:fbs">FBS</button>
        </span>` : `<span class="unitka-fulfillment-placeholder"></span>`;

      const candidatesHtml = s.competitorCandidates && s.competitorCandidates.length > 1 ? `
        <div class="unitka-search-dropdown" style="position:relative;display:block;margin-bottom:8px;">
          ${s.competitorCandidates.map((c, i) => `
            <div data-unitka-candidate="${b}:${i}">
              <div><b>${(c.name||"").slice(0,80)}</b> — ${unitkaFmt(c.price_buyer,0)} ₽</div>
              <div style="color:#64748b;font-size:10.5px;">SKU ${c.sku} · ${c.subtitle||""}</div>
            </div>`).join("")}
        </div>` : "";

      const historyHtml = "";

      // Slot 3 — кнопка действия (Загрузить для Конкурента / placeholder иначе)
      const actionBtnHtml = isCompetitor
        ? (unitkaState.extReady
            ? `<button data-unitka-ext-btn="${b}" style="width:100%;padding:6px;border:1px solid #10b981;background:#dcfce7;color:#166534;border-radius:6px;cursor:pointer;">Загрузить</button>`
            : `<span style="color:#b91c1c;font-size:11px;">расширение не установлено</span>`)
        : "";

      el.innerHTML = `
        <div class="unitka-top-area">
          <div class="unitka-row-slot" style="height:34px;">${srcSelect}</div>
          <div class="unitka-row-slot" style="height:34px;">${sourceInput}</div>
          <div class="unitka-row-slot" style="height:34px;">${actionBtnHtml}</div>
          <div class="unitka-row-slot" style="height:28px;">${fulfillmentHtml}</div>
          ${s.error ? `<div class="unitka-error">${s.error}</div>` : ""}
          ${s.loading ? `<div class="unitka-loading">Загрузка…</div>` : ""}
          ${candidatesHtml}
          ${historyHtml}
          <div class="unitka-tools">
            <span>${s.source === "empty" ? "" : `на ${s.quantity||1} ед. · база 30д`} ${s.title && s.source!=='empty' ? `· ${s.title.slice(0,40)}` : ""}
              ${s.source !== "empty" ? `
                <label style="margin-left:6px;color:#64748b;font-size:10.5px;">×
                  <input type="number" min="1" step="1" value="${s.quantity||1}"
                    data-unitka-quantity="${b}"
                    style="width:46px;padding:2px 4px;border:1px solid #cbd5e1;border-radius:3px;font:inherit;"> шт</label>` : ""}
            </span>
            <span class="unitka-chips">${chipsHtml}</span>
          </div>
          <label class="unitka-link-prices">
            <input type="checkbox" ${s.linkPrices?"checked":""} data-unitka-linkprices="${b}">
            🔗 Связать цены (соотношение: ${(s.buyerToSellerRatio*100).toFixed(0)}%)
          </label>
        </div>
        <table class="unitka-table">
          ${row("row-seller", "Цена продажи", "priceSeller", {pct: false})}
          <tr class="row-buyer">
            <td class="label">Цена для покупателя <span style="color:#94a3b8;font-size:10.5px;">(справка)</span></td>
            <td class="pct">${f.priceSeller && f.priceBuyer ? `−${unitkaFmt((1 - f.priceBuyer/f.priceSeller)*100, 0)}%` : ""}</td>
            <td class="val"><input class="input-inline" type="number" step="1" value="${Math.round(f.priceBuyer||0)}"
                data-unitka-block="${b}" data-unitka-field="priceBuyer"></td>
          </tr>
          ${commissionRow()}
          ${row("row-logistics", "Логистика", "logistics")}
          ${(f.crossSurcharge || 0) > 0 ? `
          <tr class="row-logistics">
            <td class="label" style="padding-left:18px;color:#92400e;">не локал продажа 8%</td>
            <td class="pct">${f.priceSeller ? unitkaFmt(f.crossSurcharge/f.priceSeller*100, 0) : 0}%</td>
            <td class="val"><input class="input-inline" type="number" step="1" value="${Math.round(f.crossSurcharge)}"
                data-unitka-block="${b}" data-unitka-field="crossSurcharge"></td>
          </tr>` : ""}
          ${row("", "Партнёры/эквайринг", "partners")}
          ${row("", "FBO обработка", "fbo")}
          ${row("", "Реклама", "ads")}
          <tr class="row-accrued">
            <td class="label">Начислено</td>
            <td class="pct">${f.priceSeller?unitkaFmt(d.accrued/f.priceSeller*100,0):"0"}%</td>
            <td class="val">${unitkaFmt(d.accrued, 0)} ${b==="B"?deltaHtml(d.accrued, other.derived.accrued):""}</td>
          </tr>
          ${row("", "Себестоимость", "cost", {pct: false})}
          <tr>
            <td class="label">Налог</td>
            <td class="pct"><input class="input-inline pct" type="number" step="1" value="${Math.round(f.taxPct)}"
                  data-unitka-block="${b}" data-unitka-field="taxPct">%</td>
            <td class="val">${unitkaFmt(d.taxAbs, 0)}</td>
          </tr>
          <tr class="row-gross">
            <td class="label">Валовая прибыль</td>
            <td class="pct"><input class="input-inline pct" type="number" step="1" value="${Math.round(d.grossPct)}"
                  data-unitka-goalseek="${b}:pct">%</td>
            <td class="val"><input class="input-inline" type="number" step="1" value="${Math.round(d.gross)}"
                  data-unitka-goalseek="${b}:abs">
              ${b==="B"?deltaHtml(d.gross, other.derived.gross):""}</td>
          </tr>
        </table>
        <div class="unitka-dims">
          <div><span class="unitka-dims-title">Габариты:</span>
            <span class="unitka-dims-value">${s.dims.length && s.dims.width && s.dims.height
              ? `${unitkaFmt(s.dims.length,1)} × ${unitkaFmt(s.dims.width,1)} × ${unitkaFmt(s.dims.height,1)} см`
              : "— × — × —"}</span></div>
          <div><span class="unitka-dims-title">Вес:</span>
            <span class="unitka-dims-value">${s.dims.weightKg ? unitkaFmt(s.dims.weightKg, 3) + ' кг' : '— кг'}</span></div>
          <div><span class="unitka-dims-title">Объём:</span>
            <span class="unitka-dims-value"><b>${s.dims.volumeL ? unitkaFmt(s.dims.volumeL, 3) + ' л' : '— л'}</b></span></div>
        </div>
      `;
    }

    function unitkaOnFieldChange(b, field, value) {
      const s = unitkaState[b];
      let v = parseFloat(value) || 0;
      // Абсолютные поля в UI отображаются × quantity — нормализуем ввод обратно к «на 1 ед».
      const q = s.quantity || 1;
      const SCALE_SKIP = new Set(["commissionPct", "taxPct"]);
      if (!SCALE_SKIP.has(field) && q > 1) v = v / q;

      // При смене priceSeller/priceBuyer: сохраняем текущие доли расходов и пересчитываем абсолюты.
      // Список полей, которые пропорциональны цене.
      const PCT_FIELDS = ["logistics", "crossSurcharge", "partners", "fbo", "ads"];

      if (field === "priceSeller" || field === "priceBuyer") {
        const oldPrice = s.fields.priceSeller || 0;
        // Сохраняем доли до изменения
        const ratios = {};
        if (oldPrice > 0) {
          for (const k of PCT_FIELDS) ratios[k] = (s.fields[k] || 0) / oldPrice;
        }
        // Применяем новое значение + связку
        s.fields[field] = v;
        if (s.linkPrices) {
          if (field === "priceSeller") {
            s.fields.priceBuyer = Math.round(v * s.buyerToSellerRatio * 100) / 100;
          } else {
            s.fields.priceSeller = s.buyerToSellerRatio > 0
              ? Math.round(v / s.buyerToSellerRatio * 100) / 100 : 0;
          }
        }
        // Пересчитываем абсолюты по сохранённым долям
        const newPrice = s.fields.priceSeller || 0;
        if (oldPrice > 0 && newPrice > 0) {
          for (const k of PCT_FIELDS) {
            s.fields[k] = Math.round(newPrice * (ratios[k] || 0) * 100) / 100;
          }
        }
        // commissionAbs — по фиксированному commissionPct
        s.fields.commissionAbs = Math.round(newPrice * (s.fields.commissionPct || 0) / 100 * 100) / 100;
      } else {
        s.fields[field] = v;
        if (field === "commissionPct") {
          s.fields.commissionAbs = Math.round(s.fields.priceSeller * v / 100 * 100) / 100;
        } else if (field === "commissionAbs" && s.fields.priceSeller) {
          s.fields.commissionPct = Math.round(v / s.fields.priceSeller * 10000) / 100;
        }
      }

      unitkaRecalcDerived(b);
      unitkaRenderBlock(b);
      if (b === "A") unitkaRenderBlock("B");
    }

    // Goal-seek по Валовой: сохраняем ВСЕ текущие % расходов относительно priceSeller
    // и пересчитываем priceSeller + все суммы-расходы снизу вверх пропорционально.
    function unitkaGoalSeek(b, kind, value) {
      const s = unitkaState[b];
      const f = s.fields;
      let targetVal = parseFloat(value) || 0;
      // Если пользователь ввёл валовую в ячейке-абсолюте, она показывалась × quantity.
      const q = s.quantity || 1;
      if (kind === "abs" && q > 1) targetVal = targetVal / q;
      const oldPrice = f.priceSeller;
      if (oldPrice <= 0) {
        s.error = "Нет цены для пересчёта";
        unitkaRenderBlock(b);
        return;
      }

      // Текущие доли (fraction = pct/100)
      const lgFr   = f.logistics    / oldPrice;
      const csFr   = (f.crossSurcharge || 0) / oldPrice;
      const ptFr   = f.partners     / oldPrice;
      const fbFr   = f.fbo          / oldPrice;
      const adFr   = f.ads          / oldPrice;
      const costFr = f.cost         / oldPrice;
      const commFr = (f.commissionPct || 0) / 100;
      const taxFr  = (f.taxPct || 0) / 100;

      const expenseSum = commFr + taxFr + lgFr + csFr + ptFr + fbFr + adFr + costFr;
      const denom = 1 - expenseSum;
      if (denom <= 0) {
        s.error = "Сумма всех % ≥ 100% — пересчёт невозможен";
        unitkaRenderBlock(b);
        return;
      }
      s.error = null;

      // Целевая Валовая в ₽: для % — это oldPrice × target%
      const targetGross = kind === "abs" ? targetVal : oldPrice * targetVal / 100;
      const newPrice = targetGross / denom;
      if (newPrice < 0) {
        s.error = "Расходы превышают выручку при любой цене";
        unitkaRenderBlock(b);
        return;
      }

      // Пересчитываем все суммы пропорционально новой цене (сохраняя %)
      f.priceSeller = Math.round(newPrice * 100) / 100;
      f.commissionAbs = Math.round(newPrice * commFr * 100) / 100;
      f.logistics = Math.round(newPrice * lgFr * 100) / 100;
      f.crossSurcharge = Math.round(newPrice * csFr * 100) / 100;
      f.partners  = Math.round(newPrice * ptFr * 100) / 100;
      f.fbo       = Math.round(newPrice * fbFr * 100) / 100;
      f.ads       = Math.round(newPrice * adFr * 100) / 100;
      f.cost      = Math.round(newPrice * costFr * 100) / 100;
      if (s.linkPrices) {
        f.priceBuyer = Math.round(f.priceSeller * s.buyerToSellerRatio * 100) / 100;
      }

      unitkaRecalcDerived(b);
      unitkaRenderBlock(b);
      if (b === "A") unitkaRenderBlock("B");
    }

    async function unitkaLoadFact(b, offerId) {
      const s = unitkaState[b];
      s.loading = true; s.error = null; unitkaRenderBlock(b);
      try {
        const r = await fetch(`/api/unitka/load-fact?offer_id=${encodeURIComponent(offerId)}&days=30`).then(x=>x.json());
        if (r.error) throw new Error(r.error);
        s.offerId = r.offer_id; s.title = r.title || r.offer_id; s.sku = r.sku;
        const base = r.base_30d || {};
        s.fields = {
          priceBuyer: base.price_buyer || 0, priceSeller: base.price_seller || 0,
          commissionAbs: base.commission_abs || 0, commissionPct: base.commission_pct || 0,
          logistics: base.logistics || 0, partners: base.partners || 0,
          fbo: base.fbo || 0, ads: base.ads || 0,
          cost: base.cost || 0, taxPct: base.tax_pct || 10,
        };
        s.buyerToSellerRatio = r.buyer_to_seller_ratio || 1.0;
        s.ratioSource = r.ratio_source || "";
        if (r.dimensions) {
          s.dims = {
            length: r.dimensions.length || 0, width: r.dimensions.width || 0,
            height: r.dimensions.height || 0,
            weightKg: r.dimensions.weight_kg || 0, volumeL: r.dimensions.volume_l || 0,
          };
        }
        // Для calc-режима логистика пересчитывается по прайсу, для fact — остаётся фактической
        if (s.source === "calc" && s.dims.volumeL > 0) {
          await unitkaRefreshLogistics(b);
        }
      } catch (e) {
        s.error = e.message || String(e);
      } finally {
        s.loading = false;
        unitkaRecalcDerived(b);
        unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
        unitkaFetchMetrics(b);
      }
    }

    async function unitkaRefreshLogistics(b) {
      const s = unitkaState[b];
      if (!s.dims.volumeL || s.dims.volumeL <= 0) return;
      try {
        const params = new URLSearchParams({
          cluster_from: s.cluster.from, cluster_to: s.cluster.to,
          volume_l: String(s.dims.volumeL), price: String(s.fields.priceSeller || 0),
        });
        const r = await fetch(`/api/unitka/logistics-tariff?${params}`).then(x=>x.json());
        if (!r.error) {
          s.fields.logistics = Math.round((r.base_tariff || 0) * 100) / 100;
          s.fields.crossSurcharge = Math.round((r.cross_cluster_surcharge || 0) * 100) / 100;
        }
      } catch (e) { /* keep previous */ }
    }

    async function unitkaLoadCompetitor(b, query) {
      const s = unitkaState[b];
      s.loading = true; s.error = null; s.competitorCandidates = null; unitkaRenderBlock(b);
      try {
        const r = await fetch("/api/unitka/competitor-lookup", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({query}),
        }).then(x=>x.json());
        if (r.error) throw new Error(r.error);
        const items = r.items || [];
        if (items.length === 0) throw new Error("Ничего не найдено");
        if (items.length === 1) {
          unitkaApplyCompetitor(b, items[0]);
        } else {
          s.competitorCandidates = items;
        }
      } catch (e) {
        s.error = e.message || String(e);
      } finally {
        s.loading = false; unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
      }
    }

    function unitkaApplyCompetitor(b, item) {
      const s = unitkaState[b];
      s.offerId = item.sku;
      s.title = item.name;
      s.competitorQuery = item.sku ? String(item.sku) : s.competitorQuery;
      s.competitorCandidates = null;
      s.buyerToSellerRatio = 0.6; s.ratioSource = "default_40pct";
      const commRate = s.fulfillment === "fbo" ? item.fbo_commission_rate : item.fbs_commission_rate;
      const priceSeller = item.price_seller_estimated || (item.price_buyer / 0.6) || 0;
      // Справочные формулы Ozon-калькулятора:
      //   Эквайринг = 1% от цены товара
      //   Обработка/last-mile: 25₽ для FBO; 25+30=55₽ для FBS (доставка до ПВЗ + обработка отправления)
      const acquiring = Math.round(priceSeller * 0.01 * 100) / 100;
      const lastMileFbo = 25;
      const shipHandleFbs = 30;
      const fboOrFbsCost = s.fulfillment === "fbo" ? lastMileFbo : (lastMileFbo + shipHandleFbs);
      s.fields = {
        priceBuyer: item.price_buyer || 0,
        priceSeller: priceSeller,
        commissionPct: Math.round((commRate || 0) * 100 * 10) / 10,
        commissionAbs: Math.round(priceSeller * (commRate||0) * 100) / 100,
        logistics: 0, crossSurcharge: 0,
        partners: acquiring,
        fbo: fboOrFbsCost,
        ads: 0, cost: 0, taxPct: 10,
      };
      if (item.dimensions) {
        s.dims = {
          length: item.dimensions.length || 0, width: item.dimensions.width || 0,
          height: item.dimensions.height || 0,
          weightKg: item.weight_kg || 0, volumeL: item.volume_l || 0,
        };
      }
      s.ref = item;
      unitkaRefreshLogistics(b).then(() => {
        unitkaRecalcDerived(b);
        unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
      });
      // Авто-подтяжка bestsellers по SKU (для любого пути выбора конкурента)
      if (item.sku) unitkaFetchBestsellersForSku(b, item.sku);
    }

    async function unitkaLoadHistory(b) {
      const s = unitkaState[b];
      s.loading = true; unitkaRenderBlock(b);
      try {
        const r = await fetch("/api/unitka/competitors/recent?limit=30").then(x=>x.json());
        s.historyItems = r.items || [];
        if (!s.historyItems.length) s.error = "История пуста — используйте расширение Chrome";
      } catch (e) {
        s.error = e.message || String(e);
      } finally {
        s.loading = false; unitkaRenderBlock(b);
      }
    }

    function unitkaApplyHistoryPick(b, item) {
      const s = unitkaState[b];
      s.historyItems = null;
      s.offerId = item.sku; s.title = item.name || item.sku;
      s.competitorQuery = item.sku ? String(item.sku) : s.competitorQuery;
      s.buyerToSellerRatio = 0.6; s.ratioSource = "default_40pct";
      const rate = s.fulfillment === "fbo"
        ? (item.fbo_commission_rate || 0)
        : (item.fbs_commission_rate || 0);
      const priceBuyer = item.price || 0;
      const priceSeller = priceBuyer > 0 ? Math.round(priceBuyer / 0.6 * 100) / 100 : 0;
      s.fields = {
        priceBuyer, priceSeller,
        commissionPct: Math.round(rate * 100 * 10) / 10,
        commissionAbs: Math.round(priceSeller * rate * 100) / 100,
        logistics: 0, crossSurcharge: 0, partners: 0, fbo: 0, ads: 0,
        cost: 0, taxPct: 10,
      };
      s.dims = {
        length: item.length_cm || 0, width: item.width_cm || 0,
        height: item.height_cm || 0,
        weightKg: item.weight_kg || 0, volumeL: item.volume_l || 0,
      };
      s.ref = {
        fbo_commission_rate: item.fbo_commission_rate,
        fbs_commission_rate: item.fbs_commission_rate,
      };
      unitkaRefreshLogistics(b).then(() => {
        unitkaRecalcDerived(b);
        unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
      });
    }

    async function unitkaOfferSearch(b, q) {
      if (!q || q.length < 1) return [];
      try {
        const r = await fetch(`/api/unitka/offer-search?q=${encodeURIComponent(q)}`).then(x=>x.json());
        return r.items || [];
      } catch (e) { return []; }
    }

    function unitkaShowOfferDropdown(b, items) {
      const el = document.querySelector(`[data-unitka-dropdown="${b}"]`);
      if (!el) return;
      if (!items || !items.length) { el.style.display = "none"; return; }
      el.innerHTML = items.map(it =>
        `<div data-unitka-offer-pick="${b}|${it.offer_id}"><b>${it.offer_id}</b>${it.sku?` <span style="color:#94a3b8;font-size:10.5px;">SKU ${it.sku}</span>`:""} — ${(it.name||"").slice(0,50)}</div>`
      ).join("");
      el.style.display = "block";
    }

    // Event delegation
    document.addEventListener("change", (e) => {
      const t = e.target;
      if (t.dataset.unitkaSource) {
        const b = t.dataset.unitkaSource;
        const newSrc = t.value;
        unitkaState[b] = unitkaEmptyBlock();
        unitkaState[b].source = newSrc;
        unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
        unitkaRenderCompare();
      } else if (t.dataset.unitkaBlock && t.dataset.unitkaField) {
        unitkaOnFieldChange(t.dataset.unitkaBlock, t.dataset.unitkaField, t.value);
      } else if (t.dataset.unitkaBlock && t.dataset.unitkaPctfield) {
        // Ввод % — пересчитываем абсолют «на 1 ед» = priceSeller_per_unit * pct / 100.
        // Напрямую в s.fields (минуя unitkaOnFieldChange, чтобы не делить на quantity).
        const b = t.dataset.unitkaBlock;
        const key = t.dataset.unitkaPctfield;
        const pct = parseFloat(t.value.replace(",", ".")) || 0;
        const s = unitkaState[b];
        s.fields[key] = Math.round((s.fields.priceSeller || 0) * pct / 100 * 100) / 100;
        unitkaRecalcDerived(b);
        unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
        unitkaRenderCompare();
      } else if (t.dataset.unitkaQuantity) {
        const b = t.dataset.unitkaQuantity;
        const q = Math.max(1, parseInt(t.value) || 1);
        unitkaState[b].quantity = q;
        unitkaRenderBlock(b);
      } else if (t.dataset.unitkaGoalseek) {
        const [b, kind] = t.dataset.unitkaGoalseek.split(":");
        unitkaGoalSeek(b, kind, t.value);
      } else if (t.dataset.unitkaLinkprices) {
        const b = t.dataset.unitkaLinkprices;
        unitkaState[b].linkPrices = t.checked;
      } else if (t.dataset.unitkaAvgtoggle) {
        const [b, field] = t.dataset.unitkaAvgtoggle.split(":");
        const s = unitkaState[b];
        const avg = unitkaState.shopAvg || {};
        s.useShopAvg[field] = t.checked;
        if (t.checked) {
          if (!s._origFields) s._origFields = {};
          s._origFields[field] = s.fields[field];
          // Применяем средний % магазина к ТЕКУЩЕЙ цене продавца:
          //   newVal = priceSeller × shopAvg.avg_<field>_pct / 100
          // Так «магазинная ставка» сохраняется в %, а ₽ подстраиваются под цену.
          const pctMap = {
            logistics: avg.avg_logistics_pct, partners: avg.avg_partners_pct,
            fbo: avg.avg_fbo_pct, ads: avg.avg_ads_pct,
            commissionPct: avg.avg_commission_pct,  // уже % — ничего не считаем
          };
          const pct = pctMap[field] || 0;
          if (field === "commissionPct") {
            s.fields.commissionPct = pct;
            s.fields.commissionAbs = Math.round(s.fields.priceSeller * pct / 100 * 100) / 100;
          } else {
            s.fields[field] = Math.round(s.fields.priceSeller * pct / 100 * 100) / 100;
          }
        } else if (s._origFields && s._origFields[field] !== undefined) {
          s.fields[field] = s._origFields[field];
          if (field === "commissionPct") {
            s.fields.commissionAbs = Math.round(s.fields.priceSeller * s.fields.commissionPct / 100 * 100) / 100;
          }
        }
        unitkaRecalcDerived(b);
        unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
      }
    });

    document.addEventListener("input", (e) => {
      const t = e.target;
      if (t.dataset.unitkaOfferInput) {
        const b = t.dataset.unitkaOfferInput;
        const q = t.value.trim();
        unitkaOfferSearch(b, q).then(items => unitkaShowOfferDropdown(b, items));
      }
    });

    document.addEventListener("click", (e) => {
      const t = e.target.closest("[data-unitka-offer-pick], [data-unitka-chip], [data-unitka-ff], [data-unitka-competitor-btn], [data-unitka-candidate], [data-unitka-history-btn], [data-unitka-history-pick], [data-unitka-ext-btn]");
      if (!t) {
        document.querySelectorAll("[data-unitka-dropdown]").forEach(el => el.style.display = "none");
        return;
      }
      if (t.dataset.unitkaOfferPick) {
        const [b, offerId] = t.dataset.unitkaOfferPick.split("|");
        document.querySelectorAll("[data-unitka-dropdown]").forEach(el => el.style.display = "none");
        const input = document.querySelector(`[data-unitka-offer-input="${b}"]`);
        if (input) input.value = offerId;
        unitkaLoadFact(b, offerId);
      } else if (t.dataset.unitkaChip) {
        const [b, chip] = t.dataset.unitkaChip.split(":");
        const s = unitkaState[b];
        if (s.source === "fact") return;
        if (chip === "Мск↔Мск") {
          s.cluster = { from: "Москва, МО и Дальние регионы", to: "Москва, МО и Дальние регионы" };
        } else if (chip === "Мск↔Нск") {
          s.cluster = { from: "Москва, МО и Дальние регионы", to: "Новосибирск" };
        }
        unitkaRefreshLogistics(b).then(() => {
          unitkaRecalcDerived(b);
          unitkaRenderBlock(b);
          if (b === "A") unitkaRenderBlock("B");
        });
      } else if (t.dataset.unitkaFf) {
        const [b, ff] = t.dataset.unitkaFf.split(":");
        const s = unitkaState[b];
        s.fulfillment = ff;
        if (s.ref) {
          const rate = ff === "fbo" ? s.ref.fbo_commission_rate : s.ref.fbs_commission_rate;
          s.fields.commissionPct = Math.round((rate || 0) * 100 * 10) / 10;
          s.fields.commissionAbs = Math.round(s.fields.priceSeller * (rate||0) * 100) / 100;
        }
        // Last-mile / обработка отправления: FBO=25, FBS=25+30=55
        s.fields.fbo = ff === "fbo" ? 25 : 55;
        // Эквайринг 1% — не зависит от схемы, но пересчитаем при возможной смене цены
        s.fields.partners = Math.round(s.fields.priceSeller * 0.01 * 100) / 100;
        unitkaRecalcDerived(b);
        unitkaRenderBlock(b);
        if (b === "A") unitkaRenderBlock("B");
      } else if (t.dataset.unitkaCompetitorBtn) {
        const b = t.dataset.unitkaCompetitorBtn;
        const input = document.querySelector(`[data-unitka-competitor-input="${b}"]`);
        const q = input ? input.value.trim() : "";
        if (q) unitkaLoadCompetitor(b, q);
      } else if (t.dataset.unitkaCandidate) {
        const [b, idx] = t.dataset.unitkaCandidate.split(":");
        const s = unitkaState[b];
        const item = s.competitorCandidates && s.competitorCandidates[Number(idx)];
        if (item) unitkaApplyCompetitor(b, item);
      } else if (t.dataset.unitkaExtBtn) {
        const b = t.dataset.unitkaExtBtn;
        const input = document.querySelector(`[data-unitka-competitor-input="${b}"]`);
        const q = input ? input.value.trim() : "";
        if (q) {
          unitkaState[b].competitorQuery = q;
          unitkaLoadCompetitorViaExt(b, q);
        }
      } else if (t.dataset.unitkaHistoryBtn) {
        unitkaLoadHistory(t.dataset.unitkaHistoryBtn);
      } else if (t.dataset.unitkaHistoryPick) {
        const [b, idx] = t.dataset.unitkaHistoryPick.split(":");
        const s = unitkaState[b];
        const item = s.historyItems && s.historyItems[Number(idx)];
        if (item) unitkaApplyHistoryPick(b, item);
      }
    });

    async function loadReport() {
      meta.textContent = "Loading...";
      const genericTagBar = document.getElementById("generic_tagbar");
      if (genericTagBar) genericTagBar.innerHTML = "";
      try {
        const report = reportType.value;
        if (report === "unitka") {
          await initUnitka();
          meta.textContent = "Юнитка: 2 блока · данные не сохраняются";
          return;
        }
        reportTable.classList.toggle("accrual-report", report === "accruals_comp_by_article");
        reportTable.classList.toggle("returns-report", report === "returns");
        genericWrap.classList.toggle("returns-centered", report === "returns");
        const q = new URLSearchParams();
        if (report === "finance_report" || report === "finance_report_v2" || report === "finance_report_accrual") {
          q.set("month", reportMonth.value || `${y}-${pad(now.getMonth() + 1)}`);
        } else if (report === "returns_analytics") {
          // Default last 30 days; user can set dates via filters
          if (dateFrom.value) q.set("date_from", dateFrom.value);
          if (dateTo.value) q.set("date_to", dateTo.value);
        } else if (report === "actions") {
          // Параметры из state (mode/days_back) и налог из localStorage начислений
          const st = window.actionsReportState || { mode: 'current', days_back: 30 };
          q.set('mode', st.mode);
          q.set('days_back', String(st.days_back));
          let taxRate = 0;
          try {
            const stored = localStorage.getItem('ozon-dashboard-accrual-tax-rate-v1');
            if (stored !== null && stored !== '') taxRate = parseFloat(stored) || 0;
          } catch (e) {}
          q.set('tax_rate', String(taxRate));
        } else {
          const cols = COLUMNS[report] || COLUMNS.sales;
          renderHeader(cols);
          if (report !== "article_characteristics") {
            if (dateFrom.value) q.set("date_from", dateFrom.value);
            if (dateTo.value) q.set("date_to", dateTo.value);
          }
        }
        // Supply plan has its own local filter UI; applying the global Offer ID
        // field here too makes the report look like it contains only one article.
        if ((report === "sales" || report === "returns" || report === "warehouse_stock" || report === "analytics_stocks" || report === "article_analytics" || report === "rnp_report" || report === "realization_v2" || report === "accruals_comp_by_article" || report === "stock_balances" || report === "advertising_report") && offerId.value.trim()) q.set("offer_id", offerId.value.trim());
        if ((report === "sales" || report === "returns") && schema.value) q.set("schema", schema.value);
        if (report !== "finance_report" && report !== "finance_report_v2" && limit.value) q.set("limit", limit.value);
        if (report === "accruals_comp_by_article") q.set("distribute_no_article", allocateNoArticle.checked ? "1" : "0");
        if (report === "advertising_report" && !offerId.value.trim()) {
          // Без offer_id — загружаем сводную таблицу + начисления для расчёта прибыли
          const summaryQ = new URLSearchParams();
          if (dateFrom.value) summaryQ.set("date_from", dateFrom.value);
          if (dateTo.value) summaryQ.set("date_to", dateTo.value);
          const accQ = new URLSearchParams({distribute_no_article: "1", limit: "5000"});
          if (dateFrom.value) accQ.set("date_from", dateFrom.value);
          if (dateTo.value) accQ.set("date_to", dateTo.value);
          const [summaryData, accData] = await Promise.all([
            fetchJson(`/api/advertising-summary?${summaryQ.toString()}`),
            fetchJson(`/api/accruals-comp-by-article?${accQ.toString()}`).catch(() => ({items: []})),
          ]);
          // Индекс начислений по offer_id
          const accIndex = {};
          for (const item of (accData.items || [])) {
            const key = (item.offer_id_normalized || item.offer_id || "").toLowerCase().trim();
            if (key) accIndex[key] = item.values || {};
          }
          summaryData._accruals = accIndex;
          renderAdvertisingSummary(summaryData);
          meta.textContent = `Реклама: сводка по ${(summaryData.items || []).length} артикулам · ${summaryData.num_days || 30} дней`;
          return;
        }
        if (report === "article_characteristics" && isKgtFilter.value !== "") q.set("is_kgt", isKgtFilter.value);

        let effectiveReport = report;
        if (report === "finance_report" && window.financeReportMode === "accrual") {
          effectiveReport = "finance_report_accrual";
        }
        if (report === "accruals_comp_by_article" && window.financeReportMode === "accrual") {
          effectiveReport = "accruals_comp_by_article_accrual";
        }
        const endpoint = ENDPOINTS[effectiveReport] || ENDPOINTS.sales;
        const data = await fetchJson(`${endpoint}?${q.toString()}`);

        if (report === "finance_report" || report === "finance_report_v2" || report === "finance_report_accrual") {
          renderFinanceReport(data);
          renderKpiSummary(data);
          renderFinanceSettlementBadge(data);
          renderFinanceKpiTiles(data);
          meta.textContent = `Loaded finance report for ${data.month}`;
        } else if (report === "returns_analytics") {
          renderReturnsAnalytics(data);
          meta.textContent = `Возвраты и отмены · ${data.count || 0} событий · ${(data.repeat_clients||[]).length} повторных клиентов`;
        } else if (report === "analytics_stocks") {
          renderAnalyticsStocks(data.items || [], data.summary || {});
          financeKpiWrap.classList.add("hidden");
          meta.textContent = `Loaded: ${data.count || 0} articles`;
        } else if (report === "stock_balances") {
          // Fetch accruals for last 60 days to enrich stock table
          const d60 = new Date(); d60.setDate(d60.getDate() - 60);
          const accFrom = `${d60.getFullYear()}-${String(d60.getMonth()+1).padStart(2,'0')}-${String(d60.getDate()).padStart(2,'0')}`;
          const accQ = new URLSearchParams({date_from: accFrom, distribute_no_article: "1", limit: "5000"});
          if (offerId.value.trim()) accQ.set("offer_id", offerId.value.trim());
          try {
            const accData = await fetchJson(`/api/accruals-comp-by-article?${accQ.toString()}`);
            data._accruals = {};
            for (const item of (accData.items || [])) {
              const key = (item.offer_id || "").trim();
              if (!key) continue;
              const prev = data._accruals[key];
              const vals = item.values || {};
              // Keep entry with more sales data (avoid empty duplicates overwriting)
              if (!prev || (vals.ordered_units || 0) > (prev.ordered_units || 0)) {
                data._accruals[key] = vals;
              }
            }
          } catch(e) { data._accruals = {}; }
          // Подгружаем supply-plan параллельно — нужен для вкладки «План производства»
          try {
            const supplyData = await fetchJson(`/api/supply-plan`);
            const supplyMap = new Map();
            for (const it of (supplyData.items || [])) {
              if (it && it.offer_id) supplyMap.set(String(it.offer_id), it);
            }
            stockBalancesState.supplyMap = supplyMap;
          } catch(e) {
            stockBalancesState.supplyMap = new Map();
          }
          renderStockBalances(data);
          financeKpiWrap.classList.add("hidden");
          meta.textContent = `Loaded: ${data.count || 0} articles, ${(data.clusters || []).length} clusters`;
        } else if (report === "article_analytics") {
          renderArticleAnalytics(data.items || [], data.summary || {});
          financeKpiWrap.classList.add("hidden");
          meta.textContent = `Loaded: ${data.count || 0} SKU`;
        } else if (report === "rnp_report") {
          renderRnpReport(data.items || [], data.summary || {});
          financeKpiWrap.classList.add("hidden");
          meta.textContent = `Loaded: ${data.count || 0} SKU (РНП)`;
        } else if (report === "actions") {
          renderActionsReport(data);
          financeKpiWrap.classList.add("hidden");
          meta.textContent = `Loaded: ${(data.actions || []).length} акций (${data.mode === 'simulation' ? 'симуляция ' + data.days_back + 'д' : 'факт'})`;
        } else if (report === "reviews_report") {
          renderReviewsReport(data);
          financeKpiWrap.classList.add("hidden");
          const alertsCount = (data.items || []).filter(it => it.has_alert).length;
          meta.textContent = `Загружено: ${(data.items || []).length} артикулов · алертов: ${alertsCount}`;
        } else if (report === "advertising_report") {
          // Подгрузить accruals за тот же период для расчёта расходов МП
          let accrualValues = {};
          try {
            const accQ = new URLSearchParams({
              date_from: data.date_from || dateFrom.value,
              date_to: data.date_to || dateTo.value,
              distribute_no_article: "1",
              limit: "5000",
            });
            if (data.offer_id) accQ.set("offer_id", data.offer_id);
            const accData = await fetchJson(`/api/accruals-comp-by-article?${accQ.toString()}`);
            const matchItem = (accData.items || []).find(it => {
              const norm = (it.offer_id_normalized || it.offer_id || "").toLowerCase().trim();
              return norm === (data.offer_id || "").toLowerCase().trim();
            });
            if (matchItem) accrualValues = matchItem.values || {};
          } catch (e) { console.warn("accruals fetch for advertising:", e); }
          data._accruals = accrualValues;
          renderAdvertisingReport(data);
          financeKpiWrap.classList.add("hidden");
          meta.textContent = `Реклама: ${data.offer_id || ""} · ${data.product_name || ""} · ${data.num_days || 0} дней`;
        } else if (report === "supply_plan") {
          renderSupplyPlan(data.items || [], data.summary || {});
          financeKpiWrap.classList.add("hidden");
          if (data?.summary?.uploaded_targets) {
            const source = data?.summary?.uploaded_targets_meta?.source || "XLSX";
            meta.textContent = `Loaded: ${data.count || 0} articles. Активен Excel-режим (${source}).`;
          } else {
            meta.textContent = `Loaded: ${data.count || 0} articles. Режим по "Нужно".`;
          }
        } else {
          const cols = COLUMNS[report] || COLUMNS.sales;
          if (report === "accruals_comp_by_article") {
            genericFilterBar.classList.add("hidden");
            genericFilterBar.innerHTML = "";
            renderAccrualUnitkaVisual(data.items || [], data.summary || {}, data.columns || []);
          } else if (report === "returns") {
            const rawRows = applyDynamicTagsToRows(Array.isArray(data.items) ? data.items : [], "returns");
            const returnColumns = cols.map((c) => {
              const col = toColumnDef(c);
              return {
                key: col.key,
                label: col.label,
                accessor: col.key,
                kind: (col.key === "quantity" || col.key === "refund_amount") ? "number" : "text",
                values: [],
              };
            });

            const renderReturns = () => {
              const filteredRows = applyReportFilters("returns", rawRows, returnColumns);
              const postingBase = (postingNumber) => {
                const source = String(postingNumber || "").trim();
                if (!source) return "";
                const match = source.match(/^([0-9]+)-/);
                return match ? match[1] : source;
              };
              const postingGroupCounts = filteredRows.reduce((acc, row) => {
                const key = postingBase(row?.posting_number);
                if (!key) return acc;
                acc.set(key, (acc.get(key) || 0) + 1);
                return acc;
              }, new Map());

              tableHead.innerHTML = `<tr>${returnColumns.map((column) => {
                const meta = getColumnFilterMeta("returns", column);
                const colorActive = getCellColorRanges("returns", column.key) ? " ccr-active" : "";
                return `
                  <th class="${colorActive}" data-color-report="returns" data-color-col="${column.key}" data-color-label="${column.label}">
                    <span class="column-filter-label ${meta.active ? "active" : ""}" data-report-filter="returns" data-column-key="${column.key}">
                      ${column.label}${meta.count ? `<span class="table-filter-count">${meta.count}</span>` : ""}
                    </span>
                  </th>
                `;
              }).join("")}</tr>`;
              tbody.innerHTML = "";
              filteredRows.forEach((row) => {
                const tr = document.createElement("tr");
                const base = postingBase(row?.posting_number);
                if (base && (postingGroupCounts.get(base) || 0) > 1) {
                  tr.classList.add("duplicate-posting");
                  tr.title = `Дубликат отправления: ${base}-*`;
                }
                tr.innerHTML = returnColumns.map((c) => {
                  const col = toColumnDef(c);
                  const val = row[col.key];
                  const bgColor = cellColorForValue("returns", col.key, val);
                  const bgStyle = bgColor ? ` style="background-color:${bgColor}"` : "";
                  if (col.key === "returned_at") {
                    return `<td${bgStyle}>${formatDateTimeShort(val)}</td>`;
                  }
                  if (col.key === "posting_number" && val) {
                    const pn = String(val);
                    const filters = {
                      returnNumber: "",
                      postingNumber: pn,
                      returnSchema: "all",
                      productArticle: "",
                      sort: { columnType: "state_change", sortType: "descending" },
                      filterBy: {},
                      place: "",
                      barcode: "",
                    };
                    const href = `https://seller.ozon.ru/app/returns/supply/common?filters=${encodeURIComponent(JSON.stringify(filters))}`;
                    return `<td${bgStyle}><a href="${href}" target="_blank" rel="noopener noreferrer">${fmt(pn)}</a></td>`;
                  }
                  return `<td${bgStyle}>${fmt(val)}</td>`;
                }).join("");
                tbody.appendChild(tr);
              });
              tableHead.querySelectorAll('[data-report-filter="returns"]').forEach((button) => {

    function startSyncPolling() {
      if (!syncInterval) {
        syncInterval = setInterval(checkSyncStatus, 2000);

    function stopSyncPolling() {
      if (syncInterval) {
        clearInterval(syncInterval);
        syncInterval = null;

    function updateProgressBar(progress, stage) {
      syncProgressFill.style.width = `${progress}%`;
      syncStage.textContent = stage || "Загрузка...";
      syncPercent.textContent = `${progress}%`;
    }

    function renderSyncStages(stages, currentStage) {
      const items = Array.isArray(stages) ? stages : [];
      if (!items.length) {
        syncSteps.innerHTML = '<div class="sync-progress-step active">Ожидание запуска...</div>';
        return;
      }
      syncSteps.innerHTML = items
        .map((item) => {
          const stage = item?.stage || "";
          const progress = Number(item?.progress || 0);
          const activeClass = stage === currentStage ? " active" : "";
          return `<div class="sync-progress-step${activeClass}">${stage} (${progress}%)</div>`;
        })
        .join("");
      syncSteps.scrollTop = syncSteps.scrollHeight;
    }
    
    async function checkSyncStatus() {
      try {
        const data = await fetchJson("/api/sync-status");

        if (data.is_running || data.progress > 0 || data.error) {
          updateProgressBar(data.progress, data.stage);
          renderSyncStages(data.stages, data.stage);
          syncProgressWrap.classList.remove("hidden");

          if (data.is_running) {
            syncBtn.disabled = true;
            meta.textContent = `Синхронизация выполняется: ${data.stage || "Обработка"} (${Number(data.progress || 0)}%)`;
            startSyncPolling();
          } else if (!data.is_running && data.progress >= 100) {
            // Синхронизация завершена
            stopSyncPolling();
            syncBtn.disabled = false;
            meta.textContent = "Синхронизация завершена! Обновляем данные...";

            // Автоматически скрываем прогресс-бар через 3 секунды и обновляем данные
            setTimeout(() => {
              syncProgressWrap.classList.add("hidden");
              loadReport(); // Автоматически обновляем текущий отчёт
            }, 3000);
          } else if (data.error) {
            // Ошибка
            stopSyncPolling();
            syncBtn.disabled = false;
            meta.textContent = `Ошибка: ${data.error}`;
            syncProgressWrap.classList.add("hidden");
          }
        }
      } catch (e) {
        console.error("Ошибка проверки статуса:", e);
      }

      const lossSkus = kpi.loss_skus || { count: 0, top_offers: [] };
      const lossColor = lossSkus.count > 0 ? "#f87171" : "#64748b";

      const tileStyle = "background:#f8fafc;border-radius:10px;padding:14px 16px;border-left:3px solid;border-top:1px solid #e2e8f0;border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;";
      const labelS = "color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;";
      const valueS = "font-size:22px;font-weight:700;margin-top:4px;";
      const subS = "color:#64748b;font-size:11px;margin-top:6px;";

      const profitColor = "#2563eb";
      const amberColor = "#d97706";
      const lossAccent = lossSkus.count > 0 ? "#dc2626" : "#94a3b8";
      const marginAccent = deltaPP >= 0 ? "#059669" : "#dc2626";
      const payoutsRest = nextPayouts.slice(1).map(p =>
        `<div style="margin-top:2px">${p.payout_date}: ~${fmt(p.forecast_amount)} ₽ <span style="color:#94a3b8">(${p.period_start}…${p.period_end})</span></div>`
      ).join("");
      wrap.innerHTML = `
        <div style="${tileStyle} ${profitColor}">
          <div style="${labelS}">Прибыль месяц</div>
          <div style="${valueS};color:${profitColor}">${fmt(mp.gross_profit)} ₽</div>
          <div style="${subS}">Маржа ${((mp.margin_pct||0)*100).toFixed(1)}% · выручка ${fmt(mp.revenue)}</div>
        </div>
        <div style="${tileStyle} ${marginAccent}">
          <div style="${labelS}">Маржа 7д</div>
          <div style="${valueS};color:${marginAccent}">${(((cur.margin_pct)||0)*100).toFixed(1)}%</div>
          <div style="${subS}">${deltaArrow} ${Math.abs(deltaPP).toFixed(1)} п.п. vs пред. 7д · GP ${fmt(cur.gp)}</div>
        </div>
        <div style="${tileStyle} ${amberColor}">
          <div style="${labelS}">Следующие выплаты</div>
          <div style="${valueS};color:${amberColor}">~${fmt(firstPayout.forecast_amount)} ₽ · ${firstPayout.payout_date || "—"}</div>
          <div style="${subS}">период ${firstPayout.period_start || ""}…${firstPayout.period_end || ""}${payoutsRest ? '<br>' + payoutsRest : ''}</div>
        </div>
        <div style="${tileStyle} ${lossAccent};cursor:${lossSkus.count>0?'pointer':'default'};" id="kpi_loss_tile">
          <div style="${labelS}">Убыточные SKU</div>
          <div style="${valueS};color:${lossAccent}">${lossSkus.count}</div>
          <div style="${subS}">${lossSkus.top_offers.slice(0,3).map(o => o.offer_id + ' (' + fmt(o.gross_profit) + ')').join(' · ') || 'нет убыточных'}</div>
        </div>
      `;
      wrap.style.display = "grid";
    }

    function renderFinanceSettlementBadge(data) {
      let el = document.getElementById("finance_settlement_badge");
      const toggle = document.getElementById("finance_mode_toggle");
      if (!toggle) return;
      if (!el) {
        el = document.createElement("div");
        el.id = "finance_settlement_badge";
        el.style.cssText = "margin:8px 0;padding:10px 14px;background:#f8fafc;border-radius:8px;font-size:12px;color:#334155;border:1px solid #e2e8f0;border-left:3px solid #059669;line-height:1.55;";
        toggle.parentNode.insertBefore(el, toggle.nextSibling);
      }
      const s = data && data.settlement;
      if (!s || data.variant !== "accrual") { el.style.display = "none"; return; }
      const cashA = Math.round(s.cash_accrued || 0).toLocaleString("ru-RU");
      const accrA = Math.round(s.accrual_accrued || 0).toLocaleString("ru-RU");
      const cashGP = Math.round(s.cash_gross_profit || 0).toLocaleString("ru-RU");
      const accrGP = Math.round(s.accrual_gross_profit || 0).toLocaleString("ru-RU");
      const delta = (s.accrual_gross_profit || 0) - (s.cash_gross_profit || 0);
      const deltaSign = delta >= 0 ? "+" : "";
      const deltaStr = deltaSign + Math.round(delta).toLocaleString("ru-RU");
      const deltaPctR = (s.cash_gross_profit ? (delta / s.cash_gross_profit) * 100 : 0);
      const trendColor = delta >= 0 ? "#34d399" : "#f87171";
      el.style.borderLeftColor = trendColor;
      const grossTotal = (data.gross_ordered && data.gross_ordered.total) || 0;
      const grossStr = Math.round(grossTotal).toLocaleString("ru-RU");
      el.innerHTML = `
        <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;">
          <div><span style="color:#64748b">Заказано (gross):</span> <strong>${grossStr} ₽</strong></div>
          <div><span style="color:#64748b">Начислено кассой:</span> <strong>${cashA} ₽</strong> (валовая ${cashGP})</div>
          <div><span style="color:#64748b">Прогноз по заказам:</span> <strong>${accrA} ₽</strong> (валовая ${accrGP})</div>
          <div style="color:${trendColor}"><strong>Δ валовой ${deltaStr} ₽ (${deltaSign}${deltaPctR.toFixed(1)}%)</strong></div>
        </div>
        <div style="margin-top:6px;color:#94a3b8;font-size:11px;">«Заказано» — gross выручка размещённых заказов (сверяется с Ozon UI «Заказано»).
          «Прогноз по заказам» — netto после коррекции на отмены/невыкупы.
          Δ валовой между cash и accrual показывает тренд объёма.
        </div>
      `;
      el.style.display = "block";
    }
    document.querySelectorAll(".finance-mode-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        window.financeReportMode = btn.dataset.mode;
        try { localStorage.setItem("ozon-dashboard-finance-mode", window.financeReportMode); } catch(e) {}
        updateFinanceModeUI();
        if (reportType.value === "finance_report" || reportType.value === "accruals_comp_by_article") loadReport();
      });
    });
    updateFinanceModeUI();
    
    // Проверяем статус при загрузке страницы (на случай если синхронизация уже идёт)
    checkSyncStatus();

    const startupParams = new URLSearchParams(window.location.search);
    reportType.value = startupParams.get("report") || "finance_report";
    accrualDynamicTags = getDynamicTags("accruals_comp_by_article");
    syncDatesFromMonth();
    if (startupParams.get("date_from")) dateFrom.value = String(startupParams.get("date_from"));
    if (startupParams.get("date_to")) dateTo.value = String(startupParams.get("date_to"));
    if (startupParams.get("offer_id")) offerId.value = String(startupParams.get("offer_id"));
    if (startupParams.get("schema")) schema.value = String(startupParams.get("schema"));
    if (startupParams.get("limit")) limit.value = String(startupParams.get("limit"));
    updateFilterVisibility();
    renderHeader(COLUMNS.cash_flow);
    renderReportTopMenu();
    loadArticles("").catch(() => {});
    loadReport();

    // Prevent wheel scroll hijacking by horizontal-overflow elements and selects
    document.getElementById("report_top_menu")?.addEventListener("wheel", (e) => {
      e.preventDefault();
      window.scrollBy(0, e.deltaY);
    }, {passive: false});
    document.getElementById("report_type")?.addEventListener("wheel", (e) => {
      e.preventDefault();
      window.scrollBy(0, e.deltaY);
    }, {passive: false});

    // Global right-click handler for cell color ranges on any table header
    document.addEventListener("contextmenu", (e) => {
      const th = e.target.closest("[data-color-report][data-color-col]");
      if (!th) return;
      e.preventDefault();
      const reportKey = th.dataset.colorReport;
      const colKey = th.dataset.colorCol;
      const colLabel = th.dataset.colorLabel || colKey;
      openCellColorDialog(reportKey, colKey, colLabel, () => {
        // Re-render current report by reloading
        loadReport();
      });
    });
  </script>
  <!-- Результаты паллетизации выводятся в отчете -->
</body>
</html>
