                  <div class="analytics-meta-line">
                    <span class="analytics-chip ${statusClass(item.kpi_status)}">${statusLabel(item.kpi_status)} • ${formatMetric(item.kpi_score, 0)}</span>
                    <span class="analytics-chip">CTR ${pct(item.ctr_30d)}</span>
                    <span class="analytics-chip">CR ${pct(item.conversion_30d)}</span>
                  </div>
                </div>
                <div class="sku-compact-cell">
                  <div class="sku-cell-label">Заказы 30д</div>
                  <div class="sku-cell-value">${formatMetric(item.orders_30d, 0)}</div>
                  <div class="sku-trend ${trendClass(item.orders_trend_3v3)}">${trendText(item.orders_trend_3v3)}<span class="sku-trend-tip">${formatMetric(item.orders_prev3, 1)} → ${formatMetric(item.orders_cur3, 1)}</span></div>
                </div>
                <div class="sku-compact-cell">
                  <div class="sku-cell-label">Выручка 30д</div>
                  <div class="sku-cell-value">${money(item.revenue_30d)}</div>
                  <div class="sku-trend ${trendClass(item.revenue_trend_3v3)}">${trendText(item.revenue_trend_3v3)}<span class="sku-trend-tip">${money(item.revenue_prev3)} → ${money(item.revenue_cur3)}</span></div>
                </div>
                <div class="sku-compact-cell">
                  <div class="sku-cell-label">Показы 30д</div>
                  <div class="sku-cell-value">${formatMetric(item.impressions_30d, 0)}</div>
                  <div class="sku-trend ${trendClass(item.impressions_trend_3v3)}">${trendText(item.impressions_trend_3v3)}<span class="sku-trend-tip">${formatMetric(item.impressions_prev3, 0)} → ${formatMetric(item.impressions_cur3, 0)}</span></div>
                </div>
                <div class="sku-compact-cell">
                  <div class="sku-cell-label">CTR</div>
                  <div class="sku-cell-value">${pct(item.ctr_30d)}</div>
                  <div class="sku-trend ${trendClass(item.ctr_trend_3v3)}">${trendText(item.ctr_trend_3v3)}<span class="sku-trend-tip">${pct(item.ctr_prev3)} → ${pct(item.ctr_cur3)}</span></div>
                </div>
                <div class="sku-compact-cell">
                  <div class="sku-cell-label">CR</div>
                  <div class="sku-cell-value">${pct(item.conversion_30d)}</div>
                  <div class="sku-trend ${trendClass(item.conversion_trend_3v3)}">${trendText(item.conversion_trend_3v3)}<span class="sku-trend-tip">${pct(item.conversion_prev3)} → ${pct(item.conversion_cur3)}</span></div>
                </div>
                <div class="sku-compact-cell">
                  <div class="sku-cell-label">Остаток FBO / FBS</div>
                  <div class="sku-cell-value">${formatMetric((item.stock_fbo || 0), 0)} / ${formatMetric((item.stock_fbs || 0), 0)}</div>
                  <div class="sku-cell-sub">FBO = ${formatMetric(item.stock_fbo_available || 0)} + ${formatMetric(item.stock_fbo_supply || 0)} + ${formatMetric(item.stock_fbo_transit || 0)} + ${formatMetric(item.stock_fbo_acceptance || 0)}</div>
                  <div class="sku-cell-sub">хватит на ${item.days_to_oos == null ? "∞" : formatMetric(item.days_to_oos, 0) + "д"}</div>

                </div>
                <div class="sku-compact-cell">
                  <div class="sku-cell-label">Акции</div>
                  ${promoCellHtml}
                </div>
                <div class="sku-compact-cell">
                  <div class="sku-cell-label">Статус</div>
                  <div><span class="sku-status-chip ${skuStatus.cls}">${skuStatus.label}</span></div>
                  <div class="sku-cell-sub">${alerts.length ? `алертов: ${alerts.length}` : "без критичных алертов"}</div>
                </div>
              </div>
            </div>
            <div class="analytics-detail hidden" id="${detailId}">
              ${buildCorrelationOverlay(item, `article_analytics_corr_${idx}`)}
              ${buildOverlayChart(item, chartId)}
              ${buildPdpVisitorsChart(item, pdpChartId)}
              ${buildCartConversionChart(item, cartConvChartId)}
              ${buildPositionChart(item, positionChartId)}
              ${buildPriceChart(item, priceChartId)}
              ${buildStockHistoryChart(item, stockChartId)}
              ${buildReviewsChart(item, stockChartId + "_reviews")}
              ${buildClustersCard(item)}
              ${buildArticleQueryMatrixShell(item, queryMatrixId)}
              <div style="margin: 10px 0 6px; display:grid; gap:6px;">
                <div class="metric-label">Алерты</div>
                <div>${alertsHtml}</div>
              </div>
              <table class="analytics-detail-table data-table report-table" style="margin-top:10px;">
                <thead><tr><th>Блок</th><th>Метрика</th><th>Значение</th><th>Комментарий</th></tr></thead>
                <tbody>
                  <tr><td>Трафик</td><td>Показы поиск / PDP</td><td>${formatMetric(sources.search_views_30d, 0)} / ${formatMetric(sources.pdp_views_30d, 0)}</td><td>Поиск и карточка</td></tr>
                  <tr><td>Трафик</td><td>В корзину поиск / PDP</td><td>${formatMetric(sources.search_tocart_30d, 0)} / ${formatMetric(sources.pdp_tocart_30d, 0)}</td><td>Качество трафика</td></tr>
                  <tr><td>Воронка</td><td>CR корзина → заказ 7д / 7д</td><td>${crC2O7vs7Cell}</td><td>${crC2O7vs7Delta}</td></tr>
                  <tr><td>Воронка</td><td>CR корзина → заказ за период</td><td>${crC2OAllCell}</td><td>${crC2OAllHint}</td></tr>
                  <tr><td>Экономика</td><td>Цена продавца / клиента</td><td>${money(item.seller_price)} / ${money(item.client_price)}</td><td>Скидка МП: ${pct(item.marketplace_discount_pct)}</td></tr>
                  <tr><td>Экономика</td><td>Возвраты / отмены / доставлено</td><td>${formatMetric(item.returns_30d, 0)} / ${formatMetric(item.cancellations_30d, 0)} / ${formatMetric(item.delivered_units_30d, 0)}</td><td>Качество заказа</td></tr>
                  <tr><td>Позиция</td><td>Средняя позиция</td><td>${formatMetric(item.position_category_30d, 2)}</td><td>Ниже — лучше</td></tr>
                  ${promoTableRowsHtml}

            </div>
          </section>
        `;
      }).join("");

      analyticsStocksWrap.innerHTML = `
        <div class="analytics-stocks-wrap" style="width: 1320px; margin: 0 auto;">
          ${summaryHtml}
          <div class="analytics-groups">${rowsHtml || ""}</div>
        </div>
      `;

      analyticsStocksWrap.querySelectorAll(".analytics-article-toggle").forEach((button) => {
        button.addEventListener("click", () => {
          const detail = document.getElementById(button.dataset.target);
          const hidden = detail.classList.toggle("hidden");
          const sign = button.querySelector(".analytics-toggle-sign");
          if (sign) sign.textContent = hidden ? "+" : "−";
          if (!hidden) {
            const queryMatrix = detail.querySelector(".query-matrix");
            const sku = queryMatrix?.dataset?.sku;
            const item = rows.find((row) => String(row?.sku || "") === String(sku || ""));
            if (queryMatrix && item) {
              ensureArticleQueryMatrixLoaded(item, queryMatrix);
            }
          }
        });
      });

      // Чекбоксы overlay-графика корреляции
      analyticsStocksWrap.querySelectorAll(".corr-check input[type=checkbox]").forEach((cb) => {
        cb.addEventListener("change", () => {
          const container = document.getElementById(cb.dataset.corrTarget);
          if (!container) return;
          const svg = container.querySelector(".corr-svg");
          if (!svg) return;
          const line = svg.querySelector(`[data-corr-key="${cb.dataset.corrKey}"]`);
          if (line) line.style.display = cb.checked ? "" : "none";
        });
      });
    }

    function renderRnpReport(items, summary = {}) {
      const rows = Array.isArray(items) ? items : [];

      // ─── График выручки по дням ──────────────────────────────────
      const _buildRevenueTrendChart = (daily) => {
        const points = Array.isArray(daily) ? daily : [];
        if (!points.length) return `<div class="analytics-chart-empty">Нет данных по выручке</div>`;
        const width = 960, height = 220, left = 60, right = 22, top = 18, bottom = 32;
        const usableW = width - left - right, usableH = height - top - bottom;
        const revArr = points.map((p) => Number(p.revenue || 0));

        // Bollinger Bands (window=7, mult=2)
        const bbWindow = Math.min(7, points.length);
        const bbData = points.map((_, idx) => {
          const start = Math.max(0, idx - bbWindow + 1);
          const slice = revArr.slice(start, idx + 1);
          const ma = slice.reduce((s, v) => s + v, 0) / slice.length;
          const std = Math.sqrt(slice.reduce((s, v) => s + (v - ma) ** 2, 0) / slice.length);
          return { ma, upper: ma + 2 * std, lower: ma - 2 * std };
        });

        // Trend line (slope по последним bbWindow точкам)
        const trendW = Math.min(bbWindow, points.length);
        const trendSlice = revArr.slice(-trendW);
        const txMean = (trendW - 1) / 2;
        const tyMean = trendSlice.reduce((s, v) => s + v, 0) / trendW;
        const tNum = trendSlice.reduce((s, v, i) => s + (i - txMean) * (v - tyMean), 0);
        const tDen = trendSlice.reduce((s, _, i) => s + (i - txMean) ** 2, 0);
        const tSlope = tDen > 0 ? tNum / tDen : 0;
        const tIntercept = tyMean - tSlope * txMean;
        const trendStartIdx = points.length - trendW;

        // tsAnalyze для общего вердикта
        const tsResult = tsAnalyze(revArr);

        const allVals = [...revArr, ...bbData.map((b) => b.upper), ...bbData.map((b) => b.lower)];
        const maxVal = Math.max(1, ...allVals.filter((v) => isFinite(v) && v > 0));
        const minVal = Math.min(0, ...allVals.filter((v) => isFinite(v)));
        const range = maxVal - minVal || 1;
        const xFor = (idx) => left + (usableW * idx) / Math.max(points.length - 1, 1);
        const yFor = (value) => top + usableH - ((Math.max(minVal, Math.min(maxVal, Number(value || 0))) - minVal) / range) * usableH;

        const linePoints = points.map((p, idx) => `${xFor(idx).toFixed(2)},${yFor(p.revenue).toFixed(2)}`).join(" ");
        const areaPoints = `${xFor(0).toFixed(2)},${(top + usableH).toFixed(2)} ${linePoints} ${xFor(points.length - 1).toFixed(2)},${(top + usableH).toFixed(2)}`;

        // BB band polygon
        const bbUpperPts = bbData.map((b, idx) => `${xFor(idx).toFixed(2)},${yFor(b.upper).toFixed(2)}`).join(" ");
        const bbLowerPts = [...bbData].reverse().map((b, idx) => `${xFor(points.length - 1 - idx).toFixed(2)},${yFor(b.lower).toFixed(2)}`).join(" ");
        const bbPolygon = `<polygon points="${bbUpperPts} ${bbLowerPts}" fill="rgba(99,102,241,0.08)" stroke="none" />`;

        // BB MA line
        const bbMaLine = `<polyline points="${bbData.map((b, idx) => `${xFor(idx).toFixed(2)},${yFor(b.ma).toFixed(2)}`).join(" ")}" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" opacity="0.5" />`;

        // BB upper/lower dashed lines
        const bbUpperLine = `<polyline points="${bbData.map((b, idx) => `${xFor(idx).toFixed(2)},${yFor(b.upper).toFixed(2)}`).join(" ")}" fill="none" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.35" />`;
        const bbLowerLine = `<polyline points="${bbData.map((b, idx) => `${xFor(idx).toFixed(2)},${yFor(b.lower).toFixed(2)}`).join(" ")}" fill="none" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.35" />`;

        // Trend line
        const trendLine = trendW >= 2 ? `<line x1="${xFor(trendStartIdx).toFixed(2)}" y1="${yFor(tIntercept + tSlope * 0).toFixed(2)}" x2="${xFor(points.length - 1).toFixed(2)}" y2="${yFor(tIntercept + tSlope * (trendW - 1)).toFixed(2)}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7" />` : "";

        // Grid
        const gridSteps = [minVal, minVal + range / 3, minVal + range * 2 / 3, maxVal].reverse();
        const grid = gridSteps.map((v) => {
          const y = yFor(v);
          return `<line x1="${left}" y1="${y.toFixed(2)}" x2="${(width - right).toFixed(2)}" y2="${y.toFixed(2)}" stroke="#e6ecf5" stroke-width="1" /><text x="${(left - 8).toFixed(2)}" y="${(y + 4).toFixed(2)}" text-anchor="end" font-size="11" fill="#8a97aa">${formatMetric(v, 0)}</text>`;
        }).join("");

        // Dots — colored by BB position: red = outside BB, orange = below MA, green = above MA
        const dots = points.map((p, idx) => {
          const x = xFor(idx), y = yFor(p.revenue);
          const val = Number(p.revenue || 0);
          const b = bbData[idx];
          const isLast = idx === points.length - 1;
          let color, dotR, stroke = "";
          if (val < b.lower || val > b.upper) {
            color = "#dc2626"; dotR = isLast ? 6 : 4.5; stroke = `stroke="#fff" stroke-width="1.5"`;
          } else if (val < b.ma) {
            color = "#f59e0b"; dotR = isLast ? 5 : 3.4;
          } else {
            color = "#10b981"; dotR = isLast ? 5 : 3.4;
          }
          const status = val < b.lower ? "⚠ за нижней BB" : (val > b.upper ? "⚠ за верхней BB" : (val < b.ma ? "ниже MA" : "норма"));
          return `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${dotR}" fill="${color}" ${stroke}><title>${String(p.day).slice(5)}: ${formatMetric(val, 0)} ₽ · ${status} · MA ${formatMetric(b.ma, 0)}</title></circle>`;
        }).join("");
        const xTicks = points.map((p, idx) => `<text x="${xFor(idx).toFixed(2)}" y="${(height - 10).toFixed(2)}" text-anchor="middle" font-size="10" fill="#8a97aa">${String(p.day).slice(5)}</text>`).join("");

        // Verdict badge
        const verdictHtml = tsResult ? (() => {
          const colors = { "НОРМА": "background:#dcfce7;color:#166534", "ВНИМАНИЕ": "background:#fef3c7;color:#92400e", "ТРЕВОГА": "background:#fee2e2;color:#991b1b" };
          const arrow = tsResult.trend.slope > 0 ? "↑" : (tsResult.trend.slope < -0.5 ? "↓↓" : "↓");
          return `<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:10px;${colors[tsResult.overall] || ""}">${tsResult.overall} ${tsResult.normaCount}/5</span>
            <span style="font-size:11px;color:#64748b;margin-left:6px;">Z=${tsResult.z.value >= 0 ? "+" : ""}${tsResult.z.value.toFixed(2)} · тренд ${arrow}${tsResult.trend.slopePct >= 0 ? "+" : ""}${tsResult.trend.slopePct.toFixed(1)}%/д · pctl ${tsResult.pctRank.toFixed(0)}%</span>`;
        })() : "";

        return `
          <div class="analytics-chart sku-impressions-chart" style="margin-bottom:14px;">
            <div class="sku-impressions-meta"><div>
              <div class="sku-impressions-title">Динамика выручки по дням, ₽ ${verdictHtml}</div>
              <div class="sku-impressions-summary">Суммарная выручка · <span style="color:#6366f1;">BB ±2σ</span> · <span style="color:#f59e0b;">тренд 7д</span> · <span style="color:#dc2626;">●</span> за BB · <span style="color:#f59e0b;">●</span> ниже MA · <span style="color:#10b981;">●</span> норма</div>
            </div></div>
            <div class="sku-chart-wrap">
              <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                ${grid}
                <line x1="${left}" y1="${(top + usableH).toFixed(2)}" x2="${(width - right).toFixed(2)}" y2="${(top + usableH).toFixed(2)}" stroke="#ccd6e3" stroke-width="1" />
                ${bbPolygon}
                ${bbUpperLine}
                ${bbLowerLine}
                ${bbMaLine}
                ${trendLine}
                <polygon points="${areaPoints}" fill="rgba(16,185,129,0.08)" />
                <polyline points="${linePoints}" fill="none" stroke="#10b981" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round" />
                ${dots}
                ${xTicks}
              </svg>
            </div>
          </div>`;
      };

      // Состояние «показывать только критичные» (по умолчанию — только критичные)
      window.rnpShowAll = window.rnpShowAll ?? false;
      const SIGMA_THRESHOLD = 1.0; // мягкий порог: > 1σ ниже среднего считаем аномалией

      // Собираем все дни периода
      const daySet = new Set();
      rows.forEach((it) => (Array.isArray(it?.daily) ? it.daily : []).forEach((p) => {
        const d = String(p?.day || "").slice(0, 10);
        if (d) daySet.add(d);
      }));
      const allDays = [...daySet].sort();
      const lastDay = allDays.length ? allDays[allDays.length - 1] : null;
      const prevDay = allDays.length > 1 ? allDays[allDays.length - 2] : null;
      const baselineDays = allDays.slice(0, -1);

      if (!rows.length || !lastDay) {
        analyticsStocksWrap.innerHTML = `<div class="analytics-chart-empty" style="padding:40px;text-align:center;color:#8a97aa;">Нет данных для блока РНП</div>`;
        return;
      }

      // Утилита: статистика (mean, sd, min, max) по массиву чисел
      const stats = (arr) => {
        if (!arr.length) return { mean: 0, sd: 0, min: 0, max: 0, n: 0 };
        const mean = arr.reduce((s, v) => s + v, 0) / arr.length;
        const variance = arr.reduce((s, v) => s + (v - mean) ** 2, 0) / arr.length;
        return { mean, sd: Math.sqrt(variance), min: Math.min(...arr), max: Math.max(...arr), n: arr.length };
      };
      const pct = (cur, base) => (base > 0 ? ((cur - base) / base) * 100 : null);

      // Считаем по каждому SKU
      const skuStats = rows.map((item) => {
        const byDay = new Map();
        (Array.isArray(item?.daily) ? item.daily : []).forEach((p) => {
          byDay.set(String(p?.day || "").slice(0, 10), p);
        });
        const last = byDay.get(lastDay) || {};
        const prev = prevDay ? (byDay.get(prevDay) || {}) : {};

        const lastRev = Number(last.revenue || 0);
        const lastViews = Number(last.hits_view || 0);
        const lastClicks = Number(last.session_view_pdp || 0);  // клики = просмотры карточки
        const lastCartAbs = Number(last.hits_tocart || 0);
        const lastCart = lastClicks > 0 ? (lastCartAbs / lastClicks) * 100 : 0; // конверсия в корзину %
        const lastOrders = Number(last.ordered_units || 0);
        const lastAdViews = Number(last.ad_impressions || 0);
        const lastSeoViews = Number(last.seo_impressions || 0);
        const lastAdClicks = Number(last.pdp_ad_clicks || 0);
        const lastSeoClicks = Number(last.pdp_seo_visitors || 0);

        // Серии по baseline-дням
        const revSeries = [], viewsSeries = [], clicksSeries = [], cartSeries = [], ordersSeries = [];
        const adViewsSeries = [], seoViewsSeries = [], adClicksSeries = [], seoClicksSeries = [];
        const posSeries = [];
        const oosBaselineDays = []; // дни без показов в baseline
        baselineDays.forEach((d) => {
          const p = byDay.get(d);
          if (!p) return;
          const v = Number(p.hits_view || 0);
          if (v <= 0) {
            oosBaselineDays.push(d);
            return;
          }
          revSeries.push(Number(p.revenue || 0));
          viewsSeries.push(v);
          clicksSeries.push(Number(p.session_view_pdp || 0));
          const pClicks = Number(p.session_view_pdp || 0);
          const pCartAbs = Number(p.hits_tocart || 0);
          cartSeries.push(pClicks > 0 ? (pCartAbs / pClicks) * 100 : 0); // конверсия %
          ordersSeries.push(Number(p.ordered_units || 0));
          adViewsSeries.push(Number(p.ad_impressions || 0));
          seoViewsSeries.push(Math.max(0, v - Number(p.ad_impressions || 0)));
          adClicksSeries.push(Number(p.pdp_ad_clicks || 0));
          seoClicksSeries.push(Math.max(0, Number(p.session_view_pdp || 0) - Number(p.pdp_ad_clicks || 0)));
          const pos = Number(p.position_category || 0);
          if (pos > 2) posSeries.push(pos);
        });

        const sRev = stats(revSeries);
        const sViews = stats(viewsSeries);
        const sClicks = stats(clicksSeries);
        const sCart = stats(cartSeries);
        const sOrders = stats(ordersSeries);
        const sAdViews = stats(adViewsSeries);
        const sSeoViews = stats(seoViewsSeries);
        const sAdClicks = stats(adClicksSeries);
        const sSeoClicks = stats(seoClicksSeries);
        const sPos = stats(posSeries);

        // Z-score: отрицательный = хуже (для позиции: положительный = хуже)
        const z = (val, st) => (st.sd > 0 ? (val - st.mean) / st.sd : (st.mean > 0 ? (val < st.mean ? -99 : 0) : 0));
        const zRev = z(lastRev, sRev);
        const zViews = z(lastViews, sViews);
        const zClicks = z(lastClicks, sClicks);
        const zCart = z(lastCart, sCart);
        const zOrders = z(lastOrders, sOrders);
        const zAdViews = z(lastAdViews, sAdViews);
        const zSeoViews = z(lastSeoViews, sSeoViews);
        const zPos = sPos.sd > 0 ? (Number(last.position_category || 0) - sPos.mean) / sPos.sd : 0; // >0 = хуже

        // Аномалия по метрике = z < -SIGMA_THRESHOLD (для позиции: z > +SIGMA_THRESHOLD)
        const isAnom = (zVal) => zVal !== null && zVal < -SIGMA_THRESHOLD;
        const anomViews = isAnom(zViews);
        const anomClicks = isAnom(zClicks);
        const anomCart = isAnom(zCart);
        const anomOrders = isAnom(zOrders);
        const anomRev = isAnom(zRev);
        const anomAdViews = isAnom(zAdViews);
        const anomSeoViews = isAnom(zSeoViews);
        const anomPos = zPos > SIGMA_THRESHOLD; // позиция: рост = хуже

        // OOS детектор: доступный остаток = 0
        const stockNow = Number(item.stock_now || 0);
        const stockSellable = Number(item.stock_fbo_available || 0) + Number(item.stock_fbs || 0);
        const oosNow = stockSellable <= 0;
        const viewsCollapsed = sViews.mean > 0 && lastViews < sViews.mean * 0.1;

        // Позиция слетела (≤ 2 при baseline > 5)
        const lastPos = Number(last.position_category || 0);
        const positionCollapsed = lastPos > 0 && lastPos <= 2 && sPos.mean > 5;

        const isOOSDay = lastViews === 0 || viewsCollapsed || positionCollapsed;

        // ─── ДИАГНОЗ: 1) остаток → 2) позиция → 3) показы (сео/реклама) → 4) клики → 5) корзина → 6) заказы ───
        let diagnosis = null, diagColor = "#1aa260";
        let skipFunnel = false;
        const diagParts = []; // собираем все проблемы

        if (oosNow) {
          diagnosis = "Аутофсток: доступный остаток = 0. Пополни запас.";
          diagColor = "#1f1f1f";
          skipFunnel = true;
        } else if (isOOSDay) {
          diagnosis = positionCollapsed
            ? `Позиция слетела (${lastPos.toFixed(0)} vs ср. ${sPos.mean.toFixed(0)}) → вероятный аутофсток.`
            : "Показы рухнули в ноль/около. Проверь остатки, статус карточки, рекламу.";
          diagColor = "#000";
        } else {
          // 2) Позиция деградирует
          if (anomPos) {
            diagParts.push(`Позиция деградирует (${lastPos.toFixed(0)} vs ср. ${sPos.mean.toFixed(0)})`);
          }
          // 3) Показы — разбивка по источникам
          if (anomViews) {
            if (anomSeoViews && anomAdViews) {
              diagParts.push(`Показы ↓ (сео ${Math.round(lastSeoViews)} vs ${Math.round(sSeoViews.mean)}, реклама ${Math.round(lastAdViews)} vs ${Math.round(sAdViews.mean)})`);
            } else if (anomAdViews && !anomSeoViews) {
              diagParts.push(`Рекламные показы ↓ (${Math.round(lastAdViews)} vs ср. ${Math.round(sAdViews.mean)}). Сео ок.`);
            } else if (anomSeoViews && !anomAdViews) {
              diagParts.push(`Сео-показы ↓ (${Math.round(lastSeoViews)} vs ср. ${Math.round(sSeoViews.mean)}). Реклама ок.`);
            } else {
              diagParts.push(`Показы ↓ (${Math.round(lastViews)} vs ср. ${Math.round(sViews.mean)})`);
            }
          }
          // 4) Клики (просмотры карточки)
          if (anomClicks && !anomViews) {
            diagParts.push(`Клики (просмотры карточки) ↓ (${Math.round(lastClicks)} vs ср. ${Math.round(sClicks.mean)}) — CTR из поиска упал`);
          }
          // 5) Конверсия в корзину (%)
          if (anomCart && !anomClicks && !anomViews) {
            diagParts.push(`CR корзины ↓ (${lastCart.toFixed(1)}% vs ср. ${sCart.mean.toFixed(1)}%) — проблема карточки/цены/конкурента`);
          } else if (anomCart && (anomClicks || anomViews)) {
            diagParts.push(`CR корзины ↓ (${lastCart.toFixed(1)}% vs ср. ${sCart.mean.toFixed(1)}%)`);
          }
          // 6) Заказы
          if (anomOrders && !anomCart && !anomClicks && !anomViews) {
            diagParts.push(`Заказы ↓ (${Math.round(lastOrders)} vs ср. ${Math.round(sOrders.mean)}) — проблема выкупа`);
          }

          if (diagParts.length) {
            diagnosis = diagParts.join(". ") + ".";
            // Цвет по первой (самой важной) проблеме
            if (anomPos) diagColor = "#1f1f1f";
            else if (anomViews) diagColor = "#f59e0b";
            else if (anomClicks) diagColor = "#e67e22";
            else if (anomCart) diagColor = "#a855f7";
            else if (anomOrders) diagColor = "#d93025";
          } else if (anomRev) {
            diagnosis = "Воронка в коридоре нормы, но выручка ниже — проверь средний чек / возвраты.";
            diagColor = "#f59e0b";
          } else {
            diagnosis = "Все показатели в коридоре нормальных колебаний — обычный день.";
            diagColor = "#1aa260";
          }
        }

        // Является ли SKU «критичным»? — показывается по дефолту
        const isCritical = oosNow || isOOSDay || anomPos || anomViews || anomClicks || anomCart || anomOrders;

        // Score для сортировки: чем меньше (отрицательнее) z по этапам воронки и больше |потеря|, тем выше
        const lossAbs = Math.max(0, sRev.mean - lastRev);
        const anomCount = [anomPos, anomViews, anomClicks, anomCart, anomOrders, anomRev].filter(Boolean).length;
        const score = (oosNow ? 1000 : 0) + (isOOSDay ? 500 : 0) + (anomPos ? 200 : 0) + anomCount * 100 + Math.min(50, lossAbs / Math.max(1, sRev.mean) * 50);

        // Серия по дням для heatmap — категориальная + per-метрика z-score
        const zd = (val, st) => (st.sd > 0 ? (val - st.mean) / st.sd : 0);
        const series = allDays.map((d) => {
          const p = byDay.get(d);
          const rev = p ? Number(p.revenue || 0) : 0;
          const vw = p ? Number(p.hits_view || 0) : 0;
          const clD = p ? Number(p.session_view_pdp || 0) : 0;
          const ctAbs = p ? Number(p.hits_tocart || 0) : 0;
          const ct = clD > 0 ? (ctAbs / clD) * 100 : 0; // конверсия в корзину %
          const od = p ? Number(p.ordered_units || 0) : 0;
          let cat;
          if (!p || vw === 0) cat = "oos";
          else if (sRev.sd > 0) {
            const zRevD = (rev - sRev.mean) / sRev.sd;
            if (zRevD < -SIGMA_THRESHOLD) cat = "anom";
            else if (zRevD < 0) cat = "low";
            else if (zRevD > SIGMA_THRESHOLD) cat = "high";
            else cat = "norm";
          } else {
            cat = rev < sRev.mean ? "low" : "norm";
          }
          // Z-score и аномалии по каждой метрике в этот день
          const cl = p ? Number(p.session_view_pdp || 0) : 0;
          const zViewsD = zd(vw, sViews);
          const zClicksD = zd(cl, sClicks);
          const zCartD = zd(ct, sCart);
          const zOrdersD = zd(od, sOrders);
          const anomViewsD = zViewsD < -SIGMA_THRESHOLD;
          const anomClicksD = zClicksD < -SIGMA_THRESHOLD;
          const anomCartD = zCartD < -SIGMA_THRESHOLD;
          const anomOrdersD = zOrdersD < -SIGMA_THRESHOLD;
          return { day: d, revenue: rev, views: vw, clicks: cl, cart: ct, orders: od, cat,
            z_views: zViewsD, z_clicks: zClicksD, z_cart: zCartD, z_orders: zOrdersD,
            anom_views: anomViewsD, anom_clicks: anomClicksD, anom_cart: anomCartD, anom_orders: anomOrdersD };
        });

        return {
          sku: item.sku || "",
          offer_id: item.offer_id || "",
          name: item.name || item.product_name || "",
          stock_now: stockNow,
          stock_fbo: Number(item.stock_fbo || 0),
          stock_fbs: Number(item.stock_fbs || 0),
          oos_days_30d: Number(item.oos_days_30d || 0),
          days_to_oos: item.days_to_oos,
          baseN: sRev.n,
          oos_baseline_days: oosBaselineDays.length,

          revenue_last: lastRev,
          revenue_stats: sRev,
          revenue_delta_pct: pct(lastRev, sRev.mean),
          revenue_delta_pct_prev: pct(lastRev, Number(prev.revenue || 0)),
          z_rev: zRev,

          views_last: lastViews,
          views_stats: sViews,
          views_delta_pct: pct(lastViews, sViews.mean),
          views_delta_pct_prev: pct(lastViews, Number(prev.hits_view || 0)),
          z_views: zViews,
          ad_views_last: lastAdViews,
          ad_views_stats: sAdViews,
          seo_views_last: lastSeoViews,
          seo_views_stats: sSeoViews,

          clicks_last: lastClicks,
          clicks_stats: sClicks,
          clicks_delta_pct: pct(lastClicks, sClicks.mean),
          z_clicks: zClicks,

          cart_last: lastCart,
          cart_stats: sCart,
          cart_delta_pct: pct(lastCart, sCart.mean),
          cart_delta_pct_prev: (() => { const pc = Number(prev.session_view_pdp || 0); const pca = Number(prev.hits_tocart || 0); const prevConv = pc > 0 ? (pca / pc) * 100 : 0; return pct(lastCart, prevConv); })(),
          z_cart: zCart,

          orders_last: lastOrders,
          orders_stats: sOrders,
          orders_delta_pct: pct(lastOrders, sOrders.mean),
          orders_delta_pct_prev: pct(lastOrders, Number(prev.ordered_units || 0)),
          z_orders: zOrders,

          position_last: lastPos,
          position_stats: sPos,
          z_pos: zPos,
          anom_pos: anomPos,
          anom_views: anomViews,
          anom_clicks: anomClicks,
          anom_ad_views: anomAdViews,
          anom_seo_views: anomSeoViews,
          anom_cart: anomCart,
          anom_orders: anomOrders,
          anom_rev: anomRev,
          stock_sellable: stockSellable,
          oos_now: oosNow,
          oos_day: isOOSDay,
          position_collapsed: positionCollapsed,
          is_critical: isCritical,
          skip_funnel: skipFunnel,
          diagnosis,
          diag_color: diagColor,
          score,
          loss_abs: -(lastRev - sRev.mean),  // положительная = потеря
          series,
          // Ряды для анализа временных рядов (5 методов)
          _revSeries: revSeries,
          _viewsSeries: viewsSeries,
          _clicksSeries: clicksSeries,
          _cartSeries: cartSeries,
          _ordersSeries: ordersSeries,
          _posSeries: posSeries,
          _tocartSeries: (() => {
            const arr = [];
            baselineDays.forEach((d) => {
              const p = byDay.get(d);
              if (!p) return;
              if (Number(p.hits_view || 0) <= 0) return;
              arr.push(Number(p.hits_tocart || 0));
            });
            return arr;
          })(),
        };
      }).filter((r) => r.baseN >= 2 || r.oos_now); // нужно минимум 2 baseline-дня для статистики

      // Разделение
      const allCount = skuStats.length;
      const criticalSku = skuStats.filter((r) => r.is_critical);
      const normalSku = skuStats.filter((r) => !r.is_critical);
      const visibleSku = (window.rnpShowAll ? skuStats : criticalSku).filter((r) => r.loss_abs >= 5000);
      visibleSku.sort((a, b) => b.score - a.score);

      // Категориальные цвета heatmap
      const catColor = {
        oos: "#1f1f1f",      // чёрный — OOS
        anom: "#d93025",     // красный — аномалия
        low: "#fde7e7",      // светло-розовый — ниже нормы, но в коридоре
        norm: "#f1f5f9",     // серый — обычный день
        high: "#dcfce7",     // светло-зелёный — выше нормы
      };
      const catLabel = { oos: "OOS", anom: "АНОМ", low: "ниже", norm: "норма", high: "выше" };

      const fmtRub = (v) => {
        const n = Number(v || 0);
        return Math.round(n).toLocaleString("ru-RU") + " ₽";
      };
      const fmtPctVal = (v) => {
        if (v === null || v === undefined || isNaN(v)) return "—";
        const n = Number(v);
        return `${n >= 0 ? "+" : ""}${n.toFixed(0)}%`;
      };
      const dayShort = (d) => String(d || "").slice(5);

      const totalLost = visibleSku.reduce((s, r) => s + Math.max(0, r.loss_abs), 0);

      // ─── HEATMAP ────────────────────────────────────────────────
      // Бейдж аномалий по этапам
      const stageBadges = (r) => {
        const badges = [];
        if (r.oos_now) {
          badges.push(`<span class="rnp-badge" style="background:#1f1f1f;color:#fff;">аутофсток</span>`);
          return badges.join(" "); // при аутофстоке дальше не смотрим
        }
        if (r.position_collapsed) badges.push(`<span class="rnp-badge" style="background:#1f1f1f;color:#fff;">позиция↓↓</span>`);
        else if (r.oos_day) badges.push(`<span class="rnp-badge" style="background:#1f1f1f;color:#fff;">показы≈0</span>`);
        if (r.anom_pos && !r.position_collapsed) badges.push(`<span class="rnp-badge" style="background:#1f1f1f;color:#fff;">позиция↓</span>`);
        if (r.anom_views) {
          if (r.anom_ad_views && !r.anom_seo_views) badges.push(`<span class="rnp-badge" style="background:#fef3c7;color:#92400e;">реклама↓</span>`);
          else if (r.anom_seo_views && !r.anom_ad_views) badges.push(`<span class="rnp-badge" style="background:#fef3c7;color:#92400e;">сео↓</span>`);
          else badges.push(`<span class="rnp-badge" style="background:#fef3c7;color:#92400e;">показы</span>`);
        }
        if (r.anom_clicks && !r.anom_views) badges.push(`<span class="rnp-badge" style="background:#fce4b8;color:#7c4a00;">клики↓</span>`);
        if (r.anom_cart) badges.push(`<span class="rnp-badge" style="background:#f3e8ff;color:#6b21a8;">CR корз↓</span>`);
        if (r.anom_orders) badges.push(`<span class="rnp-badge" style="background:#fee2e2;color:#991b1b;">заказы</span>`);
        return badges.join(" ");
      };

      // ─── АНАЛИЗ ВРЕМЕННЫХ РЯДОВ (5 методов из инструкции) ──────
      const _tsMedian = (arr) => {
        const s = [...arr].sort((a, b) => a - b);
        const n = s.length;
        return n % 2 ? s[n >> 1] : (s[(n >> 1) - 1] + s[n >> 1]) / 2;
      };
      const _tsPercentile = (arr, p) => {
        const s = [...arr].sort((a, b) => a - b);
        const idx = (p / 100) * (s.length - 1);
        const lo = Math.floor(idx), hi = Math.ceil(idx);
        return lo === hi ? s[lo] : s[lo] + (s[hi] - s[lo]) * (idx - lo);
      };
      const tsAnalyze = (data, window = 7) => {
        if (!Array.isArray(data) || data.length < 3) return null;
        const n = data.length;
        const val = data[n - 1];
        const mean = data.reduce((s, v) => s + v, 0) / n;
        const std = Math.sqrt(data.reduce((s, v) => s + (v - mean) ** 2, 0) / n);
        const median = _tsMedian(data);
        const absDevs = data.map((v) => Math.abs(v - median));
        const mad = _tsMedian(absDevs);
        const pctRank = (data.filter((v) => v <= val).length / n) * 100;
        const zVal = std > 0 ? (val - mean) / std : 0;
        const zVerdict = Math.abs(zVal) < 1 ? "НОРМА" : (Math.abs(zVal) < 2 ? "ВНИМАНИЕ" : "ТРЕВОГА");
        const zModVal = mad > 0 ? 0.6745 * (val - median) / mad : 0;
        const zModVerdict = Math.abs(zModVal) < 2.5 ? "НОРМА" : (Math.abs(zModVal) < 3.5 ? "ВНИМАНИЕ" : "ТРЕВОГА");
        const q1 = _tsPercentile(data, 25), q3 = _tsPercentile(data, 75), iqr = q3 - q1;
        const iqrLower = q1 - 1.5 * iqr, iqrUpper = q3 + 1.5 * iqr;
        const iqrVerdict = (val >= iqrLower && val <= iqrUpper) ? "НОРМА" : "ТРЕВОГА";
        const w = Math.min(window, n), lastW = data.slice(-w);
        const bbMa = lastW.reduce((s, v) => s + v, 0) / w;
        const bbStd = Math.sqrt(lastW.reduce((s, v) => s + (v - bbMa) ** 2, 0) / w);
        const bbUpper = bbMa + 2 * bbStd, bbLower = bbMa - 2 * bbStd;
        const bbVerdict = (val >= bbLower && val <= bbUpper) ? "НОРМА" : "ВНИМАНИЕ";
        const w2 = Math.min(window, n), lastW2 = data.slice(-w2);
        const xMean = (w2 - 1) / 2, yMean = lastW2.reduce((s, v) => s + v, 0) / w2;
        const num = lastW2.reduce((s, v, i) => s + (i - xMean) * (v - yMean), 0);
        const den = lastW2.reduce((s, _, i) => s + (i - xMean) ** 2, 0);
        const slope = den > 0 ? num / den : 0;
        const slopePct = mean > 0 ? (slope / mean) * 100 : 0;
        const trendVerdict = slope > 0.3 ? "НОРМА" : (slope >= -0.5 ? "НОРМА" : "ВНИМАНИЕ");
        const verdicts = [zVerdict, zModVerdict, iqrVerdict, bbVerdict, trendVerdict];
        const normaCount = verdicts.filter((v) => v === "НОРМА").length;
        const hasAlarm = verdicts.some((v) => v === "ТРЕВОГА");
        const overall = hasAlarm ? "ТРЕВОГА" : (normaCount >= 4 ? "НОРМА" : (normaCount >= 2 ? "ВНИМАНИЕ" : "ТРЕВОГА"));
        return { val, mean, median, std, mad, pctRank,
          z: { value: zVal, verdict: zVerdict }, zMod: { value: zModVal, verdict: zModVerdict },
          iqr: { lower: iqrLower, upper: iqrUpper, verdict: iqrVerdict },
          bollinger: { ma: bbMa, lower: bbLower, upper: bbUpper, std: bbStd, verdict: bbVerdict },
          trend: { slope, slopePct, verdict: trendVerdict }, normaCount, hasAlarm, overall };
      };
      const _tsVerdictBadge = (v) => {
        const colors = { "НОРМА": "background:#dcfce7;color:#166534", "ВНИМАНИЕ": "background:#fef3c7;color:#92400e", "ТРЕВОГА": "background:#fee2e2;color:#991b1b" };
        return `<span style="display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;${colors[v] || ""}">${v}</span>`;
      };
      const _tsRenderMetric = (label, data) => {
        const a = tsAnalyze(data);
        if (!a) return "";
        const arrow = a.trend.slope > 0.3 ? "↑" : (a.trend.slope < -0.5 ? "↓" : "→");
        return `<tr>
          <td style="font-weight:500;white-space:nowrap;">${label}</td>
          <td class="num">${formatMetric(a.val, 0)}</td>
          <td class="num">${formatMetric(a.mean, 0)}</td>
          <td class="num">${a.pctRank.toFixed(0)}%</td>
          <td>${_tsVerdictBadge(a.z.verdict)}<span style="font-size:10px;color:#64748b;margin-left:3px;">${a.z.value >= 0 ? "+" : ""}${a.z.value.toFixed(2)}</span></td>
          <td>${_tsVerdictBadge(a.zMod.verdict)}</td>
          <td>${_tsVerdictBadge(a.iqr.verdict)}</td>
          <td>${_tsVerdictBadge(a.bollinger.verdict)}</td>
          <td>${_tsVerdictBadge(a.trend.verdict)}<span style="font-size:10px;color:#64748b;margin-left:3px;">${arrow}${a.trend.slopePct >= 0 ? "+" : ""}${a.trend.slopePct.toFixed(1)}%</span></td>
          <td style="text-align:center;">${_tsVerdictBadge(a.overall)}<span style="font-size:10px;color:#64748b;margin-left:3px;">${a.normaCount}/5</span></td>
        </tr>`;
      };
      const _tsRenderBlock = (r) => {
        const metrics = [
          { label: "Выручка ₽", data: r._revSeries },
          { label: "Заказы", data: r._ordersSeries },
          { label: "Показы", data: r._viewsSeries },
          { label: "В корзину", data: r._tocartSeries },
          { label: "Клики (PDP)", data: r._clicksSeries },
          { label: "Позиция", data: r._posSeries },
        ];
        const validMetrics = metrics.filter((m) => Array.isArray(m.data) && m.data.length >= 3);
        if (!validMetrics.length) return "<div style='color:#94a3b8;font-size:12px;'>Недостаточно данных для анализа</div>";
        const rows = validMetrics.map((m) => _tsRenderMetric(m.label, m.data)).join("");
        return `
          <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">Анализ временных рядов (5 методов)</div>
          <div style="overflow-x:auto;">
          <table style="border-collapse:collapse;width:100%;font-size:11px;">
            <thead><tr style="border-bottom:1px solid #e2e8f0;">
              <th style="text-align:left;padding:4px;color:#64748b;">Метрика</th>
              <th style="text-align:right;padding:4px;color:#64748b;" title="Последнее значение ряда (анализируемый день)">Посл.</th>
              <th style="text-align:right;padding:4px;color:#64748b;" title="Среднее арифметическое всего ряда">Ср.</th>
              <th style="text-align:right;padding:4px;color:#64748b;" title="Перцентильный ранг: % значений ряда ≤ текущего. 5% = хуже почти всех дней">Pctl</th>
              <th style="padding:4px;color:#64748b;cursor:help;" title="Z-score: отклонение от среднего в единицах σ.&#10;|Z| < 1 → НОРМА&#10;|Z| 1–2 → ВНИМАНИЕ&#10;|Z| > 2 → ТРЕВОГА&#10;Чувствителен к выбросам.">Z &#9432;</th>
              <th style="padding:4px;color:#64748b;cursor:help;" title="Модифицированный Z-score (MAD): робастная версия Z-score на медиане.&#10;Устойчив к выбросам.&#10;|Z| < 2.5 → НОРМА&#10;|Z| 2.5–3.5 → ВНИМАНИЕ&#10;|Z| > 3.5 → ТРЕВОГА">MAD &#9432;</th>
              <th style="padding:4px;color:#64748b;cursor:help;" title="IQR (межквартильный размах): классический boxplot-метод.&#10;Значение за пределами [Q1−1.5×IQR, Q3+1.5×IQR] → ТРЕВОГА.&#10;Не зависит от формы распределения.">IQR &#9432;</th>
              <th style="padding:4px;color:#64748b;cursor:help;" title="Bollinger Bands: скользящее среднее ±2σ за последние 7 дней.&#10;Оценивает в контексте локальной волатильности.&#10;Значение за полосой → ВНИМАНИЕ.">BB &#9432;</th>
              <th style="padding:4px;color:#64748b;cursor:help;" title="Линейный тренд: наклон (slope) регрессии за 7 дней.&#10;Показывает направление движения.&#10;↑ рост · → стабильно · ↓ снижение&#10;% — slope относительно среднего.">Тренд &#9432;</th>
              <th style="text-align:center;padding:4px;color:#64748b;cursor:help;" title="Итоговый вердикт: сколько из 5 методов дали НОРМА.&#10;4–5/5 → НОРМА&#10;2–3/5 → ВНИМАНИЕ&#10;0–1/5 или есть ТРЕВОГА → ТРЕВОГА">Итог &#9432;</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table></div>
          <div style="font-size:10px;color:#94a3b8;margin-top:4px;">Z = Z-score · MAD = робастный Z · IQR = межквартильный · BB = Bollinger ±2σ · Тренд = slope 7д</div>`;
      };

      const heatRows = visibleSku.slice(0, 80).map((r, idx) => {
        const realIdx = skuStats.indexOf(r);
        // Определяем какие метрики проблемные для этого SKU (из итогового алерта)
        const skuAlerts = [];
        if (r.oos_now) skuAlerts.push("oos");
        if (r.anom_views) skuAlerts.push("views");
        if (r.anom_clicks) skuAlerts.push("clicks");
        if (r.anom_cart) skuAlerts.push("cart");
        if (r.anom_orders) skuAlerts.push("orders");

        const cells = r.series.map((p) => {
          const isLast = p.day === lastDay;
          const border = isLast ? "box-shadow:inset 0 0 0 2px #1e293b;" : "";
          const tip = `${p.day} · выручка ${fmtRub(p.revenue)} · показы ${formatMetric(p.views, 0)} · клики ${formatMetric(p.clicks, 0)} · CR корз ${p.cart.toFixed(1)}% · заказы ${formatMetric(p.orders, 0)} · ${catLabel[p.cat]}`;

          // OOS-день (нет показов)
          if (p.cat === "oos") {
            return `<td class="rnp-heat-cell" data-sku-idx="${realIdx}" title="${tip}" style="background:#1f1f1f;color:#fff;${border}"><div style="font-weight:700;">OOS</div></td>`;
          }

          // Аутофсток-SKU — не показываем воронку, только выручку
          if (r.oos_now) {
            const fgColor = p.cat === "anom" ? "#7f1d1d" : "#0f172a";
            return `<td class="rnp-heat-cell" data-sku-idx="${realIdx}" title="${tip}" style="background:${catColor[p.cat]};color:${fgColor};${border}"><div>${formatMetric(p.revenue, 0)}</div></td>`;
          }

          // Цвета метрик (как в бейджах)
          const mColor = { views: "#92400e", clicks: "#7c4a00", cart: "#6b21a8", orders: "#991b1b" };
          const mBg = { views: "#fef3c7", clicks: "#fce4b8", cart: "#f3e8ff", orders: "#fee2e2" };
          const mLabel = { views: "пок", clicks: "клик", cart: "CR", orders: "зак" };
          const mVal = { views: p.views, clicks: p.clicks, cart: p.cart, orders: p.orders };
          const mAnom = { views: p.anom_views, clicks: p.anom_clicks, cart: p.anom_cart, orders: p.anom_orders };
          const mFmt = (key, val) => key === "cart" ? val.toFixed(1) + "%" : formatMetric(val, 0);

          // Показываем те метрики, которые проблемные на уровне SKU
          const lines = [];
          for (const key of skuAlerts) {
            if (key === "oos") continue;
            const val = mVal[key];
            const isAnomDay = mAnom[key];
            if (isAnomDay) {
              lines.push(`<div style="color:${mColor[key]};font-weight:700;">${mLabel[key]} ${mFmt(key, val)}</div>`);
            } else {
              lines.push(`<div style="color:#64748b;">${mLabel[key]} ${mFmt(key, val)}</div>`);
            }
          }

          // Если нет проблемных метрик — показываем выручку
          if (!lines.length) {
            lines.push(`<div>${formatMetric(p.revenue, 0)}</div>`);
          }

          // Цвет фона ячейки — комбинация: перцентиль выручки + аномалии метрик
          const anomCount = [p.anom_views, p.anom_clicks, p.anom_cart, p.anom_orders].filter(Boolean).length;
          let cellBg;
          if (p.cat === "anom" && anomCount >= 2) {
            cellBg = "#fca5a5"; // красный — аномалия выручки + 2+ метрики
          } else if (p.cat === "anom") {
            cellBg = "#fecaca"; // светло-красный — аномалия выручки
          } else if (anomCount >= 2) {
            cellBg = "#fed7aa"; // оранжевый — 2+ метрик аномальны
          } else if (anomCount === 1) {
            // Цвет по конкретной проблемной метрике
            if (p.anom_views) cellBg = "#fef3c7";
            else if (p.anom_clicks) cellBg = "#fce4b8";
            else if (p.anom_cart) cellBg = "#f3e8ff";
            else if (p.anom_orders) cellBg = "#fee2e2";
            else cellBg = "#fef3c7";
          } else if (p.cat === "low") {
            cellBg = "#fef9c3"; // бледно-жёлтый — ниже нормы
          } else if (p.cat === "high") {
            cellBg = "#dcfce7"; // зелёный — выше нормы
          } else {
            cellBg = "#f1f5f9"; // серый — норма
          }
          const fgColor = "#0f172a";

          return `<td class="rnp-heat-cell" data-sku-idx="${realIdx}" title="${tip}" style="background:${cellBg};color:${fgColor};${border}">${lines.join("")}</td>`;
        }).join("");
        const stockTxt = r.stock_sellable > 0
          ? `<span style="color:#64748b;font-size:10px;">ост. ${formatMetric(r.stock_sellable, 0)}</span>`
          : `<span style="color:#d93025;font-size:10px;font-weight:600;">ост. 0${r.stock_now > 0 ? ` (${formatMetric(r.stock_now, 0)} в пути)` : ""}</span>`;
        const colSpan = allDays.length + 3;
        return `
          <tr class="rnp-heat-row" data-sku-idx="${realIdx}" style="cursor:pointer;">
            <td class="rnp-heat-name" title="${(r.name || "").replace(/"/g, "&quot;")}">
              <div>${(r.offer_id || "").replace(/</g, "&lt;") || "—"} <span class="rnp-expand-arrow" style="font-size:9px;color:#94a3b8;">▸</span></div>
              <div style="margin-top:2px;">${stockTxt}</div>
            </td>
            ${cells}
            <td class="rnp-heat-badges">${stageBadges(r) || `<span style="color:#94a3b8;font-size:10px;">в норме</span>`}</td>
            <td class="rnp-heat-loss" style="text-align:right;color:#d93025;font-weight:600;">${r.loss_abs > 0 ? fmtRub(-r.loss_abs) : "—"}</td>
          </tr>
          <tr class="rnp-ts-detail" data-sku-idx="${realIdx}" style="display:none;">
            <td colspan="${colSpan}" style="padding:8px 12px;background:#f8fafc;border-bottom:2px solid #e2e8f0;">
              ${_tsRenderBlock(r)}
              <button type="button" class="rnp-open-diag-btn" data-offer-id="${(r.offer_id || "").replace(/"/g, "&quot;")}" style="margin-top:10px;padding:7px 16px;background:#005bff;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;">Открыть в диагностике SKU →</button>
            </td>
          </tr>
        `;
      }).join("");

      const heatHead = `
        <tr>
          <th style="text-align:left;">Артикул</th>
          ${allDays.map((d) => `<th style="text-align:center;font-weight:500;color:#64748b;">${dayShort(d)}</th>`).join("")}
          <th style="text-align:left;">Где сломалось</th>
          <th style="text-align:right;">Потеря ₽</th>
        </tr>
      `;

      // ─── DRAWER (мини-воронка) ──────────────────────────────────
      const drawerHtml = `
        <aside id="rnp_drawer" style="position:fixed;top:0;right:-520px;width:500px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,0.18);z-index:9999;transition:right 0.25s ease;overflow-y:auto;padding:20px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 id="rnp_drawer_title" style="margin:0;font-size:16px;">SKU</h3>
            <button id="rnp_drawer_close" type="button" style="background:none;border:none;font-size:24px;cursor:pointer;color:#64748b;line-height:1;">×</button>
          </div>
          <div id="rnp_drawer_body"></div>
        </aside>
      `;

      // ─── СБОРКА ─────────────────────────────────────────────────
      const oosCount = skuStats.filter((r) => r.oos_now || r.oos_day).length;
      const posCount = skuStats.filter((r) => r.anom_pos && !r.oos_now && !r.oos_day).length;
      const showAllChecked = window.rnpShowAll ? "checked" : "";

      analyticsStocksWrap.innerHTML = `
        <style>
          .rnp-grid { display:grid; grid-template-columns: 1fr; gap:16px; align-items:start; }
          .rnp-summary { display:flex;gap:16px;padding:12px 16px;background:#f8fafc;border-radius:8px;margin-bottom:14px;font-size:13px;flex-wrap:wrap;align-items:center; }
          .rnp-summary b { font-size:18px;color:#0f172a; }
          .rnp-summary .rnp-toggle { margin-left:auto;font-size:12px;color:#475569;display:flex;align-items:center;gap:6px;cursor:pointer; }
          .rnp-heat-table { border-collapse:separate;border-spacing:2px;width:100%;font-size:12px; }
          .rnp-heat-table th { padding:6px 4px;font-weight:500;color:#64748b;font-size:11px; }
          .rnp-heat-table td { padding:5px 4px;text-align:center;border-radius:3px;vertical-align:middle; }
          .rnp-heat-name { text-align:left !important;font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;user-select:none; }
          .rnp-heat-name:hover { color:#005bff; }
          .rnp-heat-cell { cursor:pointer;font-size:11px;font-weight:700;letter-spacing:-0.3px;min-width:52px; }
          .rnp-heat-cell:hover { outline:2px solid #005bff; }
          .rnp-heat-badges { text-align:left !important; }
          .rnp-badge { display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-right:3px;white-space:nowrap; }

          .rnp-funnel-row { display:grid;grid-template-columns: 90px 1fr 60px;gap:8px;align-items:center;margin-bottom:8px;font-size:12px; }
          .rnp-funnel-track { position:relative;height:26px;background:#f8fafc;border-radius:4px;overflow:hidden;border:1px solid #e2e8f0; }
          .rnp-funnel-corridor { position:absolute;top:0;bottom:0;background:rgba(148,163,184,0.22);border-left:1px dashed #94a3b8;border-right:1px dashed #94a3b8; }
          .rnp-funnel-mean { position:absolute;top:0;bottom:0;width:1px;background:#475569; }
          .rnp-funnel-marker { position:absolute;top:3px;bottom:3px;width:4px;border-radius:2px; }
          .rnp-funnel-delta { text-align:right;font-weight:600;font-size:11px; }
          .rnp-legend { display:flex;gap:14px;font-size:11px;color:#64748b;margin-top:8px;flex-wrap:wrap; }
          .rnp-legend-item { display:flex;align-items:center;gap:5px; }
          .rnp-legend-sw { width:14px;height:14px;border-radius:3px;display:inline-block; }
        </style>
        <div class="analytics-stocks-wrap" style="max-width: 1600px; margin: 0 auto;">
          <div class="rnp-summary">
            <div>Анализируем: <b>${lastDay || "—"}</b></div>
            <div>Baseline: ${baselineDays.length} дн. (исключая дни без показов)</div>
            <div>Всего SKU: <b>${allCount}</b></div>
            <div>Критичных: <b style="color:#d93025;">${criticalSku.length}</b></div>
            <div>Аутофсток: <b style="color:#1f1f1f;">${oosCount}</b></div>
            ${posCount > 0 ? `<div>Позиция↓: <b style="color:#1f1f1f;">${posCount}</b></div>` : ""}
            <div>Потеря по критичным: <b style="color:#d93025;">${fmtRub(-totalLost)}</b></div>
            <label class="rnp-toggle">
              <input type="checkbox" id="rnp_show_all" ${showAllChecked} />
              Показать все (включая обычные колебания)
            </label>
          </div>
          ${(() => {
            const byDay = new Map();
            rows.forEach((item) => (Array.isArray(item?.daily) ? item.daily : []).forEach((p) => {
              const d = String(p?.day || "").slice(0, 10);
              if (!d) return;
              const b = byDay.get(d) || { day: d, revenue: 0, ordered_units: 0 };
              b.revenue += Number(p?.revenue || 0);
              b.ordered_units += Number(p?.ordered_units || 0);
              byDay.set(d, b);
            }));
            const dailyAgg = [...byDay.values()].sort((a, b) => a.day.localeCompare(b.day));
            return _buildRevenueTrendChart(dailyAgg);
          })()}
          <div class="rnp-grid">
            <section class="analytics-group">
              <div class="analytics-group-head" style="display:block;padding:10px 14px;">
                <div class="analytics-name" style="font-size:15px;">Heatmap «SKU × дни» — где и когда сломалось</div>
                <div class="analytics-meta-line" style="margin-top:2px;"><span class="analytics-chip">Только SKU с реальной аномалией (порог 1σ от собственного коридора колебаний). Жирная рамка = анализируемый день. Клик — детали.</span></div>
                <div class="rnp-legend">
                  <span class="rnp-legend-item"><i class="rnp-legend-sw" style="background:#1f1f1f;"></i>OOS / нет показов</span>
                  <span class="rnp-legend-item"><i class="rnp-legend-sw" style="background:#fca5a5;"></i>Выручка + 2+ метрики</span>
                  <span class="rnp-legend-item"><i class="rnp-legend-sw" style="background:#fecaca;"></i>Аномалия выручки</span>
                  <span class="rnp-legend-item"><i class="rnp-legend-sw" style="background:#fed7aa;"></i>2+ метрики проблемны</span>
                  <span class="rnp-legend-item"><i class="rnp-legend-sw" style="background:#fef3c7;"></i>1 метрика</span>
                  <span class="rnp-legend-item"><i class="rnp-legend-sw" style="background:#fef9c3;"></i>Ниже среднего</span>
                  <span class="rnp-legend-item"><i class="rnp-legend-sw" style="background:#f1f5f9;"></i>Норма</span>
                  <span class="rnp-legend-item"><i class="rnp-legend-sw" style="background:#dcfce7;"></i>Выше среднего</span>
                </div>
              </div>
              <div class="analytics-detail" style="display:block;padding:10px;max-height:680px;overflow:auto;">
                <table class="rnp-heat-table">
                  <thead>${heatHead}</thead>
                  <tbody>${heatRows || `<tr><td colspan="${allDays.length + 3}" style="text-align:center;color:#8a97aa;padding:30px;">Критичных аномалий нет — все колебания в пределах нормы. Включи «Показать все», если хочешь увидеть остальные SKU.</td></tr>`}</tbody>
                </table>
              </div>
            </section>
          </div>
        </div>
        ${drawerHtml}
      `;

      const showAllToggle = document.getElementById("rnp_show_all");
      if (showAllToggle) {
        showAllToggle.addEventListener("change", () => {
          window.rnpShowAll = showAllToggle.checked;
          renderRnpReport(items, summary);
        });
      }

      // ─── DRAWER ЛОГИКА ──────────────────────────────────────────
      const drawer = document.getElementById("rnp_drawer");
      const drawerTitle = document.getElementById("rnp_drawer_title");
      const drawerBody = document.getElementById("rnp_drawer_body");
      const closeBtn = document.getElementById("rnp_drawer_close");

      const openDrawer = (idx) => {
        const r = skuStats[idx];
        if (!r) return;
        drawerTitle.textContent = `${r.offer_id || r.sku} ${r.name ? "— " + r.name : ""}`;

        // Полоска с коридором нормы [min..max], серой зоной mean±σ, и точкой дня
        const funnelRow = (label, last, st, deltaPct, deltaPctPrev, isAnom) => {
          const lo = Math.min(st.min, last);
          const hi = Math.max(st.max, last, 1);
          const span = hi - lo || 1;
          const pos = (v) => ((v - lo) / span) * 100;
          const corridorLeft = pos(Math.max(lo, st.mean - st.sd));
          const corridorRight = pos(Math.min(hi, st.mean + st.sd));
          const meanPos = pos(st.mean);
          const lastPos = pos(last);
          const markerColor = isAnom ? "#d93025" : (last < st.mean ? "#f59e0b" : "#1aa260");
          const dCls = isAnom ? "color:#d93025;" : (deltaPct === null ? "color:#94a3b8;" : (deltaPct < 0 ? "color:#f59e0b;" : "color:#1aa260;"));
          return `
            <div class="rnp-funnel-row">
              <div style="color:#475569;">${label}</div>
              <div class="rnp-funnel-track" title="min ${formatMetric(st.min, 0)} · ср ${formatMetric(st.mean, 1)} · max ${formatMetric(st.max, 0)} · σ ${formatMetric(st.sd, 1)}">
                <div class="rnp-funnel-corridor" style="left:${corridorLeft.toFixed(1)}%;width:${(corridorRight - corridorLeft).toFixed(1)}%;"></div>
                <div class="rnp-funnel-mean" style="left:${meanPos.toFixed(1)}%;"></div>
                <div class="rnp-funnel-marker" style="left:calc(${lastPos.toFixed(1)}% - 2px);background:${markerColor};"></div>
              </div>
              <div class="rnp-funnel-delta" style="${dCls}">${fmtPctVal(deltaPct)}</div>
            </div>
            <div style="font-size:10px;color:#94a3b8;margin:-4px 0 8px 98px;">
              день <b style="color:#0f172a;">${formatMetric(last, 0)}</b> · ср. ${formatMetric(st.mean, 1)} · диапазон ${formatMetric(st.min, 0)}…${formatMetric(st.max, 0)} · к пред. дню ${fmtPctVal(deltaPctPrev)}
            </div>
          `;
        };

        const oosBadge = r.oos_now
          ? `<span class="rnp-badge" style="background:#1f1f1f;color:#fff;">Аутофсток: доступно 0</span>`
          : (r.position_collapsed
            ? `<span class="rnp-badge" style="background:#1f1f1f;color:#fff;">Позиция слетела: ${r.position_last.toFixed(0)} (было ${r.position_stats.mean.toFixed(0)})</span>`
            : (r.anom_pos
              ? `<span class="rnp-badge" style="background:#1f1f1f;color:#fff;">Позиция↓: ${r.position_last.toFixed(0)} (ср. ${r.position_stats.mean.toFixed(0)})</span>`
              : (r.oos_day ? `<span class="rnp-badge" style="background:#1f1f1f;color:#fff;">показы≈0 в день</span>` : "")));
        const stockLine = `Доступно для продажи: <b>${formatMetric(r.stock_sellable, 0)}</b> (всего ${formatMetric(r.stock_now, 0)}: FBO ${formatMetric(r.stock_fbo, 0)} / FBS ${formatMetric(r.stock_fbs, 0)})`
          + (r.oos_days_30d > 0 ? ` · OOS за 30д: <b>${r.oos_days_30d}</b>` : "");

        drawerBody.innerHTML = `
          <div style="padding:12px 14px;background:${r.diag_color}15;border-left:3px solid ${r.diag_color};border-radius:4px;margin-bottom:14px;font-size:13px;color:${r.diag_color};font-weight:600;line-height:1.4;">
            ${r.diagnosis}
          </div>
          ${oosBadge ? `<div style="margin-bottom:10px;">${oosBadge}</div>` : ""}
          <div style="font-size:12px;color:#475569;margin-bottom:14px;padding:8px 10px;background:#f8fafc;border-radius:4px;">
            ${stockLine}
            ${r.oos_baseline_days > 0 ? `<div style="margin-top:4px;color:#92400e;">⚠ В baseline ${r.oos_baseline_days} дн. без показов — исключены из расчёта</div>` : ""}
          </div>
          ${r.skip_funnel ? `
          <div style="font-size:13px;color:#64748b;margin-bottom:14px;padding:12px;background:#fef2f2;border-radius:6px;text-align:center;">
            Остаток = 0 → анализ воронки не имеет смысла. Пополни запас.
          </div>
          ` : `
          <div style="font-size:13px;color:#475569;margin-bottom:14px;">
            Выручка дня: <b style="color:#0f172a;">${fmtRub(r.revenue_last)}</b> vs ср. ${fmtRub(r.revenue_stats.mean)}
            <span style="${r.anom_rev ? "color:#d93025" : "color:#f59e0b"};font-weight:600;margin-left:8px;">${fmtPctVal(r.revenue_delta_pct)}</span>
          </div>
          <h4 style="margin:14px 0 10px;font-size:12px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Воронка vs коридор нормы (mean ± σ)</h4>
          ${funnelRow("Позиция", r.position_last, r.position_stats, null, null, r.anom_pos)}
          ${funnelRow("Показы", r.views_last, r.views_stats, r.views_delta_pct, r.views_delta_pct_prev, r.anom_views)}
          ${funnelRow("  сео", r.seo_views_last, r.seo_views_stats, null, null, r.anom_seo_views)}
          ${funnelRow("  реклама", r.ad_views_last, r.ad_views_stats, null, null, r.anom_ad_views)}
          ${funnelRow("Клики", r.clicks_last, r.clicks_stats, r.clicks_delta_pct, null, r.anom_clicks)}
          ${funnelRow("CR корзина %", r.cart_last, r.cart_stats, r.cart_delta_pct, r.cart_delta_pct_prev, r.anom_cart)}
          ${funnelRow("Заказы", r.orders_last, r.orders_stats, r.orders_delta_pct, r.orders_delta_pct_prev, r.anom_orders)}
          ${funnelRow("Выручка ₽", r.revenue_last, r.revenue_stats, r.revenue_delta_pct, r.revenue_delta_pct_prev, r.anom_rev)}
          <div style="font-size:10px;color:#94a3b8;margin-top:8px;">
            Серая зона = коридор обычных колебаний (среднее ± 1σ). Линия посередине = среднее. Маркер за пределами серой зоны = аномалия.
          </div>
          ${_tsRenderBlock(r)}
          `}
          <button type="button" id="rnp_drawer_open_diag" style="margin-top:16px;width:100%;padding:10px;background:#005bff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">
            Открыть в диагностике SKU →
          </button>
        `;
        drawer.style.right = "0";

        const diagBtn = document.getElementById("rnp_drawer_open_diag");
        if (diagBtn) {
          diagBtn.addEventListener("click", () => {
            try {
              reportType.value = "article_analytics";
              if (offerId) offerId.value = r.offer_id || "";
              reportType.dispatchEvent(new Event("change"));
            } catch (_) {}
          });
        }
      };

      const closeDrawer = () => { drawer.style.right = "-520px"; };
      if (closeBtn) closeBtn.addEventListener("click", closeDrawer);

      // Биндим клики: имя артикула → раскрыть/скрыть блок анализа, ячейка дня → drawer
      analyticsStocksWrap.querySelectorAll(".rnp-heat-name").forEach((el) => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          const idx = el.dataset.skuIdx ?? el.closest("[data-sku-idx]")?.dataset.skuIdx;
          if (idx == null) return;
          const detailRow = analyticsStocksWrap.querySelector(`.rnp-ts-detail[data-sku-idx="${idx}"]`);
          if (!detailRow) return;
          const isOpen = detailRow.style.display !== "none";
          // Закрыть все открытые
          analyticsStocksWrap.querySelectorAll(".rnp-ts-detail").forEach((r) => r.style.display = "none");
          analyticsStocksWrap.querySelectorAll(".rnp-heat-name .rnp-expand-arrow").forEach((a) => a.textContent = "▸");
          if (!isOpen) {
            detailRow.style.display = "";
            const arrow = el.querySelector(".rnp-expand-arrow");
            if (arrow) arrow.textContent = "▾";
          }
        });
      });
      analyticsStocksWrap.querySelectorAll(".rnp-heat-cell").forEach((el) => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          const idx = Number(el.dataset.skuIdx ?? el.closest("[data-sku-idx]")?.dataset.skuIdx);
          if (!isNaN(idx)) openDrawer(idx);
        });
      });
      // Кнопка «Открыть в диагностике SKU»
      analyticsStocksWrap.querySelectorAll(".rnp-open-diag-btn").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const offId = btn.dataset.offerId || "";
          try {
            reportType.value = "article_analytics";
            if (offerId) offerId.value = offId;
            reportType.dispatchEvent(new Event("change"));
            setTimeout(() => { const loadBtn = document.getElementById("loadReportBtn"); if (loadBtn) loadBtn.click(); }, 100);
          } catch (_) {}
        });
      });
    }

    // ─── Отчёт «Акции» ─────────────────────────────────────────────
    window.actionsReportState = window.actionsReportState || { mode: 'current', days_back: 30 };

    function actionsModeButton(label, value, current) {
      const active = value === current ? 'active' : '';
      return `<button type="button" class="report-top-menu-btn ${active}" data-actions-mode="${value}">${label}</button>`;
    }
    function actionsDaysButton(label, value, current) {
      const active = String(value) === String(current) ? 'active' : '';
      return `<button type="button" class="report-top-menu-btn ${active}" data-actions-days="${value}">${label}</button>`;
    }

    function fmtR(value) {
      const n = Number(value || 0);
      if (!isFinite(n)) return '0 ₽';
      return Math.round(n).toLocaleString('ru-RU') + ' ₽';
    }
    function fmtPct(value) {
      const n = Number(value || 0) * 100;
      if (!isFinite(n)) return '0%';
      return n.toFixed(1) + '%';
    }
    function fmtN(value, digits = 0) {
      const n = Number(value || 0);
      if (!isFinite(n)) return '0';
      return n.toLocaleString('ru-RU', { minimumFractionDigits: digits, maximumFractionDigits: digits });
    }

    function buildActionProductDetailRows(p) {
      // Дерево расходов: fact + pre_action (current) или fact + simulation (simulation)
      const fact = p.fact || {};
      const sim = p.simulation || null;
      const pre = p.pre_action || null;
      const hasComparison = sim || pre;
      const rows = [
        ['Продажи (выручка)', 'revenue'],
        ['− Вознаграждение Ozon', 'sale_commission'],
        ['− Эквайринг', 'acquiring'],
        ['− Услуги доставки + FBO + прочее (фикс на ед.)', 'fixed_costs'],
        ['− Реклама', 'ad_spend'],
        ['− Себестоимость', 'material_cost'],
        ['− Налог', 'tax'],
        ['= Валовая прибыль', 'gross_profit'],
      ];
      const parts = [];
      parts.push(`<table class="action-detail-tree">`);
      if (pre) {
        parts.push(`<thead><tr><th style="text-align:left">Статья</th><th style="text-align:right">До акции</th><th style="text-align:right">Акция (факт)</th><th style="text-align:right">Δ эффект</th></tr></thead><tbody>`);
      } else if (sim) {
        parts.push(`<thead><tr><th style="text-align:left">Статья</th><th style="text-align:right">Текущие</th><th style="text-align:right">Акция</th><th style="text-align:right">Δ</th></tr></thead><tbody>`);
      } else {
        parts.push(`<thead><tr><th style="text-align:left">Статья</th><th style="text-align:right">Факт</th></tr></thead><tbody>`);
      }
      for (const [label, key] of rows) {
        const fv = Number(fact[key] || 0);
        const isGross = key === 'gross_profit';
        const grossCls = isGross ? ' style="font-weight:600;border-top:1px solid #d8e0ea;"' : '';
        if (pre) {
          const pv = Number(pre[key] || 0);
          const dv = fv - pv;
          const dCls = dv > 0 ? 'color:#1aa260' : (dv < 0 ? 'color:#d93025' : 'color:#999');
          parts.push(`<tr${grossCls}><td>${label}</td><td style="text-align:right;color:#666;">${fmtR(pv)}</td><td style="text-align:right">${fmtR(fv)}</td><td style="text-align:right;${dCls}">${dv >= 0 ? '+' : ''}${fmtR(dv)}</td></tr>`);
        } else if (sim) {
          const sv = Number(sim[key] || 0);
          const dv = sv - fv;
          const dCls = dv > 0 ? 'color:#1aa260' : (dv < 0 ? 'color:#d93025' : 'color:#999');
          parts.push(`<tr${grossCls}><td>${label}</td><td style="text-align:right">${fmtR(fv)}</td><td style="text-align:right">${fmtR(sv)}</td><td style="text-align:right;${dCls}">${dv >= 0 ? '+' : ''}${fmtR(dv)}</td></tr>`);
        } else {
          parts.push(`<tr${grossCls}><td>${label}</td><td style="text-align:right">${fmtR(fv)}</td></tr>`);
        }
      }
      // gross_profit_pct
      if (pre) {
        parts.push(`<tr><td style="color:#666">% валовой от выручки</td><td style="text-align:right;color:#666;">${fmtPct(pre.gross_profit_pct || 0)}</td><td style="text-align:right">${fmtPct(fact.gross_profit_pct || 0)}</td><td></td></tr>`);
      } else if (sim) {
        parts.push(`<tr><td style="color:#666">% валовой от выручки</td><td style="text-align:right">${fmtPct(fact.gross_profit_pct || 0)}</td><td style="text-align:right">${fmtPct(sim.gross_profit_pct || 0)}</td><td></td></tr>`);
      } else {
        parts.push(`<tr><td style="color:#666">% валовой от выручки</td><td style="text-align:right">${fmtPct(fact.gross_profit_pct || 0)}</td></tr>`);
      }
      parts.push(`</tbody></table>`);
      return parts.join('');
    }

    function renderAdvertisingSummary(data) {
      if (!advertisingReportWrap) return;
      const wrap = advertisingReportWrap;
      if (!data || data.error) {
        wrap.innerHTML = `<div style="padding:24px;color:#A32D2D;">${data?.error || 'Ошибка загрузки сводки'}</div>`;
        return;
      }
      const items = data.items || [];
      if (items.length === 0) {
        wrap.innerHTML = `<div style="padding:24px;color:#5f5e5a;">Нет данных по рекламе за выбранный период</div>`;
        return;
      }

      // Pre-compute derived fields for sorting
      const accIndex = data._accruals || {};
      const taxRate = getAccrualTaxRate();
      for (const it of items) {
        it.cart_rate = it.clicks > 0 ? Math.round(it.adds_to_cart / it.clicks * 1000) / 10 : 0;
        it.cpb = it.adds_to_cart > 0 ? Math.round(it.spent / it.adds_to_cart * 100) / 100 : 0;
        // mpNoAdPct per article from accruals
        const acc = accIndex[(it.offer_id || '').toLowerCase().trim()] || {};
        const accRev = Number(acc.revenue_sales || acc.sales_total || 0);
        const accMpExp = Number(acc.marketplace_expenses || 0);
        const accAdSpend = Number(acc.ad_spend || acc.pay_per_click || 0);
        it._mpNoAdPct = accRev > 0 ? (accMpExp - accAdSpend) / accRev : 0;
        // Валовая прибыль — «Только реклама» (ad_revenue, ad_orders)
        const adRev = it.ad_revenue || 0;
        const adMpExp = adRev * it._mpNoAdPct;
        const adAccrued = adRev - adMpExp - it.spent;
        const adMatCost = (it.unit_cost || 0) * (it.ad_orders || 0);
        const adTax = adRev * (taxRate / 100);
        it.gross_profit = Math.round(adAccrued - adMatCost - adTax);
        it.gross_profit_pct = adRev > 0 ? Math.round(it.gross_profit / adRev * 1000) / 10 : 0;
        // Валовая прибыль — «Итого» (total_revenue, total_qty)
        const totRev = it.total_revenue || 0;
        const totMpExp = totRev * it._mpNoAdPct;
        const totAccrued = totRev - totMpExp - it.spent;
        const totMatCost = (it.unit_cost || 0) * (it.total_qty || 0);
        const totTax = totRev * (taxRate / 100);
        it.gross_profit_total = Math.round(totAccrued - totMatCost - totTax);
        it.gross_profit_total_pct = totRev > 0 ? Math.round(it.gross_profit_total / totRev * 1000) / 10 : 0;
      }

      const RK = 'advertising_summary'; // reportKey for cell color ranges
      const fmt = (n) => new Intl.NumberFormat('ru-RU', {maximumFractionDigits: 0, useGrouping: true}).format(n || 0);
      const fmt1 = (n) => new Intl.NumberFormat('ru-RU', {maximumFractionDigits: 1, useGrouping: true}).format(n || 0);
      const fmt2 = (n) => new Intl.NumberFormat('ru-RU', {maximumFractionDigits: 2, useGrouping: true}).format(n || 0);
      const cc = (col, val) => { const bg = cellColorForValue(RK, col, val); return bg ? `background:${bg};` : ''; };
      const ccA = (col) => getCellColorRanges(RK, col) ? ' ccr-active' : '';

      // Columns: key, label, fn, ad-mode raw, total-mode raw
      // If rawTotal is defined, toggle switches between raw and rawTotal
      const cols = [
        {key: 'views',       label: 'Показы',      fn: fmt,                raw: i => i.views},
        {key: 'clicks',      label: 'Клики',       fn: fmt,                raw: i => i.clicks},
        {key: 'ctr',         label: 'CTR %',       fn: v => fmt2(v),       raw: i => i.ctr},
        {key: 'adds_to_cart',label: 'Корзина',      fn: fmt,                raw: i => i.adds_to_cart},
        {key: 'cart_rate',   label: 'CR корз %',   fn: v => fmt1(v) + '%', raw: i => i.cart_rate},
        {key: 'cpb',         label: 'CPB ₽',       fn: v => fmt2(v),       raw: i => i.cpb},
        {key: 'orders',      label: 'Заказы',      fn: v => String(v),     raw: i => i.ad_orders,   rawTotal: i => i.total_qty, bold: true},
        {key: 'spent',       label: 'Расход',       fn: fmt,                raw: i => i.spent},
        {key: 'revenue',     label: 'Выручка',     fn: fmt,                raw: i => i.ad_revenue,  rawTotal: i => i.total_revenue},
        {key: 'drr',         label: 'ДРР %',       fn: v => fmt1(v) + '%', raw: i => i.drr_ad,      rawTotal: i => i.drr_total},
        {key: 'cpc',         label: 'CPC',         fn: v => fmt2(v),       raw: i => i.cpc},
        {key: 'cpo',         label: 'CPO',         fn: fmt,                raw: i => i.cpo},
        {key: 'gross_profit',    label: 'Вал. прибыль', fn: fmt,            raw: i => i.gross_profit, rawTotal: i => i.gross_profit_total},
        {key: 'gross_profit_pct',label: '% к OZ',       fn: v => fmt1(v) + '%', raw: i => i.gross_profit_pct, rawTotal: i => i.gross_profit_total_pct},
      ];

      const bdr = 'border-top:0.5px solid rgba(0,0,0,0.1);';
      const tdR = 'text-align:right;padding:6px 10px;font-variant-numeric:tabular-nums;white-space:nowrap;';
      const thBase = 'text-align:right;padding:8px 10px;font-weight:400;font-size:11px;color:#5f5e5a;white-space:nowrap;cursor:pointer;user-select:none;';

      // Helper: compute footer totals for a mode
      function calcTotals(mode) {
        const totViews = items.reduce((a, i) => a + i.views, 0);
        const totClicks = items.reduce((a, i) => a + i.clicks, 0);
        const totAtc = items.reduce((a, i) => a + i.adds_to_cart, 0);
        const totSpent = items.reduce((a, i) => a + i.spent, 0);
        const totOrders = mode === 'total' ? items.reduce((a, i) => a + i.total_qty, 0) : items.reduce((a, i) => a + i.ad_orders, 0);
        const totRevenue = mode === 'total' ? items.reduce((a, i) => a + i.total_revenue, 0) : items.reduce((a, i) => a + i.ad_revenue, 0);
        const totGp = mode === 'total' ? items.reduce((a, i) => a + (i.gross_profit_total || 0), 0) : items.reduce((a, i) => a + (i.gross_profit || 0), 0);
        return {
          views: totViews, clicks: totClicks, ctr: totViews > 0 ? (totClicks / totViews * 100) : 0,
          adds_to_cart: totAtc, cart_rate: totClicks > 0 ? (totAtc / totClicks * 100) : 0,
          cpb: totAtc > 0 ? (totSpent / totAtc) : 0,
          orders: totOrders, spent: totSpent, revenue: totRevenue,
          drr: totRevenue > 0 ? (totSpent / totRevenue * 100) : 0,
          cpc: totClicks > 0 ? (totSpent / totClicks) : 0,
          cpo: totOrders > 0 ? (totSpent / totOrders) : 0,
          gross_profit: totGp,
          gross_profit_pct: totRevenue > 0 ? Math.round(totGp / totRevenue * 1000) / 10 : 0,
        };
      }

      let html = '';
      html += `<div style="display:flex;flex-direction:column;align-items:center;padding:0 24px;">`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:12px;width:100%;max-width:1400px;">
        <div>
          <h2 style="font-size:22px;font-weight:500;margin:0;">Сводка по рекламе</h2>
          <div style="font-size:13px;color:#5f5e5a;margin-top:4px;">${items.length} артикулов · ${data.num_days || 30} дней (${data.date_from || ''} — ${data.date_to || ''})</div>
        </div>
        <div style="display:flex;gap:4px;align-items:center;">
          <button id="advSummaryModeAd" style="padding:6px 14px;font-size:12px;border:1px solid rgba(0,0,0,0.18);border-radius:8px;cursor:pointer;background:#378ADD;color:#fff;" onclick="window._advSummaryToggle('ad')">Только реклама</button>
          <button id="advSummaryModeTotal" style="padding:6px 14px;font-size:12px;border:1px solid rgba(0,0,0,0.18);border-radius:8px;cursor:pointer;background:#f1efe8;color:#666;" onclick="window._advSummaryToggle('total')">Итого с органикой</button>
        </div>
      </div>`;
      html += `<div style="font-size:11px;color:#888780;margin-bottom:10px;width:100%;max-width:1400px;">Клик по артикулу — детальный отчёт в новой вкладке. ПКМ на заголовке — цветовая разметка.</div>`;

      html += `<div style="background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;overflow-x:auto;">
        <table id="advSummaryTable" style="border-collapse:collapse;font-size:12px;">
          <thead><tr style="background:#f1efe8;">
            <th style="text-align:left;padding:8px 10px;font-weight:400;font-size:11px;color:#5f5e5a;white-space:nowrap;cursor:pointer;user-select:none;" data-sort="offer_id" data-color-report="${RK}" data-color-col="offer_id" data-color-label="Артикул">Артикул ▼</th>`;
      for (const c of cols) {
        html += `<th style="${thBase}" class="${ccA(c.key)}" data-sort="${c.key}" data-color-report="${RK}" data-color-col="${c.key}" data-color-label="${c.label}"><span>${c.label}</span></th>`;
      }
      html += `</tr></thead><tbody id="advSummaryBody">`;

      for (const it of items) {
        html += `<tr class="advSummaryRow" style="cursor:pointer;" data-offer="${(it.offer_id || '').replace(/"/g, '&quot;')}" onclick="window._advSummaryClick(this)">
          <td style="text-align:left;padding:6px 10px;${bdr}font-weight:500;color:#378ADD;white-space:nowrap;">${it.offer_id || ''}</td>`;
        for (const c of cols) {
          const rawAd = c.raw(it);
          const rawTot = c.rawTotal ? c.rawTotal(it) : rawAd;
          const bold = c.bold ? 'font-weight:500;' : '';
          html += `<td style="${tdR}${bdr}${bold}${cc(c.key, rawAd)}" data-col="${c.key}" data-raw-ad="${rawAd}" data-raw-total="${rawTot}">${c.fn(rawAd)}</td>`;
        }
        html += `</tr>`;
      }

      // Footer
      const initTotals = calcTotals('ad');
      html += `</tbody><tfoot><tr id="advSummaryFooter" style="font-weight:500;background:#f1efe8;border-top:1px solid rgba(0,0,0,0.18);">
        <td style="padding:8px 10px;text-align:left;">Итого</td>`;
      for (const c of cols) {
        html += `<td style="text-align:right;padding:8px 10px;white-space:nowrap;" data-col="${c.key}">${c.fn(initTotals[c.key])}</td>`;
      }
      html += `</tr></tfoot></table></div>`;
      html += `</div>`;
      wrap.innerHTML = html;

      // Toggle mode: switch cell values between ad / total
      window._advSummaryMode = 'ad';
      window._advSummaryToggle = function(mode) {
        window._advSummaryMode = mode;
        const isTotal = mode === 'total';
        // Update buttons
        const btnAd = document.getElementById('advSummaryModeAd');
