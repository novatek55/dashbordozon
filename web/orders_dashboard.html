    function attachActionsControlHandlers() {
      analyticsStocksWrap.querySelectorAll('[data-actions-mode]').forEach((btn) => {
        btn.addEventListener('click', () => {
          window.actionsReportState.mode = btn.dataset.actionsMode;
          loadReport();
        });
      });
      analyticsStocksWrap.querySelectorAll('[data-actions-days]').forEach((btn) => {
        btn.addEventListener('click', () => {
          window.actionsReportState.days_back = parseInt(btn.dataset.actionsDays, 10) || 30;
          loadReport();
        });
      });
      // Фильтр по артикулу
      const filterInput = document.getElementById('actions_filter_input');
      if (filterInput) {
        let filterTimer;
        filterInput.addEventListener('input', () => {
          clearTimeout(filterTimer);
          filterTimer = setTimeout(() => {
            window.actionsReportState.filter = filterInput.value;
            if (window._lastActionsReportData) renderActionsReport(window._lastActionsReportData);
          }, 300);
        });
      }
      // Чекбокс скрытия без остатка
      const hideOosCheck = document.getElementById('actions_hide_oos');
      if (hideOosCheck) {
        hideOosCheck.addEventListener('change', () => {
          window.actionsReportState.hideOos = hideOosCheck.checked;
          if (window._lastActionsReportData) renderActionsReport(window._lastActionsReportData);
        });
      }
      // Сортировка по колонкам
      analyticsStocksWrap.querySelectorAll('[data-sort-col]').forEach((th) => {
        th.addEventListener('click', (e) => {
          e.stopPropagation();
          const col = th.dataset.sortCol;
          const st = window.actionsReportState.sort;
          if (st.col === col) { st.asc = !st.asc; } else { st.col = col; st.asc = col === 'offer_id'; }
          if (window._lastActionsReportData) renderActionsReport(window._lastActionsReportData);
        });
      });
    }

    function attachActionsRowHandlers() {
      // Сворачивание акций
      analyticsStocksWrap.querySelectorAll('[data-action-toggle]').forEach((head) => {
        head.addEventListener('click', () => {
          const body = document.getElementById(head.dataset.actionToggle);
          if (!body) return;
          const hidden = body.style.display === 'none';
          body.style.display = hidden ? '' : 'none';
          head.classList.toggle('collapsed', !hidden);
          const sign = head.querySelector('.action-group-toggle');
          if (sign) sign.textContent = hidden ? '▼' : '▶';
        });
      });
      // Раскрытие детали товара
      analyticsStocksWrap.querySelectorAll('[data-detail-target]').forEach((row) => {
        row.addEventListener('click', () => {
          const detail = document.getElementById(row.dataset.detailTarget);
          if (!detail) return;
          detail.classList.toggle('hidden');
          const sign = row.querySelector('.action-toggle');
          if (sign) sign.textContent = detail.classList.contains('hidden') ? '▶' : '▼';
        });
      });
      // «Выбрать всех кандидатов»
      analyticsStocksWrap.querySelectorAll('.action-select-all').forEach((cb) => {
        cb.addEventListener('change', () => {
          const aidx = cb.dataset.actionIdx;
          analyticsStocksWrap.querySelectorAll(`.action-product-check[data-action-idx="${aidx}"]`).forEach((c) => { c.checked = cb.checked; });
          _updateSelectedCount(aidx);
        });
      });
      // Обновление счётчика при клике на чекбокс товара
      analyticsStocksWrap.querySelectorAll('.action-product-check').forEach((cb) => {
        cb.addEventListener('change', () => _updateSelectedCount(cb.dataset.actionIdx));
      });
      // Кнопка «Добавить в акцию»
      analyticsStocksWrap.querySelectorAll('.action-activate-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const actionId = btn.dataset.actionId;
          const aidx = btn.dataset.actionIdx;
          const checks = analyticsStocksWrap.querySelectorAll(`.action-product-check[data-action-idx="${aidx}"]:checked`);
          if (!checks.length) { alert('Выберите товары для добавления'); return; }
          const products = Array.from(checks).map(c => ({
            product_id: Number(c.dataset.productId),
            action_price: Number(c.dataset.actionPrice),
          }));
          if (!confirm(`Добавить ${products.length} товар(ов) в акцию по max_action_price?\n\n${products.map(p => `ID ${p.product_id} → ${p.action_price} ₽`).join('\n')}`)) return;
          btn.disabled = true;
          btn.textContent = 'Отправка...';
          try {
            const resp = await fetchJson('/api/action-products/activate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action_id: Number(actionId), products }),
            });
            if (resp.ok) {
              alert(`Готово! Добавлено ${products.length} товар(ов) в акцию.`);
              loadReport();
            } else {
              alert(`Ошибка: ${resp.error || JSON.stringify(resp)}`);
            }
          } catch (e) {
            alert(`Ошибка: ${e.message}`);
          } finally {
            btn.disabled = false;
            btn.textContent = 'Добавить выбранные в акцию';
          }
        });
      });
    }
    function _updateSelectedCount(aidx) {
      const cnt = analyticsStocksWrap.querySelectorAll(`.action-product-check[data-action-idx="${aidx}"]:checked`).length;
      const span = analyticsStocksWrap.querySelector(`.action-selected-count[data-action-idx="${aidx}"]`);
      if (span) span.textContent = cnt > 0 ? `выбрано: ${cnt}` : '';
    }

    function buildAnalyticsChart(group) {
        const sales = Array.isArray(group.sales_series_28) ? group.sales_series_28.map((v) => Number(v || 0)) : [];
        const labels = Array.isArray(group.sales_dates_28) ? group.sales_dates_28 : [];
        const width = 340;
        const height = 80;
        const padX = 6;
        const padY = 8;
        const baseY = height - padY;
        const usableH = height - padY * 2;
        const futureDays = 28;
        const histCount = Math.max(sales.length, 28);
        const totalCount = histCount + futureDays;
        const stepX = (width - padX * 2) / Math.max(totalCount - 1, 1);
        const todayX = padX + (histCount - 1) * stepX;
        const currentStock = Number(group.stock_fbo || 0) + Number(group.stock_fbs || 0);
        const totalSales28 = sales.reduce((sum, value) => sum + Number(value || 0), 0);
        const firstSaleIndex = sales.findIndex((value) => Number(value || 0) > 0);
        const appearanceIndex = firstSaleIndex >= 0 ? firstSaleIndex : Math.max(0, histCount - 1);
        const stockAtAppearance = currentStock + sales.slice(appearanceIndex).reduce((sum, value) => sum + Number(value || 0), 0);
        const histStock = Array.from({ length: histCount }, () => 0);
        let runningStock = stockAtAppearance;
        histStock[appearanceIndex] = Math.max(0, runningStock);
        for (let i = appearanceIndex + 1; i < histCount; i += 1) {
          runningStock -= Number(sales[i - 1] || 0);
          histStock[i] = Math.max(0, runningStock);
        }
        if (firstSaleIndex < 0 && currentStock > 0) {
          for (let i = 0; i < histCount; i += 1) {
            histStock[i] = currentStock;
          }
        }
        const forecastStock = [];
        const avgDaily = Math.max(0, Number(group.avg_daily_sales || 0));
        let forecastRunning = Math.max(0, currentStock);
        for (let i = 0; i < futureDays; i += 1) {
          forecastRunning = Math.max(0, forecastRunning - avgDaily);
          forecastStock.push(forecastRunning);
        }
        const maxStock = Math.max(...histStock, ...forecastStock, currentStock, 1);
        const yForStock = (value) => baseY - (Math.max(0, value) / maxStock) * usableH;
        const histPoints = histStock.map((value, index) => `${(padX + index * stepX).toFixed(2)},${yForStock(value).toFixed(2)}`).join(" ");
        const forecastPoints = [`${todayX.toFixed(2)},${yForStock(currentStock).toFixed(2)}`]
          .concat(forecastStock.map((value, index) => `${(todayX + (index + 1) * stepX).toFixed(2)},${yForStock(value).toFixed(2)}`))
          .join(" ");
        let depletionMarker = "";
        let depletionText = "";

        if (group.depletion_within_horizon && Number(group.depletion_days_left || 0) >= 0) {
          const depletionDays = Math.min(futureDays, Number(group.depletion_days_left || 0));
          const depletionX = todayX + depletionDays * stepX;
          depletionMarker = `<circle cx="${depletionX.toFixed(2)}" cy="${baseY.toFixed(2)}" r="3.2" fill="#ff6a3d" />`;
          depletionText = `<text x="${depletionX.toFixed(2)}" y="${(baseY + 13).toFixed(2)}" text-anchor="middle" font-size="10" fill="#ff6a3d">${fmt(group.depletion_date_label)}</text>`;
        }

        return `
          <div class="analytics-chart">
            <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
              <line x1="${padX}" y1="${baseY}" x2="${width - padX}" y2="${baseY}" stroke="#d8e0ea" stroke-width="1" />
              <polyline points="${histPoints}" fill="none" stroke="#f44336" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
              <line x1="${todayX.toFixed(2)}" y1="4" x2="${todayX.toFixed(2)}" y2="${baseY}" stroke="#005bff" stroke-width="1.5" />
              <polyline points="${forecastPoints}" fill="none" stroke="#ff6a3d" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0" />
              ${depletionMarker}
              ${depletionText}
            </svg>
            <div class="analytics-chart-caption">
              <span>${fmt(labels[0])}</span>
              <span>Сегодня ${fmt(labels[labels.length - 1])}</span>
              <span>${group.depletion_within_horizon && group.depletion_date_label ? `Остаток до ${fmt(group.depletion_date_label)}` : "Запас > 28 дней"}</span>
            </div>
          </div>
        `;
    }

    // State для переключения Остатки ↔ План производства
    let stockBalancesState = {
      data: null,
      supplyMap: null, // Map<offer_id, supplyItem>
      horizon: 60,
      sortCol: "daysLeft", // имя поля для сортировки
      sortDir: "asc",
      hideOk: true, // скрыть 🟢 и ⚪ по умолчанию
    };

    function renderStockBalances(data) {
      stockBalancesState.data = data;
      stockBalancesWrap.dataset.view = stockBalancesWrap.dataset.view || "stocks";
      _renderStockBalancesByView();
    }

    function _renderStockBalancesByView() {
      const view = stockBalancesWrap.dataset.view || "stocks";
      if (view === "production") {
        renderProductionPlan(stockBalancesState.data, stockBalancesState.supplyMap, stockBalancesState.horizon);
      } else {
        _renderStockBalancesStocksView(stockBalancesState.data);
      }
    }

    function _renderStockBalancesStocksView(data) {
      const items = data.items || [];
      const clusters = data.clusters || [];
      const fbsWarehouses = data.fbs_warehouses || [];
      const summary = data.summary || {};
      const accruals = data._accruals || {};

      if (!items.length) {
        stockBalancesWrap.innerHTML = `<div style="padding:24px;color:#888;">Нет данных об остатках</div>`;
        return;
      }

      // Calculate potential revenue/accrued for each item
      // revenue_per_unit = revenue_sales / net_sold_units, then × stock
      let totalPotRevenue = 0, totalPotAccrued = 0;
      const noDataMark = `<span style="color:#bbb;font-size:11px;" title="Нет данных о продажах за 60 дней">—</span>`;
      for (const item of items) {
        const acc = accruals[item.offer_id] || {};
        const sold = (acc.ordered_units || 0) - (acc.returned_units || 0);
        if (sold > 0) {
          item._revPerUnit = (acc.revenue_sales || 0) / sold;
          item._accPerUnit = (acc.accrued || 0) / sold;
          item._potRevenue = item._revPerUnit * item.total;
          item._potAccrued = item._accPerUnit * item.total;
          item._hasAccruals = true;
          totalPotRevenue += item._potRevenue;
          totalPotAccrued += item._potAccrued;
        } else {
          item._hasAccruals = false;
          item._potRevenue = 0;
          item._potAccrued = 0;
        }
      }

      const summaryHtml = `
        <div class="analytics-summary" style="grid-template-columns: repeat(4, 1fr);">
          <div class="analytics-summary-card">
            <div class="label">Артикулов</div>
            <div class="value">${formatMetric(summary.articles || 0)}</div>
          </div>
          <div class="analytics-summary-card">
            <div class="label">Всего шт.</div>
            <div class="value">${formatMetric(summary.total || 0)}</div>
          </div>
          <div class="analytics-summary-card">
            <div class="label">Потенц. выручка</div>
            <div class="value">${formatMetric(Math.round(totalPotRevenue))}</div>
          </div>
          <div class="analytics-summary-card">
            <div class="label">Потенц. начислено</div>
            <div class="value">${formatMetric(Math.round(totalPotAccrued))}</div>
          </div>
        </div>
      `;

      let bodyHtml = "";
      for (let idx = 0; idx < items.length; idx++) {
        const item = items[idx];
        const synced = item.last_synced_at ? new Date(item.last_synced_at).toLocaleString("ru-RU", {day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
        const nameShort = (item.name || "").length > 50 ? (item.name || "").slice(0, 48) + "…" : (item.name || "");
        const detailId = `sb_detail_${idx}`;
        const potRev = item._hasAccruals ? formatMetric(Math.round(item._potRevenue)) : noDataMark;
        const potAcc = item._hasAccruals ? formatMetric(Math.round(item._potAccrued)) : noDataMark;
        const accColor = item._hasAccruals && item._potAccrued < 0 ? '#c33' : '#2a6';

        // Parent row
        bodyHtml += `<tr class="sb-parent" data-detail="${detailId}" style="cursor:pointer;">
          <td style="font-weight:600;white-space:nowrap;padding:4px 8px;">
            <span class="sb-arrow" id="sb_arrow_${idx}" style="display:inline-block;width:14px;transition:transform .15s;">&#9654;</span>
            ${fmt(item.offer_id)}
          </td>
          <td title="${fmt(item.name)}" style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:4px 8px;">${nameShort}</td>
          <td style="font-weight:700;text-align:right;padding:4px 8px;">${formatMetric(item.total)}</td>
          <td style="color:#1a73e8;font-weight:600;text-align:right;padding:4px 8px;">${formatMetric(item.fbo_total)}</td>
          <td style="color:#e67700;font-weight:600;text-align:right;padding:4px 8px;">${formatMetric(item.fbs_total)}</td>
          <td style="text-align:right;padding:4px 8px;color:#2a6;">${potRev}</td>
          <td style="text-align:right;padding:4px 8px;color:${accColor};">${potAcc}</td>
          <td style="font-size:11px;color:#888;white-space:nowrap;padding:4px 8px;">${synced}</td>
        </tr>`;

        // Detail rows (hidden by default)
        const fboDetail = item.fbo_clusters_detail || {};
        const fbsDetail = item.fbs_wh_detail || {};

        // FBO cluster rows
        for (const cluster of clusters) {
          const d = fboDetail[cluster];
          if (!d || d.total === 0) continue;
          bodyHtml += `<tr class="sb-detail sb-detail-${detailId}" style="display:none;background:#f4f9ff;">
            <td style="padding:2px 8px 2px 28px;color:#1a73e8;font-size:12px;">FBO</td>
            <td style="font-size:12px;padding:2px 8px;" colspan="2">${fmt(cluster)}</td>
            <td style="font-weight:600;font-size:12px;text-align:right;padding:2px 8px;" title="Доступно ${formatMetric(d.available)} / Приёмка ${formatMetric(d.acceptance)} / В пути ${formatMetric(d.transit)} / Поставка ${formatMetric(d.supply)}">${formatMetric(d.total)}<span style="color:#999;font-weight:400;margin-left:4px;font-size:11px;">(${formatMetric(d.available)} дост.)</span></td>
            <td></td><td></td><td></td>
            <td></td>
          </tr>`;
        }

        // FBS warehouse rows
        for (const wh of fbsWarehouses) {
          const whKey = String(wh.warehouse_id);
          const d = fbsDetail[whKey];
          if (!d || d.present === 0) continue;
          const whLabel = `${fmt(d.warehouse_name || wh.warehouse_name)} <span style="color:#999;font-size:11px;">(#${wh.warehouse_id})</span>`;
          bodyHtml += `<tr class="sb-detail sb-detail-${detailId}" style="display:none;background:#fffaf4;">
            <td style="padding:2px 8px 2px 28px;color:#e67700;font-size:12px;">FBS</td>
            <td style="font-size:12px;padding:2px 8px;" colspan="2">${whLabel}</td>
            <td></td>
            <td style="font-weight:600;font-size:12px;text-align:right;padding:2px 8px;">${formatMetric(d.present)}${d.reserved ? `<span style="color:#999;font-weight:400;margin-left:4px;font-size:11px;">(${formatMetric(d.reserved)} резерв)</span>` : ""}</td>
            <td></td><td></td>
            <td></td>
          </tr>`;
        }
      }

      // Totals row
      const totalsRow = `<tr style="font-weight:700;background:#f0f4f8;">
        <td style="padding:4px 8px;"></td><td style="padding:4px 8px;">ИТОГО</td>
        <td style="text-align:right;padding:4px 8px;">${formatMetric(summary.total || 0)}</td>
        <td style="color:#1a73e8;text-align:right;padding:4px 8px;">${formatMetric(summary.fbo_total || 0)}</td>
        <td style="color:#e67700;text-align:right;padding:4px 8px;">${formatMetric(summary.fbs_total || 0)}</td>
        <td style="text-align:right;padding:4px 8px;color:#2a6;">${formatMetric(Math.round(totalPotRevenue))}</td>
        <td style="text-align:right;padding:4px 8px;color:${totalPotAccrued >= 0 ? '#2a6' : '#c33'};">${formatMetric(Math.round(totalPotAccrued))}</td>
        <td style="padding:4px 8px;"></td>
      </tr>`;

      stockBalancesWrap.innerHTML = `
        ${_renderStockBalancesToggle()}
        ${summaryHtml}
        <div style="overflow-x:auto;display:flex;justify-content:center;">
          <table class="data-table report-table" style="font-size:13px;width:auto;min-width:700px;max-width:1100px;">
            <thead>
              <tr>
                <th>Артикул</th>
                <th>Наименование</th>
                <th style="text-align:right;">Всего</th>
                <th style="text-align:right;">FBO</th>
                <th style="text-align:right;">FBS</th>
                <th style="text-align:right;" title="Выручка за 1 шт (60д) × остатки">Потенц. выручка</th>
                <th style="text-align:right;" title="Начислено за 1 шт (60д) × остатки">Потенц. начислено</th>
                <th>Синхр.</th>
              </tr>
            </thead>
            <tbody>
              ${totalsRow}
              ${bodyHtml}
            </tbody>
          </table>
        </div>
      `;

      // Toggle detail rows on parent click
      stockBalancesWrap.querySelectorAll(".sb-parent").forEach((parentRow) => {
        parentRow.addEventListener("click", () => {
          const detId = parentRow.dataset.detail;
          const details = stockBalancesWrap.querySelectorAll(`.sb-detail-${detId}`);
          const arrow = parentRow.querySelector(".sb-arrow");
          const isOpen = details.length > 0 && details[0].style.display !== "none";
          details.forEach((r) => r.style.display = isOpen ? "none" : "");
          if (arrow) arrow.style.transform = isOpen ? "" : "rotate(90deg)";
        });
      });
      _bindStockBalancesToggle();
    }

    function renderProductionPlan(data, supplyMap, horizonDays) {
      const stockItems = (data && data.items) || [];
      const horizon = Math.max(7, Math.min(365, Number(horizonDays) || 60));
      if (!(supplyMap instanceof Map)) supplyMap = new Map();

      // Метаданные приоритетов (для badge и сортировки)
      const PRIO = {
        crit:   { rank: 1, cls: "crit",   label: "🔴 Крит",   full: "Критично (≤1 дня)" },
        urg:    { rank: 2, cls: "urg",    label: "🟠 Срочно", full: "Срочно (≤14 дн.)" },
        plan:   { rank: 3, cls: "plan",   label: "🟡 План",   full: "В плане (15–35 дн.)" },
        ok:     { rank: 4, cls: "ok",     label: "🟢 OK",     full: "Запас OK (>35 дн.)" },
        nosale: { rank: 5, cls: "nosale", label: "⚪ —",      full: "Без продаж" },
      };

      // Слить stock-balances items с supply-plan по offer_id.
      const merged = stockItems.map((item) => {
        const offer = String(item.offer_id || "");
        const sp = supplyMap.get(offer) || null;
        const v = sp ? Number(sp.avg_daily_sales || 0) : 0;
        const stock = sp ? (
          Number(sp.stock_fbo_available || 0) +
          Number(sp.stock_fbo_supply || 0) +
          Number(sp.stock_fbo_transit || 0) +
          Number(sp.stock_fbo_acceptance || 0) +
          Number(sp.stock_fbs || 0)
        ) : Number(item.total || 0);
        const daysLeft = v > 0 ? stock / v : Infinity;
        const productionQty = v > 0 ? Math.max(0, Math.ceil(horizon * v) - stock) : 0;
        let prio;
        if (v <= 0) prio = PRIO.nosale;
        else if (daysLeft <= 1) prio = PRIO.crit;
        else if (daysLeft <= 14) prio = PRIO.urg;
        else if (daysLeft <= 35) prio = PRIO.plan;
        else prio = PRIO.ok;
        return {
          offer_id: offer,
          name: item.name || "",
          v: v,
          stock: stock,
          daysLeft: daysLeft,
          productionQty: productionQty,
          grade: sp ? (sp.turnover_grade || "") : "",
          prioRank: prio.rank,
          prioCls: prio.cls,
          prioLabel: prio.label,
          prioFull: prio.full,
        };
      });

      // Сводка по группам (считается ДО фильтрации hideOk, чтобы цифры отражали общую картину)
      const countsByPrio = { crit: { n: 0, qty: 0 }, urg: { n: 0, qty: 0 }, plan: { n: 0, qty: 0 } };
      for (const r of merged) {
        if (r.prioCls === "crit" || r.prioCls === "urg" || r.prioCls === "plan") {
          countsByPrio[r.prioCls].n += 1;
          countsByPrio[r.prioCls].qty += r.productionQty;
        }
      }
      const totalQty = countsByPrio.crit.qty + countsByPrio.urg.qty + countsByPrio.plan.qty;

      // Фильтр + сортировка
      const filtered = stockBalancesState.hideOk
        ? merged.filter((r) => r.prioCls !== "ok" && r.prioCls !== "nosale")
        : merged;
      const sortCol = stockBalancesState.sortCol || "daysLeft";
      const sortDir = stockBalancesState.sortDir === "desc" ? -1 : 1;
      const getVal = (r, c) => {
        if (c === "prioRank") return r.prioRank;
        if (c === "offer_id" || c === "name" || c === "grade") return String(r[c] || "").toLowerCase();
        if (c === "daysLeft") return r.daysLeft === Infinity ? 1e18 : r.daysLeft;
        return Number(r[c] || 0);
      };
      filtered.sort((a, b) => {
        const va = getVal(a, sortCol), vb = getVal(b, sortCol);
        if (va === vb) return a.prioRank - b.prioRank; // tie-break
        if (typeof va === "string") return va < vb ? -sortDir : sortDir;
        return (va - vb) * sortDir;
      });

      // Render
      const arrow = (col) => col === sortCol ? (sortDir === 1 ? "▲" : "▼") : "";
      const thCls = (col) => col === sortCol ? "active" : "";
      const daysTxt = (r) => r.daysLeft === Infinity ? "∞" : r.daysLeft.toFixed(1);
      const rowHtml = (r) => `<tr>
        <td style="padding:4px 8px;"><span class="pp-badge ${r.prioCls}" title="${r.prioFull}">${r.prioLabel}</span></td>
        <td style="font-weight:600;padding:4px 8px;white-space:nowrap;">${fmt(r.offer_id)}</td>
        <td style="padding:4px 8px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${fmt(r.name)}">${fmt(r.name.length > 50 ? r.name.slice(0, 48) + "…" : r.name)}</td>
        <td style="text-align:right;padding:4px 8px;">${r.v > 0 ? r.v.toFixed(2) : "—"}</td>
        <td style="text-align:right;padding:4px 8px;">${formatMetric(r.stock, 0)}</td>
        <td style="text-align:right;padding:4px 8px;">${daysTxt(r)}</td>
        <td style="text-align:right;padding:4px 8px;font-weight:700;">${r.v > 0 ? formatMetric(r.productionQty, 0) : "—"}</td>
        <td style="padding:4px 8px;font-size:11px;color:#888;">${fmt(r.grade)}</td>
      </tr>`;

      const summaryHtml = `
        <div class="pp-summary">
          <div class="analytics-summary-card"><div class="label">🔴 Критично</div><div class="value">${countsByPrio.crit.n}</div><div class="subvalue">${formatMetric(countsByPrio.crit.qty, 0)} ед. к производству</div></div>
          <div class="analytics-summary-card"><div class="label">🟠 Срочно</div><div class="value">${countsByPrio.urg.n}</div><div class="subvalue">${formatMetric(countsByPrio.urg.qty, 0)} ед. к производству</div></div>
          <div class="analytics-summary-card"><div class="label">🟡 В плане</div><div class="value">${countsByPrio.plan.n}</div><div class="subvalue">${formatMetric(countsByPrio.plan.qty, 0)} ед. к производству</div></div>
          <div class="analytics-summary-card"><div class="label">Итого к производству</div><div class="value">${formatMetric(totalQty, 0)}</div><div class="subvalue">за горизонт ${horizon} дн. (без 🟢/⚪)</div></div>
        </div>
      `;

      const controlsHtml = `
        <div class="pp-controls">
          <label class="pp-horizon">Горизонт производства, дней:
            <input type="number" id="pp-horizon-input" min="7" max="365" step="1" value="${horizon}">
          </label>
          <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
            <input type="checkbox" id="pp-hide-ok" ${stockBalancesState.hideOk ? "checked" : ""}>
            Скрыть 🟢 и ⚪ (только требующие производства)
          </label>
          <span style="color:#888;font-size:12px;">Показано ${filtered.length} из ${merged.length}</span>
        </div>
      `;

      const tableHtml = `
        <div style="max-width: 1200px; margin: 0 auto; overflow-x:auto;">
          <table class="data-table report-table pp-table" style="font-size:13px;width:100%;">
            <thead><tr>
              <th data-sort-key="prioRank" class="${thCls("prioRank")}">Приоритет <span class="pp-sort-arrow">${arrow("prioRank")}</span></th>
              <th data-sort-key="offer_id" class="${thCls("offer_id")}">Артикул <span class="pp-sort-arrow">${arrow("offer_id")}</span></th>
              <th data-sort-key="name" class="${thCls("name")}">Наименование <span class="pp-sort-arrow">${arrow("name")}</span></th>
              <th data-sort-key="v" class="${thCls("v")}" style="text-align:right;">v/день <span class="pp-sort-arrow">${arrow("v")}</span></th>
              <th data-sort-key="stock" class="${thCls("stock")}" style="text-align:right;">Остаток <span class="pp-sort-arrow">${arrow("stock")}</span></th>
              <th data-sort-key="daysLeft" class="${thCls("daysLeft")}" style="text-align:right;">≈дней <span class="pp-sort-arrow">${arrow("daysLeft")}</span></th>
              <th data-sort-key="productionQty" class="${thCls("productionQty")}" style="text-align:right;">К произв. <span class="pp-sort-arrow">${arrow("productionQty")}</span></th>
              <th data-sort-key="grade" class="${thCls("grade")}">Статус Ozon <span class="pp-sort-arrow">${arrow("grade")}</span></th>
            </tr></thead>
            <tbody>${filtered.map(rowHtml).join("") || `<tr><td colspan="8" style="text-align:center;padding:20px;color:#888;">Нет данных</td></tr>`}</tbody>
          </table>
        </div>
      `;

      stockBalancesWrap.innerHTML = `
        ${_renderStockBalancesToggle()}
        ${summaryHtml}
        ${controlsHtml}
        ${tableHtml}
      `;

      _bindStockBalancesToggle();
      _bindProductionPlanHandlers();
    }

    function _bindProductionPlanHandlers() {
      const horizonInput = stockBalancesWrap.querySelector("#pp-horizon-input");
      if (horizonInput) {
        const onChange = () => {
          const v = Math.max(7, Math.min(365, Number(horizonInput.value) || 60));
          if (v !== stockBalancesState.horizon) {
            stockBalancesState.horizon = v;
            renderProductionPlan(stockBalancesState.data, stockBalancesState.supplyMap, stockBalancesState.horizon);
          }
        };
        horizonInput.addEventListener("change", onChange);
        horizonInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); onChange(); } });
      }
      const hideOkCb = stockBalancesWrap.querySelector("#pp-hide-ok");
      if (hideOkCb) {
        hideOkCb.addEventListener("change", () => {
          stockBalancesState.hideOk = hideOkCb.checked;
          renderProductionPlan(stockBalancesState.data, stockBalancesState.supplyMap, stockBalancesState.horizon);
        });
      }
      stockBalancesWrap.querySelectorAll(".pp-table th[data-sort-key]").forEach((th) => {
        th.addEventListener("click", () => {
          const col = th.dataset.sortKey;
          if (stockBalancesState.sortCol === col) {
            stockBalancesState.sortDir = stockBalancesState.sortDir === "asc" ? "desc" : "asc";
          } else {
            stockBalancesState.sortCol = col;
            // Дефолт: для числовых — desc (больше сверху), для текстовых и daysLeft — asc
            stockBalancesState.sortDir = (col === "offer_id" || col === "name" || col === "grade" || col === "daysLeft" || col === "prioRank") ? "asc" : "desc";
          }
          renderProductionPlan(stockBalancesState.data, stockBalancesState.supplyMap, stockBalancesState.horizon);
        });
      });
    }

      const view = stockBalancesWrap.dataset.view || "stocks";
      return `
        <div class="pp-toggle">
          <button data-pp-view="stocks" class="${view === "stocks" ? "active" : ""}">📦 Остатки</button>
          <button data-pp-view="production" class="${view === "production" ? "active" : ""}">🏭 План производства</button>

    async function applySupplyInputChange(productId, offerId, nextValue) {
      const normalizedProductId = Number(productId || 0);
      const normalizedOfferId = String(offerId || "").trim();
      if (!normalizedProductId && !normalizedOfferId) return;
      const payload = { supply_stock: nextValue };
      if (normalizedProductId > 0) payload.product_id = normalizedProductId;
      if (normalizedOfferId) payload.offer_id = normalizedOfferId;
      await saveSupplyPlanState(payload);
      getSupplyPlanItemsSource().forEach((group) => {
        const groupProductId = Number(group?.product_id || 0);
        const offerMatches = String(group?.offer_id || "").trim() === normalizedOfferId;
        const productMatches = normalizedProductId > 0 && groupProductId === normalizedProductId;
        if (!productMatches && !offerMatches) return;
        group.supply_stock = nextValue;
        const clusterKeys = new Set(
          (Array.isArray(group?.details) ? group.details : [])
            .map((detail, detailIndex) =>
              normalizeWarehouseKey(
                getEffectiveSupplyDetail(group, detail, detailIndex)?.cluster_name ||
                getEffectiveSupplyDetail(group, detail, detailIndex)?.warehouse_name ||
                ""
              )
            )
            .filter(Boolean)
        );
        clusterKeys.forEach((clusterKey) => rebalanceGroupSupplyForCluster(group, clusterKey));
      });
      recalcSupplyPlanSummaryFromOverrides();
      renderSupplyPlan(currentSupplyPlanItems, latestSupplyPlanSummary || {});
    }

    function scheduleSupplyInputSave(productId, offerId, nextValue, delay = 250) {
      const key = Number(productId || 0) > 0 ? `product:${Number(productId)}` : `offer:${String(offerId || "").trim()}`;
      if (!key) return;
      clearTimeout(supplyInputSaveTimers[key]);
      supplyInputSaveTimers[key] = setTimeout(async () => {
        delete supplyInputSaveTimers[key];
        try {
          await applySupplyInputChange(productId, offerId, nextValue);
        } catch (e) {
          meta.textContent = `Ошибка сохранения остатка для поставки: ${e.message}`;
        }
      }, delay);
    }

    function recalcSupplyPlanSummaryFromOverrides() {
      const groups = getSupplyPlanItemsSource();
      groups.forEach((group) => {
        const stockTotal = toNonNegativeInt(group?.supply_stock ?? 0, 0);
        const allocatedTotal = (group?.details || []).reduce((sum, detail, detailIndex) => {
          const effective = getEffectiveSupplyDetail(group, detail, detailIndex);
          return sum + toNonNegativeInt(effective?.allocated_supply ?? 0, 0);
        }, 0);
        group.remaining_supply = Math.max(0, stockTotal - allocatedTotal);
      });

      latestSupplyPlanSummary = {
        ...(latestSupplyPlanSummary || {}),
        supply_stock: groups.reduce((sum, group) => sum + toNonNegativeInt(group?.supply_stock ?? 0, 0), 0),
        remaining_supply: groups.reduce((sum, group) => sum + toNonNegativeInt(group?.remaining_supply ?? 0, 0), 0),
      };
    }

    function normalizeSupplyKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[ё]/g, "е")
        .replace(/[_-]/g, " ")
        .replace(/\s+/g, " ")
        .replace(/^'+|'+$/g, "");
    }

    function getPalletDetailsDomId(clusterName, palletNumber) {
      return `pallet-${String(clusterName || "").replace(/\s+/g, '-')}-${palletNumber}`;
    }

    function pickAvailabilityReportFile() {
      return new Promise((resolve) => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
        input.style.display = "none";
        document.body.appendChild(input);
        input.addEventListener("change", () => {
          const file = (input.files && input.files[0]) || null;
          input.remove();
          resolve(file);
        }, { once: true });
        input.click();
      });
    }

    async function fillSupplyPlanFromAvailabilityReport() {
      try {
        const file = await pickAvailabilityReportFile();
        if (!file) {
          meta.textContent = "Импорт XLSX отменен.";
          return;
        }
        const formData = new FormData();
        formData.append("file", file, file.name);
        const response = await fetch("/api/supply-plan/fill-from-availability-report", {
          method: "POST",
          body: formData,
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data?.error || "Ошибка импорта XLSX");
        }
        // После импорта расчет "Поставим" делает backend: Excel (если загружен) или "Нужно".
        supplyDetailOverrides = {};
        await loadReport();
        const matchedRows = Number(data?.validation?.matched_rows || 0);
        meta.textContent = `Импортирован ${data.report_file || "XLSX"}: строк ${formatMetric(matchedRows)}. Распределение "Поставим" обновлено. Пересчёт паллет...`;
        await calculatePalletsForSupplyPlan();
        meta.textContent = `Импортирован ${data.report_file || "XLSX"}: строк ${formatMetric(matchedRows)}. Распределение и паллеты обновлены.`;
      } catch (e) {
        meta.textContent = `Ошибка импорта XLSX: ${e.message}`;
      }
    }

      analyticsStocksWrap.innerHTML = `
        <div class="analytics-stocks-wrap" style="width: min(1320px, 100%); margin: 0 auto;">

    async function filterPalletsByHeight() {
      const minHeight = parseFloat(document.getElementById("filter-pallet-height")?.value || "0.4") || 0.4;
      const statusEl = document.getElementById("filter-pallets-status");
      if (!latestPalletClusters || !latestPalletClusters.length) {
        if (statusEl) statusEl.textContent = "Сначала рассчитайте паллеты";
        return;
      }
      if (statusEl) statusEl.textContent = "Фильтрую...";
      try {
        const resp = await fetch("/api/supply-plan/pallets/filter", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ clusters: latestPalletClusters, min_height: minHeight }),
        });
        const data = await resp.json();
        if (!data.success) {
          if (statusEl) statusEl.textContent = "Ошибка: " + (data.error || "?");
          return;
        }
        const filteredClusters = Array.isArray(data.clusters) ? data.clusters : [];
        const removedClusterCount = filteredClusters.filter((cluster) => !Array.isArray(cluster?.pallets) || cluster.pallets.length === 0).length;
        latestPalletClusters = filteredClusters.filter((cluster) => Array.isArray(cluster?.pallets) && cluster.pallets.length > 0);
        await syncSupplyPlanFromAllPallets();
        const removed = data.removed_total || 0;
        if (statusEl) statusEl.innerHTML = removed > 0
          ? `<span style="color:#e53935;">Удалено ${removed} паллет ниже ${minHeight}м${removedClusterCount > 0 ? `, скрыто кластеров: ${removedClusterCount}` : ''}</span>`
          : `<span style="color:#4caf50;">Все паллеты выше ${minHeight}м</span>`;
      } catch (e) {
        if (statusEl) statusEl.textContent = "Ошибка: " + String(e?.message || e);
      }
    }

    async function exportSupplyPlanPallets() {
      if (!Array.isArray(latestPalletClusters) || latestPalletClusters.length === 0) {
        alert("Сначала рассчитайте паллеты");
        return;
      }
      try {
        const response = await fetch('/api/supply-plan/pallets/export', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clusters: latestPalletClusters })
        });
        if (!response.ok) {
          let errorText = `HTTP ${response.status}`;
          try {
            const data = await response.json();
            errorText = data?.error || errorText;
          } catch (_) {
            // ignore JSON parsing issues
          }
          throw new Error(errorText);
        }
        const blob = await response.blob();
        const contentDisposition = response.headers.get('Content-Disposition') || '';
        const match = contentDisposition.match(/filename="([^"]+)"/i);
        const filename = match?.[1] || `supply_palletization_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.xlsx`;
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      } catch (error) {
        alert(`Ошибка сохранения файла: ${error.message}`);
      }
    }

    function exportSupplyPlanPalletsJson() {
      if (!Array.isArray(latestPalletClusters) || latestPalletClusters.length === 0) {

      try {
        const payload = {
          saved_at: new Date().toISOString(),

        const link = document.createElement("a");
        link.href = url;
        link.download = `supply_palletization_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-")}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      } catch (error) {

    async function runCheckDrafts() {
      const statusEl = document.getElementById("check-drafts-status");
      const resultsEl = document.getElementById("check-drafts-results");
      const btn = document.getElementById("check-drafts-run-btn");
      if (!statusEl || !resultsEl) return;

      const withItems = document.getElementById("check-drafts-items-cb")?.checked ?? true;
      const limit = parseInt(document.getElementById("check-drafts-limit")?.value || "20", 10);

      statusEl.textContent = "Загружаем список поставок...";
      resultsEl.innerHTML = "";
      if (btn) btn.disabled = true;

      try {
        const resp = await fetch("/api/supply-plan/check-drafts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ limit, with_items: withItems }),
        });
        const data = await resp.json();
        if (!data.success) {
          statusEl.textContent = `Ошибка: ${data.error || "unknown"}`;
          return;
        }
        const orders = data.orders || [];
        statusEl.textContent = `Найдено ${orders.length} заявок — ${new Date(data.checked_at).toLocaleString("ru")}`;
        resultsEl.innerHTML = renderCheckDraftsResults(orders);
      } catch (err) {
        statusEl.textContent = `Ошибка запроса: ${err.message}`;

      }

      const file = input?.files?.[0];
      const statusEl = document.getElementById("fill-draft-status");
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const clusters = Array.isArray(parsed?.clusters) ? parsed.clusters : (Array.isArray(parsed) ? parsed : []);
        if (!clusters.length) {
          throw new Error("В файле нет кластеров паллетизации");

        latestPalletClusters = clusters;
        latestWarehouseAcceptance = null;
        persistPalletizationState();
        await syncSupplyPlanFromAllPallets();
        if (statusEl) {
          statusEl.innerHTML = `<div style="padding: 8px 10px; background: #eef9f1; border: 1px solid #cdebd5; border-radius: 8px; color: #1f6f45; font-size: 12px;">Паллетизация загружена из файла: ${fmt(file.name)}</div>`;

        if (statusEl) {
          statusEl.innerHTML = `<div style="padding: 8px 10px; background: #fff1f1; border: 1px solid #ffd1d1; border-radius: 8px; color: #a40000; font-size: 12px;">Ошибка загрузки паллетизации: ${fmt(String(error?.message || error))}</div>`;
        } else {
          alert(`Ошибка загрузки паллетизации: ${error.message}`);
        }
      } finally {
        if (input) input.value = "";
      }
    }
