version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ozon_db
    environment:
      POSTGRES_USER: ozon_user
      POSTGRES_PASSWORD: ozon_password
      POSTGRES_DB: ozon_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ozon_user -d ozon_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ozon_sync
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ozon_user:ozon_password@db:5432/ozon_analytics
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command: python -m src.main --mode full

  metabase:
    image: metabase/metabase:latest
    container_name: ozon_metabase
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  metabase_data:
