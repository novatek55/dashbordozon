version: '3.8'

services:
  metabase:
    image: metabase/metabase:latest
    container_name: ozon_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  metabase_data:

